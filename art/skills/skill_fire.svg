<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- 火焰系 Fire Skill Icon -->
  <defs>
    <radialGradient id="fire-bg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7f1d1d"/>
      <stop offset="1" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="fire-core" cx="0.5" cy="0.6" r="0.5">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="0.4" stop-color="#fbbf24"/>
      <stop offset="0.8" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#7f1d1d" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="fire-flame" x1="0.5" x2="0.5" y1="1" y2="0">
      <stop offset="0" stop-color="#dc2626"/>
      <stop offset="0.5" stop-color="#f97316"/>
      <stop offset="0.85" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>

  <!-- 圓形底 -->
  <circle cx="128" cy="128" r="120" fill="url(#fire-bg)" stroke="#fbbf24" stroke-width="4"/>
  <circle cx="128" cy="128" r="115" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.5"/>

  <!-- 火焰漩渦光 -->
  <circle cx="128" cy="135" r="80" fill="url(#fire-core)" opacity="0.85"/>

  <!-- 主火焰 -->
  <path d="M 128 220 Q 90 200 80 165 Q 75 130 95 110 Q 100 125 110 130 Q 105 100 130 70 Q 135 100 145 115 Q 155 95 170 95 Q 165 130 175 145 Q 185 175 175 195 Q 160 215 128 220 Z" fill="url(#fire-flame)" stroke="#dc2626" stroke-width="1.5"/>

  <!-- 內火焰 -->
  <path d="M 128 200 Q 110 185 105 160 Q 110 135 125 125 Q 130 145 135 155 Q 145 140 150 145 Q 145 175 152 185 Q 145 200 128 200 Z" fill="#fbbf24" opacity="0.9"/>
  <path d="M 128 180 Q 120 170 122 150 Q 130 145 134 155 Q 140 165 132 180 Z" fill="#fef3c7" opacity="0.85"/>

  <!-- 火星 -->
  <circle cx="80" cy="100" r="3" fill="#fbbf24"/>
  <circle cx="180" cy="100" r="2" fill="#fef3c7"/>
  <circle cx="200" cy="150" r="3" fill="#dc2626"/>
  <circle cx="60" cy="160" r="2" fill="#f97316"/>
  <circle cx="195" cy="195" r="2" fill="#fbbf24"/>
  <circle cx="65" cy="210" r="2" fill="#dc2626"/>

  <!-- 外圈光暈 -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#fef3c7" stroke-width="1" opacity="0.3"/>
</svg>
