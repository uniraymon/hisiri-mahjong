<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- 流血系 Blood Skill Icon -->
  <defs>
    <radialGradient id="bl-bg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#450a0a"/>
      <stop offset="1" stop-color="#0c0606"/>
    </radialGradient>
    <radialGradient id="bl-glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#fca5a5" stop-opacity="0.4"/>
      <stop offset="0.7" stop-color="#7f1d1d" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#0c0606" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bl-drop" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fca5a5"/>
      <stop offset="0.4" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
  </defs>

  <!-- 圓形底 -->
  <circle cx="128" cy="128" r="120" fill="url(#bl-bg)" stroke="#dc2626" stroke-width="4"/>
  <circle cx="128" cy="128" r="115" fill="none" stroke="#fca5a5" stroke-width="1" opacity="0.4"/>

  <!-- 中央光暈 -->
  <circle cx="128" cy="120" r="90" fill="url(#bl-glow)"/>

  <!-- 主血滴（大） -->
  <path d="M 128 60 Q 100 100 95 140 Q 95 175 128 195 Q 161 175 161 140 Q 156 100 128 60 Z" fill="url(#bl-drop)" stroke="#7f1d1d" stroke-width="2.5"/>

  <!-- 高光 -->
  <ellipse cx="115" cy="120" rx="8" ry="22" fill="#fca5a5" opacity="0.55"/>
  <ellipse cx="113" cy="115" rx="3" ry="10" fill="#fef2f2" opacity="0.85"/>

  <!-- 滴落小血滴 -->
  <path d="M 70 175 Q 65 190 70 200 Q 78 200 80 192 Q 78 185 70 175 Z" fill="url(#bl-drop)" stroke="#7f1d1d" stroke-width="1.5"/>
  <path d="M 186 175 Q 191 190 186 200 Q 178 200 176 192 Q 178 185 186 175 Z" fill="url(#bl-drop)" stroke="#7f1d1d" stroke-width="1.5"/>
  <path d="M 100 200 Q 96 213 100 220 Q 106 220 108 214 Q 106 209 100 200 Z" fill="url(#bl-drop)" stroke="#7f1d1d" stroke-width="1.2"/>
  <path d="M 156 200 Q 160 213 156 220 Q 150 220 148 214 Q 150 209 156 200 Z" fill="url(#bl-drop)" stroke="#7f1d1d" stroke-width="1.2"/>

  <!-- 噴濺 -->
  <circle cx="80" cy="100" r="4" fill="#dc2626"/>
  <circle cx="74" cy="106" r="2" fill="#dc2626"/>
  <circle cx="178" cy="100" r="3.5" fill="#dc2626"/>
  <circle cx="184" cy="106" r="2" fill="#dc2626"/>
  <circle cx="60" cy="140" r="2.5" fill="#7f1d1d"/>
  <circle cx="196" cy="140" r="2.5" fill="#7f1d1d"/>

  <!-- 底部血池 -->
  <ellipse cx="128" cy="220" rx="50" ry="6" fill="#7f1d1d" opacity="0.7"/>
  <ellipse cx="128" cy="218" rx="35" ry="3" fill="#dc2626" opacity="0.9"/>

  <!-- 外圈光暈 -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#fca5a5" stroke-width="1" opacity="0.3"/>
</svg>
