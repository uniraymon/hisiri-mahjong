    if (!cls) return null;
    const lv = rpg.level || 1;
    const b = computeSkillBonuses(player);
    const ab = computeAbilityBonuses(player);
    let stats = {
      maxHp: Math.round((cls.hp + (lv - 1) * cls.hpPer) * (1 + b.hpPct)) + b.hp + ab.hp,
      maxMp: Math.round(((cls.mp || 30) + (lv - 1) * (cls.mpPer || 5)) * (1 + b.mpPct)) + b.mp + ab.mp,
      atk:   Math.round(cls.atk + (lv - 1) * cls.atkPer) + b.atk + ab.atk,
      def:   Math.round(cls.def + (lv - 1) * cls.defPer) + b.def + ab.def,
      spd:   Math.round(cls.spd + (lv - 1) * cls.spdPer) + b.spd + ab.spd,
      mark:  Math.round((cls.mark || 0) + (lv - 1) * (cls.markPer || 0)) + (ab.mark || 0),
    };
    // 裝備加成（10 個槽）— 同時累積裝備本身的 critChance / critDmg / mpRegen
    let itemCritChance = 0;
    let itemCritDmg = 0;
    let itemMpRegen = 0;
    for (const slot of ['weapon', 'armor', 'accessory', 'helmet', 'gloves', 'boots', 'cape', 'wings', 'pet', 'guide', 'ring1', 'ring2']) {
      const itemId = rpg.equipment?.[slot];
      if (itemId) {
        const item = resolveItem(itemId);
        if (item) {
          if (item.atk)  stats.atk  += item.atk;
          if (item.def)  stats.def  += item.def;
          if (item.spd)  stats.spd  += item.spd;
          if (item.hp)   stats.maxHp += item.hp;
          if (item.mp)   stats.maxMp += item.mp;
          if (item.mark) stats.mark += item.mark;
          if (item.critChance) itemCritChance += item.critChance;
          if (item.critDmg)    itemCritDmg    += item.critDmg;
          if (item.mpRegen)    itemMpRegen    += item.mpRegen;
        }
      }
    }
    // 套裝加成
    const setInfo = computeSetBonuses(player);
    if (setInfo.bonuses.atk)  stats.atk  += setInfo.bonuses.atk;
    if (setInfo.bonuses.def)  stats.def  += setInfo.bonuses.def;
    if (setInfo.bonuses.spd)  stats.spd  += setInfo.bonuses.spd;
    if (setInfo.bonuses.hp)   stats.maxHp += setInfo.bonuses.hp;
    if (setInfo.bonuses.mp)   stats.maxMp += setInfo.bonuses.mp;
    if (setInfo.bonuses.mark) stats.mark += setInfo.bonuses.mark;
    // ⭐ 寶物的直接屬性類加成（hp/mp/atk/def/spd/critChance/critDmg）
    const treasure = computeTreasureBonuses(rpg);
    stats.maxHp += treasure.hp   || 0;
    stats.maxMp += treasure.mp   || 0;
    stats.atk   += treasure.atk  || 0;
    stats.def   += treasure.def  || 0;
    stats.spd   += treasure.spd  || 0;
    stats.mark  += treasure.mark || 0;
    // ⭐ 精魂加成（裝在 5 個槽中的）
    let spiritCritChance = 0;
    let spiritCritDmg = 0;
    const spirits = getSpiritSlots(rpg);
    for (const sp of spirits) {
      if (!sp) continue;
      stats.maxHp += sp.hp   || 0;
      stats.atk   += sp.atk  || 0;
      stats.def   += sp.def  || 0;
      stats.spd   += sp.spd  || 0;
      stats.mark  += sp.mark || 0;
      spiritCritChance += sp.critChance || 0;
      spiritCritDmg    += sp.critDmg    || 0;
    }
    // critChance / critDmg：把裝備 + 寶物 + 精魂加成併到 setBonuses，autoFight 直接讀
    const mergedBonuses = { ...setInfo.bonuses };
    mergedBonuses.critChance = (mergedBonuses.critChance || 0) + itemCritChance + (treasure.critChance || 0) + spiritCritChance;
    mergedBonuses.critDmg    = (mergedBonuses.critDmg    || 0) + itemCritDmg    + (treasure.critDmg || 0)    + spiritCritDmg;
    stats.setBonuses = mergedBonuses;
    stats.setCounts = setInfo.counts;
    // 給 UI 顯示用：總暴擊率 / 總爆傷倍率（包含職業底、技能、能力、被動、裝備、套裝）
    const cBonus = computeSkillBonuses(player);
    const cAbil  = computeAbilityBonuses(player);
    const cPass  = (typeof computePassiveBonuses === 'function') ? computePassiveBonuses(player) : {};
    stats.totalCritChance = 0.08
      + (cls.critBonus || 0)
      + (cBonus.critChance || 0)
      + (cAbil.critChance || 0)
      + (cPass.critChance || 0)
      + (mergedBonuses.critChance || 0);
    stats.totalCritDmg = 1.7
      + (cAbil.critDmgBonus || 0)
      + (cPass.critDmg || 0)
      + (mergedBonuses.critDmg || 0);
    // ⭐ 每回合 MP 自動恢復（鵝王恩賜首飾、之後其他來源都加在這裡）
    stats.mpRegen = itemMpRegen;
    return stats;
  }
  // ⭐ 怪物 EXP 給予公式（依等級）— 全面 +20%
  //   Lv 1-5  : 24, 30, 36, 42, 48
  //   Lv 6-10 : 96, 108, 120, 132, 144
  //   Lv 11-15: 180, 192, 204, 216, 228
  //   Lv 16-20: 276, 288, 300, 312, 324
  //   Lv 21+  : 同樣 ×1.20 縮放
  function getMonsterBaseXp(level) {
    const lv = Math.max(1, level | 0);
    let base;
    if (lv <= 5)        base = 20  + (lv - 1)  * 5;
    else if (lv <= 10)  base = 80  + (lv - 6)  * 10;
    else if (lv <= 15)  base = 150 + (lv - 11) * 10;
    else if (lv <= 20)  base = 230 + (lv - 16) * 10;
    else {
      const tier = Math.floor((lv - 1) / 5);
      const tierBase = 230 + (tier - 3) * 80;
      base = tierBase + (lv - tier * 5 - 1) * 10;
    }
    return Math.round(base * 1.20);
  }
  // ⭐ 不同品種品種隨機加成 0~20%（戰鬥當下 roll，所以「最多多 20%」）
  function rollMonsterXpVariance(level) {
    const base = getMonsterBaseXp(level);
    return Math.round(base * (1 + Math.random() * 0.20));
  }

  // ⭐ 探險 EXP — 大幅縮減，永遠遠小於怪物 EXP
  //   舊公式 Lv 30 outcome 200 會給 ~78 XP，玩家覺得太多
  //   新公式：tier = clamp(outcome.xp / 30, 1, 5)
  //          xp = round(level × tier × 0.3)
  //   範例：
  //     Lv 1  outcome 30  → 1
  //     Lv 1  outcome 200 → 2
  //     Lv 10 outcome 80  → 11
  //     Lv 30 outcome 80  → 32
  //     Lv 30 outcome 200 → 45
  //     Lv 50 outcome 200 → 75
  //   對比同等級怪物（Lv 30 約 430、Lv 50 約 670）→ 探險 EXP < 10%，不會搶風頭
  function getForageXp(outcomeXp, level) {
    const lv = Math.max(1, level | 0);
    const tier = Math.max(1, Math.min(5, (Number(outcomeXp) || 30) / 30));
    return Math.max(1, Math.round(lv * tier * 0.3));
  }

  function generateMonster(playerLv, opts) {
    const me = (typeof getMe === 'function') ? getMe() : null;
    const rpg = me && me.rpg ? me.rpg : null;
    // ⭐ 探險選錯路觸發的戰鬥：強制 forage 精英，跳過綠茶判斷
    // （否則綠茶有機率攔截，玩家以為打精英但其實打到綠茶 → 沒掉裝）
    const noSpecial = !!(opts && opts.noSpecial);
    if (opts && opts.forageElite) {
      // 落入下面的 forage elite 分支
    } else if (noSpecial) {
      // 多怪同戰時的「補位怪」：跳過綠茶 / 寶箱 / 精英 roll，直接到普通怪邏輯
    } else {
      // 綠茶事件：頭 5 場固定 5%，第 6 場起每場 +2% 慢慢加，第 30 場保底必出
      if (rpg) {
        rpg.greenTeaPity = (rpg.greenTeaPity || 0) + 1;
        const baseRate = 0.05;
        const rate = rpg.greenTeaPity <= 5
          ? baseRate
          : baseRate + (rpg.greenTeaPity - 5) * 0.02;
        const guaranteed = rpg.greenTeaPity >= 30;
        if (guaranteed || Math.random() < rate) {
          rpg.greenTeaPity = 0;
          return createGreenTea(playerLv);
        }
      } else if (Math.random() < 0.05) {
        return createGreenTea(playerLv);
      }
    }
    // 探險強制觸發：100% 精英怪、掉「玩家職業套裝」
    if (opts && opts.forageElite) {
      const myClass = me?.rpg?.class || 'warrior';
      const setId = CLASS_SET[myClass] || 'warrior_iron';
      const lv = Math.max(1, playerLv);
      forageTrace('generateMonster:forageElite', { class: myClass, setId, lv, opts });
      const k = monsterK(lv);
      const FORAGE_ELITE_TEMPLATES = {
        warrior: { name: '★ 戰士試煉鵝', icon: '⚔️', verb: '試煉揮砍', dialogue: ['想成為戰士？先撐過我這關！', '揮砍吧！讓我看看你的覺悟！'], deathLine: ['果然...是個合格的戰士...', '繼承...這份意志...'] },
          archer:  { name: '★ 弓手試煉鵝', icon: '🏹', verb: '疾風射',  dialogue: ['風的速度，你跟得上嗎？', '一箭一個鵝鵝！'],         deathLine: ['風...教給你了...', '快、再快一點...'] },
          mage:    { name: '★ 法師試煉鵝', icon: '🔮', verb: '元素之炎', dialogue: ['鵝鵝感受元素之力！', '魔法不是給弱者用的！'],     deathLine: ['元素...回應你...', '繼續...深入奧義...'] },
          paladin: { name: '★ 聖騎試煉鵝', icon: '✨', verb: '聖光裁決', dialogue: ['以鵝鵝聖光之名審判你！', '正義永不消逝！'],         deathLine: ['信念...傳遞給你...', '聖光...歸於你...'] },
      };
      const tpl = FORAGE_ELITE_TEMPLATES[myClass] || FORAGE_ELITE_TEMPLATES.warrior;
      // ⭐ 重新調平：原本 220/20/8/multiHit 對裸裝玩家完全打不過 → 全敗 → 沒掉裝
      // 調到「跟同等級玩家裸裝接近」，有裝備就贏；獎勵照樣是套裝必掉
      return {
        id: 'forage_elite_' + myClass,
        name: tpl.name, icon: tpl.icon, verb: tpl.verb,
        level: lv,
        hp: Math.round(115 * k), maxHp: Math.round(115 * k),
        atk: Math.round(12 * k * 1.3),
        def: Math.round(4 * k * 0.7),
        spd: Math.round(8 + lv * 0.4),
        goldDrop: Math.round(110 + lv * 3 + Math.random() * lv * 2),
        // ⭐ 探險精英：基底依等級 + 0~20% 隨機 + 精英 ×2 倍
        xpDrop: Math.round(rollMonsterXpVariance(lv) * 2),
        dialogue: tpl.dialogue,
        deathLine: tpl.deathLine,
        dropSet: setId,
        isElite: true,
        isForageElite: true,
      };
    }
    // ⭐ 寶箱怪：在指定地區內 5% 機率出現（金錢 ×2 + 掉裝率 ×2）；noSpecial 跳過
    if (!noSpecial && opts && opts.zoneId && Math.random() < 0.05) {
      const chest = MONSTERS.find(m => m.isChest && m.chestZone === opts.zoneId);
      if (chest) {
        const lv = Math.max(1, opts.targetLv || layerFloorToLevel(opts.layerId, opts.floor) || 1);
        const k = monsterK(lv);
        return {
          ...chest,
          level: lv,
          hp: chest.fixedHp ?? Math.round(chest.hpBase * monsterHPK(lv)),
          maxHp: chest.fixedHp ?? Math.round(chest.hpBase * monsterHPK(lv)),
          atk: Math.round(chest.atkBase * k * 1.0),
          def: Math.round(chest.defBase * monsterDEFK(lv) * 0.7),
          spd: Math.round(chest.spdBase + lv * 0.3),
          goldDrop: coinDropByLevel(lv) * 2,         // ⭐ 金錢 ×2
          // 寶箱怪：依等級給 EXP，無精英倍率（賺金錢用，EXP 標準）
          xpDrop: rollMonsterXpVariance(lv),
          isChest: true,
        };
      }
    }
    // 精英怪：在指定地區內 7% 機率出現；noSpecial 跳過
    if (!noSpecial && opts && opts.zoneId && Math.random() < 0.07) {
      const elite = ELITES.find(e => e.zone === opts.zoneId);
      const zone = ZONES.find(z => z.id === opts.zoneId);
      if (elite && zone) {
        // 等級 = 樓層直接決定
        const lv = Math.max(1, opts.targetLv || layerFloorToLevel(opts.layerId, opts.floor) || 1);
        const k = monsterK(lv);
        return {
          ...elite,
          level: lv,
          hp: elite.fixedHp ?? Math.round(elite.hpBase * monsterHPK(lv)),
          maxHp: elite.fixedHp ?? Math.round(elite.hpBase * monsterHPK(lv)),
          atk: Math.round(elite.atkBase * k * 1.3),
          def: Math.round(elite.defBase * monsterDEFK(lv) * 0.7),
          spd: Math.round(elite.spdBase + lv * 0.4),
          goldDrop: coinDropByLevel(lv) * 2,  // 精英 = 同層普通 ×2
          // ⭐ 精英 = 同層普通 ×2 EXP（基底依等級 + 0~20% 隨機）
          xpDrop: Math.round(rollMonsterXpVariance(lv) * 2),
          isElite: true,
        };
      }
    }
    let candidates;
    let levelMin = playerLv, levelMax = playerLv;
    if (opts && opts.zoneId) {
      const zone = ZONES.find(z => z.id === opts.zoneId);
      candidates = MONSTERS.filter(m => zone.monsters.includes(m.id));
      // 怪物等級 = 樓層直接決定（不再用 baseLv + floor）
      const flv = Math.max(1, opts.targetLv || layerFloorToLevel(opts.layerId, opts.floor) || 1);
      levelMin = flv; levelMax = flv;
    } else {
      const tierMax = Math.min(5, Math.ceil(playerLv / 4));
      const tierMin = Math.max(1, tierMax - 1);
      candidates = MONSTERS.filter(m => m.tier <= tierMax && m.tier >= tierMin);
    }
    if (!candidates || candidates.length === 0) candidates = MONSTERS.slice();
    const m = candidates[Math.floor(Math.random() * candidates.length)];
    const lv = Math.max(1, levelMin + Math.floor(Math.random() * (levelMax - levelMin + 2)) - 1);
    const k = monsterK(lv);
    return {
      ...m,
      level: lv,
      hp: m.fixedHp ?? Math.round(m.hpBase * monsterHPK(lv)),
      maxHp: m.fixedHp ?? Math.round(m.hpBase * monsterHPK(lv)),
      // atk 倍率 1.5 → 1.3：因為 atkBase 已重新調高，總體 atk 仍變強
      atk: Math.round(m.atkBase * k * 1.3),
      def: Math.round(m.defBase * monsterDEFK(lv) * 0.7),
      spd: Math.round(m.spdBase + lv * 0.4),
      goldDrop: coinDropByLevel(lv),  // 依層級，不看怪物 goldBase
      // ⭐ 一般怪：依等級給 EXP（不看 m.xpBase）+ 0~20% 隨機品種變異
      xpDrop: rollMonsterXpVariance(lv),
    };
  }
  function rollItemDrop(playerLv, opts) {
    if (Math.random() > 0.28) return null; // 28% 掉落
    return generateDropItem(playerLv, opts || {});
  }

  // ============================================================
  // 戰鬥邏輯
  // ============================================================
  function autoFight(player, monster) {
    const log = [];
    const cls = CLASSES[player.rpg.class];
    const stats = computeStats(player);

    // 綠茶事件：腳本式遭遇，跳過正常戰鬥
    if (monster.ability?.type === 'cameo') {
      const startHp = Math.min(player.rpg.hp ?? stats.maxHp, stats.maxHp);
      const startMp = Math.min(player.rpg.mp ?? stats.maxMp, stats.maxMp);
      const kickDmg = 5 + Math.floor(Math.random() * 5);
      const newHp = Math.max(1, startHp - kickDmg);
      log.push({ type: 'system', text: `═══ 🍵 綠茶鵝突然飄了過來 ═══` });
      if (monster.dialogue && monster.dialogue.length) {
        const line = monster.dialogue[Math.floor(Math.random() * monster.dialogue.length)];
        log.push({ type: 'monster', text: `🍵 綠茶鵝：「${line}」` });
      }
      // ⭐ 偷錢量隨等級成正比：每 1 等 +10 元（Lv 1=10 / Lv 30=300 / Lv 50=500）
      const stolen = Math.max(1, (player.rpg.level || 1) * 10);
      log.push({ type: 'monster', text: `回合 1：綠茶鵝踢了你一腳 → -${kickDmg} HP`, hp: { player: newHp, monster: 1, mp: startMp } });
      log.push({ type: 'monster', text: `回合 2：綠茶鵝順手摸走 💰 ${stolen} 鵝鵝幣（Lv${player.rpg.level || 1}×10）`, hp: { player: newHp, monster: 1, mp: startMp } });
      log.push({ type: 'system', text: `綠茶鵝丟下一句「鵝鵝沒有錯」就跑掉了 ☕💨` });
      return {
        won: false, fled: true,
        pHpFinal: newHp, pMpFinal: startMp, mHpFinal: 1,
        maxHp: stats.maxHp, maxMp: stats.maxMp,
        coinsStolen: stolen, kickDmg, log,
        metGreenTea: 1,
      };
    }

    const bonus = computeSkillBonuses(player);
    const abil  = computeAbilityBonuses(player);
    const passive = computePassiveBonuses(player);
    // 被動 spd 加成已套到 stats 之外（先給門檻型，autoFight 用即時 spd）
    const effectiveSpd = stats.spd + (passive.spd || 0);
    const setB = stats.setBonuses || {};
    const baseCritChance = 0.08 + (cls.critBonus || 0) + (bonus.critChance || 0) + (abil.critChance || 0) + (passive.critChance || 0) + (setB.critChance || 0);
    const critMult = 1.7 + (abil.critDmgBonus || 0) + (passive.critDmg || 0) + (setB.critDmg || 0);
    const regenPer = (cls.regenPer || 0) + (bonus.regen || 0);
    let pHp = stats.maxHp; // ⭐ 每場戰鬥 HP 自動回滿（HP 變成屬性，不是耗材）
    let pMp = stats.maxMp; // ⭐ 每場戰鬥 MP 自動回滿
    let mHp = monster.hp;
    let round = 0;
    let playerActions = 0;
    let coinsStolen = 0;
    let critCount = 0;
    const mAbility = monster.ability;
    // 每個技能的冷卻記錄（key = skillId）
    const skills = cls.skills || (cls.skill ? [cls.skill] : []);
    const skillById = Object.fromEntries(skills.map((s, i) => [s.id, { skill: s, idx: i }]));
    const nextActionForSkill = {};
    // 每條規則的本場使用次數（給 judge 1920「最多用 X 次」用）
    const ruleUseCount = {};
    // ⭐ HOF 行動規則表：玩家自訂 / 預設值
    const actionPattern = (player.rpg.actionPattern && player.rpg.actionPattern.length)
      ? player.rpg.actionPattern
      : getDefaultActionPattern(player.rpg.class);

    // ATB（Active Time Battle）：每個單位的「行動條」依速度填滿
    // 條滿（達到 ATB_THRESHOLD）即出手；速度越快、填滿越快、出手越頻繁
    // ⭐ SPD_BASE 扁平化：把雙方 SPD 加上一個基礎值，避免「玩家 SPD 比怪高 2 倍 → 出手 2 倍」這種極端比例
    //    e.g. 你 30 vs 怪 10 → 原本 3:1，加 30 之後變 (60:40) = 1.5:1
    const ATB_THRESHOLD = 100;
    const SPD_BASE = 30;
    let pSpd = Math.max(1, SPD_BASE + effectiveSpd);   // 受 buff 影響，每回合會重算
    const mSpd = Math.max(1, SPD_BASE + monster.spd);
    // ⭐ SPD 軟上限 + 軟下限
    //   軟上限：行動比率 > 1.5:1 後遞減，弓手極限 2.5（係數 1.0）、其他 2.0（係數 0.5）
    //   軟下限：行動比率 < 1/1.5 後遞增，所有職業趨近 0.5:1（係數固定 0.5）
    //   公式（上/下對稱）：effRatio = 1.5 + coeff × excess / (0.2 + excess)
    const _spdCapCoeff = player.rpg.class === 'archer' ? 1.0 : 0.5;
    const _capSpd = (rawP, refM) => {
      if (!refM || refM <= 0) return rawP;
      const raw = rawP / refM;
      if (raw > 1.5) { // 軟上限
        const excess = raw - 1.5;
        return (1.5 + _spdCapCoeff * excess / (0.2 + excess)) * refM;
      }
      if (rawP > 0 && raw < 1 / 1.5) { // 軟下限：趨近 0.5:1
        const invRaw = refM / rawP;
        const excess = invRaw - 1.5;
        return refM / (1.5 + 0.5 * excess / (0.2 + excess));
      }
      return rawP;
    };
    // 雙方都從 0 開始填條，誰先達到 100 誰先出手（速度高自然先到）
    let effPSpd = _capSpd(pSpd, mSpd);
    let pGauge = 0, mGauge = 0;
    // ⭐ 戰鬥 log 加上「ATB 進度」資訊：UI 可畫出 SPD 進度條
    //   為了避免每個 push 都手動加 gauge，直接 monkey-patch log.push：
    //   只要 entry 有 hp（代表是「戰鬥中」），就自動補上 gauge
    {
      const __origPush = log.push.bind(log);
      log.push = function(e) {
        if (e && e.hp && !e.gauge) {
          e.gauge = {
            p: Math.max(0, Math.min(100, pGauge)),
            m: Math.max(0, Math.min(100, mGauge)),
            pSpd: effPSpd, mSpd,
          };
        }
        return __origPush(e);
      };
    }
    // 狀態追蹤（玩家身上的 buff/中毒/麻痺 + 怪物身上的中毒/麻痺）
    const playerObj = { statuses: [] };
    monster.statuses = monster.statuses || [];
    // 怪物技能冷卻：lastUseRound[idx]
    const mSkillLast = {};
    // ⭐ 上次施放技能的回合 — 確保兩招間至少夾一次普攻
    let mLastSkillRound = -999;
    // ⭐ fixedSkillOrder：下一個要出的技能 index（循環）
    let mSkillNextIdx = 0;

    log.push({ type: 'system', text: `═══ ⚔️ ${player.name} VS ${monster.icon} ${monster.name} Lv ${monster.level} ═══` });
    log.push({ type: 'system', text: `🌬 速度：你 ${effectiveSpd} vs ${monster.name} ${monster.spd}（行動頻率比 ${(effPSpd/mSpd).toFixed(2)} : 1${effPSpd < pSpd ? '，速度軟上限啟動' : ''}）` });
    if (monster.dialogue && monster.dialogue.length) {
      const line = monster.dialogue[Math.floor(Math.random() * monster.dialogue.length)];
      log.push({ type: 'monster', text: `${monster.icon} ${monster.name}：「${line}」` });
    }
    const pushDeathLine = () => {
      if (monster.deathLine && monster.deathLine.length) {
        const line = monster.deathLine[Math.floor(Math.random() * monster.deathLine.length)];
        log.push({ type: 'monster', text: `${monster.icon} ${monster.name}：「${line}」`, hp: { player: pHp, monster: 0, mp: pMp } });
      }
    };

    while (pHp > 0 && mHp > 0 && round < (monster.maxRounds || 80)) {
      // 重算 pSpd（含 buff）
      const pBuff = getBuffBonus(playerObj);
      pSpd = Math.max(1, SPD_BASE + effectiveSpd + (pBuff.spd || 0));
      effPSpd = _capSpd(pSpd, mSpd); // ⭐ 套用 SPD 軟上限
      // 推進時間：跳到下一個「條滿」的瞬間
      const pNeed = Math.max(0, ATB_THRESHOLD - pGauge);
      const mNeed = Math.max(0, ATB_THRESHOLD - mGauge);
      const dt = Math.min(pNeed / effPSpd, mNeed / mSpd);
      pGauge += dt * effPSpd;
      mGauge += dt * mSpd;

      // 決定誰先出手：若同時滿條，gauge 較大者先；否則只有滿條那邊出手
      let pTurn;
      if (pGauge >= ATB_THRESHOLD && mGauge >= ATB_THRESHOLD) pTurn = pGauge >= mGauge;
      else if (pGauge >= ATB_THRESHOLD) pTurn = true;
      else pTurn = false;

      round++;
      // 被動自癒（聖騎天生 + 自癒強化技能）
      if (pTurn && regenPer > 0 && pHp < stats.maxHp) {
        const heal = Math.max(1, Math.round(stats.maxHp * regenPer));
        pHp = Math.max(pHp, Math.min(stats.maxHp, pHp + heal));  // 不下調（神聖祝福可讓 HP 超過 maxHp，後續補血不應拉低）
        log.push({ type: 'player', text: `回合 ${round}：自癒 +${heal} HP`, hp: { player: pHp, monster: mHp, mp: pMp } });
      }
      // ⭐ 每回合自動回 MP（法系 4 / 其他 2）+ 鵝王恩賜飾品 mpRegen — 戰術中持續產生 MP，不必依賴回魔技
      if (pTurn && pMp < stats.maxMp) {
        const isCaster = (player.rpg.class === 'mage' || player.rpg.class === 'paladin');
        const mpGain = (isCaster ? 4 : 2) + (stats.mpRegen || 0);
        const before = pMp;
        pMp = Math.min(stats.maxMp, pMp + mpGain);
        const gained = pMp - before;
        if (gained > 0) {
          log.push({ type: 'player', text: `回合 ${round}：💙 自然回 +${gained} MP`, hp: { player: pHp, monster: mHp, mp: pMp } });
        }
      }
      if (pTurn) {
        pGauge -= ATB_THRESHOLD;
        playerActions++;
        // 玩家身上狀態 tick（中毒、buff 倒數）
        playerObj._curHp = pHp; // ⭐ 流血傷害需要當前 HP
        const _hadMaxHpPct = (playerObj.statuses || []).some(s => s.type === 'buff' && s.stat === 'maxHpPct');
        const pevs = tickStatuses(playerObj, stats.maxHp);
        for (const ev of pevs) {
          pHp = Math.max(0, pHp - ev.dmg);
          log.push({ type: 'monster', text: `回合 ${round}：${player.name} ${statusEmoji(ev.type)}${statusLabel(ev.type)} 觸發 -${ev.dmg} HP`, hp: { player: pHp, monster: mHp, mp: pMp } });
        }
        // ⭐ 神聖祝福 maxHpPct 到期：HP 壓回 base maxHp，確保再施放時看得到加血效果
        const _nowHasMaxHpPct = (playerObj.statuses || []).some(s => s.type === 'buff' && s.stat === 'maxHpPct');
        if (_hadMaxHpPct && !_nowHasMaxHpPct && pHp > stats.maxHp) {
          pHp = stats.maxHp;
          log.push({ type: 'system', text: `回合 ${round}：💖 最大HP 加成結束，HP 恢復上限 ${stats.maxHp}`, hp: { player: pHp, monster: mHp, mp: pMp } });
        }
        if (pHp <= 0) break;
        // ⭐ 麻痺（charge-based + 30% RNG）：玩家受麻痺發動率 30%
        if (consumeParalyze(playerObj, 0.30)) {
          log.push({ type: 'system', text: `回合 ${round}：${player.name} ⚡麻痺，無法行動！`, hp: { player: pHp, monster: mHp, mp: pMp } });
          continue;
        }
        // ⭐ HOF：依玩家的 actionPattern 規則表決定動作
        // 從上到下評估每條規則，第一條 judge 成立 + 技能可用就放；都不成立 → 普攻
        let useSkill = null;
        let useSkillIdx = -1;
        let usedRuleIdx = -1;
        const judgeCtx = {
          pHp, maxHp: stats.maxHp,
          pMp, maxMp: stats.maxMp,
          mHp, maxMHp: monster.maxHp,
          playerActions,
          ruleUseCount,
          // ⭐ 狀態判定
          selfPoisoned:    hasStatus(playerObj, 'poison'),
          selfParalyzed:   hasStatus(playerObj, 'paralyze'),
          anyEnemyPoisoned:  hasStatus(monster, 'poison'),
          anyEnemyParalyzed: hasStatus(monster, 'paralyze'),
          anyEnemyBled:      hasStatus(monster, 'bleed'),
          allEnemyPoisoned:  hasStatus(monster, 'poison'),
        };
        for (let r = 0; r < actionPattern.length; r++) {
          const rule = actionPattern[r];
          if (!rule || !evaluateJudge(rule.judgeId, rule.param, judgeCtx, r)) continue;

          if (rule.skillId === 'basic') {
            // 普攻
            useSkill = null;
            useSkillIdx = -1;
            usedRuleIdx = r;
            break;
          }

          const sInfo = skillById[rule.skillId];
          if (!sInfo) continue; // 規則指向不存在的技能（職業改了？）
          const s = sInfo.skill;
          if ((s.unlockLv || 1) > (player.rpg.level || 1)) continue;
          // ⭐ 玩家技能 CD 取消（用 MP 跟硬值控制節奏）
          // if (playerActions < (nextActionForSkill[s.id] || 0)) continue;
          const effMpCost = Math.round((s.mpCost || 0) * (1 - (passive.mpDiscount || 0)));
          if (pMp < effMpCost) continue;
          // HP 代價技能：必須有「比成本多」的 HP（防自爆）
          if (s.hpCost) {
            const hpNeeded = Math.max(1, Math.round(stats.maxHp * s.hpCost));
            if (pHp <= hpNeeded) continue;
          }
          if (s.hpCostFlat) {
            if (pHp <= s.hpCostFlat) continue;
          }
          // judge 已過、技能也可用 → 採用這條
          useSkill = s;
          useSkillIdx = sInfo.idx;
          usedRuleIdx = r;
          break;
        }
        // 累積規則使用次數（給 1920「最多 X 次」用）
        if (usedRuleIdx >= 0) {
          ruleUseCount[usedRuleIdx] = (ruleUseCount[usedRuleIdx] || 0) + 1;
        }

        if (useSkill) {
          // ⭐ 套用技能等級加成：傷害/治療/MP 回復 +10%/級，Lv 3+ 強化狀態，Lv 5 額外加成（依技能特性）
          const __skillLv = (player.rpg.skillLevels && player.rpg.skillLevels[useSkill.id]) || 0;
          const skill = getSkillEffectiveStats(useSkill, __skillLv);
          // Lv 5 治療系：mpCostMult 進一步打折
          const effMpCost = Math.round((skill.mpCost || 0) * (skill.mpCostMult || 1) * (1 - (passive.mpDiscount || 0)));
          pMp -= effMpCost;
          // ⭐ HP 代價（戰士血祭系列）：施法時扣自身 HP（最少留 1）
          let hpPaid = 0;
          if (skill.hpCost) {
            hpPaid = Math.max(1, Math.round(stats.maxHp * skill.hpCost));
            pHp = Math.max(1, pHp - hpPaid);
          }
          if (skill.hpCostFlat) {
            hpPaid += skill.hpCostFlat;
            pHp = Math.max(1, pHp - skill.hpCostFlat);
          }
          nextActionForSkill[skill.id] = playerActions + skill.cooldown;
          // ⭐ 硬值：施放完 pGauge 額外扣 cast（重技能下次行動更慢）
          pGauge -= getEffectiveCast(skill);
          // 成本說明字串（多種代價可能組合：MP / HP）
          const costParts = [];
          if (effMpCost > 0) costParts.push(`-${effMpCost} MP`);
          if (hpPaid > 0)    costParts.push(`-${hpPaid} HP`);
          const costStr = costParts.length ? `（${costParts.join('，')}）` : '';
          if (skill.type === 'damage') {
            let dmg;
            const isFlat = skill.flat != null;
            // 受 buff 影響的攻擊力 / 防禦力 / 最大生命
            const effAtk  = stats.atk  * (1 + (pBuff.atkPct || 0));
            const effMark = stats.mark * (1 + (pBuff.atkPct || 0) + (pBuff.markPct || 0)); // atkPct + markPct buff 加成魔攻
            const effDef = (stats.def + (pBuff.def || 0)) * (1 + (pBuff.defPct || 0));
            // ⭐ 怪物防禦（含自身 buff）
            const monDefBuff = getBuffBonus(monster).def || 0;
            const monDef = monster.def + monDefBuff;
            // ⭐ 怪物護盾：有護盾時玩家傷害歸零（消耗一層）
            const consumeMonsterShield = (d) => {
              const sh = (monster.statuses || []).find(x => x.type === 'shield' && (x.charges || 0) > 0);
              if (!sh || d <= 0) return d;
              sh.charges -= 1;
              if (sh.charges <= 0) monster.statuses = monster.statuses.filter(x => x !== sh);
              log.push({ type: 'system', text: `回合 ${round}：🫙 ${monster.name} 護盾抵擋此次傷害！（剩 ${sh.charges} 層）`, hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp } });
              return 0;
            };
            // ⭐ 多段技能：mult = 每段獨立乘率，直接套用（不再 ÷ hits 均分）
            const skillHits = Math.max(1, skill.hits || 1);
            const perHitFactor = 1.0; // 每段都用完整 mult
            if (skill.defMult != null) {
              // ⭐ 聖騎風格：以 DEF 結算傷害
              dmg = effDef * skill.defMult - Math.floor(monDef / 2);
            } else if (skill.maxHpMult != null) {
              // ⭐ 聖騎風格：以 maxHp 結算傷害（魔攻）
              dmg = stats.maxHp * skill.maxHpMult - Math.floor(monDef / 2);
            } else if (isFlat) {
              dmg = (skill.flat + (bonus.skillFlat || 0) + (abil.skillFlat || 0)) + (skill.perLv || 0) * (player.rpg.level || 1);
              if (!skill.ignoreDef) dmg -= Math.floor(monDef / 2);
            } else {
              // ⭐ useMark:true 的技能使用 MARK 而非 ATK（法師魔攻技）
              const dmgStat = skill.useMark ? effMark : effAtk;
              dmg = dmgStat * (skill.mult || 1) - Math.floor(monDef / 2);
            }
            // ⭐ markMult：flat 傷害後追加 MARK 加傷（火焰風暴：固定150 + 6*MARK）
            if (skill.markMult) {
              dmg = Math.max(0, dmg) + effMark * skill.markMult;
            }
            dmg *= perHitFactor;
            // 技能個別 % 加成（從技能樹點到的對應節點）— 只對前 3 個技能有效
            const perSkillKey = `skill${useSkillIdx}Pct`;
            dmg *= (1 + (bonus[perSkillKey] || 0));
            // 通用 skillDmgPct（保留舊邏輯）
            dmg *= (1 + (bonus.skillDmgPct || 0));
            // 是否走「魔攻」邏輯：flat / maxHpMult / 顯式 magic flag / useMark
            const isMagic = isFlat || skill.maxHpMult != null || skill.magic || skill.markMult;
            // 職業被動：物理或法術加成
            if (isMagic) dmg *= (1 + (passive.flatPct || 0));
            else         dmg *= (1 + (passive.physPct || 0));
            // ⭐ 聖騎 bonusMaxHpPct：純加值（maxHp × X），不吃怪 DEF
            //    例：聖光斬 1.2× ATK + 5% maxHp → 200 maxHp 玩家額外 +10 傷害
            //    ATK 部分被高 DEF 壓到負值時，先 clamp 0 再加 maxHp，避免被 Math.max(1) 蓋掉
            let __bonusMaxHpDmg = 0;
            if (skill.bonusMaxHpPct) {
              const effMaxHp = Math.round(stats.maxHp * (1 + (pBuff.maxHpPct || 0)));
              __bonusMaxHpDmg = effMaxHp * skill.bonusMaxHpPct;
              dmg = Math.max(0, dmg) + __bonusMaxHpDmg;
            }
            // 怪物抗性（魔攻吃法抗，物攻吃物抗）
            if (isMagic && mAbility?.type === 'magicResist') dmg *= (1 - mAbility.resist);
            if (!isMagic && mAbility?.type === 'physResist') dmg *= (1 - mAbility.resist);
            // ⭐ 流血加傷：血祭斬打流血目標 +30% 傷害
            if (skill.bleedBonus && hasStatus(monster, 'bleed')) {
              dmg *= (1 + skill.bleedBonus);
            }
            const skillCrit = baseCritChance + (skill.extraCritChance || 0) + (pBuff.critChance || 0);
            const skillCritMult = critMult + (skill.extraCritDmg || 0) + (pBuff.critDmg || 0);
            const baseDmg = dmg;
            // ⭐ 多段：每段獨立 roll 暴擊 + 變異 + 易傷（hit-based，每段各消耗 1 層）
            let totalDmg = 0;
            let lastIsCrit = false;
            const hitLogs = [];
            let monsterDied = false;
            for (let h = 0; h < skillHits && !monsterDied; h++) {
              let hitDmg = baseDmg * (0.9 + Math.random() * 0.2);
              const hitCrit = skill.alwaysCrit || Math.random() < skillCrit;
              if (hitCrit) { hitDmg *= skillCritMult; critCount++; lastIsCrit = true; }
              // ⭐ 易傷（hit-based）：每段各消耗 1 層
              hitDmg *= consumeVulnerable(monster);
              hitDmg = Math.max(1, Math.round(hitDmg));
              if (mAbility?.type === 'flatCapDmg') hitDmg = Math.min(hitDmg, mAbility.cap || 1);
              hitDmg = consumeMonsterShield(hitDmg);
              mHp -= hitDmg;
              totalDmg += hitDmg;
              hitLogs.push(`${hitDmg}${hitCrit ? '【爆】' : ''}`);
              if (mAbility?.type === 'reflect' && mAbility.resist) {
                // 反傷：受到傷害的 50%，最多 300
                const r = Math.min(300, Math.max(1, Math.round(hitDmg * mAbility.resist)));
                pHp = Math.max(0, pHp - r);
              }
              if (mHp <= 0) { monsterDied = true; }
            }
            const dmgStr = skillHits > 1 ? `(${hitLogs.join(' / ')})` : `-${totalDmg} HP`;
            // 吸血 / 自癒：用總傷害計
            let extra = '';
            if (skill.lifesteal) {
              const heal = Math.max(1, Math.round(totalDmg * skill.lifesteal));
              const before = pHp;
              pHp = Math.max(pHp, Math.min(stats.maxHp, pHp + heal));  // 不下調（神聖祝福可讓 HP 超過 maxHp，後續補血不應拉低）
              if (pHp - before > 0) extra += ` 🩸+${pHp - before} HP (吸血)`;
            }
            // ⭐ 流血吸血（嗜血爆裂）：打流血目標額外 +10% 吸血
            if (skill.bleedLifestealBonus && hasStatus(monster, 'bleed')) {
              const extraHeal = Math.max(1, Math.round(totalDmg * skill.bleedLifestealBonus));
              const before = pHp;
              pHp = Math.max(pHp, Math.min(stats.maxHp, pHp + extraHeal));
              if (pHp - before > 0) extra += ` 🩸+${pHp - before} HP (流血吸血)`;
            }
            if (skill.healCaster) {
              const heal = Math.max(1, Math.round(stats.maxHp * skill.healCaster));
              const before = pHp;
              pHp = Math.max(pHp, Math.min(stats.maxHp, pHp + heal));  // 不下調（神聖祝福可讓 HP 超過 maxHp，後續補血不應拉低）
              if (pHp - before > 0) extra += ` 💚+${pHp - before} HP`;
            }
            // ⭐ mpRestore：傷害技回 N MP（魔吸斬 / 奪魂箭 / 神聖奪魂）
            if (skill.mpRestore) {
              const before = pMp;
              pMp = Math.min(stats.maxMp, pMp + skill.mpRestore);
              if (pMp - before > 0) extra += ` 💙+${pMp - before} MP`;
            }
            // ⭐ mpRestorePct：傷害技回 X% maxMP（魔力虹吸）
            if (skill.mpRestorePct) {
              const before = pMp;
              pMp = Math.min(stats.maxMp, pMp + Math.round(stats.maxMp * skill.mpRestorePct));
              if (pMp - before > 0) extra += ` 💙+${pMp - before} MP（${Math.round(skill.mpRestorePct * 100)}%）`;
            }
            // ⭐ postSelfBuff：傷害技攻擊完後額外給自己 buff（護盾衝鋒：DEF +10）
            if (skill.postSelfBuff) {
              applyStatus(playerObj, { type: 'buff', stat: skill.postSelfBuff.stat, amount: skill.postSelfBuff.amount, turns: skill.postSelfBuff.turns });
              extra += ` ✨${describeBuff(skill.postSelfBuff)}`;
            }
            // ⭐ bonusMaxHpPct 顯示：讓玩家看到「+X HP 傷害」明確來自最大血量
            if (skill.bonusMaxHpPct && __bonusMaxHpDmg > 0) {
              extra += ` 🩸+${Math.round(__bonusMaxHpDmg)}（${Math.round(skill.bonusMaxHpPct * 100)}% maxHp）`;
            }
            log.push({
              type: 'crit-player',
              text: `回合 ${round}：${skill.icon} ${skill.name}${lastIsCrit ? '【暴擊】' : ''}${isMagic ? '【魔攻】' : ''}${skillHits > 1 ? `×${skillHits}` : ''} → ${monster.name} ${skillHits > 1 ? '共 ' + totalDmg + ' HP ' + dmgStr : dmgStr}${extra}${costStr}`,
              hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp }
            });
            if (mAbility?.type === 'reflect' && mAbility.resist) {
              log.push({ type: 'monster', text: `回合 ${round}：🪞 ${monster.name} 反射光芒（多段反彈）`, hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp } });
            }
            // 對怪物上狀態（毒箭、冰錐術…）
            if (skill.applyStatus && Math.random() < (skill.applyStatus.chance || 1)) {
              applyStatus(monster, skill.applyStatus);
              log.push({ type: 'system', text: `回合 ${round}：${monster.name} 進入 ${statusEmoji(skill.applyStatus.type)}${statusLabel(skill.applyStatus.type)} 狀態`, hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp } });
            }
            if (mHp <= 0) { pushDeathLine(); break; }
          } else if (skill.type === 'buff' && (skill.selfBuff || skill.applyPartialShield)) {
            const extraNote = [];
            if (skill.selfBuff) {
              applyStatus(playerObj, { type: 'buff', stat: skill.selfBuff.stat, amount: skill.selfBuff.amount, turns: skill.selfBuff.turns });
            }
            // ⭐ 魔坑：hit-based 減傷護盾
            if (skill.applyPartialShield) {
              applyStatus(playerObj, { type: 'partialShield', reducePct: skill.applyPartialShield.reducePct, hitsLeft: skill.applyPartialShield.hits, turns: 99 });
              extraNote.push(`🛡 魔坑 −${Math.round(skill.applyPartialShield.reducePct*100)}%（${skill.applyPartialShield.hits} 次）`);
            }
            // ⭐ selfBuff2：第二個 buff（鷹眼：暴擊率 + 暴傷）
            if (skill.selfBuff2) {
              applyStatus(playerObj, { type: 'buff', stat: skill.selfBuff2.stat, amount: skill.selfBuff2.amount, turns: skill.selfBuff2.turns });
              extraNote.push(describeBuff(skill.selfBuff2));
            }
            // ⭐ selfBuff3：第三個 buff（鷹眼：+25% ATK）
            if (skill.selfBuff3) {
              applyStatus(playerObj, { type: 'buff', stat: skill.selfBuff3.stat, amount: skill.selfBuff3.amount, turns: skill.selfBuff3.turns });
              extraNote.push(describeBuff(skill.selfBuff3));
            }
            // ⭐ 隱身：另加 shield 狀態（吸收一次傷害）+ Lv 5 額外 +20% 爆傷 buff
            if (skill.applyShield) {
              applyStatus(playerObj, { type: 'shield', charges: skill.applyShield, turns: 99 });
              extraNote.push('🛡 免疫一次傷害');
            }
            if (skill.id === 'a_stealth' && (__skillLv || 0) >= 5) {
              applyStatus(playerObj, { type: 'buff', stat: 'critDmg', amount: 0.20, turns: skill.selfBuff.turns });
              extraNote.push('💥 爆傷 +20%');
            }
            // ⭐ 底氣 / 隱身：額外即時補血（上限 maxHp）
            if (skill.bonusHealPct) {
              const heal = Math.round(stats.maxHp * skill.bonusHealPct);
              const actualHeal = Math.min(heal, Math.max(0, stats.maxHp - pHp));
              pHp = Math.min(stats.maxHp, pHp + heal);
              extraNote.push(`💚 +${actualHeal} HP（${Math.round(skill.bonusHealPct * 100)}% maxHp）`);
            }
            // ⭐ buffMaxHpPct：臨時提升最大 HP + 即時補血至新上限（確保再施放時明顯有效）
            if (skill.buffMaxHpPct) {
              const bTurns = (skill.selfBuff && skill.selfBuff.turns) ? skill.selfBuff.turns : 3;
              applyStatus(playerObj, { type: 'buff', stat: 'maxHpPct', amount: skill.buffMaxHpPct, turns: bTurns });
              const _newEffMaxHp = Math.round(stats.maxHp * (1 + skill.buffMaxHpPct));
              const _bonusHeal = Math.max(0, _newEffMaxHp - pHp);
              if (_bonusHeal > 0) pHp = Math.min(_newEffMaxHp, pHp + _bonusHeal);
              extraNote.push(`💖 最大HP +${Math.round(skill.buffMaxHpPct * 100)}%（${bTurns} 回合）${_bonusHeal > 0 ? ` / 💚+${_bonusHeal} HP` : ''}`);
            }
            const mainDesc = skill.selfBuff ? `${describeBuff(skill.selfBuff)}（${skill.selfBuff.turns} 回合）` : skill.name;
            log.push({
              type: 'player',
              text: `回合 ${round}：${skill.icon} ${skill.name} → ${mainDesc}${extraNote.length ? ' / ' + extraNote.join(' / ') : ''}${costStr}`,
              hp: { player: pHp, monster: mHp, mp: pMp }
            });
          } else if (skill.type === 'heal') {
            // 'heal' 類型：可同時帶 healPct（HP 補）+ mpFlat 或 mpPct（MP 補）
            const gainedParts = [];
            if (skill.healPct) {
              const before = pHp;
              const heal = Math.round(stats.maxHp * skill.healPct * (1 + (bonus.skillHealPct || 0)) * (1 + (passive.healPct || 0)));
              pHp = Math.max(pHp, Math.min(stats.maxHp, pHp + heal));  // 不下調（神聖祝福可讓 HP 超過 maxHp，後續補血不應拉低）
              if (pHp - before > 0) gainedParts.push(`💚+${pHp - before} HP`);
            }
            // ⭐ mpFlat / mpPct 都套用（不再 else if）— 回魔技要兩部分都吃到
            if (skill.mpFlat || skill.mpPct) {
              const before = pMp;
              const flat = skill.mpFlat || 0;
              const pct  = skill.mpPct ? Math.round(stats.maxMp * skill.mpPct) : 0;
              pMp = Math.min(stats.maxMp, pMp + flat + pct);
              if (pMp - before > 0) gainedParts.push(`💙+${pMp - before} MP`);
            }
            // ⭐ 治療技能也可附帶護盾（絕對防禦）
            if (skill.applyShield) {
              applyStatus(playerObj, { type: 'shield', charges: skill.applyShield, turns: 99 });
              gainedParts.push('🛡 免疫一次傷害');
            }
            const gainedStr = gainedParts.length ? gainedParts.join(' ') : '無效果';
            log.push({
              type: 'player',
              text: `回合 ${round}：${skill.icon} ${skill.name} ${gainedStr}${costStr}`,
              hp: { player: pHp, monster: mHp, mp: pMp }
            });
          }
        } else {
          // 普攻
          const monDefBuff0 = getBuffBonus(monster).def || 0;
          const monDef0 = monster.def + monDefBuff0;
          const monShield0 = (d) => {
            const sh = (monster.statuses || []).find(x => x.type === 'shield' && (x.charges || 0) > 0);
            if (!sh || d <= 0) return d;
            sh.charges -= 1;
            if (sh.charges <= 0) monster.statuses = monster.statuses.filter(x => x !== sh);
            log.push({ type: 'system', text: `回合 ${round}：🫙 ${monster.name} 護盾抵擋此次傷害！（剩 ${sh.charges} 層）`, hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp } });
            return 0;
          };
          const isCrit = Math.random() < baseCritChance;
          const effAtk = stats.atk * (1 + (pBuff.atkPct || 0));
          const baseCrit2 = baseCritChance + (pBuff.critChance || 0);
          const critMult2 = critMult + (pBuff.critDmg || 0);
          const isCrit2 = Math.random() < baseCrit2;
          let dmg = Math.max(1, effAtk - Math.floor(monDef0 / 2));
          dmg *= (0.85 + Math.random() * 0.3);
          if (isCrit2) { dmg *= critMult2; critCount++; }
          if (mAbility?.type === 'physResist') dmg *= (1 - mAbility.resist);
          dmg *= consumeVulnerable(monster); // ⭐ 易傷（hit-based）
          dmg = Math.max(1, Math.round(dmg));
          if (mAbility?.type === 'flatCapDmg') dmg = Math.min(dmg, mAbility.cap || 1);
          dmg = monShield0(dmg);
          mHp -= dmg;
          log.push({
            type: isCrit2 ? 'crit-player' : 'player',
            text: `回合 ${round}：${cls.attackVerb}${isCrit2 ? '【暴擊】' : ''} → ${monster.name} -${dmg} HP`,
            hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp }
          });
          if (mAbility?.type === 'reflect' && mAbility.resist) {
            // 反傷：受到傷害的 50%，最多 300
            const r = Math.min(300, Math.max(1, Math.round(dmg * mAbility.resist)));
            pHp = Math.max(0, pHp - r);
            log.push({ type: 'monster', text: `回合 ${round}：🪞 ${monster.name} 反射光芒 → ${player.name} -${r} HP`, hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp } });
          }
          if (mHp <= 0) { pushDeathLine(); break; }
        }
      } else {
        mGauge -= ATB_THRESHOLD;
        // 怪物身上狀態 tick（中毒、流血、麻痺）
        monster._curHp = mHp; // ⭐ 流血傷害需要當前 HP
        const mevs = tickStatuses(monster, monster.maxHp);
        for (const ev of mevs) {
          mHp = Math.max(0, mHp - ev.dmg);
          log.push({ type: 'player', text: `回合 ${round}：${monster.name} ${statusEmoji(ev.type)}${statusLabel(ev.type)} 觸發 -${ev.dmg} HP`, hp: { player: pHp, monster: mHp, mp: pMp } });
        }
        if (mHp <= 0) { pushDeathLine(); break; }
        // ⭐ 麻痺（charge-based）：50% RNG 決定跳過，消耗 1 層
        if (consumeParalyze(monster, 0.50)) {
          log.push({ type: 'system', text: `回合 ${round}：${monster.name} ⚡麻痺，行動被取消`, hp: { player: pHp, monster: mHp, mp: pMp } });
          continue;
        }
        // 怪物技能挑選（fixedSkillOrder 需間隔 ≥ 2 回合，確保兩技能間至少有一次普攻）
        let mSkill = null;
        const minSkillGap = monster.fixedSkillOrder ? 2 : 1;
        const skillsAllowed = (round - mLastSkillRound) >= minSkillGap;
        if (skillsAllowed && Array.isArray(monster.skills) && monster.skills.length) {
          if (monster.fixedSkillOrder) {
            // ⭐ 固定出招順序（晚餐鵝）：按技能陣列順序循環，等待 CD 就緒才出招
            const si = mSkillNextIdx % monster.skills.length;
            const s = monster.skills[si];
            const last = mSkillLast[si] ?? -999;
            if (round - last >= (s.cooldown || 3)) {
              mSkill = s;
              mSkillLast[si] = round;
              mLastSkillRound = round;
              mSkillNextIdx++;
            }
          } else if (Math.random() < 0.65) {
            // 一般怪物：65% 機率從冷卻就緒的技能中隨機挑一招
            const ready = [];
            for (let si = 0; si < monster.skills.length; si++) {
              const s = monster.skills[si];
              const last = mSkillLast[si] ?? -999;
              if (round - last >= (s.cooldown || 3)) ready.push({ s, si });
            }
            if (ready.length) {
              const pick = ready[Math.floor(Math.random() * ready.length)];
              mSkill = pick.s;
              mSkillLast[pick.si] = round;
              mLastSkillRound = round;
            }
          }
        }
        // 防禦受 buff 影響
        const effDef = (stats.def + (pBuff.def || 0)) * (1 + (pBuff.defPct || 0));
        // 反傷：玩家身上有 reflectPct 時，怪打到我會被反彈一部分（受到傷害的 50%，最多 300）
        const applyReflect = (incomingDmg) => {
          if (!pBuff.reflectPct || incomingDmg <= 0 || mHp <= 0) return;
          const r = Math.min(300, Math.max(1, Math.round(incomingDmg * pBuff.reflectPct)));
          mHp -= r;
          log.push({ type: 'crit-player', text: `回合 ${round}：🪞 反傷 → ${monster.name} -${r} HP`, hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp } });
        };
        let dead = false;
        // ⭐ 共用：套用傷害前檢查 shield；有則吸收一次、回 0
        const consumeShield = (incoming) => {
          if (incoming <= 0) return incoming;
          const s = (playerObj.statuses || []).find(x => x.type === 'shield' && (x.charges || 0) > 0);
          if (!s) return incoming;
          s.charges -= 1;
          if (s.charges <= 0) playerObj.statuses = playerObj.statuses.filter(x => x !== s);
          log.push({ type: 'system', text: `回合 ${round}：🌫 ${player.name} 隱身免疫此次傷害！`, hp: { player: pHp, monster: mHp, mp: pMp } });
          return 0;
        };
        // ⭐ 魔坑：hit-based 減傷 reducePct，消耗 1 次
        const consumePartialShield = (incoming) => {
          if (incoming <= 0) return incoming;
          const ps = (playerObj.statuses || []).find(x => x.type === 'partialShield' && (x.hitsLeft || 0) > 0);
          if (!ps) return incoming;
          const reduced = Math.max(1, Math.round(incoming * (1 - (ps.reducePct || 0))));
          ps.hitsLeft -= 1;
          if (ps.hitsLeft <= 0) playerObj.statuses = playerObj.statuses.filter(x => x !== ps);
          log.push({ type: 'system', text: `回合 ${round}：🛡 魔坑 −${Math.round((ps.reducePct||0)*100)}% 傷害（剩 ${ps.hitsLeft} 次）`, hp: { player: pHp, monster: mHp, mp: pMp } });
          return reduced;
        };
        if (mSkill) {
          if (mSkill.type === 'monsterSelfBuff') {
            // ⭐ 怪物自身加 buff（早餐鵝加防）
            applyStatus(monster, { type: 'buff', stat: mSkill.stat, amount: mSkill.amount, turns: mSkill.turns });
            log.push({ type: 'monster', text: `回合 ${round}：${monster.icon}${monster.name} 🛡 ${mSkill.verb} → ${mSkill.stat === 'def' ? `DEF +${mSkill.amount}（${mSkill.turns} 回合）` : `${mSkill.stat} +${mSkill.amount}`}`, hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp } });
          } else if (mSkill.type === 'monsterShield') {
            // ⭐ 怪物獲得護盾（午餐鵝咖哩潑灑：無視傷害 N 次）
            applyStatus(monster, { type: 'shield', charges: mSkill.charges || 1, turns: 99 });
            log.push({ type: 'monster', text: `回合 ${round}：${monster.icon}${monster.name} 🫙 ${mSkill.verb} → 無視下 ${mSkill.charges} 次傷害！`, hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp } });
          } else {
            // ⭐ 30% DEF 穿透：boss 有 defPen 屬性時，部分 ATK 直接無視防禦
            const _mPen = monster.defPen || 0;
            let dmg;
            if (mSkill.ignoreDef || _mPen <= 0) {
              dmg = Math.max(1, monster.atk * (mSkill.mult || 1) - (mSkill.ignoreDef ? 0 : Math.floor(effDef / 2)));
            } else {
              const _totAtk = monster.atk * (mSkill.mult || 1);
              dmg = Math.max(1, _totAtk * _mPen + Math.max(0, _totAtk * (1 - _mPen) - Math.floor(effDef / 2)));
            }
            dmg *= (0.85 + Math.random() * 0.3);
            dmg *= (1 - (passive.dmgReduction || 0));
            dmg *= (1 - (pBuff.dmgReducePct || 0));
            dmg = Math.max(1, Math.round(dmg));
            dmg = consumeShield(dmg);
            dmg = consumePartialShield(dmg);
            pHp = Math.max(0, pHp - dmg);
            if (dmg > 0) {
              log.push({
                type: 'monster',
                text: `回合 ${round}：${monster.icon}${monster.name} ✨${mSkill.verb || '技能'} → ${player.name} -${dmg} HP`,
                hp: { player: pHp, monster: mHp, mp: pMp }
              });
              applyReflect(dmg);
            }
            if (pHp <= 0) { dead = true; }
            if (mHp <= 0) { pushDeathLine(); break; }
            // 對玩家上狀態
            if (!dead && mSkill.applyStatus && Math.random() < (mSkill.applyStatus.chance || 1)) {
              applyStatus(playerObj, mSkill.applyStatus);
              log.push({ type: 'system', text: `回合 ${round}：${player.name} 進入 ${statusEmoji(mSkill.applyStatus.type)}${statusLabel(mSkill.applyStatus.type)} 狀態`, hp: { player: pHp, monster: mHp, mp: pMp } });
            }
          }
        } else {
          // 多段攻擊：1.3x 總傷害平均分散
          const hits = (mAbility?.type === 'multiHit') ? Math.max(1, mAbility.hits || 2) : 1;
          const perHitMult = hits === 1 ? 1.0 : (1.3 / hits);
          const _mPen2 = monster.defPen || 0;
          for (let h = 0; h < hits; h++) {
            let dmg;
            if (_mPen2 > 0) {
              dmg = Math.max(1, monster.atk * _mPen2 + Math.max(0, monster.atk * (1 - _mPen2) - Math.floor(effDef / 2)));
            } else {
              dmg = Math.max(1, monster.atk - Math.floor(effDef / 2));
            }
            dmg *= (0.85 + Math.random() * 0.3);
            dmg *= perHitMult;
            dmg *= (1 - (passive.dmgReduction || 0));
            dmg *= (1 - (pBuff.dmgReducePct || 0));
            dmg = Math.max(1, Math.round(dmg));
            dmg = consumeShield(dmg);
            dmg = consumePartialShield(dmg);
            pHp -= dmg;
            if (dmg > 0) {
              log.push({
                type: 'monster',
                text: `回合 ${round}：${monster.name} ${monster.verb}${hits > 1 ? `（${h+1}/${hits}）` : ''} → ${player.name} -${dmg} HP`,
                hp: { player: Math.max(0, pHp), monster: mHp, mp: pMp }
              });
              applyReflect(dmg);
            }
            if (mHp <= 0) { pushDeathLine(); dead = true; break; }
            if (pHp <= 0) { dead = true; break; }
          }
        }
        // 偷錢：60% 機率得手 — ⭐ 偷錢量降低 50%（綠茶不算 cameo 走另一條 path）
        if (!dead && mAbility?.type === 'steal' && Math.random() < 0.6) {
          const rawStolen = mAbility.min + Math.floor(Math.random() * (mAbility.max - mAbility.min + 1));
          const stolen = Math.max(1, Math.floor(rawStolen * 0.5));
          coinsStolen += stolen;
          log.push({
            type: 'monster',
            text: `回合 ${round}：${monster.name} 摸走 💰 ${stolen} 鵝鵝幣！`,
            hp: { player: pHp, monster: mHp, mp: pMp }
          });
        }
        if (pHp <= 0) break;
      }
    }
    const won = pHp > 0 && mHp <= 0;
    return {
      won,
      pHpFinal: Math.max(0, pHp),
      pMpFinal: pMp,
      mHpFinal: Math.max(0, mHp),
      maxHp: stats.maxHp,
      maxMp: stats.maxMp,
      coinsStolen,
      critCount,
      log
    };
  }

  // ============================================================
  // 異常狀態系統 + 多目標戰鬥引擎（試煉戰場用）
  // ============================================================
  // 狀態結構（全部 charge-based）：
  //   poison:    { type, charges, [dmg] } — 每次行動觸發扣 3% maxHP，消耗 1 層
  //   paralyze:  { type, charges }        — 必定跳過行動，消耗 1 層（consumeParalyze）
  //   vulnerable/shield: 見 consumeVulnerable / 護盾處理
  function applyStatus(target, status) {
    target.statuses = target.statuses || [];
    // 同類覆蓋（取較長 turns）— 'buff' 型用 stat 區分，可同時帶多個不同 stat 的 buff
    const isBuff = status.type === 'buff';
    const existing = isBuff
      ? target.statuses.find(s => s.type === 'buff' && s.stat === status.stat)
      : target.statuses.find(s => s.type === status.type);
    if (existing) {
      if (status.type === 'vulnerable') {
        // ⭐ hit-based：取較多次數，疊加量取最大
        existing.hits   = Math.max(existing.hits   || 0, status.hits   || 0);
        existing.amount = Math.max(existing.amount || 0, status.amount || 0);
      } else if (status.type === 'partialShield') {
        // ⭐ 魔坑：hit-based，取較多次數 / 較高減傷
        existing.hitsLeft  = Math.max(existing.hitsLeft  || 0, status.hitsLeft  || 0);
        existing.reducePct = Math.max(existing.reducePct || 0, status.reducePct || 0);
      } else if (status.type === 'shield' || status.type === 'paralyze' || status.type === 'poison' || status.type === 'bleed') {
        // ⭐ charge-based：護盾/麻痺/中毒/流血均取較多層
        existing.charges = Math.max(existing.charges || 0, status.charges || 0);
        if (status.type === 'poison') existing.dmg = Math.max(existing.dmg || 0, status.dmg || 0);
      } else {
        existing.turns = Math.max(existing.turns, status.turns);
        if (isBuff) existing.amount = Math.max(existing.amount || 0, status.amount || 0);
        else        existing.dmg    = Math.max(existing.dmg    || 0, status.dmg    || 0);
      }
    } else {
      target.statuses.push({ ...status });
    }
  }
  // ⭐ 狀態 tick：易傷/護盾/麻痺/中毒 均為 charge-based，不計 turns
  //   poison：每次行動觸發扣目標 3% maxHP（單次上限 1000），消耗 1 層
  //   paralyze：由 consumeParalyze() 負責消耗，tickStatuses 不處理
  //   maxHp 由呼叫端傳入（玩家 stats.maxHp / 怪物 monster.maxHp）
  function tickStatuses(target, maxHp) {
    if (!target.statuses || target.statuses.length === 0) return [];
    const events = []; // [{type, dmg}]
    const safeMax = Math.max(1, maxHp || target.maxHp || 0);
    for (const s of target.statuses) {
      if (s.type === 'poison') {
        // ⭐ 中毒傷害去上限：Boss（有 defPen）固定 0.5% maxHp；一般怪 3% maxHp
        const _poisonPct = target.defPen ? 0.005 : 0.03;
        const dmg = Math.max(1, Math.round(safeMax * _poisonPct));
        events.push({ type: 'poison', dmg });
        s.charges = (s.charges || 0) - 1; // ⭐ charge-based：每次觸發消耗 1 層
      }
      // ⭐ 流血：每次觸發扣目標當前 HP 的 0.5%，消耗 1 層
      if (s.type === 'bleed') {
        const curHp = target._curHp !== undefined ? target._curHp : (target.hp || safeMax);
        const dmg = Math.max(1, Math.round(curHp * 0.005));
        events.push({ type: 'bleed', dmg });
        s.charges = (s.charges || 0) - 1;
      }
      // ⭐ 易傷/護盾/麻痺/中毒/流血/魔坑：全部 charge/hit-based，不計 turns
      if (s.type !== 'vulnerable' && s.type !== 'shield' && s.type !== 'paralyze' && s.type !== 'poison' && s.type !== 'partialShield' && s.type !== 'bleed') {
        s.turns = (s.turns || 0) - 1;
      }
    }
    target.statuses = target.statuses.filter(s => {
      if (s.type === 'vulnerable')    return (s.hits     || 0) > 0;
      if (s.type === 'shield')        return (s.charges  || 0) > 0;
      if (s.type === 'paralyze')      return (s.charges  || 0) > 0; // ⭐ charge-based
      if (s.type === 'poison')        return (s.charges  || 0) > 0; // ⭐ charge-based
      if (s.type === 'bleed')         return (s.charges  || 0) > 0; // ⭐ charge-based
      if (s.type === 'partialShield') return (s.hitsLeft || 0) > 0; // ⭐ hit-based
      return s.turns > 0;
    });
    return events;
  }
  function hasStatus(target, type) {
    return (target.statuses || []).some(s => s.type === type);
  }
  // ⭐ 易傷（hit-based）：消耗 1 層並回傳傷害倍率；無易傷時回傳 1.0
  function consumeVulnerable(target) {
    const v = (target.statuses || []).find(s => s.type === 'vulnerable' && (s.hits || 0) > 0);
    if (!v) return 1.0;
    v.hits -= 1;
    if (v.hits <= 0) target.statuses = target.statuses.filter(s => s !== v);
    return 1 + (v.amount || 0.5);
  }
  // ⭐ 麻痺（charge-based + RNG）：每次行動消耗 1 層，依 skipChance 決定是否真的跳過
  //   玩家受麻痺：skipChance = 0.30（30%）；怪物受麻痺：skipChance = 0.50（50%）
  function consumeParalyze(target, skipChance) {
    const p = (target.statuses || []).find(s => s.type === 'paralyze' && (s.charges || 0) > 0);
    if (!p) return false;
    p.charges -= 1;
    if (p.charges <= 0) target.statuses = target.statuses.filter(s => s !== p);
    return Math.random() < skipChance; // true = 跳過行動
  }
  // 把目前生效的 buff 加總（atkPct/defPct/spd/critChance/critDmg/reflectPct/maxHpPct）
  function getBuffBonus(target) {
    const out = { atkPct: 0, defPct: 0, def: 0, spd: 0, critChance: 0, critDmg: 0, reflectPct: 0, maxHpPct: 0, markPct: 0, dmgReducePct: 0 };
    if (!target || !target.statuses) return out;
    for (const s of target.statuses) {
      if (s.type !== 'buff' || !s.stat) continue;
      out[s.stat] = (out[s.stat] || 0) + (s.amount || 0);
    }
    return out;
  }
  function describeBuff(buff) {
    if (!buff) return '';
    if (buff.stat === 'atkPct')     return `🦁 ATK +${Math.round(buff.amount * 100)}%`;
    if (buff.stat === 'defPct')     return `🛡 DEF +${Math.round(buff.amount * 100)}%`;
    if (buff.stat === 'def')        return `🛡 DEF +${buff.amount}`;
    if (buff.stat === 'spd')        return `💨 SPD +${buff.amount}`;
    if (buff.stat === 'critChance') return buff.amount >= 1.0 ? `🎯 必中暴擊（1 次）` : `🎯 暴擊率 +${Math.round(buff.amount * 100)}%`;
    if (buff.stat === 'critDmg')    return `💥 爆傷 +${Math.round(buff.amount * 100)}%`;
    if (buff.stat === 'reflectPct')   return `🪞 反傷 ${Math.round(buff.amount * 100)}%（單次最多 300）`;
    if (buff.stat === 'maxHpPct')     return `💖 最大HP +${Math.round(buff.amount * 100)}%（戰鬥中有效）`;
    if (buff.stat === 'markPct')      return `🌀 MARK +${Math.round(buff.amount * 100)}%`;
    if (buff.stat === 'dmgReducePct') return `🛡 受傷 -${Math.round(buff.amount * 100)}%（物理 + 魔法）`;
    return `✨ ${buff.stat} +${buff.amount}`;
  }
  function statusEmoji(type) {
    return type === 'poison' ? '☠️' : type === 'paralyze' ? '⚡' : type === 'vulnerable' ? '🎯' : type === 'bleed' ? '🩸' : type === 'buff' ? '✨' : '✨';
  }
  function statusLabel(type) {
    return type === 'poison' ? '中毒' : type === 'paralyze' ? '麻痺' : type === 'vulnerable' ? '易傷' : type === 'bleed' ? '流血' : type === 'buff' ? '增益' : type;
  }

  // 多目標戰鬥（最多 N 隻怪物 vs 玩家），用在「試煉戰場」
  function autoFightMulti(player, monsters) {
    const log = [];
    const cls = CLASSES[player.rpg.class];
    const stats = computeStats(player);
    const bonus = computeSkillBonuses(player);
    const abil  = computeAbilityBonuses(player);
    const passive = computePassiveBonuses(player);
    const effectiveSpd = stats.spd + (passive.spd || 0);
    const setB = stats.setBonuses || {};
    const baseCritChance = 0.08 + (cls.critBonus || 0) + (bonus.critChance || 0) + (abil.critChance || 0) + (passive.critChance || 0) + (setB.critChance || 0);
    const critMult = 1.7 + (abil.critDmgBonus || 0) + (passive.critDmg || 0) + (setB.critDmg || 0);
    const regenPer = (cls.regenPer || 0) + (bonus.regen || 0);

    let pHp = stats.maxHp; // ⭐ 每場戰鬥 HP 自動回滿（HP 變成屬性，不是耗材）
    let pMp = stats.maxMp; // ⭐ 每場戰鬥 MP 自動回滿
    const playerObj = { statuses: [] };

    // 怪物列表，每隻獨立 ATB gauge
    const mList = monsters.map((m, i) => ({
      ...m,
      idx: i,
      hp: m.hp,
      maxHp: m.maxHp || m.hp,
      gauge: 0,
      statuses: [],
      alive: true,
    }));

    const skills = cls.skills || [];
    const skillById = Object.fromEntries(skills.map((s, i) => [s.id, { skill: s, idx: i }]));
    const nextActionForSkill = {};
    const ruleUseCount = {};
    const actionPattern = (player.rpg.actionPattern && player.rpg.actionPattern.length)
      ? player.rpg.actionPattern
      : getDefaultActionPattern(player.rpg.class);

    const ATB_THRESHOLD = 100;
    const SPD_BASE = 30; // ⭐ 扁平化：每方加上基礎值，避免極端比例
    let pSpd = Math.max(1, SPD_BASE + effectiveSpd); // 受 buff 影響，每回合會重算
    // 把怪物 gauge 速度也加 SPD_BASE
    mList.forEach(m => { m._effSpd = Math.max(1, SPD_BASE + (m.spd || 0)); });
    // ⭐ SPD 軟上限 + 軟下限（多目標，以存活怪物平均速度為基準）
    //   軟上限：弓手極限 2.5，其他 2.0；軟下限：所有職業趨近 0.5:1
    const _spdCapCoeffM = player.rpg.class === 'archer' ? 1.0 : 0.5;
    const _capSpdM = (rawP) => {
      const aliveM = mList.filter(m => m.alive);
      if (!aliveM.length) return rawP;
      const avgMSpd = aliveM.reduce((s, m) => s + m._effSpd, 0) / aliveM.length;
      if (!avgMSpd || avgMSpd <= 0) return rawP;
      const raw = rawP / avgMSpd;
      if (raw > 1.5) { // 軟上限
        const excess = raw - 1.5;
        return (1.5 + _spdCapCoeffM * excess / (0.2 + excess)) * avgMSpd;
      }
      if (rawP > 0 && raw < 1 / 1.5) { // 軟下限：趨近 0.5:1
        const invRaw = avgMSpd / rawP;
        const excess = invRaw - 1.5;
        return avgMSpd / (1.5 + 0.5 * excess / (0.2 + excess));
      }
      return rawP;
    };
    let effPSpd = _capSpdM(pSpd);
    let pGauge = 0;
    // ⭐ 試煉戰場：log 加上 ATB 進度（玩家 + 最快的怪）
    {
      const __origPush = log.push.bind(log);
      log.push = function(e) {
        if (e && e.hp && !e.gauge) {
          const aliveM = mList.filter(m => m.alive);
          const topM = aliveM.length ? Math.max(...aliveM.map(m => m.gauge || 0)) : 0;
          e.gauge = {
            p: Math.max(0, Math.min(100, pGauge)),
            m: Math.max(0, Math.min(100, topM)),
            pSpd: effPSpd,
          };
        }
        return __origPush(e);
      };
    }
    // 怪物技能冷卻（每隻獨立）
    const mSkillLastByIdx = {}; // mSkillLastByIdx[mIdx][skillIdx] = round

    log.push({ type: 'system', text: `═══ ⚔️ 試煉戰場 ═══` });
    log.push({ type: 'system', text: `${player.name} VS ${monsters.map(m => m.icon + m.name).join(' / ')}` });
    log.push({ type: 'system', text: `🌬 你 SPD ${effectiveSpd}　·　${monsters.map(m => m.name + ' ' + m.spd).join(' / ')}` });

    let round = 0, playerActions = 0, critCount = 0;
    const hpsSnapshot = () => ({ player: pHp, mp: pMp, monsters: mList.map(m => Math.max(0, m.hp)) });

    while (pHp > 0 && mList.some(m => m.alive) && round < 120) {
      // 重算 pSpd（含 buff）
      const pBuff = getBuffBonus(playerObj);
      pSpd = Math.max(1, SPD_BASE + effectiveSpd + (pBuff.spd || 0));
      effPSpd = _capSpdM(pSpd); // ⭐ 套用 SPD 軟上限（對存活怪物平均速度）
      // ATB 推進（用 _effSpd 已加 SPD_BASE）
      const aliveM = mList.filter(m => m.alive);
      const pNeed = Math.max(0, ATB_THRESHOLD - pGauge);
      const pTime = pNeed / effPSpd;
      const mTimes = aliveM.map(m => Math.max(0, ATB_THRESHOLD - m.gauge) / Math.max(1, m._effSpd));
      const dt = Math.min(pTime, ...(mTimes.length ? mTimes : [Infinity]));
      pGauge += dt * effPSpd;
      aliveM.forEach(m => m.gauge += dt * m._effSpd);

      // 決定動作者：所有 gauge ≥ 100 的中，最大者；同分玩家先
      let actor = null; // 'player' or monster ref
      let bestG = -1;
      if (pGauge >= ATB_THRESHOLD - 0.001) { actor = 'player'; bestG = pGauge; }
      for (const m of aliveM) {
        if (m.gauge >= ATB_THRESHOLD - 0.001 && m.gauge > bestG) {
          actor = m; bestG = m.gauge;
        }
      }
      if (!actor) continue;

      round++;

      if (actor === 'player') {
        pGauge -= ATB_THRESHOLD;
        playerActions++;

        // 自身狀態 tick（中毒等）
        const _hadMaxHpPct2 = (playerObj.statuses || []).some(s => s.type === 'buff' && s.stat === 'maxHpPct');
        const evs = tickStatuses(playerObj, stats.maxHp);
        for (const ev of evs) {
          pHp = Math.max(0, pHp - ev.dmg);
          log.push({ type: 'monster', text: `回合 ${round}：${player.name} ${statusEmoji(ev.type)}${statusLabel(ev.type)} 觸發 -${ev.dmg} HP`, hp: hpsSnapshot() });
        }
        // ⭐ 神聖祝福 maxHpPct 到期：HP 壓回 base maxHp
        const _nowHasMaxHpPct2 = (playerObj.statuses || []).some(s => s.type === 'buff' && s.stat === 'maxHpPct');
        if (_hadMaxHpPct2 && !_nowHasMaxHpPct2 && pHp > stats.maxHp) {
          pHp = stats.maxHp;
          log.push({ type: 'system', text: `回合 ${round}：💖 最大HP 加成結束，HP 恢復上限 ${stats.maxHp}`, hp: hpsSnapshot() });
        }
        if (pHp <= 0) break;

        // ⭐ 麻痺（charge-based）：30% RNG 決定跳過，消耗 1 層
        if (consumeParalyze(playerObj, 0.30)) {
          log.push({ type: 'system', text: `回合 ${round}：${player.name} ⚡麻痺，無法行動！`, hp: hpsSnapshot() });
          continue;
        }
        // 自癒
        if (regenPer > 0 && pHp < stats.maxHp) {
          const heal = Math.max(1, Math.round(stats.maxHp * regenPer));
          pHp = Math.max(pHp, Math.min(stats.maxHp, pHp + heal));  // 不下調（神聖祝福可讓 HP 超過 maxHp，後續補血不應拉低）
          log.push({ type: 'player', text: `回合 ${round}：自癒 +${heal} HP`, hp: hpsSnapshot() });
        }
        // ⭐ 每回合自動回 MP（法系 4 / 其他 2）+ 鵝王恩賜飾品 mpRegen
        if (pMp < stats.maxMp) {
          const isCaster = (player.rpg.class === 'mage' || player.rpg.class === 'paladin');
          const mpGain = (isCaster ? 4 : 2) + (stats.mpRegen || 0);
          const before = pMp;
          pMp = Math.min(stats.maxMp, pMp + mpGain);
          const gained = pMp - before;
          if (gained > 0) {
            log.push({ type: 'player', text: `回合 ${round}：💙 自然回 +${gained} MP`, hp: hpsSnapshot() });
          }
        }

        // 評估規則表（用最低血敵人當「敵 HP」context）
        const lowHpM = aliveM.slice().sort((a, b) => a.hp - b.hp)[0];
        const judgeCtx = {
          pHp, maxHp: stats.maxHp,
          pMp, maxMp: stats.maxMp,
          mHp: lowHpM ? lowHpM.hp : 0, maxMHp: lowHpM ? lowHpM.maxHp : 1,
          aliveCount: aliveM.length,
          playerActions,
          ruleUseCount,
          // ⭐ 狀態判定
          selfPoisoned:    hasStatus(playerObj, 'poison'),
          selfParalyzed:   hasStatus(playerObj, 'paralyze'),
          anyEnemyPoisoned:  aliveM.some(m => hasStatus(m, 'poison')),
          anyEnemyParalyzed: aliveM.some(m => hasStatus(m, 'paralyze')),
          anyEnemyBled:      aliveM.some(m => hasStatus(m, 'bleed')),
          allEnemyPoisoned:  aliveM.length > 0 && aliveM.every(m => hasStatus(m, 'poison')),
        };
        let useSkill = null, useSkillIdx = -1, usedRuleIdx = -1;
        for (let r = 0; r < actionPattern.length; r++) {
          const rule = actionPattern[r];
          if (!rule || !evaluateJudge(rule.judgeId, rule.param, judgeCtx, r)) continue;
          if (rule.skillId === 'basic') { useSkill = null; useSkillIdx = -1; usedRuleIdx = r; break; }
          const sInfo = skillById[rule.skillId];
          if (!sInfo) continue;
          const s = sInfo.skill;
          if ((s.unlockLv || 1) > (player.rpg.level || 1)) continue;
          // ⭐ 玩家技能 CD 取消（用 MP 跟硬值控制節奏）
          // if (playerActions < (nextActionForSkill[s.id] || 0)) continue;
          const effMpCost = Math.round((s.mpCost || 0) * (1 - (passive.mpDiscount || 0)));
          if (pMp < effMpCost) continue;
          if (s.hpCost) {
            const need = Math.max(1, Math.round(stats.maxHp * s.hpCost));
            if (pHp <= need) continue;
          }
          if (s.hpCostFlat) { if (pHp <= s.hpCostFlat) continue; }
          useSkill = s; useSkillIdx = sInfo.idx; usedRuleIdx = r; break;
        }
        if (usedRuleIdx >= 0) ruleUseCount[usedRuleIdx] = (ruleUseCount[usedRuleIdx] || 0) + 1;

        // 決定目標
        const targetCount = useSkill ? (useSkill.targetCount === 'all' ? aliveM.length : (useSkill.targetCount || 1)) : 1;
        const targets = aliveM.slice().sort((a, b) => a.hp - b.hp).slice(0, targetCount);

        if (useSkill) {
          // ⭐ 套用技能等級加成：傷害/治療/MP 回復 +10%/級，Lv 3+ 強化狀態，Lv 5 額外加成（依技能特性）
          const __skillLv = (player.rpg.skillLevels && player.rpg.skillLevels[useSkill.id]) || 0;
          const skill = getSkillEffectiveStats(useSkill, __skillLv);
          // Lv 5 治療系：mpCostMult 進一步打折
          const effMpCost = Math.round((skill.mpCost || 0) * (skill.mpCostMult || 1) * (1 - (passive.mpDiscount || 0)));
          pMp -= effMpCost;
          let hpPaid = 0;
          if (skill.hpCost) {
            hpPaid = Math.max(1, Math.round(stats.maxHp * skill.hpCost));
            pHp = Math.max(1, pHp - hpPaid);
          }
          if (skill.hpCostFlat) { hpPaid += skill.hpCostFlat; pHp = Math.max(1, pHp - skill.hpCostFlat); }
          nextActionForSkill[skill.id] = playerActions + skill.cooldown;
          const costParts = [];
          if (effMpCost > 0) costParts.push(`-${effMpCost} MP`);
          if (hpPaid > 0)    costParts.push(`-${hpPaid} HP`);
          const costStr = costParts.length ? `（${costParts.join('，')}）` : '';

          if (skill.type === 'damage') {
            const isFlat = skill.flat != null;
            const isMagic = isFlat || skill.maxHpMult != null || skill.magic || skill.markMult;
            const effAtk = stats.atk * (1 + (pBuff.atkPct || 0));
            const effMark = stats.mark * (1 + (pBuff.atkPct || 0) + (pBuff.markPct || 0));
            const effDef = (stats.def + (pBuff.def || 0)) * (1 + (pBuff.defPct || 0));
            // 對每個目標各打一發（不分散傷害）
            const consumeMonsterShield2 = (tgt, d) => {
              const sh = (tgt.statuses || []).find(x => x.type === 'shield' && (x.charges || 0) > 0);
              if (!sh || d <= 0) return d;
              sh.charges -= 1;
              if (sh.charges <= 0) tgt.statuses = tgt.statuses.filter(x => x !== sh);
              log.push({ type: 'system', text: `回合 ${round}：🫙 ${tgt.icon}${tgt.name} 護盾抵擋此次傷害！（剩 ${sh.charges} 層）`, hp: hpsSnapshot() });
              return 0;
            };
            const hits = [];
            for (const tgt of targets) {
              const tgtMonDef = tgt.def + (getBuffBonus(tgt).def || 0);
              let dmg;
              if (skill.defMult != null) {
                dmg = effDef * skill.defMult - Math.floor(tgtMonDef / 2);
              } else if (skill.maxHpMult != null) {
                dmg = stats.maxHp * skill.maxHpMult - Math.floor(tgtMonDef / 2);
              } else if (isFlat) {
                dmg = (skill.flat + (bonus.skillFlat || 0) + (abil.skillFlat || 0)) + (skill.perLv || 0) * (player.rpg.level || 1);
                if (!skill.ignoreDef) dmg -= Math.floor(tgtMonDef / 2);
              } else {
                const dmgStat = skill.useMark ? effMark : effAtk;
                dmg = dmgStat * (skill.mult || 1) - Math.floor(tgtMonDef / 2);
              }
              // ⭐ markMult：flat 傷害後追加 MARK 加傷（火焰風暴：固定150 + 6*MARK）
              if (skill.markMult) {
                dmg = Math.max(0, dmg) + effMark * skill.markMult;
              }
              const perSkillKey = `skill${useSkillIdx}Pct`;
              dmg *= (1 + (bonus[perSkillKey] || 0));
              dmg *= (1 + (bonus.skillDmgPct || 0));
              if (isMagic) dmg *= (1 + (passive.flatPct || 0));
              else         dmg *= (1 + (passive.physPct || 0));
              // ⭐ 聖騎 bonusMaxHpPct：純加值，不吃怪 DEF（同單體 path）
              if (skill.bonusMaxHpPct) {
                const effMaxHp = Math.round(stats.maxHp * (1 + (pBuff.maxHpPct || 0)));
                dmg = Math.max(0, dmg) + effMaxHp * skill.bonusMaxHpPct;
              }
              if (isMagic && tgt.ability?.type === 'magicResist') dmg *= (1 - tgt.ability.resist);
              if (!isMagic && tgt.ability?.type === 'physResist') dmg *= (1 - tgt.ability.resist);
              dmg *= consumeVulnerable(tgt); // ⭐ 易傷（hit-based）
              // ⭐ 流血加傷：血祭斬打流血目標 +30% 傷害
              if (skill.bleedBonus && hasStatus(tgt, 'bleed')) {
                dmg *= (1 + skill.bleedBonus);
              }
              const skillCrit = baseCritChance + (skill.extraCritChance || 0) + (pBuff.critChance || 0);
              const skillCritMult = critMult + (skill.extraCritDmg || 0) + (pBuff.critDmg || 0);
              const isCrit = skill.alwaysCrit || Math.random() < skillCrit;
              dmg *= (0.9 + Math.random() * 0.2);
              if (isCrit) { dmg *= skillCritMult; critCount++; }
              dmg = Math.max(1, Math.round(dmg));
              if (tgt.ability?.type === 'flatCapDmg') dmg = Math.min(dmg, tgt.ability.cap || 1);
              dmg = consumeMonsterShield2(tgt, dmg);
              tgt.hp = Math.max(0, tgt.hp - dmg);
              if (tgt.hp <= 0) tgt.alive = false;
              hits.push({ tgt, dmg, isCrit });
              // 鏡鵝反傷（受到傷害的 50%，最多 300）
              if (tgt.ability?.type === 'reflect' && tgt.ability.resist) {
                pHp = Math.max(0, pHp - Math.min(300, Math.max(1, Math.round(dmg * tgt.ability.resist))));
              }
              // 套用狀態
              if (skill.applyStatus && Math.random() < (skill.applyStatus.chance || 1)) {
                applyStatus(tgt, skill.applyStatus);
              }
            }
            // 吸血（總和）
            let extra = '';
            if (skill.lifesteal && hits.length) {
              const totalDmg = hits.reduce((s, h) => s + h.dmg, 0);
              const heal = Math.max(1, Math.round(totalDmg * skill.lifesteal));
              const before = pHp;
              pHp = Math.max(pHp, Math.min(stats.maxHp, pHp + heal));  // 不下調（神聖祝福可讓 HP 超過 maxHp，後續補血不應拉低）
              const gained = pHp - before;
              if (gained > 0) extra += ` 🩸+${gained} HP`;
            }
            // ⭐ 流血吸血（嗜血爆裂）：打流血目標額外 +10% 吸血
            if (skill.bleedLifestealBonus && hits.length) {
              const bleedHits = hits.filter(h => hasStatus(h.tgt, 'bleed'));
              if (bleedHits.length) {
                const bleedTotalDmg = bleedHits.reduce((s, h) => s + h.dmg, 0);
                const extraHeal = Math.max(1, Math.round(bleedTotalDmg * skill.bleedLifestealBonus));
                const before = pHp;
                pHp = Math.max(pHp, Math.min(stats.maxHp, pHp + extraHeal));
                if (pHp - before > 0) extra += ` 🩸+${pHp - before} HP (流血吸血)`;
              }
            }
            if (skill.healCaster) {
              const heal = Math.max(1, Math.round(stats.maxHp * skill.healCaster));
              const before = pHp;
              pHp = Math.max(pHp, Math.min(stats.maxHp, pHp + heal));  // 不下調（神聖祝福可讓 HP 超過 maxHp，後續補血不應拉低）
              const gained = pHp - before;
              if (gained > 0) extra += ` 💚+${gained} HP`;
            }
            // ⭐ mpRestore：傷害技回 N MP
            if (skill.mpRestore) {
              const before = pMp;
              pMp = Math.min(stats.maxMp, pMp + skill.mpRestore);
              if (pMp - before > 0) extra += ` 💙+${pMp - before} MP`;
            }
            // ⭐ mpRestorePct：傷害技回 X% maxMP（魔力虹吸）
            if (skill.mpRestorePct) {
              const before = pMp;
              pMp = Math.min(stats.maxMp, pMp + Math.round(stats.maxMp * skill.mpRestorePct));
              if (pMp - before > 0) extra += ` 💙+${pMp - before} MP（${Math.round(skill.mpRestorePct * 100)}%）`;
            }
            // ⭐ postSelfBuff：護盾衝鋒打完 +10 DEF buff
            if (skill.postSelfBuff) {
              applyStatus(playerObj, { type: 'buff', stat: skill.postSelfBuff.stat, amount: skill.postSelfBuff.amount, turns: skill.postSelfBuff.turns });
              extra += ` ✨${describeBuff(skill.postSelfBuff)}`;
            }
            const targetSummary = hits.map(h => `${h.tgt.icon}${h.tgt.name} -${h.dmg}${h.isCrit ? '【爆】' : ''}`).join(' / ');
            log.push({
              type: 'crit-player',
              text: `回合 ${round}：${skill.icon} ${skill.name}${isMagic ? '【魔攻】' : ''} → ${targetSummary}${extra}${costStr}`,
              hp: hpsSnapshot(),
            });
            // 套狀態的 log
            if (skill.applyStatus) {
              const stuck = hits.filter(h => h.tgt.statuses.find(s => s.type === skill.applyStatus.type));
              if (stuck.length) {
                log.push({ type: 'system', text: `${stuck.map(h => h.tgt.name).join(' / ')} 進入 ${statusEmoji(skill.applyStatus.type)}${statusLabel(skill.applyStatus.type)} 狀態`, hp: hpsSnapshot() });
              }
            }
          } else if (skill.type === 'buff' && (skill.selfBuff || skill.applyPartialShield)) {
            const extraNote = [];
            if (skill.selfBuff) {
              applyStatus(playerObj, { type: 'buff', stat: skill.selfBuff.stat, amount: skill.selfBuff.amount, turns: skill.selfBuff.turns });
            }
            // ⭐ 魔坑：hit-based 減傷護盾
            if (skill.applyPartialShield) {
              applyStatus(playerObj, { type: 'partialShield', reducePct: skill.applyPartialShield.reducePct, hitsLeft: skill.applyPartialShield.hits, turns: 99 });
              extraNote.push(`🛡 魔坑 −${Math.round(skill.applyPartialShield.reducePct*100)}%（${skill.applyPartialShield.hits} 次）`);
            }
            // ⭐ selfBuff2：第二個 buff（鷹眼：暴擊率 + 暴傷）
            if (skill.selfBuff2) {
              applyStatus(playerObj, { type: 'buff', stat: skill.selfBuff2.stat, amount: skill.selfBuff2.amount, turns: skill.selfBuff2.turns });
              extraNote.push(describeBuff(skill.selfBuff2));
            }
            // ⭐ selfBuff3：第三個 buff（鷹眼：+25% ATK）
            if (skill.selfBuff3) {
              applyStatus(playerObj, { type: 'buff', stat: skill.selfBuff3.stat, amount: skill.selfBuff3.amount, turns: skill.selfBuff3.turns });
              extraNote.push(describeBuff(skill.selfBuff3));
            }
            if (skill.applyShield) {
              applyStatus(playerObj, { type: 'shield', charges: skill.applyShield, turns: 99 });
              extraNote.push('🛡 免疫一次傷害');
            }
            if (skill.id === 'a_stealth' && (__skillLv || 0) >= 5) {
              applyStatus(playerObj, { type: 'buff', stat: 'critDmg', amount: 0.20, turns: skill.selfBuff.turns });
              extraNote.push('💥 爆傷 +20%');
            }
            // ⭐ 底氣 / 隱身：額外即時補血（上限 maxHp）
            if (skill.bonusHealPct) {
              const heal = Math.round(stats.maxHp * skill.bonusHealPct);
              const actualHeal = Math.min(heal, Math.max(0, stats.maxHp - pHp));
              pHp = Math.min(stats.maxHp, pHp + heal);
              extraNote.push(`💚 +${actualHeal} HP（${Math.round(skill.bonusHealPct * 100)}% maxHp）`);
            }
            // ⭐ buffMaxHpPct：臨時提升最大 HP + 即時補血至新上限（確保再施放時明顯有效）
            if (skill.buffMaxHpPct) {
              const bTurns = (skill.selfBuff && skill.selfBuff.turns) ? skill.selfBuff.turns : 3;
              applyStatus(playerObj, { type: 'buff', stat: 'maxHpPct', amount: skill.buffMaxHpPct, turns: bTurns });
              const _newEffMaxHp2 = Math.round(stats.maxHp * (1 + skill.buffMaxHpPct));
              const _bonusHeal2 = Math.max(0, _newEffMaxHp2 - pHp);
              if (_bonusHeal2 > 0) pHp = Math.min(_newEffMaxHp2, pHp + _bonusHeal2);
              extraNote.push(`💖 最大HP +${Math.round(skill.buffMaxHpPct * 100)}%（${bTurns} 回合）${_bonusHeal2 > 0 ? ` / 💚+${_bonusHeal2} HP` : ''}`);
            }
            const mainDesc2 = skill.selfBuff ? `${describeBuff(skill.selfBuff)}（${skill.selfBuff.turns} 回合）` : skill.name;
            log.push({
              type: 'player',
              text: `回合 ${round}：${skill.icon} ${skill.name} → ${mainDesc2}${extraNote.length ? ' / ' + extraNote.join(' / ') : ''}${costStr}`,
              hp: hpsSnapshot(),
            });
          } else if (skill.type === 'heal') {
            const gainedParts = [];
            if (skill.healPct) {
              const before = pHp;
              const heal = Math.round(stats.maxHp * skill.healPct * (1 + (bonus.skillHealPct || 0)) * (1 + (passive.healPct || 0)));
              pHp = Math.max(pHp, Math.min(stats.maxHp, pHp + heal));  // 不下調（神聖祝福可讓 HP 超過 maxHp，後續補血不應拉低）
              if (pHp - before > 0) gainedParts.push(`💚+${pHp - before} HP`);
            }
            // ⭐ mpFlat / mpPct 都套用（不再 else if）
            if (skill.mpFlat || skill.mpPct) {
              const before = pMp;
              const flat = skill.mpFlat || 0;
              const pct  = skill.mpPct ? Math.round(stats.maxMp * skill.mpPct) : 0;
              pMp = Math.min(stats.maxMp, pMp + flat + pct);
              if (pMp - before > 0) gainedParts.push(`💙+${pMp - before} MP`);
            }
            // ⭐ 治療技能也可附帶護盾（絕對防禦）
            if (skill.applyShield) {
              applyStatus(playerObj, { type: 'shield', charges: skill.applyShield, turns: 99 });
              gainedParts.push('🛡 免疫一次傷害');
            }
            log.push({
              type: 'player',
              text: `回合 ${round}：${skill.icon} ${skill.name} ${gainedParts.join(' ') || '無效果'}${costStr}`,
              hp: hpsSnapshot(),
            });
          }
        } else {
          // 普攻：打 lowHp 那隻
          const tgt = targets[0];
          const effAtk = stats.atk * (1 + (pBuff.atkPct || 0));
          const baseCrit2 = baseCritChance + (pBuff.critChance || 0);
          const critMult2 = critMult + (pBuff.critDmg || 0);
          const isCrit = Math.random() < baseCrit2;
          let dmg = Math.max(1, effAtk - Math.floor(tgt.def / 2));
          dmg *= (0.85 + Math.random() * 0.3);
          if (isCrit) { dmg *= critMult2; critCount++; }
          if (tgt.ability?.type === 'physResist') dmg *= (1 - tgt.ability.resist);
          dmg *= consumeVulnerable(tgt); // ⭐ 易傷（hit-based）
          dmg = Math.max(1, Math.round(dmg));
          if (tgt.ability?.type === 'flatCapDmg') dmg = Math.min(dmg, tgt.ability.cap || 1);
          tgt.hp = Math.max(0, tgt.hp - dmg);
          if (tgt.hp <= 0) tgt.alive = false;
          if (tgt.ability?.type === 'reflect' && tgt.ability.resist) {
            // 反傷：受到傷害的 50%，最多 300
            const r = Math.min(300, Math.max(1, Math.round(dmg * tgt.ability.resist)));
            pHp = Math.max(0, pHp - r);
          }
          log.push({
            type: isCrit ? 'crit-player' : 'player',
            text: `回合 ${round}：${cls.attackVerb}${isCrit ? '【暴擊】' : ''} → ${tgt.icon}${tgt.name} -${dmg} HP`,
            hp: hpsSnapshot(),
          });
        }
      } else {
        // 怪物的回合
        const m = actor;
        m.gauge -= ATB_THRESHOLD;
        // 怪物中毒等狀態 tick
        const evs = tickStatuses(m, m.maxHp);
        for (const ev of evs) {
          m.hp = Math.max(0, m.hp - ev.dmg);
          if (m.hp <= 0) m.alive = false;
          log.push({ type: 'player', text: `回合 ${round}：${m.icon}${m.name} ${statusEmoji(ev.type)}${statusLabel(ev.type)} 觸發 -${ev.dmg} HP`, hp: hpsSnapshot() });
        }
        if (!m.alive) continue;
        // ⭐ 麻痺（charge-based）：50% RNG 決定跳過，消耗 1 層
        if (consumeParalyze(m, 0.50)) {
          log.push({ type: 'system', text: `回合 ${round}：${m.icon}${m.name} ⚡麻痺，行動被取消`, hp: hpsSnapshot() });
          continue;
        }
        // 防禦受 buff 影響
        const effDef = (stats.def + (pBuff.def || 0)) * (1 + (pBuff.defPct || 0));
        // 怪物技能挑選
        let mSkill = null;
        const cdMap = mSkillLastByIdx[m.idx] = mSkillLastByIdx[m.idx] || {};
        const lastSkillR = cdMap.__lastSkillR ?? -999;
