  function renderCharCard() {
    const me = getMe();
    const rpg = getRpg(me);
    const cls = CLASSES[rpg.class];
    const stats = computeStats(me);
    tickRecovery(me); // 確保 hp/體力已更新
    if (rpg.hp == null || rpg.hp > stats.maxHp) rpg.hp = stats.maxHp;
    if (rpg.mp == null || rpg.mp > stats.maxMp) rpg.mp = stats.maxMp;
    const xpCur = rpg.xp;
    const xpNeed = xpForLevel(rpg.level);
    const xpPercent = Math.min(100, Math.round((xpCur / xpNeed) * 100));
    const hpPercent = Math.round((rpg.hp / stats.maxHp) * 100);
    const mpPercent = Math.round((rpg.mp / stats.maxMp) * 100);
    const stamPercent = Math.round((rpg.stamina / STAMINA_MAX) * 100);
    const coins = getCoins(me.id);

    // 從同步好的 equipped 物件讀紙娃娃 SVG 路徑（裝備物品 ID 仍存在 rpg.equipment）
    const equipped = rpg.equipped || {};
    const weaponItem = rpg.equipment?.weapon ? resolveItem(rpg.equipment.weapon) : null;
    const armorItem  = rpg.equipment?.armor  ? resolveItem(rpg.equipment.armor)  : null;
    const accItem    = rpg.equipment?.accessory ? resolveItem(rpg.equipment.accessory) : null;
    const wTier = weaponItem ? itemTier(weaponItem) : 0;
    const aTier = armorItem  ? itemTier(armorItem)  : 0;
    const cTier = accItem    ? itemTier(accItem)    : 0;
    const unlockedAvatars = (me.unlockedAvatars || []).slice(0, 6);
    const collectionHtml = unlockedAvatars.length > 0
      ? unlockedAvatars.map(a => `<span class="cc-item">${a}</span>`).join('')
      : `<span class="cc-empty">主頁抽蛋可解鎖收藏</span>`;
    // 紙娃娃 5 層（順序由下到上：armor-glow → base → shield → weapon → accessory）
    // 每張 SVG 都是 200×250、位置已對齊；data-tier 觸發 CSS filter 上色（1..10）
    const dollLayers = [];
    if (equipped.armor) dollLayers.push(`<img class="pd-layer pd-armor" data-tier="${aTier}" src="${equipped.armor}" alt="">`);
    dollLayers.push(`<img class="pd-layer pd-base" src="${cls.baseImage}" alt="${cls.name}"
       onerror="this.outerHTML='<div class=\\'pd-base-emoji\\'>${cls.icon}</div>';">`);
    if (equipped.shield) dollLayers.push(`<img class="pd-layer pd-shield" src="${equipped.shield}" alt="">`);
    if (equipped.weapon) dollLayers.push(`<img class="pd-layer pd-weapon" data-tier="${wTier}" src="${equipped.weapon}" alt="">`);
    if (equipped.accessory) dollLayers.push(`<img class="pd-layer pd-acc" data-tier="${cTier}" src="${equipped.accessory}" alt="">`);

    document.getElementById('charCard').innerHTML = `
      <div class="char-portrait">
        <div class="cp-lv-badge">Lv ${rpg.level}</div>
        <div class="cp-coin-badge">🪙 ${coins >= 1000 ? (coins/1000).toFixed(1) + 'k' : coins}</div>
        <div class="paper-doll">${dollLayers.join('')}</div>
        <div class="cp-collection">${collectionHtml}</div>
      </div>
      <div class="char-info">
        <div class="char-name">${escapeHtml(me.name)}</div>
        <div class="char-class">${cls.name} · Lv ${rpg.level}</div>
        <div class="char-coins">🪙 ${coins} 鵝鵝幣　·　🧭 ${rpg.exploreCoins || 0} 探險幣</div>
        <div class="stat-bar">
          <div class="stat-bar-label"><span>❤️ HP</span><span>${rpg.hp} / ${stats.maxHp}</span></div>
          <div class="stat-bar-track"><div class="stat-bar-fill hp-fill" style="width:${hpPercent}%"></div></div>
        </div>
        <div class="stat-bar">
          <div class="stat-bar-label"><span>💙 MP</span><span>${rpg.mp} / ${stats.maxMp}</span></div>
          <div class="stat-bar-track"><div class="stat-bar-fill mp-fill" style="width:${mpPercent}%"></div></div>
        </div>
        <div class="stat-bar">
          <div class="stat-bar-label"><span>⚡ 體力</span><span>${rpg.stamina} / ${STAMINA_MAX}</span></div>
          <div class="stat-bar-track"><div class="stat-bar-fill mhp-fill" style="width:${stamPercent}%"></div></div>
        </div>
        <div class="stat-bar">
          <div class="stat-bar-label"><span>⭐ XP</span><span>${xpCur} / ${xpNeed}</span></div>
          <div class="stat-bar-track"><div class="stat-bar-fill xp-fill" style="width:${xpPercent}%"></div></div>
        </div>
        <div class="stats-grid">
          <div class="stat-cell"><div class="sc-label">ATK</div><div class="sc-value">${stats.atk}</div></div>
          <div class="stat-cell"><div class="sc-label">DEF</div><div class="sc-value">${stats.def}</div></div>
          <div class="stat-cell"><div class="sc-label">SPD</div><div class="sc-value">${stats.spd}</div></div>
          <div class="stat-cell"><div class="sc-label" style="color:#818cf8;">MARK</div><div class="sc-value" style="color:#818cf8;">${stats.mark || 0}</div></div>
          <div class="stat-cell"><div class="sc-label">爆擊率</div><div class="sc-value">${Math.round((stats.totalCritChance || 0) * 100)}%</div></div>
          <div class="stat-cell"><div class="sc-label">爆傷</div><div class="sc-value">${Math.round((stats.totalCritDmg || 1.7) * 100)}%</div></div>
        </div>
        ${(() => {
          const setIds = Object.keys(stats.setCounts || {});
          if (setIds.length === 0) return '';
          return `<div style="margin-top:10px; padding:8px 10px; background:linear-gradient(135deg,#fef3c7,#fde68a); border:2px dashed #f59e0b; border-radius:10px; font-size:11px;">
            <div style="font-weight:700; margin-bottom:4px; color:#92400e;">🛡 套裝</div>
            ${setIds.map(sid => {
              const set = SETS[sid];
              if (!set) return '';
              const c = stats.setCounts[sid];
              const totalPieces = set.pieces.length;
              const tiers = (set.tiers || []).map(t => {
                const active = c >= t.req;
                return `<span style="display:inline-block; padding:1px 6px; margin:1px 2px; border-radius:6px; font-size:10px; ${active ? `background:${set.color}; color:#fff; font-weight:700;` : 'background:#e5e7eb; color:#9ca3af;'}">${t.desc}</span>`;
              }).join('');
              return `<div style="margin-bottom:3px;">
                <b style="color:${set.color};">${escapeHtml(set.name)}</b> <span style="color:#92400e;">${c}/${totalPieces}</span>
                <div style="margin-top:2px;">${tiers}</div>
              </div>`;
            }).join('')}
          </div>`;
        })()}
      </div>
    `;
  }

  function renderEquipment() {
    // 裝備 UI 已搬到 modal，平時不在 DOM。沒元素就略過（避免 null.innerHTML）
    const equipRowEl = document.getElementById('equipRow');
    const invGridEl = document.getElementById('invGrid');
    if (!equipRowEl || !invGridEl) return;
    const me = getMe();
    const rpg = getRpg(me);
    const slots = ['weapon', 'armor', 'accessory', 'helmet', 'gloves', 'boots', 'cape', 'wings', 'pet', 'guide', 'ring1', 'ring2'];
    const slotLabels = { weapon: '武器', armor: '防具', accessory: '飾品', helmet: '頭盔', gloves: '手套', boots: '鞋子', cape: '披風', wings: '翅膀', pet: '寵物', guide: '綠茶指南書', ring1: '💍 戒指 1', ring2: '💍 戒指 2' };
    equipRowEl.innerHTML = slots.map(s => {
      const id = rpg.equipment?.[s];
      const item = id ? resolveItem(id) : null;
      if (!item) {
        return `<div class="equip-slot empty"><div class="es-icon">➕</div><div class="es-name">${slotLabels[s]}</div></div>`;
      }
      const rarColor = item.rarity ? RARITY[item.rarity]?.color : null;
      // ⭐ hover tooltip：顯示完整資訊（名字、Lv、屬性、詞綴、套裝）
      const tooltip = buildItemTooltipText(item);
      return `<button class="equip-slot" onclick="unequip('${s}')" style="${rarColor ? `border-color:${rarColor};` : ''}" title="${escapeHtml(tooltip)}">
        <div class="es-icon">${item.icon}</div>
        <div class="es-name" style="${rarColor ? `color:${rarColor};` : ''}">${item.name}</div>
        <div class="es-stat">${formatItemStats(item)}</div>
      </button>`;
    }).join('');

    // 背包：分頁 + 可批量選取
    const inv = (rpg.inventory || []);
    const pageCount = Math.max(1, Math.ceil(inv.length / INV_PAGE_SIZE));
    if (__invPage >= pageCount) __invPage = pageCount - 1;
    if (__invPage < 0) __invPage = 0;

    // 分頁 tabs（至少顯示 1 個）
    const tabsEl = document.getElementById('invPageTabs');
    if (tabsEl) {
      tabsEl.innerHTML = Array.from({ length: pageCount }, (_, p) => `
        <button class="inv-page-tab ${p === __invPage ? 'active' : ''}" onclick="setInvPage(${p})">${p + 1}</button>
      `).join('');
    }

    // 工具列：批量模式 + 全選 + 取消選取 + 賣出
    const tbEl = document.getElementById('invToolbar');
    if (tbEl) {
      // 計算已選的賣價總和
      let selValue = 0;
      __invSelected.forEach(i => {
        const it = resolveItem(inv[i]);
        if (it) selValue += getSellValue(it);
      });
      tbEl.innerHTML = `
        <button class="it-btn ${__invBulkMode ? 'active' : ''}" onclick="toggleInvBulk()">
          ${__invBulkMode ? '✓ 批量模式' : '☐ 批量出售'}
        </button>
        ${__invBulkMode ? `
          <button class="it-btn" onclick="selectAllInvOnPage()">全選本頁</button>
          <button class="it-btn" onclick="clearInvSelection()">取消選取</button>
          <button class="it-btn danger" onclick="bulkSellInv()" ${__invSelected.size === 0 ? 'disabled' : ''}>
            賣掉選取（${__invSelected.size}件 +${selValue}🪙）
          </button>
        ` : ''}
        <span class="it-info">背包 ${inv.length} 件 · 第 ${__invPage + 1}/${pageCount} 頁</span>
      `;
    }

    // 該頁的格子（固定 INV_PAGE_SIZE 個 cell，沒物品就空格）
    const start = __invPage * INV_PAGE_SIZE;
    const cells = [];
    for (let i = 0; i < INV_PAGE_SIZE; i++) {
      const globalIdx = start + i;
      const entry = inv[globalIdx];
      if (entry === undefined) {
        cells.push(`<div class="inv-cell empty"></div>`);
        continue;
      }
      const item = resolveItem(entry);
      if (!item) {
        cells.push(`<button class="inv-cell has-item" onclick="onInvCellClick(${globalIdx})" style="border-color:#dc2626; background:#7f1d1d;" title="未知物品">
          <div class="ic-icon">❓</div>
          <div class="ic-name">未知</div>
          ${__invBulkMode ? `<div class="ic-check">${__invSelected.has(globalIdx) ? '✓' : ''}</div>` : ''}
        </button>`);
        continue;
      }
      const isBossCoin = !!item.isBossCoin;
      const rarColor = isBossCoin
        ? '#fbbf24'
        : item.rarity ? RARITY[item.rarity]?.color
        : item.setId ? (SETS[item.setId]?.color || '#f59e0b')
        : null;
      const selected = __invSelected.has(globalIdx);
      const bgStyle = isBossCoin
        ? `border-color:#fbbf24; background:linear-gradient(135deg,#7c2d12,#b45309);`
        : (rarColor
          ? `border-color:${rarColor}; background:linear-gradient(135deg,#2d1b69,${rarColor}40);`
          : '');
      const tooltip = isBossCoin
        ? `${item.name} ×${item.qty || 1}（王硬幣 / 結算用）`
        : buildItemTooltipText(item);
      const qtyBadge = (item.qty && item.qty > 1)
        ? `<div class="ic-qty">×${item.qty}</div>`
        : '';
      cells.push(`<button
          class="inv-cell has-item ${__invBulkMode ? 'bulk-on' : ''} ${selected ? 'selected' : ''}"
          style="${bgStyle}"
          title="${escapeHtml(tooltip)}"
          onclick="onInvCellClick(${globalIdx})">
        <div class="ic-icon">${item.icon}</div>
        <div class="ic-name" style="${rarColor && !selected ? `color:${rarColor};` : ''}">${escapeHtml(item.name)}</div>
        ${qtyBadge}
        ${__invBulkMode ? `<div class="ic-check">${selected ? '✓' : ''}</div>` : ''}
      </button>`);
    }
    invGridEl.innerHTML = cells.join('');
  }

  // === 背包：分頁、批量出售操作 ===
  function setInvPage(p) {
    __invPage = Math.max(0, p | 0);
    renderEquipment();
  }
  window.setInvPage = setInvPage;

  function toggleInvBulk() {
    __invBulkMode = !__invBulkMode;
    if (!__invBulkMode) __invSelected.clear();
    renderEquipment();
  }
  window.toggleInvBulk = toggleInvBulk;

  function onInvCellClick(globalIdx) {
    if (__invBulkMode) {
      if (__invSelected.has(globalIdx)) __invSelected.delete(globalIdx);
      else __invSelected.add(globalIdx);
      renderEquipment();
    } else {
      openInvItemActions(globalIdx);
    }
  }
  window.onInvCellClick = onInvCellClick;

  function selectAllInvOnPage() {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const inv = r.inventory || [];
    const start = __invPage * INV_PAGE_SIZE;
    const end = Math.min(start + INV_PAGE_SIZE, inv.length);
    for (let i = start; i < end; i++) __invSelected.add(i);
    renderEquipment();
  }
  window.selectAllInvOnPage = selectAllInvOnPage;

  function clearInvSelection() {
    __invSelected.clear();
    renderEquipment();
  }
  window.clearInvSelection = clearInvSelection;

  function bulkSellInv() {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    if (__invSelected.size === 0) { showToast('還沒選任何物品 ♡'); return; }
    // 先預覽：算總價、過濾無法解析的 / 王硬幣等不可賣
    const idxs = [...__invSelected].sort((a, b) => b - a); // 由大到小，splice 不會錯位
    const valid = [];
    let total = 0;
    let skippedCoin = 0;
    for (const idx of idxs) {
      const item = resolveItem(r.inventory[idx]);
      if (!item) continue;
      if (item.isBossCoin) { skippedCoin++; continue; } // 王硬幣不能賣
      valid.push({ idx, value: getSellValue(item) });
      total += getSellValue(item);
    }
    if (valid.length === 0) {
      if (skippedCoin > 0) showToast('王硬幣不能賣 ♡');
      __invSelected.clear();
      renderEquipment();
      return;
    }
    const confirmMsg = skippedCoin > 0
      ? `確定賣掉這 ${valid.length} 件（${skippedCoin} 個王硬幣會跳過），共 ${total} 鵝鵝幣？`
      : `確定賣掉這 ${valid.length} 件，共 ${total} 鵝鵝幣？`;
    if (!confirm(confirmMsg)) return;
    // 真的賣
    for (const v of valid) r.inventory.splice(v.idx, 1);
    refundCoins(me.id, total);
    __invSelected.clear();
    saveData();
    if (typeof renderCharCard === 'function') renderCharCard();
    if (typeof renderShop === 'function') renderShop();
    renderEquipment();
    showToast(`💰 一次賣出 ${valid.length} 件 +${total} 鵝鵝幣`);
  }
  window.bulkSellInv = bulkSellInv;

  function openInvItemActions(idx) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const entry = r.inventory[idx];
    const item = resolveItem(entry);
    if (!item) return;
    // ⭐ 王硬幣：另開介紹彈窗（不賣不裝）
    if (item.isBossCoin) {
      const html = `
        <div style="text-align:center; padding:12px 4px;">
          <div style="font-size:64px;">${item.icon}</div>
          <div style="font-weight:800; font-size:18px; color:#fbbf24; margin-top:4px;">${escapeHtml(item.name)} ×${item.qty || 1}</div>
          <div style="font-size:12px; color:#8b6f9b; margin-top:8px; padding:8px 12px; background:#fef3c7; border:1px dashed #f59e0b; border-radius:8px;">
            🏆 世界王結算獎勵<br>
            擊殺後依傷害排名 / 尾刀分配的硬幣<br>
            <span style="color:#92400e; font-weight:700;">無法賣出，未來會用來兌換王限定獎勵</span>
          </div>
          <button class="btn btn-secondary" onclick="backToBackpack()" style="margin-top:14px;">← 回背包</button>
        </div>
      `;
      showModal('🪙 ' + item.name, html);
      return;
    }
    const sellValue = getSellValue(item);
    const canEquip = true; // ⭐ 裝備不再有等級限制
    const rarColor = item.rarity ? RARITY[item.rarity]?.color : (item.setId ? (SETS[item.setId]?.color || '#f59e0b') : '#7c3aed');
    const rarLabel = item.rarity ? RARITY[item.rarity]?.label : (item.setId ? '套裝' : '');
    const affixHtml = item.affixes && item.affixes.length
      ? `<div style="margin-top:6px; padding:6px 8px; background:${rarColor}20; border-radius:8px; font-size:11px;">${item.affixes.map(a => `<div style="color:${rarColor};">+${a.val} ${a.type.toUpperCase()}（${a.name}）</div>`).join('')}</div>`
      : '';
    // ⭐ 比較：目前該槽位裝備的物件（戒指：比較 ring1 / ring2 中第一個有裝的）
    let compareHtml = '';
    const _cmpSlot = item.slot === 'ring'
      ? (r.equipment?.ring1 ? 'ring1' : 'ring2')
      : item.slot;
    if (_cmpSlot && r.equipment) {
      const curEquipped = resolveItem(r.equipment[_cmpSlot]);
      if (curEquipped) {
        const curRar = curEquipped.rarity ? RARITY[curEquipped.rarity]?.color : (curEquipped.setId ? (SETS[curEquipped.setId]?.color || '#f59e0b') : '#9ca3af');
        const curRarLabel = curEquipped.rarity ? RARITY[curEquipped.rarity]?.label : (curEquipped.setId ? '套裝' : '');
        const curAffixes = (curEquipped.affixes || []).map(a => `<div style="color:${curRar}; font-size:10px;">+${a.val} ${a.type.toUpperCase()}（${a.name}）</div>`).join('');
        // 對比箭頭：算 ATK / DEF / HP / SPD / MP / 暴擊 差值
        const diffStats = ['atk','def','spd','hp','mp','critChance','critDmg'].map(k => {
          const oldV = curEquipped[k] || 0;
          const newV = item[k] || 0;
          const d = newV - oldV;
          if (d === 0) return null;
          const isPct = (k === 'critChance' || k === 'critDmg');
          const fmt = isPct ? `${d > 0 ? '+' : ''}${Math.round(d * 100)}%` : `${d > 0 ? '+' : ''}${d}`;
          const label = isPct ? (k === 'critDmg' ? '爆傷' : '暴擊') : k.toUpperCase();
          return `<span style="color:${d > 0 ? '#16a34a' : '#dc2626'}; font-weight:700; margin-right:6px;">${label} ${fmt}</span>`;
        }).filter(Boolean).join('');
        compareHtml = `
          <div style="margin-top:10px; padding:8px 10px; background:#f3f4f6; border:1px dashed #9ca3af; border-radius:8px; text-align:left;">
            <div style="font-size:10px; color:#6b7280; font-weight:700; margin-bottom:4px;">🔄 對比（目前裝備）</div>
            <div style="display:flex; gap:8px; align-items:center;">
              <span style="font-size:24px;">${curEquipped.icon}</span>
              <div style="flex:1; min-width:0;">
                <div style="font-size:12px; font-weight:700; color:${curRar};">${curRarLabel ? `[${curRarLabel}] ` : ''}${escapeHtml(curEquipped.name)}${curEquipped.lv ? `  Lv ${curEquipped.lv}` : ''}</div>
                <div style="font-size:10px; color:#7c3aed;">${formatItemStats(curEquipped)}</div>
                ${curAffixes}
              </div>
            </div>
            ${diffStats ? `<div style="margin-top:6px; padding-top:6px; border-top:1px dashed #d1d5db; font-size:11px;">換上後：${diffStats}</div>` : ''}
          </div>
        `;
      }
    }
    // 套裝資訊
    let setHtml = '';
    if (item.setId && SETS[item.setId]) {
      const set = SETS[item.setId];
      // 計算目前已裝備的件數
      const setInfo = computeSetBonuses(me);
      const currentCount = setInfo.counts[item.setId] || 0;
      const tiers = set.tiers.map(t => {
        const active = currentCount >= t.req;
        return `<div style="font-size:11px; padding:3px 6px; margin:2px 0; border-radius:6px; ${active ? `background:${set.color}; color:#fff;` : 'background:#fff; color:#9ca3af; border:1px dashed #d1d5db;'}">${active ? '✓' : `${t.req}件：`}${t.desc}</div>`;
      }).join('');
      setHtml = `
        <div style="margin-top:8px; padding:8px 10px; background:${set.color}15; border:2px solid ${set.color}; border-radius:10px; text-align:left;">
          <div style="font-size:12px; color:${set.color}; font-weight:700; margin-bottom:4px;">🛡 ${set.name}（已裝 ${currentCount}/${set.pieces.length}）</div>
          ${tiers}
        </div>
      `;
    }
    const html = `
      <div style="text-align:center; padding:8px 0;">
        <div style="font-size:52px; margin-bottom:4px;">${item.icon}</div>
        ${rarLabel ? `<div style="font-size:10px; color:${rarColor}; font-weight:700; letter-spacing:1px;">[${rarLabel}]</div>` : ''}
        <div style="font-weight:700; font-size:16px; color:${rarColor};">${escapeHtml(item.name)}</div>
        <div style="font-size:12px; color:#8b6f9b; margin-top:4px;">
          ${item.lv ? `Lv ${item.lv}　·　` : ''}${formatItemStats(item)}
        </div>
        ${affixHtml}
        ${compareHtml}
        ${setHtml}
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:14px;">
          <button class="btn btn-primary" onclick="equipFromInvAndClose(${idx})" ${canEquip ? '' : 'disabled'}>裝備</button>
          <button class="btn btn-warning" onclick="sellInvItem(${idx})">賣掉（🪙 ${sellValue}）</button>
        </div>
        <button class="btn btn-secondary" onclick="backToBackpack()" style="margin-top:6px;">← 回背包</button>
      </div>
    `;
    showModal('🎒 ' + item.name, html);
  }
  window.openInvItemActions = openInvItemActions;

  // ⭐ 從詳情 modal 回背包（不要整個關掉）
  function backToBackpack() {
    hideModal();
    if (typeof showEquipmentModal === 'function') showEquipmentModal();
  }
  window.backToBackpack = backToBackpack;

  // ⭐ 判斷某物品是否為戒指部位（slot 可能是舊值 'accessory'，故同時檢查 baseId / id）
  const RING_ITEM_IDS = new Set(['c_ring','c_foot','c_ruby','c_heart','c_oracle']);
  function isRingItem(item) {
    if (!item) return false;
    if (item.slot === 'ring') return true;
    if (RING_ITEM_IDS.has(item.baseId)) return true;
    if (RING_ITEM_IDS.has(item.id)) return true;
    return false;
  }

  function equipFromInvAndClose(idx) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const entry = r.inventory[idx];
    const item = resolveItem(entry);
    if (isRingItem(item)) {
      // ⭐ 確保物件 instance 的 slot 已更新，避免後續 equipFromInv 放錯槽
      if (typeof entry === 'object' && entry !== null) entry.slot = 'ring';
      hideModal();
      pickRingSlotAndEquip(idx);
      return;
    }
    hideModal();
    equipFromInv(idx);
    if (typeof showEquipmentModal === 'function') showEquipmentModal();
  }
  window.equipFromInvAndClose = equipFromInvAndClose;

  // ⭐ 戒指槽選擇器
  function pickRingSlotAndEquip(idx) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const s1 = resolveItem(r.equipment?.ring1);
    const s2 = resolveItem(r.equipment?.ring2);
    const html = `
      <div style="text-align:center; padding:8px 0;">
        <div style="margin-bottom:12px; font-size:13px; color:#374151; font-weight:700;">選擇要裝到哪個戒指槽</div>
        <button class="btn btn-primary" onclick="equipRingToSlot(${idx},'ring1')" style="width:100%; margin-bottom:8px;">
          💍 戒指 1 — ${s1 ? `替換「${escapeHtml(s1.name)}」` : '（空槽）'}
        </button>
        <button class="btn btn-primary" onclick="equipRingToSlot(${idx},'ring2')" style="width:100%; margin-bottom:8px;">
          💍 戒指 2 — ${s2 ? `替換「${escapeHtml(s2.name)}」` : '（空槽）'}
        </button>
        <button class="btn btn-secondary" onclick="backToBackpack()" style="width:100%;">取消</button>
      </div>
    `;
    showModal('💍 選擇戒指槽', html);
  }
  window.pickRingSlotAndEquip = pickRingSlotAndEquip;

  function equipRingToSlot(idx, slot) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const entry = r.inventory[idx];
    const item = resolveItem(entry);
    if (!item) return;
    const cur = r.equipment[slot];
    if (cur) r.inventory.push(cur);
    r.equipment[slot] = entry;
    r.inventory.splice(idx, 1);
    r.equipmentLastChanged = Date.now();
    syncEquipped(me);
    saveData();
    renderCharCard();
    renderEquipment();
    hideModal();
    showToast(`已裝備 ${item.icon} ${item.name}（${slot === 'ring1' ? '戒指 1' : '戒指 2'}）`);
    if (typeof showEquipmentModal === 'function') showEquipmentModal();

    if (item.spd)  parts.push(`SPD+${item.spd}`);

    if (item.mp)   parts.push(`MP+${item.mp}`);

  function generateTrialMonsters(playerLv) {
    // 用目前所在地區的怪物池，但等級 = 玩家等級
    const me = getMe();
    const rpg = me ? getRpg(me) : null;
    const zoneId = rpg?.currentZone || 'forest';
    const zone = ZONES.find(z => z.id === zoneId) || ZONES[0];
    const pool = MONSTERS.filter(m => zone.monsters.includes(m.id));
    if (pool.length === 0) return [];
    // 抽 1-3 隻
    const count = 2 + Math.floor(Math.random() * 2); // 2-3 隻
    const out = [];
    for (let i = 0; i < count; i++) {
      const m = pool[Math.floor(Math.random() * pool.length)];
      const lv = Math.max(1, playerLv);
      const k = monsterK(lv);
      out.push({
        ...m,
        level: lv,
        hp: m.fixedHp ?? Math.round(m.hpBase * monsterHPK(lv) * 0.6),
        maxHp: m.fixedHp ?? Math.round(m.hpBase * monsterHPK(lv) * 0.6),
        atk: Math.round(m.atkBase * k * 0.9),
        def: Math.round(m.defBase * monsterDEFK(lv) * 0.6),
        spd: Math.round(m.spdBase + lv * 0.4),
        goldDrop: Math.round(coinDropByLevel(lv) * 0.5),
        // ⭐ 試煉：基底依等級 + 0~20% 隨機 ×1.3（試煉場 EXP 略高於一般怪）
        xpDrop: Math.round(rollMonsterXpVariance(lv) * 1.3),
      });
    }
    return out;
  }

  // ⭐ 通用：更新單一 ATB 行動條（width = gauge%、滿條時加閃爍 .full）
  // 偵測「條突然下降」→ 那一方剛出手 → 快閃 100% 再掉到新值
  // 這樣對手出招時，你會先看到他的條飆到 100% 再清零，視覺上才合理
  // 動畫純由 CSS 處理，不影響戰鬥節奏
  function updateSpdBar(barId, textId, val, label) {
    const bar = document.getElementById(barId);
    const txt = document.getElementById(textId);
    if (!bar) return;
    const v = Math.max(0, Math.min(100, val ?? 0));
    const old = parseFloat(bar.style.width) || 0;
    const dropped = (old - v) >= 25; // 條變短 ≥25% → 該方剛出手
    if (dropped) {
      // 先快閃滿（80ms 衝 100），再掉到新值
      bar.style.transition = 'width 0.08s ease-out';
      bar.style.width = '100%';
      bar.classList.add('full');
      if (txt) txt.textContent = `⏱ ${label || '行動條'} 100% 出手！`;
      setTimeout(() => {
        bar.style.transition = 'width 0.22s linear';
        bar.style.width = v + '%';
        bar.classList.remove('full');
        if (txt) txt.textContent = `⏱ ${label || '行動條'} ${Math.round(v)}%`;

      // 正常爬升：平滑過渡到新值
      bar.style.transition = 'width 0.22s linear';
      bar.style.width = v + '%';
      if (v >= 99) bar.classList.add('full'); else bar.classList.remove('full');
      if (txt) txt.textContent = `⏱ ${label || '行動條'} ${Math.round(v)}%${v >= 99 ? ' 滿條！' : ''}`;

  let __replayState = null;
  // 播放速度循環：1× → 2× → 4× → 1×
  function cycleReplaySpeed() {
    if (!__replayState) return;
    const speeds = [1, 2, 4];
    const idx = speeds.indexOf(__replayState.speed);
    __replayState.speed = speeds[(idx + 1) % speeds.length];
    const btn = document.getElementById('replaySpeedBtn');
    if (btn) btn.textContent = `⚡ 速度 ${__replayState.speed}×`;
  }
  window.cycleReplaySpeed = cycleReplaySpeed;

  function runReplayStep(sessionId) {
    const st = __replayState;
    if (!st) return;
    if (sessionId && st.sessionId !== sessionId) return; // 舊 session 殘留 timer，不要動
    const logEl = document.getElementById('replayLog');
    if (!logEl) { __replayState = null; return; } // modal 已關
    if (st.i >= st.log.length) {
      const prog = document.getElementById('replayProgress');
      if (prog) prog.textContent = `${st.log.length} / ${st.log.length}（完）`;
      return;
    }
    const entry = st.log[st.i++];
    const cls = entry.type === 'crit-player' ? 'log-crit'
      : entry.type === 'player' ? 'log-player'
      : entry.type === 'monster' ? 'log-monster'
      : 'log-system';
    const div = document.createElement('div');
    div.className = `log-line ${cls}`;
    div.textContent = entry.text;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
    if (entry.hp) {
      const pHpBar = document.getElementById('replayPHpBar');
      const pHpText = document.getElementById('replayPHpText');
      const mHpBar = document.getElementById('replayMHpBar');
      const mHpText = document.getElementById('replayMHpText');
      if (pHpBar) pHpBar.style.width = (entry.hp.player / st.maxHp * 100) + '%';
      if (pHpText) pHpText.textContent = `${entry.hp.player}/${st.maxHp}`;
      if (mHpBar) mHpBar.style.width = (entry.hp.monster / st.monsterMaxHp * 100) + '%';
      if (mHpText) mHpText.textContent = `${entry.hp.monster.toLocaleString()}/${st.monsterMaxHp.toLocaleString()}`;
      if (entry.hp.mp != null) {
        const pMpBar = document.getElementById('replayPMpBar');
        const pMpText = document.getElementById('replayPMpText');
        if (pMpBar) pMpBar.style.width = (entry.hp.mp / st.maxMp * 100) + '%';
        if (pMpText) pMpText.textContent = `MP ${entry.hp.mp}/${st.maxMp}`;
      }
    }
    if (entry.gauge && typeof updateSpdBar === 'function') {
      updateSpdBar('replayPSpdBar', 'replayPSpdText', entry.gauge.p, '我的行動條');
      updateSpdBar('replayMSpdBar', 'replayMSpdText', entry.gauge.m, '怪行動條');
    }
    const prog = document.getElementById('replayProgress');
    if (prog) prog.textContent = `${st.i} / ${st.log.length}`;
    const baseDelay = 350;
    const sid = st.sessionId;
    st.timer = setTimeout(() => runReplayStep(sid), Math.max(60, baseDelay / st.speed));
  }

  function attackPersonalBoss(bossId) {
    if (__personalBossInProgress) { showToast('⏳ 戰鬥進行中…'); return; }
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.class) { showToast('先選職業'); return; }
    if (rpg.hp <= 0) { showToast('💀 HP 不足'); return; }
    const def = PERSONAL_BOSSES.find(b => b.id === bossId);
    if (!def) return;
    const st = getPersonalBossState(rpg, bossId);
    // 共用冷卻檢查（假人無冷卻，直接跳過）
    if (!def.isDummy && getPersonalBossCdRemain(rpg) > 0) {
      showToast('⏳ 共用冷卻中');
      return;
    }
    __personalBossInProgress = true;
    if (!def.isDummy) rpg.personalBossLastAt = Date.now();

        renderEquipment();
        renderRpgStats();

        renderPersonalBossHistory();
        __personalBossInProgress = false;
        if (typeof updateStaminaUI === 'function') updateStaminaUI(); // ⭐ 立刻更新小怪戰按鈕狀態

  function doWork() {
    const me = getMe(); if (!me) return;
    const r = getRpg(me); if (!r.class) { showToast('先選職業'); return; }
    tickRecovery(me);
    if (r.stamina < WORK_STAMINA) { showToast(`⚡ 體力不足（需 ${WORK_STAMINA}）`); return; }
    r.stamina -= WORK_STAMINA;
    r.workCount = (r.workCount || 0) + 1;
    const ev = JOB_EVENTS[Math.floor(Math.random() * JOB_EVENTS.length)];
    // ⭐ 新公式：基底 3-50 鵝鵝幣 × (1 + 10% × 等級-1)
    //   mood good/bad 仍輕微加減（±15%），以保留事件文案的意義
    const baseRoll = 3 + Math.floor(Math.random() * 48); // 3..50
    const levelBonus = 1 + 0.10 * Math.max(0, (r.level || 1) - 1);
    const moodMult = ev.mood === 'good' ? 1.15 : ev.mood === 'bad' ? 0.85 : 1.0;
    const pay = Math.max(1, Math.round(baseRoll * levelBonus * moodMult));
    refundCoins(me.id, pay);
    saveData();
    renderCharCard();
    updateStaminaUI();
    document.getElementById('dailyResult').innerHTML = `
      <div class="reward-list" style="background:linear-gradient(135deg,#fef3c7,#fde68a); border-color:#f59e0b;">
        <div class="rl-title" style="color:#92400e;">${ev.icon} ${ev.name}</div>
        <div class="rl-item" style="color:#5a4a4a;">「${escapeHtml(ev.line)}」</div>
        <div class="rl-item" style="margin-top:6px; color:${ev.mood === 'good' ? '#16a34a' : ev.mood === 'bad' ? '#dc2626' : '#d97706'}; font-weight:700;">
          ${ev.mood === 'good' ? '🎉 好運加成' : ev.mood === 'bad' ? '😩 衰運' : '🙂 普通'} → +${pay} 鵝鵝幣
        </div>
      </div>
    `;
    showToast(`💼 +${pay} 鵝鵝幣`);
  }

  // 顯示分支事件：讓玩家做選擇
  function showForageQuest(quest) {
    const me = getMe();
    const myCoins = me ? getCoins(me.id) : 0;
    const choicesHtml = quest.choices.map((c, i) => {
      const need = c.requiresCoins || 0;
      const tooPoor = need > myCoins;
      return `
        <button class="forage-choice" onclick="resolveForageChoice('${quest.id}', ${i})" ${tooPoor ? 'disabled' : ''}>
          <div class="fc-text">${escapeHtml(c.text)}</div>
          ${need > 0 ? `<div class="fc-cost">需要 ${need} 幣${tooPoor ? '（不足）' : ''}</div>` : ''}
        </button>
      `;
    }).join('');
    const html = `
      <div style="text-align:center; padding:6px 0 12px;">
        <div style="font-size:54px; margin-bottom:6px;">${quest.icon}</div>
        <div style="font-size:13px; color:#5b3d62; padding:10px 12px; background:#fff8fb; border-radius:10px; border:2px dashed #ffd6e0; line-height:1.7;">${escapeHtml(quest.intro)}</div>
      </div>
      <div class="forage-choices">${choicesHtml}</div>
    `;
    showModal('🎣 探險中…', html);
  }

  function resolveForageChoice(questId, choiceIdx) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const quest = FORAGE_QUESTS.find(q => q.id === questId);
    if (!quest) { hideModal(); return; }
    const choice = quest.choices[choiceIdx];
    if (!choice) { hideModal(); return; }
    // 再檢查一次條件（防玩家在 modal 開啟期間鵝幣被扣完）
    if (choice.requiresCoins && getCoins(me.id) < choice.requiresCoins) {
      showToast('鵝幣不足');
      return;
    }
    // 加權選一個 outcome
    const roll = Math.random();
    let acc = 0;
    let outcome = choice.outcomes[choice.outcomes.length - 1];
    for (const o of choice.outcomes) {
      acc += (o.p || 0);
      if (roll < acc) { outcome = o; break; }
    }
    // ⭐ 改版：原本「戰鬥 outcome」改成「直接掉一個寶物」（不再進戰鬥）
    if (outcome.battle) {
      r.forageBattles = (r.forageBattles || 0) + 1; // 還是當成「冒險戰鬥」累計
      forageTrace('resolveForageChoice→treasure(was battle)', { questId, choiceIdx, outcomeP: outcome.p, battleLine: outcome.battleLine, forageBattles: r.forageBattles });
      // 處理 outcome 的 coins 扣費（例如賭博花了錢還被搶）
      if (outcome.coins) {
        const amt = Array.isArray(outcome.coins) ? outcome.coins[0] + Math.floor(Math.random() * (outcome.coins[1] - outcome.coins[0] + 1)) : Number(outcome.coins) || 0;
        if (amt > 0) refundCoins(me.id, amt);
        else if (amt < 0) spendCoins(me.id, -amt);
      }
      // 直接掉一個寶物（重複 → +1000 XP）
      r.treasures = r.treasures || [];
      const allIds = Object.keys(TREASURES);
      const tid = allIds[Math.floor(Math.random() * allIds.length)];
      const treasure = TREASURES[tid];
      let isDup = r.treasures.includes(tid);
      let dupXpGained = 0;
      let leveledFromDup = 0;
      if (isDup) {
        // ⭐ 重複寶物 EXP：依等級縮放，上限為「當層怪物 EXP × 1.5」
        //   保留「重複比較有獎」的感覺，但不再固定給 1000 XP（Lv 1 直接升 5 級的 bug）
        const lvCap = Math.round(getMonsterBaseXp(r.level || 1) * 1.5);
        const dupXp = Math.max(20, Math.min(TREASURE_DUP_XP, lvCap));
        r.xp = (r.xp || 0) + dupXp;
        dupXpGained = dupXp;
        forageTrace('forage-treasure DUP', { tid, name: treasure?.name, dupXp, ownedCount: r.treasures.length });
        while (r.xp >= xpForLevel(r.level)) {
          r.xp -= xpForLevel(r.level);
          r.level += 1;
          r.skillPoints = (r.skillPoints || 0) + POINTS_PER_LEVEL.skill;
          r.abilityPoints = (r.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
          leveledFromDup++;
        }
        if (leveledFromDup) {
          const ns = computeStats(me);
          r.hp = ns.maxHp; r.mp = ns.maxMp; r.deathAt = null;
        }
      } else {
        r.treasures.push(tid);
        forageTrace('forage-treasure NEW', { tid, name: treasure?.name, ownedCount: r.treasures.length });
      }
      saveData();
      hideModal();
      // 描述寶物效果
      let effectStr = '';
      if (treasure?.ability) effectStr = `+${treasure.value} ${(treasure.ability || '').toUpperCase()}`;
      else if (treasure?.stat) {
        const map = { hp: 'HP', mp: 'MP', atk: 'ATK', def: 'DEF', spd: 'SPD', critChance: '暴擊率', critDmg: '爆傷' };
        const fmtVal = (treasure.stat === 'critChance' || treasure.stat === 'critDmg')
          ? `+${Math.round(treasure.value * 100)}%`
          : `+${treasure.value}`;
        effectStr = `${fmtVal} ${map[treasure.stat] || treasure.stat}`;
      }
      document.getElementById('dailyResult').innerHTML = `
        <div class="reward-list" style="background:linear-gradient(135deg,#fef3c7,#fde047); border-color:#f59e0b;">
          <div class="rl-title" style="color:#92400e;">${isDup ? '✨ 找到寶物（已收藏）' : '🎁 找到寶物！'}</div>
          <div class="rl-item" style="color:#5a4a4a; font-size:11px;">經過一番周折，你撿到了…</div>
          <div class="rl-item" style="margin-top:6px; font-size:14px; color:#92400e;">
            ${treasure?.icon || '🎁'} <b>${escapeHtml(treasure?.name || '寶物')}</b>　·　<span style="color:#16a34a;">${effectStr}</span>
          </div>
          ${isDup
            ? `<div class="rl-item" style="font-size:11px; color:#7c3aed;">已擁有 → +${dupXpGained} XP${leveledFromDup ? `（升 ${leveledFromDup} 級！）` : ''}</div>`
            : '<div class="rl-item" style="font-size:11px; color:#16a34a;">永久加入寶物庫！</div>'}
        </div>
      `;
      renderCharCard();
      renderRpgStats();
      updateStaminaUI();
      return;
    }
    // 處理 outcome
    let parts = [];
    let resultColor = '#5a4a4a';
    const applyAmount = (val) => {
      if (Array.isArray(val)) return val[0] + Math.floor(Math.random() * (val[1] - val[0] + 1));
      return Number(val) || 0;
    };
    // coins
    if (outcome.coins != null) {
      const amt = applyAmount(outcome.coins);
      if (amt > 0) {
        refundCoins(me.id, amt);
        parts.push(`<span style="color:#16a34a;">+${amt} 鵝鵝幣</span>`);
      } else if (amt < 0) {
        // 防止扣超過手上有的（負債也允許，但顯示為扣多少）
        spendCoins(me.id, -amt);
        parts.push(`<span style="color:#dc2626;">${amt} 鵝鵝幣</span>`);
      }
    }
    // hp
    if (outcome.hp) {
      const amt = applyAmount(outcome.hp);
      const stats = computeStats(me);
      // ⭐ 探險事件傷害不再造成真死亡：HP 最低為 1
      r.hp = Math.max(1, Math.min(stats.maxHp, (r.hp || 0) + amt));
      parts.push(amt >= 0
        ? `<span style="color:#16a34a;">+${amt} HP</span>`
        : `<span style="color:#dc2626;">${amt} HP</span>`);
    }
    // xp — ⭐ 探險 EXP 過 getForageXp() 縮放：依等級成正比、上限是怪物 EXP 一半
    if (outcome.xp) {
      const rolled = applyAmount(outcome.xp);
      const amt = getForageXp(rolled, r.level || 1);
      r.xp = Math.max(0, (r.xp || 0) + amt);
      let leveled = 0;
      while (r.xp >= xpForLevel(r.level)) {
        r.xp -= xpForLevel(r.level);
        r.level += 1;
        r.skillPoints = (r.skillPoints || 0) + POINTS_PER_LEVEL.skill;
        r.abilityPoints = (r.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
        leveled++;
      }
      if (leveled) {
        const ns = computeStats(me);
        r.hp = ns.maxHp; r.mp = ns.maxMp; r.deathAt = null;
      }
      parts.push(amt >= 0
        ? `<span style="color:#7c3aed;">+${amt} XP</span>${leveled ? `<span style="color:#7c3aed; font-weight:700;">（升級到 Lv ${r.level}！）</span>` : ''}`
        : `<span style="color:#9ca3af;">${amt} XP</span>`);
    }
    // xpPerLv：新探險事件格式 — EXP = random(min,max) × playerLevel
    if (outcome.xpPerLv) {
      const [xMin, xMax] = outcome.xpPerLv;
      const mult = xMin + Math.floor(Math.random() * (xMax - xMin + 1));
      const amt = mult * (r.level || 1);
      r.xp = (r.xp || 0) + amt;
      let leveled = 0;
      while (r.xp >= xpForLevel(r.level)) {
        r.xp -= xpForLevel(r.level);
        r.level += 1;
        r.skillPoints = (r.skillPoints || 0) + POINTS_PER_LEVEL.skill;
        r.abilityPoints = (r.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
        leveled++;
      }
      if (leveled) { const ns = computeStats(me); r.hp = ns.maxHp; r.mp = ns.maxMp; r.deathAt = null; }
      parts.push(`<span style="color:#7c3aed;">+${amt} XP (×${mult}×Lv${r.level})</span>${leveled ? `<span style="color:#7c3aed; font-weight:700;">（升級到 Lv ${r.level}！）</span>` : ''}`);
    }
    // 永久屬性的舊路徑已移除——統一從寶物庫取得。
    // 萬一還有舊事件帶 stat:，靜默轉成 50 XP，避免出錯。
    if (outcome.stat) {
      r.xp = (r.xp || 0) + 50;
      parts.push(`<span style="color:#7c3aed;">+50 XP</span>`);
    }
    // ⭐ 探索不再掉裝備 — 改成給探險幣（未來用於兌換）
    //   每次 outcome.item 觸發 → 5-15 隨機 + 等級 / 5（無條件進位）
    if (outcome.item === 'drop' || outcome.item === 'rare') {
      const lv = Math.max(1, r.level || 1);
      const baseRoll = EXPLORE_COIN_BASE_MIN + Math.floor(Math.random() * (EXPLORE_COIN_BASE_MAX - EXPLORE_COIN_BASE_MIN + 1));
      const lvBonus = Math.ceil(lv / 5);
      const rareMult = (outcome.item === 'rare') ? 2 : 1; // 'rare' 翻倍
      const explore = (baseRoll + lvBonus) * rareMult;
      r.exploreCoins = (r.exploreCoins || 0) + explore;
      parts.push(`<span style="color:#0ea5e9; font-weight:700;">🧭 +${explore} 探險幣</span>`);
    }
    // 觸發綠茶事件（探險選錯路觸發 — 不算真正戰鬥，固定 10 幣）
    if (outcome.greentea) {
      r.metGreenTea = (r.metGreenTea || 0) + 1;
      // 偷錢扣 HP — 探險選錯只是腳本式懲罰，固定 10 幣不隨等級
      const kickDmg = 5 + Math.floor(Math.random() * 5);
      const stolen = 10;
      const stats = computeStats(me);
      r.hp = Math.max(1, Math.min(stats.maxHp, (r.hp || stats.maxHp) - kickDmg));
      spendCoins(me.id, stolen);
      parts.push(`<span style="color:#dc2626;">🍵 綠茶鵝偷襲 −${stolen} 幣 / −${kickDmg} HP</span>`);
      // 是否觸發指南書
      if (typeof grantGreenTeaGuides === 'function') grantGreenTeaGuides(me);
    }
    // ⭐ 加成擲骰：每個選項都有機率額外獲得寶物 / 探險幣
    const _isPaid = !!(choice.requiresCoins > 0);
    const _treasureChance = _isPaid ? 0.07 : 0.05;
    const _exploreChance  = _isPaid ? 0.13 : 0.10;
    if (Math.random() < _treasureChance) {
      r.treasures = r.treasures || [];
      const allTids = Object.keys(TREASURES);
      const tid = allTids[Math.floor(Math.random() * allTids.length)];
      const treasure = TREASURES[tid];
      const isDup = r.treasures.includes(tid);
      if (isDup) {
        // 重複寶物 → +2 探險幣
        r.exploreCoins = (r.exploreCoins || 0) + 2;
        parts.push(`<span style="color:#0ea5e9; font-weight:700;">🎁 ${treasure?.icon || '🎁'} ${escapeHtml(treasure?.name || '寶物')}（重複）→ 🧭 +2 探險幣</span>`);
      } else {
        r.treasures.push(tid);
        let effStr = '';
        if (treasure?.ability) effStr = `+${treasure.value} ${treasure.ability.toUpperCase()}`;
        else if (treasure?.stat) {
          const statMap = { hp:'HP', mp:'MP', atk:'ATK', def:'DEF', spd:'SPD', critChance:'暴擊率', critDmg:'爆傷' };
          effStr = `+${treasure.value} ${statMap[treasure.stat] || treasure.stat}`;
        }
        parts.push(`<span style="color:#a16207; font-weight:700;">🎁 獲得寶物 ${treasure?.icon || '🎁'} <b>${escapeHtml(treasure?.name || '寶物')}</b>（${effStr}）！</span>`);
      }
    }
    if (Math.random() < _exploreChance) {
      const ec = 1 + Math.floor(Math.random() * 3); // 1–3
      r.exploreCoins = (r.exploreCoins || 0) + ec;
      parts.push(`<span style="color:#0ea5e9; font-weight:700;">🧭 額外 +${ec} 探險幣</span>`);
    }
    saveData();
    renderCharCard();
    renderEquipment();
    renderRpgStats();
    renderLeaderboard();
    updateStaminaUI();
    // 顯示結果
    const html = `
      <div style="text-align:center; padding:6px 0;">
        <div style="font-size:48px; margin-bottom:6px;">${quest.icon}</div>
        <div style="font-size:13px; color:#5b3d62; padding:10px 12px; background:#fff8fb; border-radius:10px; border:2px dashed #ffd6e0; line-height:1.7;">${escapeHtml(outcome.line || '')}</div>
        ${parts.length > 0 ? `<div style="margin-top:14px; padding:10px; background:#ecfdf5; border-radius:10px; font-size:13px; line-height:1.9;">${parts.join('　·　')}</div>` : '<div style="margin-top:14px; color:#9ca3af; font-size:12px;">什麼都沒發生。</div>'}
        <button class="btn btn-primary" onclick="hideModal()" style="margin-top:14px;">繼續探險 ✨</button>
      </div>
    `;
    showModal('🎣 探險結果', html);
  }
  window.resolveForageChoice = resolveForageChoice;

  let __fightInProgress = false;
  function onFight(opts) {
    if (__fightInProgress) { showToast('⏳ 戰鬥進行中…請稍候'); return; }
    const skipStamina = opts && opts.skipStamina;
    const me = getMe();
    if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.class) return;
    if (!skipStamina) {
      tickRecovery(me);
      if (rpg.stamina < STAMINA_PER_FIGHT) {
        showToast(`⚡ 體力不足（需 ${STAMINA_PER_FIGHT}，目前 ${rpg.stamina}）`);
        return;
      }
    }
    if (rpg.hp <= 0) { showToast('💀 HP 不足'); return; }

    // 鎖按鈕，扣體力
    document.getElementById('fightBtn').disabled = true;
    __fightInProgress = true;
    if (!skipStamina) rpg.stamina -= STAMINA_PER_FIGHT;

    // 使用目前選擇的地區/層數
    const zoneId = rpg.currentZone || 'forest';
    const layerId = rpg.currentLayer || 'upper';
    const zone = ZONES.find(z => z.id === zoneId) || ZONES[0];
    // ⭐ 每場戰鬥隨機抽該層範圍內的怪物等級
    const targetLv = pickLayerLevel(layerId);
    const monster = generateMonster(rpg.level, { zoneId, layerId, targetLv, forageElite: !!(opts && opts.forageElite) });
    // ⭐ 下層 / 深層：固定多一隻同伴怪（普通怪、不是精英 / 寶箱 / 綠茶 / 探險精英）
    const isMultiLayer = (layerId === 'lower' || layerId === 'deep');
    const isFirstSpecial = !!(monster.isElite || monster.isChest || monster.isForageElite || monster.ability?.type === 'cameo');
    if (isMultiLayer && !isFirstSpecial) {
      const second = generateMonster(rpg.level, { zoneId, layerId, targetLv, noSpecial: true });
      if (second && !second.isElite && !second.isChest && !second.isForageElite && second.ability?.type !== 'cameo') {
        return runMultiMonsterFight(me, [monster, second], { zoneId, layerId, opts });
      }
    }
    const result = autoFight(me, monster);

    // 渲染戰鬥場景，依序播放
    const stats = computeStats(me);
    const arenaHtml = `
      <div class="battle-arena" id="battleArena">
        <div class="combatant" id="combatPlayer">
          <div class="combatant-icon">${CLASSES[rpg.class].icon}</div>
          <div class="combatant-name">${escapeHtml(me.name)} Lv${rpg.level}</div>
          <div class="combatant-hp-track"><div class="combatant-hp-fill" id="pHpBar" style="width:100%"></div></div>
          <div class="combatant-hp-text" id="pHpText">${stats.maxHp}/${stats.maxHp}</div>
          <div class="combatant-hp-track" style="margin-top:2px;"><div class="combatant-hp-fill" id="pMpBar" style="width:100%; background:linear-gradient(90deg,#93c5fd,#3b82f6);"></div></div>
          <div class="combatant-hp-text" id="pMpText" style="color:#1e40af;">MP ${stats.maxMp}/${stats.maxMp}</div>
          <div class="combatant-spd-track"><div class="combatant-spd-fill" id="pSpdBar" style="width:0%"></div></div>
          <div class="combatant-spd-text" id="pSpdText">⏱ 行動條 0%</div>
        </div>
        <div class="vs-icon">⚔️</div>
        <div class="combatant" id="combatMonster">
          <div class="combatant-icon">${monster.icon}</div>
          <div class="combatant-name">${monster.name} Lv${monster.level}</div>
          ${monster.ability ? `<div style="font-size:9px; color:#7c3aed; font-weight:600; margin-bottom:2px;">${describeAbility(monster.ability)}</div>` : ''}
          <div class="combatant-hp-track"><div class="combatant-hp-fill" id="mHpBar" style="width:100%"></div></div>
          <div class="combatant-hp-text" id="mHpText">${monster.hp}/${monster.maxHp}</div>
          <div class="combatant-spd-track" style="margin-top:14px;"><div class="combatant-spd-fill" id="mSpdBar" style="width:0%"></div></div>
          <div class="combatant-spd-text" id="mSpdText">⏱ 行動條 0%</div>
        </div>
      </div>
      <div class="battle-log" id="battleLog"></div>
    `;
    document.getElementById('fightResult').innerHTML = arenaHtml;

    // 播放 log
    const logEl = document.getElementById('battleLog');
    let i = 0;
    const playStep = () => {
      if (i >= result.log.length) {
        // ⭐ try-finally 保證 __fightInProgress 一定被解鎖，不讓任何例外永久卡住按鈕
        try {
          // 結算
          finalizeFight(me, monster, result, stats);
          snapshotLastFight(monster, result);
          // ⭐ 把這場探索 / 打怪戰鬥存到「最近 5 場」（只給自己看）
          try {
            const dmgDealt = Math.max(0, (monster.maxHp || monster.hp) - (result.mHpFinal || 0));
            const battleSnap = {
              id: 'fr_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
              ts: Date.now(),
              bossId: monster.id || 'forage_' + zoneId,
              bossName: monster.name,
              bossIcon: monster.icon,
              bossLevel: monster.level,
              dmgDealt,
              killed: !!result.won,
              fled: !!result.fled,
              playerSnap: {
                name: me.name,
                avatar: CLASSES[rpg.class]?.icon || '🎴',
                level: rpg.level,
                maxHp: stats.maxHp,
                maxMp: stats.maxMp,
              },
              monsterSnap: {
                name: monster.name,
                icon: monster.icon,
                level: monster.level,
                maxHp: monster.maxHp || monster.hp,
                ability: monster.ability,
              },
              log: (result.log || []).slice(0, 100),
              zoneId, layerId,
              isForage: true,
            };
            rpg.forageBattleHistory = Array.isArray(rpg.forageBattleHistory) ? rpg.forageBattleHistory : [];
            rpg.forageBattleHistory.unshift(battleSnap);
            if (rpg.forageBattleHistory.length > 5) rpg.forageBattleHistory.length = 5;
            saveData();
            renderForageHistory();
          } catch (e) { console.warn('snapshot forage fight:', e); }
          // 在戰鬥結果下方加一個小回報按鈕
          try {
            const fr = document.getElementById('fightResult');
            if (fr) {
              const btn = document.createElement('button');
              btn.className = 'btn btn-secondary';
              btn.style.cssText = 'margin-top:8px; padding:6px 10px; font-size:12px; background:#fef2f2; color:#991b1b; border:1px dashed #f87171;';
              btn.textContent = '🐛 這場有 BUG？回報一下';
              btn.onclick = () => openBugReport(true);
              fr.appendChild(btn);
            }
          } catch (e) {}
        } catch (e) {
          console.error('[onFight] playStep 結算出錯，強制解鎖按鈕:', e);
        } finally {
          __fightInProgress = false;
          if (typeof updateStaminaUI === 'function') updateStaminaUI(); // ⭐ 立刻解鎖按鈕（不等 setInterval 1s 才更新）
        }
        return;
      }
      const entry = result.log[i++];
      const cls = entry.type === 'crit-player' ? 'log-crit'
        : entry.type === 'player' ? 'log-player'
        : entry.type === 'monster' ? 'log-monster'
        : 'log-system';
      const div = document.createElement('div');
      div.className = `log-line ${cls}`;
      div.textContent = entry.text;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      // 更新 HP / MP 條
      if (entry.hp) {
        document.getElementById('pHpBar').style.width = (entry.hp.player / stats.maxHp * 100) + '%';
        document.getElementById('pHpText').textContent = `${entry.hp.player}/${stats.maxHp}`;
        document.getElementById('mHpBar').style.width = (entry.hp.monster / monster.maxHp * 100) + '%';
        document.getElementById('mHpText').textContent = `${entry.hp.monster}/${monster.maxHp}`;
        if (entry.hp.mp != null) {
          document.getElementById('pMpBar').style.width = (entry.hp.mp / stats.maxMp * 100) + '%';
          document.getElementById('pMpText').textContent = `MP ${entry.hp.mp}/${stats.maxMp}`;
        }
        // shake 動畫
        if (entry.type === 'player' || entry.type === 'crit-player') {
          const m = document.getElementById('combatMonster');
          m.classList.remove('hurt'); void m.offsetWidth; m.classList.add('hurt');
        } else if (entry.type === 'monster') {
          const p = document.getElementById('combatPlayer');
          p.classList.remove('hurt'); void p.offsetWidth; p.classList.add('hurt');
        }
      }
      // ⭐ 行動條（純視覺，跑得比實際戰鬥快）
      if (entry.gauge && typeof updateSpdBar === 'function') {
        updateSpdBar('pSpdBar', 'pSpdText', entry.gauge.p, '我的行動條');
        updateSpdBar('mSpdBar', 'mSpdText', entry.gauge.m, '怪行動條');
      }
      setTimeout(playStep, 550);
    };
    playStep();
  }
  window.onFight = onFight;

  // ⭐ 下層 / 深層：2 隻怪同戰（重用試煉場 multi-monster 引擎 + 樣式）

          try {

          } catch (e) {}
        } catch (e) {
          console.error('[runMultiMonsterFight] playStep 結算出錯，強制解鎖按鈕:', e);
        } finally {
          __fightInProgress = false;
          if (typeof updateStaminaUI === 'function') updateStaminaUI(); // ⭐ 立刻解鎖按鈕
        }
        return;
      }
      const entry = result.log[i++];
      const cls = entry.type === 'crit-player' ? 'log-crit'
        : entry.type === 'player' ? 'log-player'
        : entry.type === 'monster' ? 'log-monster'
        : 'log-system';
      const div = document.createElement('div');
      div.className = `log-line ${cls}`;
      div.textContent = entry.text;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      if (entry.hp) {
        const tpFill = document.getElementById('mfPHpFill');
        const tpText = document.getElementById('mfPHpText');
        if (tpFill) tpFill.style.width = (entry.hp.player / stats.maxHp * 100) + '%';
        if (tpText) tpText.textContent = `${entry.hp.player}/${stats.maxHp}`;
        if (entry.hp.mp != null) {
          const mpF = document.getElementById('mfPMpFill');
          const mpT = document.getElementById('mfPMpText');
          if (mpF) mpF.style.width = (entry.hp.mp / stats.maxMp * 100) + '%';
          if (mpT) mpT.textContent = `MP ${entry.hp.mp}/${stats.maxMp}`;
        }
        if (Array.isArray(entry.hp.monsters)) {
          entry.hp.monsters.forEach((mh, idx) => {
            const f = document.getElementById('mfTmHpFill' + idx);
            const t = document.getElementById('mfTmHpText' + idx);
            if (f) f.style.width = (mh / monsters[idx].maxHp * 100) + '%';
            if (t) t.textContent = `${mh}/${monsters[idx].maxHp}`;
          });
        }
      }
      if (entry.gauge && typeof updateSpdBar === 'function') {
        updateSpdBar('mfPSpdBar', 'mfPSpdText', entry.gauge.p, '我的行動條');
        updateSpdBar('mfMSpdBar', 'mfMSpdText', entry.gauge.m, '怪物最快行動條');
      }
      setTimeout(playStep, 480);
    };
    playStep();
  }
  window.runMultiMonsterFight = runMultiMonsterFight;

  // ⭐ 多怪戰鬥結算（每隻死掉的怪都給 XP / 鵝鵝幣 / 掉裝 roll）
  function finalizeFightMulti(player, monsters, result, stats, ctx) {
    const rpg = getRpg(player);
    rpg.hp = stats.maxHp;
    rpg.mp = stats.maxMp;
    if (result.critCount) rpg.critCount = (rpg.critCount || 0) + result.critCount;
    if (result.won) rpg.fightsWon = (rpg.fightsWon || 0) + 1;
    const _zone = ZONES.find(z => z.id === (rpg.currentZone || 'forest'));
    let totalXp = 0, totalGold = 0;
    const drops = [];
    // 從 result.monsters 找 alive=false 的（已死）
    const deadCount = (result.monsters || []).filter(m => !m.alive).length;
    if (deadCount > 0) {
      // 防護：確保 inventory 是陣列（防止 sync race 造成 undefined）
      if (!Array.isArray(rpg.inventory)) rpg.inventory = [];
      monsters.forEach((m, idx) => {
        const summary = (result.monsters || [])[idx];
        if (!summary || summary.alive) return; // 沒死不發
        totalXp += m.xpDrop || 0;
        totalGold += m.goldDrop || 0;
        const dropLv = m.level || rpg.level;
        const drop = rollItemDrop(dropLv, { slotBias: _zone ? _zone.dropBias : null });
        if (drop) {
          // ⭐ Phase A：走 atomic tx，避免並發 race 把剛拿的裝備吃掉
          addInventoryItem(player.id, drop);  // fire-and-forget；本地已樂觀更新
          drops.push(drop);
          forageTrace('multi-drop pushed (atomic)', { dropLv, dropId: drop.id, baseId: drop.baseId, rarity: drop.rarity, affixes: drop.affixes?.length, invCount: rpg.inventory.length });
        }
        rpg.kills = rpg.kills || {};
        rpg.kills[m.id] = (rpg.kills[m.id] || 0) + 1;
      });
    }
    rpg.xp = (rpg.xp || 0) + totalXp;
    rpg.totalGold = (rpg.totalGold || 0) + totalGold;
    if (totalGold > 0) refundCoins(player.id, totalGold);
    // 升等檢查
    let leveledUp = 0;
    while (rpg.xp >= xpForLevel(rpg.level)) {
      rpg.xp -= xpForLevel(rpg.level);
      rpg.level += 1;
      rpg.skillPoints = (rpg.skillPoints || 0) + POINTS_PER_LEVEL.skill;
      rpg.abilityPoints = (rpg.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
      leveledUp++;
    }
    if (leveledUp) {
      const ns = computeStats(player);
      rpg.hp = ns.maxHp; rpg.mp = ns.maxMp; rpg.deathAt = null;
    }
    if (!result.won) {
      // ⭐ 不再有真死亡：輸了立刻恢復 50% HP
      const _ns = computeStats(player);
      rpg.hp = Math.max(1, Math.floor(_ns.maxHp * REST_HP_RATIO));
      rpg.deathAt = null;
      rpg.fightsLost = (rpg.fightsLost || 0) + 1;
    }
    // 渲染獎勵
    const dropHtml = drops.length === 0 ? '' : drops.map(d => {
      const rar = d.rarity ? RARITY[d.rarity]?.color : '#9ca3af';
      const rarLabel = d.rarity ? RARITY[d.rarity]?.label : '';
      return `<div class="rl-item" style="color:${rar};">[${rarLabel}] ${d.icon} ${escapeHtml(d.name)} ${formatItemStats(d)}</div>`;
    }).join('');
    const rewardHtml = `
      <div class="reward-list" style="background:linear-gradient(135deg,#fef3c7,#fde68a); border-color:#f59e0b;">
        <div class="rl-title" style="color:#7c2d12;">${result.won ? '⚔️ 雙怪戰鬥勝利！' : '💀 雙怪戰鬥失敗'}</div>
        <div class="rl-item">擊殺：${deadCount} / ${monsters.length} 隻</div>
        ${result.won ? `<div class="rl-item">⭐ +${totalXp} XP　·　🪙 +${totalGold} 鵝鵝幣${leveledUp ? `（升 ${leveledUp} 級）` : ''}</div>` : ''}
        ${dropHtml}
        ${!result.won ? `<div class="rl-item" style="color:#dc2626;">休息 5 分鐘後 HP 恢復 50%</div>` : ''}
      </div>
    `;
    document.getElementById('fightResult').insertAdjacentHTML('beforeend', rewardHtml);
    // 把這場記到「最近 5 場」
    try {
      const battleSnap = {
        id: 'fr_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        ts: Date.now(),
        bossId: 'multi_' + (ctx?.layerId || 'lower'),
        bossName: monsters.map(m => m.name).join(' + '),
        bossIcon: monsters[0].icon,
        bossLevel: monsters[0].level,
        dmgDealt: monsters.reduce((s, m, idx) => {
          const sum = (result.monsters || [])[idx];
          return s + Math.max(0, (m.maxHp || 0) - (sum?.hp || 0));
        }, 0),
        killed: !!result.won,
        playerSnap: { name: player.name, avatar: CLASSES[rpg.class]?.icon || '🎴', level: rpg.level, maxHp: stats.maxHp, maxMp: stats.maxMp },
        monsterSnap: { name: monsters.map(m => m.name).join(' + '), icon: monsters[0].icon, level: monsters[0].level, maxHp: monsters.reduce((s, m) => s + (m.maxHp || 0), 0) },
        log: (result.log || []).slice(0, 100),
        zoneId: ctx?.zoneId, layerId: ctx?.layerId,
        isForage: true,
      };
      rpg.forageBattleHistory = Array.isArray(rpg.forageBattleHistory) ? rpg.forageBattleHistory : [];
      rpg.forageBattleHistory.unshift(battleSnap);
      if (rpg.forageBattleHistory.length > 5) rpg.forageBattleHistory.length = 5;
    } catch (e) { console.warn('multi snap', e); }
    saveData();
    renderCharCard();
    renderEquipment();
    renderShop();
    renderRpgStats();
    renderForageHistory();
    updateStaminaUI();
  }

  function finalizeFight(player, monster, result, stats) {
    const rpg = getRpg(player);
    // ⭐ HP/MP 是屬性：戰後一律回滿（敗北分支會自己把 hp 設 0 觸發死亡）
    rpg.hp = stats.maxHp;
    rpg.mp = stats.maxMp;
    if (result.coinsStolen > 0) {
      player.coinsSpent = (player.coinsSpent || 0) + result.coinsStolen;
    }
    if (result.critCount) rpg.critCount = (rpg.critCount || 0) + result.critCount;
    if (result.metGreenTea) {
      rpg.metGreenTea = (rpg.metGreenTea || 0) + result.metGreenTea;
      // 綠茶指南書里程碑：遇到 10/20/30/50/75/100 次自動獲得
      grantGreenTeaGuides(player);
    }
    if (result.won) {
      if (!rpg.kills) rpg.kills = {};
      rpg.kills[monster.id] = (rpg.kills[monster.id] || 0) + 1;
    }
    const logEl = document.getElementById('battleLog');
    let rewardHtml = '';

    // 綠茶事件：不算勝負，直接結算
    if (result.fled) {
      const div = document.createElement('div');
      div.className = 'log-line log-system';
      div.textContent = `🍵 綠茶鵝逃走了，這次的相遇不算戰鬥`;
      logEl.appendChild(div);
      rewardHtml = `
        <div class="reward-list" style="background:#dcfce7; border-color:#86efac;">
          <div class="rl-title" style="color:#15803d;">🍵 綠茶鵝反撒了一波</div>
          <div class="rl-item">「鵝鵝沒有錯」</div>
          <div class="rl-item" style="color:#dc2626;">💰 −${result.coinsStolen} 鵝鵝幣　❤️ −${result.kickDmg || 0} HP</div>
          <div class="rl-item" style="margin-top:4px; font-size:11px; color:#16a34a;">無 XP / 無金幣 / 無戰利品</div>
        </div>
      `;
      document.getElementById('fightResult').insertAdjacentHTML('beforeend', rewardHtml);
      saveData();
      renderCharCard();
      renderEquipment();
      renderShop();
      renderRpgStats();
      updateStaminaUI();
      return;
    }

    if (result.won) {
      rpg.fightsWon = (rpg.fightsWon || 0) + 1;
      rpg.xp = (rpg.xp || 0) + monster.xpDrop;
      rpg.totalGold = (rpg.totalGold || 0) + monster.goldDrop;
      // 勝利補 20% MP
      const mpBack = Math.round(stats.maxMp * 0.2);
      rpg.mp = Math.min(stats.maxMp, rpg.mp + mpBack);
      // 獎勵鵝鵝幣
      refundCoins(player.id, monster.goldDrop);
      // 使用目前地區的掉落偏好；掉落等級 = 怪物等級（樓層）
      const _zone = ZONES.find(z => z.id === (rpg.currentZone || 'forest'));
      const dropLv = monster.level || rpg.level;
      // 防護：確保 inventory 是陣列（防止 sync race 造成 undefined）
      if (!Array.isArray(rpg.inventory)) rpg.inventory = [];
      // 寶箱怪：roll 兩次 → 掉裝率變 ~2 倍
      const drop = rollItemDrop(dropLv, { slotBias: _zone ? _zone.dropBias : null });
      if (drop) {
        // ⭐ Phase A：atomic tx，避免並發 race
        addInventoryItem(player.id, drop);  // fire-and-forget
        forageTrace('single-drop pushed (atomic)', { dropLv, dropId: drop.id, baseId: drop.baseId, rarity: drop.rarity, affixes: drop.affixes?.length, invCount: rpg.inventory.length });
      }
      let chestExtraDrop = null;
      if (monster.isChest) {
        chestExtraDrop = rollItemDrop(dropLv, { slotBias: _zone ? _zone.dropBias : null });
        if (chestExtraDrop) addInventoryItem(player.id, chestExtraDrop);
      }
      forageTrace('rollItemDrop', { zoneId: _zone?.id, dropBias: _zone?.dropBias, dropLv, gotDrop: !!drop, dropId: drop?.id, dropName: drop?.name, rarity: drop?.rarity, affixCount: drop?.affixes?.length, isChest: !!monster.isChest, chestExtra: !!chestExtraDrop });
      // 精英怪：必掉 2 件 3 詞條的裝備（地區偏好部位、隨機等級在玩家層樓附近）
      let elitePiece = null;
      let eliteExtraDrops = [];
      let treasureDropped = null;     // 拿到的寶物本體（首次取得才會有）
      let treasureDupXp = 0;           // 重複的話換 XP
      if (monster.isElite && !monster.isForageElite) {
        // ⭐ 地區精英：必掉 1 件「紫裝」（legendary，3 詞條）100%
        const eliteDrop = generateDropItem(dropLv, { slotBias: _zone ? _zone.dropBias : null, forceAffixes: 3, boosted: true, forceRarity: 'legendary' });
        if (eliteDrop) {
          addInventoryItem(player.id, eliteDrop);  // ⭐ Phase A: atomic tx
          eliteExtraDrops.push(eliteDrop);
        }
        forageTrace('zone-elite drop (1x legendary)', { dropLv, count: eliteExtraDrops.length, ids: eliteExtraDrops.map(d => d.id) });
      } else if (monster.isForageElite) {
        // ⭐ 探險精英：改成給寶物（重複→ +1000 XP）
        rpg.treasures = rpg.treasures || [];
        const allIds = Object.keys(TREASURES);
        const tid = allIds[Math.floor(Math.random() * allIds.length)];
        const treasure = TREASURES[tid];
        if (rpg.treasures.includes(tid)) {
          rpg.xp = (rpg.xp || 0) + TREASURE_DUP_XP;
          treasureDupXp = TREASURE_DUP_XP;
          treasureDropped = { ...treasure, duplicate: true };
          forageTrace('forage-elite treasure DUP', { tid, name: treasure?.name, dupXp: TREASURE_DUP_XP, ownedCount: rpg.treasures.length });
        } else {
          rpg.treasures.push(tid);
          treasureDropped = { ...treasure, duplicate: false };
          forageTrace('forage-elite treasure NEW', { tid, name: treasure?.name, ownedCount: rpg.treasures.length });
          // 寶物給的能力加成是 derived（透過 computeTreasureBonuses），不直接改 abilities
        }
      } else {
        // 普通怪 / 沒掉裝（不是精英）— 也記一筆方便除錯
        forageTrace('non-elite or no-drop', { isElite: !!monster.isElite, isForageElite: !!monster.isForageElite, dropSet: monster.dropSet, monsterId: monster.id });
      }
      // ⭐ 新版：層 + 樓自由切換，不再追蹤解鎖進度
      // 升級檢查
      let leveledUp = 0;
      while (rpg.xp >= xpForLevel(rpg.level)) {
        rpg.xp -= xpForLevel(rpg.level);
        rpg.level += 1;
        rpg.skillPoints = (rpg.skillPoints || 0) + POINTS_PER_LEVEL.skill;
        rpg.abilityPoints = (rpg.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
        leveledUp++;
      }
      // 升級回滿 HP
      if (leveledUp) {
        const newStats = computeStats(player);
        rpg.hp = newStats.maxHp;
        rpg.mp = newStats.maxMp;
        rpg.deathAt = null;
      }

      const div = document.createElement('div');
      div.className = 'log-line log-victory';
      div.textContent = `✨ ${monster.name}倒下！`;
      logEl.appendChild(div);
      rewardHtml = `
        <div class="reward-list" ${monster.isElite ? 'style="background:linear-gradient(135deg,#fef3c7,#fde047); border-color:#f59e0b;"' : ''}>
          <div class="rl-title">${monster.isElite ? '⭐ 精英戰利品' : '🎉 戰利品'}</div>
          <div class="rl-item">⭐ +${monster.xpDrop} XP</div>
          <div class="rl-item">🪙 +${monster.goldDrop} 鵝鵝幣</div>
          ${drop ? `<div class="rl-item">${drop.icon} ${drop.name}<span style="font-size:10px; color:#8b6f9b;"> · ${drop.affixes?.length || 0} 詞條</span></div>` : ''}
          ${chestExtraDrop ? `<div class="rl-item" style="color:#92400e;">📦 寶箱多掉：${chestExtraDrop.icon} ${chestExtraDrop.name} <span style="font-size:10px; opacity:0.85;">· ${chestExtraDrop.affixes?.length || 0} 詞條</span></div>` : ''}
          ${eliteExtraDrops && eliteExtraDrops.length ? eliteExtraDrops.map(d => `<div class="rl-item" style="color:${RARITY[d.rarity]?.color || '#7c3aed'}; font-weight:700;">⭐ ${d.icon} ${escapeHtml(d.name)} <span style="font-size:10px; opacity:0.85;">· 3 詞條 · Lv${d.lv}</span></div>`).join('') : ''}
          ${elitePiece ? `<div class="rl-item" style="color:${SETS[monster.dropSet]?.color || '#7c3aed'}; font-weight:700;">🛡 [套裝] ${elitePiece.icon} ${elitePiece.name}（${SETS[monster.dropSet]?.name}）</div>` : ''}
          ${treasureDropped && !treasureDropped.duplicate ? `
            <div class="rl-item" style="color:#7c3aed; font-weight:700; padding:6px 8px; background:#f3e8ff; border-radius:8px; margin-top:4px;">
              🎁 寶物入庫：${treasureDropped.icon} <b>${escapeHtml(treasureDropped.name)}</b>
              <div style="font-size:11px; color:#5b21b6; font-weight:500; margin-top:2px;">永久 +${treasureDropped.value} ${treasureDropped.ability.toUpperCase()}</div>
            </div>
          ` : ''}
          ${treasureDropped && treasureDropped.duplicate ? `
            <div class="rl-item" style="color:#92400e; padding:6px 8px; background:#fef3c7; border-radius:8px; margin-top:4px;">
              🎁 重複了「${treasureDropped.icon} ${escapeHtml(treasureDropped.name)}」 → +${treasureDupXp} XP
            </div>
          ` : ''}
          ${result.coinsStolen > 0 ? `<div class="rl-item" style="color:#dc2626;">💰 被偷走 −${result.coinsStolen} 鵝鵝幣</div>` : ''}
          ${leveledUp ? `<div style="margin-top:8px; color:#7c3aed; font-weight:700;">🎊 升級到 Lv ${rpg.level}！HP/MP 回滿、+${leveledUp * POINTS_PER_LEVEL.skill} 技能點 / +${leveledUp * POINTS_PER_LEVEL.ability} 能力點</div>` : ''}
        </div>
      `;
      if (leveledUp) showLevelUp(rpg.level);
    } else {
      rpg.fightsLost = (rpg.fightsLost || 0) + 1;
      // ⭐ 死亡即時恢復 50% HP，無休息懲罰
      {
        const newStats = computeStats(player);
        rpg.hp = Math.max(1, Math.floor(newStats.maxHp * REST_HP_RATIO));
        rpg.deathAt = null;
        const div = document.createElement('div');
        div.className = 'log-line log-defeat';
        div.textContent = `💀 你被打倒了… HP 全滿恢復`;
        logEl.appendChild(div);
        rewardHtml = `
          <div class="reward-list reward-loss">
            <div class="rl-title">😭 失敗了</div>
            <div class="rl-item">💀 HP 全滿恢復，可繼續挑戰</div>
            ${result.coinsStolen > 0 ? `<div class="rl-item" style="color:#dc2626;">💰 被偷走 −${result.coinsStolen} 鵝鵝幣</div>` : ''}
          </div>
        `;
      }
    }
    document.getElementById('fightResult').insertAdjacentHTML('beforeend', rewardHtml);
    saveData();
    renderCharCard();
    renderEquipment();
    renderShop();
    renderRpgStats();
    renderZoneSelector();
    updateStaminaUI();
  }

  function showLevelUp(lv) {
    const overlay = document.createElement('div');
    overlay.className = 'level-up-overlay';
    overlay.innerHTML = `<div class="level-up-text">🎊 LV ${lv}!</div>`;
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 3500);
  }

  function equipFromInv(idx) {
    const me = getMe();
    const rpg = getRpg(me);
    const entry = rpg.inventory[idx];
    const item = resolveItem(entry);
    if (!item) return;
    // ⭐ 戒指類物品不應走這裡，應透過 pickRingSlotAndEquip 選槽
    if (isRingItem(item)) {
      if (typeof entry === 'object' && entry !== null) entry.slot = 'ring';
      pickRingSlotAndEquip(idx);
      return;
    }
    // 把現有同 slot 裝備丟回背包
    const cur = rpg.equipment[item.slot];
    if (cur) rpg.inventory.push(cur);
    rpg.equipment[item.slot] = entry;
    rpg.inventory.splice(idx, 1);
    rpg.equipmentLastChanged = Date.now();
    syncEquipped(me);
    saveData();
    renderCharCard();
    renderEquipment();
    showToast(`已裝備 ${item.icon} ${item.name}`);
  }
  window.equipFromInv = equipFromInv;

  function unequip(slot) {
    const me = getMe();
    const rpg = getRpg(me);
    const cur = rpg.equipment[slot];
    if (!cur) return;
    // ⭐ 從戒指槽拆下來時，確保物件 instance 的 slot 標記為 'ring'，
    //    避免放回背包後 isRingItem 失效而走進飾品槽
    if (slot === 'ring1' || slot === 'ring2') {
      if (typeof cur === 'object' && cur !== null) cur.slot = 'ring';
    }
    rpg.inventory.push(cur);
    rpg.equipment[slot] = null;
    rpg.equipmentLastChanged = Date.now();
    syncEquipped(me);
    saveData();
    renderCharCard();
    renderEquipment();
  }
  window.unequip = unequip;

  function showDebugModal() {
    const me = getMe();
    if (!me) { showToast('先選身份'); return; }
    const r = getRpg(me);
    const myCoins = getCoins(me.id);

  // ⭐ 遷移：飾品槽裡的戒指類物品 → 戒指 1 / 戒指 2
  const RING_BASE_IDS = ['c_ring','c_foot','c_ruby','c_heart','c_oracle'];
  function adminMigrateAccessoryToRing() {
    let moved = 0;
    for (const p of players) {
      if (!p || !p.rpg) continue;
      const eq = p.rpg.equipment;
      if (!eq || !eq.accessory) continue;
      const entry = eq.accessory; // string ID 或 object instance
      const item = resolveItem(entry);
      if (!item) continue;
      // 判斷是否為戒指類：slot === 'ring' 或 baseId / id 在清單內
      const isRing = item.slot === 'ring'
        || RING_BASE_IDS.includes(item.baseId)
        || RING_BASE_IDS.includes(item.id);
      if (!isRing) continue;
      // ⭐ 若是物件 instance（有 slot 欄位），把 slot 改成 'ring'
      if (typeof entry === 'object' && entry !== null) {
        entry.slot = 'ring';
      }
      // 找空戒指槽
      const target = !eq.ring1 ? 'ring1' : !eq.ring2 ? 'ring2' : null;
      if (!target) {
        // 兩槽都有：丟回背包
        p.rpg.inventory = p.rpg.inventory || [];
        p.rpg.inventory.push(entry);
      } else {
        eq[target] = entry;
      }
      delete eq.accessory;
      moved++;
    }
    saveData();
    showToast(`💍 遷移完成：${moved} 個裝備從飾品槽移至戒指槽（slot 已更新）`);
    showDebugModal();
  }

  function adminAddXp(amount) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    if (!r.class) { showToast('先選職業'); return; }
    r.xp = (r.xp || 0) + amount;
    let leveled = 0;
    while (r.xp >= xpForLevel(r.level)) {
      r.xp -= xpForLevel(r.level);
      r.level += 1;
      r.skillPoints = (r.skillPoints || 0) + POINTS_PER_LEVEL.skill;
      r.abilityPoints = (r.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
      leveled++;
      if (r.level > 50) break;
    }
    const s = computeStats(me);
    r.hp = s.maxHp;
    r.mp = s.maxMp;
    r.deathAt = null;
    syncEquipped(me); saveData(); render(); showDebugModal();
    showToast(`⭐ +${amount} XP${leveled ? `，升 ${leveled} 級 +${leveled * POINTS_PER_LEVEL.skill} 技能點 +${leveled * POINTS_PER_LEVEL.ability} 能力點` : ''}`);
  }

  function adminSetLevel(lvStr) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    if (!r.class) { showToast('先選職業'); return; }
    const lv = Math.max(1, Math.min(50, parseInt(lvStr) || 1));
    const usedSk = Object.values(r.skills || {}).reduce((a, b) => a + (b || 0), 0);
    const usedSkLv = Object.values(r.skillLevels || {}).reduce((a, b) => a + (b || 0), 0);
    const usedAb = Object.values(r.abilities || {}).reduce((a, b) => a + (b || 0), 0);
    r.level = lv; r.xp = 0;
    r.skillPoints = Math.max(0, (lv - 1) * POINTS_PER_LEVEL.skill - usedSk - usedSkLv);
    r.abilityPoints = Math.max(0, 5 + (lv - 1) * POINTS_PER_LEVEL.ability - usedAb);
    const s = computeStats(me);
    r.hp = s.maxHp; r.mp = s.maxMp;
    r.deathAt = null;
    syncEquipped(me); saveData(); render(); showDebugModal();
    showToast(`🎯 等級設為 Lv ${lv}`);
  }

  // === 備份 / 還原 ===
  function adminDownloadBackup() {
    const me = getMe();
    const payload = {
      version: 'mahjong-v2',
      exportedAt: new Date().toISOString(),
      exportedBy: me ? `${me.avatar} ${me.name}` : '?',
      // ⭐ 完整資料：玩家（含每個人的 RPG / inventory）+ 對局 + 互動 + 押注 + 世界王 + 比例
      data: {
        players, history, gifts, comments, pendingBets, betPool, worldBoss,
        baseMoney, basePoint,
      },
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const dt = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    const fname = `mahjong-backup-${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}-${pad(dt.getHours())}${pad(dt.getMinutes())}${pad(dt.getSeconds())}.json`;
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click();
    setTimeout(() => { try { document.body.removeChild(a); URL.revokeObjectURL(url); } catch (e) {} }, 200);
    const sizeKb = Math.round(json.length / 1024);
    showToast(`📦 已下載 ${fname}（${sizeKb} KB · ${players.length} 玩家 · ${history.length} 局）`);
  }
  window.adminDownloadBackup = adminDownloadBackup;

  function adminApplyRestoreFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    const fr = new FileReader();
    fr.onload = () => {
      try {
        const obj = JSON.parse(String(fr.result));
        if (!obj || !obj.data) throw new Error('檔案格式錯誤（缺 data）');
        if (obj.version && obj.version !== 'mahjong-v2') {
          if (!confirm(`版本不一致（檔案: ${obj.version}）— 強制套用？`)) return;
        }
        if (!confirm(`還原備份「${obj.exportedBy || '?'}」（${obj.exportedAt || '?'}）會覆蓋目前資料 + 推到 Firebase（朋友也會被覆蓋）。繼續？`)) return;
        const d = obj.data;
        if (Array.isArray(d.players))   players   = d.players;
        if (Array.isArray(d.history))   history   = d.history;
        if (Array.isArray(d.gifts))     gifts     = d.gifts;
        if (Array.isArray(d.comments))  comments  = d.comments;
        if (Array.isArray(d.pendingBets)) pendingBets = d.pendingBets;
        if (typeof d.betPool === 'number') betPool = d.betPool;
        if (d.worldBoss && typeof d.worldBoss === 'object') worldBoss = d.worldBoss;
        if (typeof d.baseMoney === 'number') baseMoney = d.baseMoney;
        if (typeof d.basePoint === 'number') basePoint = d.basePoint;
        saveData();
        render();
        hideModal();
        showToast(`📥 已還原備份（${players.length} 玩家 · ${history.length} 局）`);
      } catch (err) {
        alert('還原失敗：' + (err.message || err));
      }
    };
    fr.onerror = () => alert('讀檔失敗');
    fr.readAsText(file);
  }

  // ⭐ 補滿所有世界王 HP（保留排隊 / 戰報 / 已殺次數）
  // ⭐ HP 平衡遷移：依 baseId 重建裝備（套新詞綴/稀有度/階層 mult）
  function rebuildItemForRebalance(item) {
    if (!item || !item.baseId || !Array.isArray(item.affixes) || item.affixes.length === 0) return false;
    const base = (typeof findItem === 'function') ? findItem(item.baseId) : null;
    if (!base) return false;
    const lv = item.lv || base.lv || 1;
    const def = (item.rarity && RARITY[item.rarity]) || { mult: 1.0 };
    const layerMult = lv <= 5 ? 1.00 : lv <= 10 ? 1.10 : lv <= 15 ? 1.20 : lv <= 20 ? 1.35 : 1.50;
    // 重設為 base
    item.atk = base.atk || 0;
    item.def = base.def || 0;
    item.spd = base.spd || 0;
    item.hp  = base.hp  || 0;
    item.mp  = base.mp  || 0;
    item.critChance = base.critChance || 0;
    item.critDmg    = base.critDmg    || 0;
    // 重新套詞綴
    for (const a of item.affixes) {
      const ad = AFFIXES.find(x => x.name === a.name && x.type === a.type);
      if (!ad) continue;
      const newVal = Math.max(1, Math.round((1 + lv * ad.perLv) * (def.mult || 1) * layerMult));
      a.val = newVal;
      item[a.type] = (item[a.type] || 0) + newVal;
    }
    return true;
  }

  // ⭐ HP 平衡遷移：依 defId / sourceBossId 重建精魂（HP base × 0.7、HP 詞綴 × 0.7）
  function rebuildSpiritForRebalance(sp) {
    if (!sp) return false;
    const def = (sp.defId && SPIRIT_DEFS.find(d => d.id === sp.defId)) ||
                (sp.sourceBossId && SPIRIT_DEFS.find(d => d.sourceBossId === sp.sourceBossId));
    if (!def) return false;
    sp.hp  = Math.round((def.base.hp || 0) * 0.7);
    sp.atk = def.base.atk || 0;
    sp.def = def.base.def || 0;
    sp.spd = def.base.spd || 0;
    sp.critChance = def.base.critChance || 0;
    sp.critDmg    = def.base.critDmg    || 0;
    for (const a of (sp.affixes || [])) {
      const ad = AFFIXES.find(x => x.name === a.name && x.type === a.type);
      if (!ad) continue;
      let newVal = Math.max(1, Math.round((1 + 30 * ad.perLv) * 1.0));
      if (a.type === 'hp') newVal = Math.max(1, Math.round(newVal * 0.7));
      a.val = newVal;
      sp[a.type] = (sp[a.type] || 0) + newVal;
    }
    return true;
  }

  // ⭐ 對單一玩家施加 HP 平衡遷移：背包 / 裝備 / 精魂槽 / 精魂背包
  function applyHpRebalanceToPlayer(p) {
    if (!p || !p.rpg) return 0;
    let count = 0;
    // 背包
    for (const it of (p.rpg.inventory || [])) {
      if (it && typeof it === 'object' && rebuildItemForRebalance(it)) count++;
    }
    // 裝備（10 槽）
    for (const slot of ['weapon', 'armor', 'accessory', 'helmet', 'gloves', 'boots', 'cape', 'wings', 'pet', 'guide']) {
      const e = p.rpg.equipment?.[slot];
      if (e && typeof e === 'object' && rebuildItemForRebalance(e)) count++;
    }
    // 精魂槽（5）+ 背包
    for (const sp of (p.rpg.spirits || [])) {
      if (sp && rebuildSpiritForRebalance(sp)) count++;
    }
    for (const sp of (p.rpg.spiritBag || [])) {
      if (sp && rebuildSpiritForRebalance(sp)) count++;
    }
    return count;
  }
