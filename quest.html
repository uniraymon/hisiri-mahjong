      <div class="shop-section-title">🛠 其他</div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:6px; margin-bottom:8px;">
        <button class="btn btn-secondary" onclick="adminFullHeal()">💚 滿血滿體力</button>
        <button class="btn btn-secondary" onclick="adminGiveLegendary()">🌟 神話全套</button>
        <button class="btn btn-secondary" onclick="adminPickSet()" style="grid-column:1/-1; background:linear-gradient(135deg,#fef3c7,#f59e0b); color:#7c2d12;">🛡 直接拿整套套裝（選一套）</button>
      </div>
      <button class="btn btn-secondary" onclick="adminResetPoints()" style="background:linear-gradient(135deg,#a7f3d0,#10b981); color:#fff;">🔄 退回所有技能點 + 能力點</button>
      <button class="btn btn-danger" onclick="adminResetRpg()" style="margin-top:6px;">⚠️ 重置 RPG 角色（保留幣）</button>
      <button class="btn btn-secondary" onclick="adminLockDebug()" style="margin-top:6px;">🔐 鎖回 Debug</button>

      <div style="margin-top:10px; font-size:11px; color:#8b6f9b; text-align:center;">
        所有操作會同步到 Firebase（朋友會看到）
      </div>
    `;
    showModal('🛠 Debug 模式', html);
  }

  function adminAddCoins(amount) {
    const me = getMe(); if (!me) return;
    me.coinsSpent = (me.coinsSpent || 0) - amount;
    saveData(); render(); showDebugModal();
    showToast(`🪙 +${amount} 鵝鵝幣`);
  }
  window.adminAddCoins = adminAddCoins;

  function adminAddXp(amount) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    if (!r.class) { showToast('先選職業'); return; }
    r.xp = (r.xp || 0) + amount;
    let leveled = 0;
    while (r.xp >= xpForLevel(r.level)) {
      r.xp -= xpForLevel(r.level);
      r.level += 1;
      r.skillPoints = (r.skillPoints || 0) + POINTS_PER_LEVEL.skill;
      r.abilityPoints = (r.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
      leveled++;
      if (r.level > 50) break;
    }
    const s = computeStats(me);
    r.hp = s.maxHp;
    r.mp = s.maxMp;
    r.deathAt = null;
    syncEquipped(me); saveData(); render(); showDebugModal();
    showToast(`⭐ +${amount} XP${leveled ? `，升 ${leveled} 級 +${leveled * POINTS_PER_LEVEL.skill} 技能點 +${leveled * POINTS_PER_LEVEL.ability} 能力點` : ''}`);
  }
  window.adminAddXp = adminAddXp;

  function adminSetLevel(lvStr) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    if (!r.class) { showToast('先選職業'); return; }
    const lv = Math.max(1, Math.min(50, parseInt(lvStr) || 1));
    const usedSk = Object.values(r.skills || {}).reduce((a, b) => a + (b || 0), 0);
    const usedSkLv = Object.values(r.skillLevels || {}).reduce((a, b) => a + (b || 0), 0);
    const usedAb = Object.values(r.abilities || {}).reduce((a, b) => a + (b || 0), 0);
    r.level = lv; r.xp = 0;
    r.skillPoints = Math.max(0, (lv - 1) * POINTS_PER_LEVEL.skill - usedSk - usedSkLv);
    r.abilityPoints = Math.max(0, 5 + (lv - 1) * POINTS_PER_LEVEL.ability - usedAb);
    const s = computeStats(me);
    r.hp = s.maxHp; r.mp = s.maxMp;
    r.deathAt = null;
    syncEquipped(me); saveData(); render(); showDebugModal();
    showToast(`🎯 等級設為 Lv ${lv}`);
  }
  window.adminSetLevel = adminSetLevel;

  function adminFullHeal() {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const s = computeStats(me);
    r.hp = s.maxHp;
    r.mp = s.maxMp;
    r.stamina = STAMINA_MAX;
    r.deathAt = null;
    saveData(); render(); showDebugModal();
    showToast('💚 HP / MP / 體力 全滿');
  }
  window.adminFullHeal = adminFullHeal;

  function adminGiveLegendary() {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    if (!r.class) { showToast('先選職業'); return; }
    // 把現有裝備丟回背包
    ['weapon','armor','accessory'].forEach(s => {
      if (r.equipment[s]) r.inventory.push(r.equipment[s]);
    });
    r.equipment = { weapon: 'shop_w_28', armor: 'shop_a_28', accessory: 'shop_c_28' };
    if (r.level < 28) r.level = 28;
    r.hp = computeStats(me).maxHp;
    syncEquipped(me); saveData(); render(); showDebugModal();
    showToast('🌟 神話套裝穿戴完成');
  }
  window.adminGiveLegendary = adminGiveLegendary;

  // ⭐ 選一套套裝、把所有件丟進背包
  function adminPickSet() {
    const setIds = Object.keys(SETS);
    const html = `
      <div style="text-align:left;">
        <div style="font-size:12px; color:#5b3d62; padding:8px 10px; background:#fef3c7; border-radius:8px; margin-bottom:10px; border:1px dashed #f59e0b;">
          選一套，所有 5 件直接進你背包（沒有等級限制檢查、不影響現有裝備）。
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
          ${setIds.map(sid => {
            const s = SETS[sid];
            return `<button class="btn btn-secondary" onclick="adminGiveSet('${sid}')" style="border:2px solid ${s.color}; background:${s.color}1a; color:${s.color}; font-weight:700; padding:10px 8px; text-align:left;">
              <div style="font-size:13px;">🛡 ${escapeHtml(s.name)}</div>
              <div style="font-size:10px; opacity:0.8; margin-top:2px;">${s.pieces.length} 件　·　Lv ${s.pieces[0]?.lv || 1}</div>
            </button>`;
          }).join('')}
        </div>
        <button class="btn btn-secondary" onclick="hideModal()" style="margin-top:10px;">取消</button>
      </div>
    `;
    showModal('🛡 選一套套裝', html);
  }
  window.adminPickSet = adminPickSet;

  function adminGiveSet(setId) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const set = SETS[setId];
    if (!set) { showToast('找不到套裝'); return; }
    r.inventory = r.inventory || [];
    set.pieces.forEach(p => {
      // 用 id 字串塞背包（resolveItem 會從 SET_PIECES 還原）
      r.inventory.push(p.id);
    });
    saveData();
    hideModal();
    render();
    showDebugModal();
    showToast(`🛡 ${set.name} ×${set.pieces.length} 件已進背包`);
  }
  window.adminGiveSet = adminGiveSet;

  function adminResetPoints() {
    const me = getMe(); if (!me) return;
    if (!confirm('退回所有技能點 + 能力點？（職業 / 等級 / 裝備不變）')) return;
    const r = getRpg(me);
    const usedSk = Object.values(r.skills || {}).reduce((a, b) => a + (b || 0), 0);
    const usedSkLv = Object.values(r.skillLevels || {}).reduce((a, b) => a + (b || 0), 0);
    const usedAb = Object.values(r.abilities || {}).reduce((a, b) => a + (b || 0), 0);
    r.skillPoints = (r.skillPoints || 0) + usedSk + usedSkLv;
    r.abilityPoints = (r.abilityPoints || 0) + usedAb;
    r.skills = {};
    r.skillLevels = {};
    r.abilities = { str: 0, vit: 0, agi: 0, dex: 0, int: 0, luk: 0 };
    // HP/MP 上限可能因屬性歸零而變小，擋一下
    const s = computeStats(me);
    if (r.hp > s.maxHp) r.hp = s.maxHp;
    if (r.mp > s.maxMp) r.mp = s.maxMp;
    saveData(); render(); showDebugModal();
    showToast(`🔄 退回 ${usedSk + usedSkLv} 技能點 + ${usedAb} 能力點`);
  }
  window.adminResetPoints = adminResetPoints;

  function adminResetRpg() {
    if (!confirm('重置 RPG 角色（職業、等級、裝備全清；鵝鵝幣保留）？')) return;
    const me = getMe(); if (!me) return;
    delete me.rpg;
    getRpg(me); // 重建預設
    syncEquipped(me); saveData(); render();
    hideModal();
    showToast('🔄 RPG 已重置');
  }
  window.adminResetRpg = adminResetRpg;

  function adminLockDebug() {
    localStorage.removeItem(DEBUG_KEY);
    refreshDebugBtn();
    hideModal();
    showToast('🔐 Debug 已鎖回');
  }
  window.adminLockDebug = adminLockDebug;

  // ============================================================
  // 啟動
  // ============================================================
  loadData();
  render();
  refreshDebugBtn();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import { getFirestore, doc, collection, onSnapshot, setDoc, getDoc, deleteField, runTransaction } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1dzTX6COdDAab7gojdXaycx7Vr9EydN8",
    authDomain: "hisiri-mahjong.firebaseapp.com",
    projectId: "hisiri-mahjong",
    storageBucket: "hisiri-mahjong.firebasestorage.app",
    messagingSenderId: "565503631941",
    appId: "1:565503631941:web:be3c8a762292960527792c"
  };
  try {
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const hashParams = new URLSearchParams(location.hash.replace(/^#/, '?'));
    const ROOM_ID = hashParams.get('room') || localStorage.getItem('mahjong-room-id') || 'shared';
    localStorage.setItem('mahjong-room-id', ROOM_ID);

    // ⭐ 拆檔結構：rooms/{ROOM_ID}（meta）+ rooms/{ROOM_ID}/players/{pid}
    const metaRef = doc(db, 'rooms', ROOM_ID);
    const playersCol = collection(db, 'rooms', ROOM_ID, 'players');

    let firstMetaSnap = true;
    let firstPlayersSnap = true;
    let metaSaveTimer = null;
    const playerSaveTimers = {};
    let metaReady = false;
    let playersReady = false;
    const seenPlayerIds = new Set();

    function checkReady() {
      if (metaReady && playersReady && !window.__firebaseSync.ready) {
        window.__firebaseSync.ready = true;
        window.__updateSyncStatus?.('☁️ 已同步', 'ok');
      }
    }

    window.__firebaseSync = {
      ready: false,
      roomId: ROOM_ID,
      // 世界王打擊：用 transaction 原子地讀 + 扣 HP + 寫回，避免兩個玩家互相蓋掉
      // bossDef 是 WORLD_BOSSES 裡的設定（要拿 hp / respawnMs / 各檔次獎勵）
      // 回傳 { actualDmg, newState, killed, pendingRewards }
      // 加入排隊。若目前不在任何王的排隊裡才能加。回傳 { queue, position }
      // bossDef 用來在第一次參戰時初始化王
      joinBossQueue: async (bossId, attackerId, bossDef, staleMs) => {
        return await runTransaction(db, async (tx) => {
          const snap = await tx.get(metaRef);
          const data = snap.exists() ? snap.data() : {};
          const wb = data.worldBoss ? { ...data.worldBoss } : {};
          let state = wb[bossId];
          // respawnMs=0 → 死了就立刻重生（不用等 nextSpawnAt）
          const __instantRespawn = !bossDef.respawnMs;
          if (!state || (state.deadAt && (__instantRespawn || (state.nextSpawnAt && Date.now() >= state.nextSpawnAt)))) {
            state = {
              currentHp: bossDef.hp,
              spawnedAt: Date.now(),
              deadAt: null, nextSpawnAt: null,
              damageLog: {}, lastHit: null,
              killCount: state ? (state.killCount || 0) : 0,
              lastKill: state ? state.lastKill : null,
              pendingRewards: state ? (state.pendingRewards || []) : [],
              queue: [],
            };
          }
          if (state.deadAt) throw new Error('boss-already-dead');
          state.queue = Array.isArray(state.queue) ? state.queue : [];
          // 清理過期 head（避免 AFK 玩家卡住排隊）
          while (state.queue.length > 0) {
            const head = state.queue[0];
            if (head && head.joinedAt && Date.now() - head.joinedAt > staleMs) {
              state.queue.shift();
            } else break;
          }
          // 不能同時排兩個 boss
          for (const bid of Object.keys(wb)) {
            const q = (wb[bid] && wb[bid].queue) || [];
            const stillThere = q.find(qi => qi.pid === attackerId);
            if (stillThere) {
              if (bid === bossId) throw new Error('already-in-this-queue');
              throw new Error('already-in-other-queue:' + bid);
            }
          }
          // 不能加進「同 pid」重複條目
          if (state.queue.find(qi => qi.pid === attackerId)) {
            throw new Error('already-in-this-queue');
          }
          state.queue.push({ pid: attackerId, joinedAt: Date.now() });
          wb[bossId] = state;
          tx.set(metaRef, { worldBoss: wb }, { merge: true });
          const pos = state.queue.findIndex(qi => qi.pid === attackerId);
          return { queue: state.queue, position: pos };
        });
      },
      // 退出排隊
      leaveBossQueue: async (bossId, attackerId) => {
        return await runTransaction(db, async (tx) => {
          const snap = await tx.get(metaRef);
          const data = snap.exists() ? snap.data() : {};
          const wb = data.worldBoss ? { ...data.worldBoss } : {};
          const state = wb[bossId];
          if (!state || !Array.isArray(state.queue)) return { queue: [] };
          state.queue = state.queue.filter(qi => qi.pid !== attackerId);
          wb[bossId] = state;
          tx.set(metaRef, { worldBoss: wb }, { merge: true });
          return { queue: state.queue };
        });
      },
      applyBossAttack: async (bossId, requestedDmg, attackerId, bossDef, staleMs) => {
        return await runTransaction(db, async (tx) => {
          const snap = await tx.get(metaRef);
          const data = snap.exists() ? snap.data() : {};
          const wb = data.worldBoss ? { ...data.worldBoss } : {};
          let state = wb[bossId];
          // respawnMs=0 → 死了就立刻重生（不用等 nextSpawnAt）
          const __instantRespawn = !bossDef.respawnMs;
          // 若沒有狀態 / 已經到復活時間 → 重生
          if (!state || (state.deadAt && (__instantRespawn || (state.nextSpawnAt && Date.now() >= state.nextSpawnAt)))) {
            state = {
              currentHp: bossDef.hp,
              spawnedAt: Date.now(),
              deadAt: null,
              nextSpawnAt: null,
              damageLog: {},
              lastHit: null,
              killCount: state ? (state.killCount || 0) : 0,
              lastKill: state ? state.lastKill : null,
              pendingRewards: state ? (state.pendingRewards || []) : [],
              queue: [],
            };
          }
          if (state.deadAt) {
            // 王已倒下、還沒到復活時間
            throw new Error('boss-already-dead');
          }
          // 排隊驗證：必須是排隊頭（過期的可被略過）
          state.queue = Array.isArray(state.queue) ? state.queue : [];
          while (state.queue.length > 0) {
            const head = state.queue[0];
            if (head && head.pid === attackerId) break;
            if (head && head.joinedAt && Date.now() - head.joinedAt > staleMs) {
              state.queue.shift();
              continue;
            }
            // head 是別人 + 還沒過期
            throw new Error('not-your-turn');
          }
          if (state.queue.length === 0 || state.queue[0].pid !== attackerId) {
            throw new Error('not-in-queue');
          }
          const actualDmg = Math.min(state.currentHp, Math.max(0, Math.floor(requestedDmg)));
          state.currentHp -= actualDmg;
          state.damageLog = state.damageLog || {};
          state.damageLog[attackerId] = (state.damageLog[attackerId] || 0) + actualDmg;
          state.lastHit = attackerId;
          let killed = false;
          let newPending = [];
          if (state.currentHp <= 0) {
            state.currentHp = 0;
            state.deadAt = Date.now();
            state.nextSpawnAt = state.deadAt + bossDef.respawnMs;
            state.killCount = (state.killCount || 0) + 1;
            state.lastKill = { killer: attackerId, when: state.deadAt, killCount: state.killCount };
            killed = true;
            // 把獎勵記在 pendingRewards 裡，由各玩家自己領
            const sortedDmg = Object.entries(state.damageLog).sort((a, b) => b[1] - a[1]);
            const rankRewards = [bossDef.rewardTop, bossDef.rewardSecond, bossDef.rewardThird];
            const seen = new Set();
            // 尾刀
            newPending.push({
              pid: attackerId,
              coins: bossDef.rewardKiller.coins,
              item: bossDef.rewardKiller.item || null,
              rewardId: `${bossId}_${state.killCount}_killer`,
              kind: '尾刀',
            });
            seen.add(attackerId + '_killer');
            // 排行 1-3 額外
            sortedDmg.slice(0, 3).forEach(([pid], idx) => {
              if (rankRewards[idx]) {
                newPending.push({
                  pid,
                  coins: rankRewards[idx].coins,
                  item: null,
                  rewardId: `${bossId}_${state.killCount}_rank${idx+1}_${pid}`,
                  kind: `第 ${idx+1} 名`,
                });
              }
            });
            // 其餘參與者
            sortedDmg.slice(3).forEach(([pid]) => {
              if (bossDef.rewardParticipant) {
                newPending.push({
                  pid,
                  coins: bossDef.rewardParticipant.coins,
                  item: null,
                  rewardId: `${bossId}_${state.killCount}_part_${pid}`,
                  kind: '參與',
                });
              }
            });
            state.pendingRewards = (state.pendingRewards || []).concat(newPending);
          }
          // 攻擊完成 → 從排隊頭移除自己（讓下一位上場）
          if (state.queue[0] && state.queue[0].pid === attackerId) {
            state.queue.shift();
          }
          wb[bossId] = state;
          tx.set(metaRef, { worldBoss: wb }, { merge: true });
          return { actualDmg, newState: state, killed, pendingRewards: newPending };
        });
      },
      save: (payload) => {
        const meId = window.__getMeId?.();

        // Firestore 不接受 undefined。深度遞迴遞掉 undefined（陣列/物件）
        const pruneUndef = (v) => {
          if (Array.isArray(v)) return v.map(pruneUndef).filter(x => x !== undefined);
          if (v !== null && typeof v === 'object') {
            const out = {};
            for (const k of Object.keys(v)) {
              const x = pruneUndef(v[k]);
              if (x !== undefined) out[k] = x;
            }
            return out;
          }
          return v;
        };

        // 把 undefined 欄位過濾掉
        // 注意：merge:true 下，缺漏的欄位會保留雲端原值；只丟掉 undefined 不會誤刪
        const rawMeta = {
          history: payload.history,
          gifts: payload.gifts,
          comments: payload.comments,
          pendingBets: payload.pendingBets,
          betPool: payload.betPool,
          worldBoss: payload.worldBoss,
          bugs: payload.bugs,
          baseMoney: payload.baseMoney,
          basePoint: payload.basePoint,
        };
        const meta = pruneUndef(rawMeta);

        clearTimeout(metaSaveTimer);
        metaSaveTimer = setTimeout(async () => {
          try {
            await setDoc(metaRef, meta, { merge: true });
            window.__updateSyncStatus?.('☁️ 已同步', 'ok');
          } catch (e) {
            console.error('Meta save failed:', e);
            window.__updateSyncStatus?.('☁️ 同步失敗', 'err');
          }
        }, 250);

        const playersToWrite = [];
        if (meId && Array.isArray(payload.players)) {
          const me = payload.players.find(p => p && p.id === meId);
          if (me) playersToWrite.push(me);
          for (const p of payload.players) {
            if (p && p.id && p.id !== meId && !seenPlayerIds.has(p.id)) {
              playersToWrite.push(p);
            }
          }
        }
        for (const p of playersToWrite) {
          const cleanP = pruneUndef(p);
          clearTimeout(playerSaveTimers[p.id]);
          playerSaveTimers[p.id] = setTimeout(async () => {
            try {
              await setDoc(doc(playersCol, p.id), cleanP);
              seenPlayerIds.add(p.id);
            } catch (e) { console.error('Player ' + p.id + ' save failed:', e); }
          }, 250);
        }
      },
    };

    async function migrateIfNeeded() {
      try {
        const snap = await getDoc(metaRef);
        if (!snap.exists()) return;
        const data = snap.data();
        if (Array.isArray(data.players) && data.players.length > 0) {
          console.log('[migrate] 偵測舊結構，拆分 ' + data.players.length + ' 個玩家');
          for (const p of data.players) {
            if (p && p.id) await setDoc(doc(playersCol, p.id), p);
          }
          await setDoc(metaRef, { players: deleteField() }, { merge: true });
          console.log('[migrate] 完成');
        }
      } catch (e) { console.error('[migrate] 失敗：', e); }
    }

    (async () => {
      await migrateIfNeeded();

      onSnapshot(metaRef, async (snap) => {
        if (firstMetaSnap) {
          firstMetaSnap = false;
          if (!snap.exists()) {
            const local = window.__getCurrentData?.();
            if (local && (local.history?.length || local.players?.length)) {
              try {
                await setDoc(metaRef, {
                  history: local.history,
                  gifts: local.gifts,
                  comments: local.comments,
                  pendingBets: local.pendingBets,
                  betPool: local.betPool,
                  worldBoss: local.worldBoss,
                  baseMoney: local.baseMoney,
                  basePoint: local.basePoint,
                });
              } catch (e) { console.error(e); }
            }
          } else {
            window.__applyRemoteMeta?.(snap.data());
          }
          metaReady = true;
          checkReady();
          return;
        }
        if (snap.exists()) window.__applyRemoteMeta?.(snap.data());
      }, (err) => {
        console.error('Meta listen failed:', err);
        window.__updateSyncStatus?.('☁️ 連線錯誤', 'err');
      });

      onSnapshot(playersCol, async (snap) => {
        snap.docs.forEach(d => seenPlayerIds.add(d.id));
        if (firstPlayersSnap) {
          firstPlayersSnap = false;
          if (snap.empty) {
            const local = window.__getCurrentData?.();
            if (local && Array.isArray(local.players)) {
              for (const p of local.players) {
                if (p && p.id) {
                  try {
                    await setDoc(doc(playersCol, p.id), p);
                    seenPlayerIds.add(p.id);
                  } catch (e) { console.error(e); }
                }
              }
            }
          } else {
            window.__applyRemotePlayers?.(snap.docs.map(d => d.data()));
          }
          playersReady = true;
          checkReady();
          return;
        }
        const changes = snap.docChanges();
        for (const c of changes) {
          if (c.type === 'removed') {
            seenPlayerIds.delete(c.doc.id);
            window.__applyRemotePlayerDelete?.(c.doc.id);
          } else {
            seenPlayerIds.add(c.doc.id);
            window.__applyRemotePlayer?.(c.doc.data());
          }
        }
      }, (err) => {
        console.error('Players listen failed:', err);
        window.__updateSyncStatus?.('☁️ 連線錯誤', 'err');
      });
    })();
  } catch (e) {
    console.error(e);
    window.__updateSyncStatus?.('☁️ 未連線', 'err');
  }
</script>
</body>
</html>
