<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ 冒險島 — 麻將戰績小本本</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background:
      radial-gradient(circle at 20% 10%, #ddd6fe 0%, transparent 40%),
      radial-gradient(circle at 80% 30%, #fbcfe8 0%, transparent 40%),
      radial-gradient(circle at 50% 80%, #fde68a 0%, transparent 40%),
      linear-gradient(135deg, #f3e8ff 0%, #fef3c7 100%);
    min-height: 100vh;
    padding: 16px;
    padding-bottom: 100px;
    color: #5a4a4a;
  }
  .container { max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .back-link {
    color: #8b5cf6;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
    background: rgba(255,255,255,0.7);
    padding: 6px 12px;
    border-radius: 16px;
    border: 2px dashed #c4b5fd;
  }
  .back-link:hover { background: #fff; }
  h1 {
    font-size: 24px;
    color: #7c3aed;
    text-shadow: 2px 2px 0 #fff, 3px 3px 0 #ddd6fe;
    letter-spacing: 1px;
  }

  .card {
    background: rgba(255, 255, 255, 0.88);
    border: 2px solid #ddd6fe;
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 0 #c4b5fd, 0 8px 20px rgba(167, 139, 250, 0.18);
  }
  .card h2 {
    font-size: 16px;
    margin-bottom: 12px;
    color: #7c3aed;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .hidden { display: none !important; }

  /* 職業選擇 */
  .class-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .class-card {
    background: linear-gradient(135deg, #fff, #fff8fb);
    border: 2px solid #ddd6fe;
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .class-card:hover { transform: translateY(-2px); box-shadow: 0 4px 0 #a78bfa; }
  .class-card .cls-icon { font-size: 42px; margin-bottom: 4px; }
  .class-card .cls-name { font-weight: 700; color: #7c3aed; font-size: 14px; }
  .class-card .cls-desc { font-size: 10px; color: #8b6f9b; margin-top: 4px; line-height: 1.4; }
  .class-card .cls-stats {
    font-size: 10px;
    color: #5a4a4a;
    margin-top: 6px;
    background: #f3e8ff;
    border-radius: 8px;
    padding: 4px;
    line-height: 1.4;
  }

  /* 角色卡（卡片風） */
  .char-card {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }
  .char-portrait {
    width: 220px;
    height: 280px;
    background:
      radial-gradient(circle at 50% 30%, rgba(255,255,255,0.5) 0%, transparent 40%),
      linear-gradient(160deg, #ddd6fe 0%, #c4b5fd 50%, #a78bfa 100%);
    border-radius: 18px;
    position: relative;
    overflow: hidden;
    border: 3px solid #c4b5fd;
    box-shadow:
      0 4px 0 #8b5cf6,
      0 8px 20px rgba(124, 58, 237, 0.25),
      inset 0 0 30px rgba(255, 255, 255, 0.3);
  }
  /* 卡片內框 */
  .char-portrait::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px dashed rgba(255, 255, 255, 0.55);
    border-radius: 12px;
    pointer-events: none;
    z-index: 5;
  }
  /* 卡片角落裝飾 — 飄浮在頂部中央，不擋徽章 */
  .char-portrait::after {
    content: '✨';
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    opacity: 0.7;
    animation: sparkleFloat 2.5s ease-in-out infinite;
    z-index: 6;
  }
  @keyframes sparkleFloat {
    0%, 100% { opacity: 0.3; transform: rotate(0) scale(1); }
    50%      { opacity: 1;   transform: rotate(25deg) scale(1.2); }
  }

  /* 卡片角徽章 */
  .cp-lv-badge, .cp-coin-badge {
    position: absolute;
    z-index: 7;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #fef3c7);
    border: 2px solid #f59e0b;
    color: #d97706;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 11px;
    box-shadow: 0 2px 4px rgba(245, 158, 11, 0.3);
  }
  .cp-lv-badge { top: 8px; left: 8px; }
  .cp-coin-badge { top: 8px; right: 8px; background: linear-gradient(135deg, #fff, #fed7aa); border-color: #ea580c; color: #c2410c; }
  /* sparkle 移到中央上方避免擋徽章 */

  /* 卡片下方收藏列 */
  .cp-collection {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    z-index: 7;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(124, 58, 237, 0.3);
    border-radius: 10px;
    padding: 4px 8px;
    backdrop-filter: blur(4px);
  }
  /* 技能列表（角色卡內，每行可點看詳細） */
  .skill-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px;
    margin: 1px 0;
    border-radius: 6px;
    gap: 6px;
    cursor: pointer;
    transition: background 0.1s;
    background: rgba(255,255,255,0.4);
  }
  .skill-row:hover { background: rgba(196, 181, 253, 0.4); }
  .skill-row.locked { opacity: 0.45; cursor: default; }
  .skill-row.locked:hover { background: rgba(255,255,255,0.4); }
  .skill-row-lv {
    display: inline-block;
    background: linear-gradient(135deg, #c4b5fd, #7c3aed);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 6px;
    margin-left: 2px;
  }
  /* 技能等級 modal 內：等級表 */
  .skl-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    margin: 2px 0;
    border-radius: 6px;
    font-size: 11px;
    background: #fff;
    border: 1px solid #e9d5e3;
  }
  .skl-row.owned { background: #f0fdf4; border-color: #86efac; color: #166534; }
  .skl-row.next { background: #fef3c7; border-color: #fde047; color: #92400e; font-weight: 700; }
  .skl-num { width: 36px; font-weight: 700; }

  /* 角色卡左側按鈕列（規則 / 寶物庫 / 未來擴充） */
  .char-with-menu {
    display: flex;
    gap: 10px;
    align-items: stretch;
    margin-bottom: 12px;
  }
  .char-with-menu > .char-card {
    flex: 1;
    margin-bottom: 0;
  }
  .char-quick-menu {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
    width: 70px;
    padding-top: 4px;
  }
  .cqm-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    background: linear-gradient(135deg, #fef3c7, #fde047);
    border: 2px solid #f59e0b;
    border-radius: 12px;
    padding: 8px 4px;
    cursor: pointer;
    box-shadow: 0 3px 0 #d97706;
    font-family: inherit;
    transition: transform 0.1s;
    min-height: 56px;
  }
  .cqm-btn:hover { transform: translateY(-1px); background: linear-gradient(135deg, #fffaf0, #fbbf24); }
  .cqm-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #d97706; }
  .cqm-btn .cqm-icon { font-size: 22px; line-height: 1; }
  .cqm-btn .cqm-label { font-size: 11px; font-weight: 700; color: #92400e; margin-top: 2px; }
  .cqm-btn .cqm-badge {
    font-size: 9px;
    color: #78350f;
    background: rgba(255,255,255,0.6);
    padding: 1px 5px;
    border-radius: 6px;
    margin-top: 2px;
  }
  /* 寶物庫卡 */
  .tv-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .tv-card {
    background: #fff;
    border: 2px solid #e9d5e3;
    border-radius: 12px;
    padding: 10px 6px;
    text-align: center;
    transition: transform 0.1s;
  }
  .tv-card.owned {
    background: linear-gradient(135deg, #faf5ff, #e9d5ff);
    border-color: #a78bfa;
    box-shadow: 0 3px 0 #8b5cf6;
  }
  .tv-card.locked { opacity: 0.4; filter: grayscale(0.6); }
  .tv-icon { font-size: 28px; line-height: 1; }
  .tv-name { font-size: 11px; font-weight: 700; color: #5b3d62; margin-top: 4px; }
  .tv-card.locked .tv-name { color: #9ca3af; }
  .tv-bonus { font-size: 10px; color: #7c3aed; margin-top: 2px; font-weight: 600; }
  .tv-card.locked .tv-bonus { color: #9ca3af; }
  .tv-summary {
    background: linear-gradient(135deg, #f3e8ff, #e9d5ff);
    border: 2px dashed #a78bfa;
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 10px;
    font-size: 12px;
  }
  .tv-summary-row { display: flex; justify-content: space-between; padding: 1px 0; }
  .tv-summary-row b { color: #5b21b6; }
  .cp-collection .cc-item {
    font-size: 16px;
    line-height: 1;
  }
  .cp-collection .cc-empty {
    font-size: 9px;
    color: #8b6f9b;
    font-style: italic;
  }

  /* 紙娃娃（SVG 5 層疊圖；每張 SVG 都是 200×250 已對齊） */
  .paper-doll {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 250px;
    z-index: 4;
    pointer-events: none;
  }
  .pd-layer {
    position: absolute;
    inset: 0;
    width: 200px;
    height: 250px;
    pointer-events: none;
    user-select: none;
  }
  .pd-armor  { z-index: 1; animation: pdPulse 3s ease-in-out infinite; filter: drop-shadow(0 0 6px rgba(125,211,252,0.5)); }
  .pd-base   { z-index: 2; filter: drop-shadow(0 4px 8px rgba(124,58,237,0.25)); }
  .pd-shield { z-index: 3; }
  .pd-weapon { z-index: 4; animation: pdSwayWeapon 2.6s ease-in-out infinite; transform-origin: center; }
  .pd-acc    { z-index: 5; animation: pdFloatAcc 2.4s ease-in-out infinite; }

  /* === 裝備分階自動上色（用 CSS filter 覆蓋 SVG 模板） === */
  /* 武器：10 階色調（木 → 鐵 → 鋼 → 銀 → 魔 → 聖 → 邪 → 雷 → 龍 → 神話） */
  .pd-weapon[data-tier="1"]  { filter: sepia(1) saturate(0.8) hue-rotate(-15deg) brightness(0.85) drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }
  .pd-weapon[data-tier="2"]  { filter: saturate(0.4) brightness(0.95) drop-shadow(0 2px 3px rgba(0,0,0,0.3)); }
  .pd-weapon[data-tier="3"]  { filter: saturate(0.7) brightness(1.05) drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }
  .pd-weapon[data-tier="4"]  { filter: saturate(0.6) brightness(1.15) drop-shadow(0 0 4px rgba(135,206,250,0.5)); }
  .pd-weapon[data-tier="5"]  { filter: hue-rotate(70deg) saturate(2.5) brightness(1.1) drop-shadow(0 0 6px rgba(167,139,250,0.85)); }
  .pd-weapon[data-tier="6"]  { filter: sepia(1) saturate(2.5) hue-rotate(-30deg) brightness(1.15) drop-shadow(0 0 6px rgba(255,215,0,0.8)); }
  .pd-weapon[data-tier="7"]  { filter: hue-rotate(-30deg) saturate(2.2) brightness(0.7) drop-shadow(0 0 6px rgba(220,38,38,0.7)); }
  .pd-weapon[data-tier="8"]  { filter: hue-rotate(-80deg) saturate(3) brightness(1.2) drop-shadow(0 0 7px rgba(250,204,21,0.95)); }
  .pd-weapon[data-tier="9"]  { filter: hue-rotate(110deg) saturate(2.2) brightness(1.05) drop-shadow(0 0 7px rgba(34,197,94,0.85)); }
  .pd-weapon[data-tier="10"] { filter: saturate(2.5) brightness(1.2) drop-shadow(0 0 4px #ff7eb9) drop-shadow(0 0 8px #7afcff) drop-shadow(0 0 14px rgba(255,255,255,0.6)); animation: pdSwayWeapon 2.6s ease-in-out infinite, pdRainbow 4s linear infinite; }
  @keyframes pdRainbow {
    0%   { filter: hue-rotate(0deg)   saturate(2.5) brightness(1.2) drop-shadow(0 0 6px #ff7eb9); }
    50%  { filter: hue-rotate(180deg) saturate(2.5) brightness(1.2) drop-shadow(0 0 6px #7afcff); }
    100% { filter: hue-rotate(360deg) saturate(2.5) brightness(1.2) drop-shadow(0 0 6px #ff7eb9); }
  }

  /* 防具：10 階盔甲光暈色 */
  .pd-armor[data-tier="1"]  { filter: hue-rotate(20deg) saturate(0.5) brightness(0.85); }
  .pd-armor[data-tier="2"]  { filter: saturate(0.3) brightness(0.95); }
  .pd-armor[data-tier="3"]  { filter: saturate(0.6) brightness(1.05); }
  .pd-armor[data-tier="4"]  { filter: hue-rotate(15deg) saturate(0.8) brightness(1.15); }
  .pd-armor[data-tier="5"]  { filter: hue-rotate(60deg) saturate(2) brightness(1.1) drop-shadow(0 0 8px rgba(167,139,250,0.7)); }
  .pd-armor[data-tier="6"]  { filter: hue-rotate(-150deg) saturate(2.5) brightness(1.2) drop-shadow(0 0 10px rgba(255,215,0,0.7)); }
  .pd-armor[data-tier="7"]  { filter: hue-rotate(140deg) saturate(2) brightness(0.6) drop-shadow(0 0 8px rgba(220,38,38,0.6)); }
  .pd-armor[data-tier="8"]  { filter: hue-rotate(-110deg) saturate(2.5) brightness(1.15) drop-shadow(0 0 10px rgba(250,204,21,0.85)); }
  .pd-armor[data-tier="9"]  { filter: hue-rotate(80deg) saturate(2.2) brightness(1.05) drop-shadow(0 0 10px rgba(34,197,94,0.8)); }
  .pd-armor[data-tier="10"] { filter: saturate(3) brightness(1.2) drop-shadow(0 0 12px rgba(255,255,255,0.8)); animation: pdPulse 3s ease-in-out infinite, pdRainbow 4s linear infinite; }

  /* 飾品：10 階色 */
  .pd-acc[data-tier="1"]  { filter: sepia(0.7) saturate(0.7) brightness(0.9); }
  .pd-acc[data-tier="2"]  { filter: saturate(0.6) brightness(1); }
  .pd-acc[data-tier="3"]  { filter: saturate(0.8) brightness(1.05); }
  .pd-acc[data-tier="4"]  { filter: hue-rotate(-20deg) saturate(0.8) brightness(1.15); }
  .pd-acc[data-tier="5"]  { filter: hue-rotate(60deg) saturate(2) brightness(1.1) drop-shadow(0 0 5px rgba(167,139,250,0.85)); }
  .pd-acc[data-tier="6"]  { filter: sepia(1) saturate(2.5) hue-rotate(-30deg) drop-shadow(0 0 6px rgba(255,215,0,0.9)); }
  .pd-acc[data-tier="7"]  { filter: hue-rotate(-30deg) saturate(2.2) brightness(0.75) drop-shadow(0 0 5px rgba(220,38,38,0.7)); }
  .pd-acc[data-tier="8"]  { filter: hue-rotate(-80deg) saturate(3) brightness(1.15) drop-shadow(0 0 6px rgba(250,204,21,0.95)); }
  .pd-acc[data-tier="9"]  { filter: hue-rotate(110deg) saturate(2.2) brightness(1.05) drop-shadow(0 0 6px rgba(34,197,94,0.85)); }
  .pd-acc[data-tier="10"] { animation: pdFloatAcc 2.4s ease-in-out infinite, pdRainbow 4s linear infinite; filter: saturate(2.5) brightness(1.2) drop-shadow(0 0 6px rgba(255,255,255,0.9)); }
  /* emoji fallback：當 SVG 載不到時用 emoji 撐住中央位置 */
  .pd-base-emoji {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 110px;
    z-index: 2;
    text-shadow: 0 4px 12px rgba(124,58,237,0.3);
  }
  @keyframes pdPulse {
    0%, 100% { transform: scale(1); opacity: 0.85; }
    50%      { transform: scale(1.04); opacity: 1; }
  }
  @keyframes pdSwayWeapon {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-2px); }
  }
  @keyframes pdFloatAcc {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-2px); }
  }

  /* 角色資訊（卡片下方） */
  .char-info { width: 100%; min-width: 0; }
  .char-name { font-weight: 700; color: #7c3aed; font-size: 18px; }
  .char-class { font-size: 12px; color: #8b6f9b; margin-bottom: 8px; }
  .char-coins { font-size: 12px; color: #d4806b; font-weight: 700; }

  .stat-bar { margin-top: 6px; }
  .stat-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .stat-bar-track {
    background: #f3f0ff;
    border: 1px solid #ddd6fe;
    border-radius: 8px;
    height: 12px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 6px;
  }
  .hp-fill   { background: linear-gradient(90deg, #fca5a5, #ef4444); }
  .mp-fill   { background: linear-gradient(90deg, #93c5fd, #3b82f6); }
  .xp-fill   { background: linear-gradient(90deg, #c4b5fd, #8b5cf6); }
  .mhp-fill  { background: linear-gradient(90deg, #fcd34d, #f59e0b); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 10px;
  }
  .stat-cell {
    background: #f3e8ff;
    border: 1px solid #ddd6fe;
    border-radius: 8px;
    padding: 6px;
    text-align: center;
  }
  .stat-cell .sc-label { font-size: 10px; color: #8b6f9b; font-weight: 600; }
  .stat-cell .sc-value { font-weight: 700; color: #7c3aed; font-size: 14px; }

  /* 行動按鈕 */
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 16px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 1px;
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, #c4b5fd, #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 0 #7c3aed, 0 6px 12px rgba(124, 58, 237, 0.3);
  }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: 0 2px 0 #c4b5fd; }
  .btn-secondary {
    background: #fff;
    color: #7c3aed;
    border: 2px solid #ddd6fe;
    margin-top: 8px;
  }
  .btn-warning {
    background: linear-gradient(135deg, #fde68a, #f59e0b);
    color: #fff;
    box-shadow: 0 4px 0 #d97706;
  }
  .btn-danger {
    background: linear-gradient(135deg, #fda4af, #ef4444);
    color: #fff;
    box-shadow: 0 4px 0 #dc2626;
  }

  .cooldown-info {
    text-align: center;
    margin-top: 8px;
    font-size: 13px;
    color: #8b6f9b;
    font-weight: 600;
  }

  /* 地區選擇 */
  .zone-tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }
  .zone-tab {
    background: #fff;
    border: 2px solid #e9d5e3;
    border-radius: 10px;
    padding: 6px 4px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    box-shadow: 0 2px 0 #e9d5e3;
    font-size: 12px;
    user-select: none;
  }
  .zone-tab:hover:not(.locked):not(.active) {
    transform: translateY(-1px);
    background: #fef9ff;
  }
  .zone-tab.active {
    background: linear-gradient(135deg, #fff, #fef3c7);
    transform: translateY(-1px);
  }
  .zone-tab.locked {
    opacity: 0.45;
    cursor: not-allowed;
    background: #f3f4f6;
  }
  .zone-tab-icon {
    font-size: 22px;
    line-height: 1.1;
  }
  .zone-tab-name {
    font-size: 11px;
    font-weight: 700;
    color: #5b3d62;
    margin-top: 2px;
  }
  .zone-info {
    background: linear-gradient(135deg, #fffaf0, #fef3c7);
    border: 2px solid #f59e0b;
    border-radius: 12px;
    padding: 8px 10px;
    margin-bottom: 10px;
  }
  .zone-info-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 4px;
  }
  .zone-info-meta {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 11px;
    color: #8b6f9b;
    margin-bottom: 6px;
  }
  .floor-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 4px;
  }
  .floor-btn {
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 2px solid #e9d5e3;
    background: #fff;
    color: #5b3d62;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 2px 0 #e9d5e3;
    transition: transform 0.1s;
    padding: 0;
  }
  .floor-btn:hover:not(.locked):not(.active) {
    transform: translateY(-1px);
    background: #fef9ff;
  }
  .floor-btn.active {
    background: linear-gradient(135deg, #fde68a, #f59e0b);
    color: #fff;
    border-color: #d97706;
    box-shadow: 0 2px 0 #b45309;
  }
  .floor-btn.locked {
    opacity: 0.5;
    cursor: not-allowed;
    background: #f3f4f6;
  }
  .floor-meta {
    font-size: 11px;
    color: #8b6f9b;
    text-align: right;
    font-weight: 600;
  }

  /* 戰鬥場 */
  .battle-arena {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
    padding: 12px;
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border: 2px solid #f59e0b;
    border-radius: 14px;
    margin-bottom: 10px;
  }
  .combatant { text-align: center; min-width: 0; }
  .combatant-icon {
    font-size: 44px;
    line-height: 1;
    transition: transform 0.3s;
  }
  .combatant.attacking .combatant-icon { transform: scale(1.2) rotate(-10deg); }
  .combatant.hurt .combatant-icon { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .combatant-name { font-size: 11px; font-weight: 700; color: #5a4a4a; margin: 4px 0; }
  .combatant-hp-track {
    background: #fff;
    border: 1px solid #d97706;
    border-radius: 6px;
    height: 10px;
    overflow: hidden;
  }
  .combatant-hp-fill {
    height: 100%;
    background: linear-gradient(90deg, #fca5a5, #ef4444);
    transition: width 0.4s ease;
  }
  .combatant-hp-text { font-size: 10px; color: #5a4a4a; margin-top: 2px; font-weight: 600; }
  /* ⭐ SPD ATB 進度條（顯示誰快滿出手） */
  .combatant-spd-track {
    background: #fff;
    border: 1px solid #f59e0b;
    border-radius: 6px;
    height: 6px;
    overflow: hidden;
    margin-top: 3px;
    position: relative;
  }
  .combatant-spd-fill {
    height: 100%;
    background: linear-gradient(90deg, #fde047, #f59e0b);
    /* 進度條動畫只是視覺，跑快一點不影響戰鬥節奏 */
    transition: width 0.18s linear;
    box-shadow: 0 0 4px rgba(245, 158, 11, 0.45) inset;
  }
  .combatant-spd-fill.full {
    background: linear-gradient(90deg, #fff, #fde047);
    animation: spdPulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes spdPulse {
    from { box-shadow: 0 0 4px rgba(245, 158, 11, 0.5) inset; }
    to   { box-shadow: 0 0 10px rgba(245, 158, 11, 1) inset; }
  }
  .combatant-spd-text {
    font-size: 8px;
    color: #92400e;
    font-weight: 600;
    margin-top: 1px;
    line-height: 1.2;
  }
  .vs-icon { font-size: 30px; color: #d97706; }

  .battle-log {
    background: #1e1b4b;
    color: #ddd6fe;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.6;
    max-height: 180px;
    overflow-y: auto;
    font-family: "Consolas", "Microsoft JhengHei", monospace;
  }
  .battle-log .log-line { margin-bottom: 2px; }
  .battle-log .log-player { color: #93c5fd; }
  .battle-log .log-monster { color: #fca5a5; }
  .battle-log .log-crit { color: #fde047; font-weight: 700; }
  .battle-log .log-system { color: #c4b5fd; font-style: italic; }
  .battle-log .log-victory { color: #86efac; font-weight: 700; }
  .battle-log .log-defeat { color: #f87171; font-weight: 700; }

  .reward-list {
    background: #f0fdf4;
    border: 2px dashed #86efac;
    border-radius: 12px;
    padding: 10px;
    margin-top: 10px;
    font-size: 13px;
    text-align: center;
  }
  .reward-list .rl-title { font-weight: 700; color: #16a34a; margin-bottom: 6px; }
  .reward-list .rl-item { display: inline-block; margin: 2px 4px; }
  .reward-loss {
    background: #fef2f2;
    border-color: #fca5a5;
  }
  .reward-loss .rl-title { color: #dc2626; }

  /* 裝備 / 背包 */
  .equip-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 6px;
    margin-bottom: 10px;
  }
  .equip-slot {
    background: #f3e8ff;
    border: 2px dashed #c4b5fd;
    border-radius: 12px;
    padding: 10px 4px;
    text-align: center;
    min-height: 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: inherit;
  }
  .equip-slot:hover { background: #ede9fe; }
  .equip-slot.empty { color: #b5a5d4; }
  .equip-slot .es-icon { font-size: 24px; margin-bottom: 2px; }
  .equip-slot .es-name { font-size: 10px; font-weight: 700; color: #5a4a4a; }
  .equip-slot .es-stat { font-size: 9px; color: #8b6f9b; }

  .inv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 6px;
  }
  .inv-item {
    background: #fff;
    border: 1px solid #ddd6fe;
    border-radius: 10px;
    padding: 6px;
    text-align: center;
    cursor: pointer;
    font-family: inherit;
    position: relative;
  }
  .inv-item:hover { background: #f3e8ff; }
  .inv-item .ii-icon { font-size: 20px; }
  .inv-item .ii-name { font-size: 10px; font-weight: 700; color: #5a4a4a; }
  .inv-item .ii-stat { font-size: 9px; color: #7c3aed; }
  .inv-item.equipped {
    background: linear-gradient(135deg, #c4b5fd, #a78bfa);
    border-color: #7c3aed;
  }
  .inv-item.equipped .ii-name, .inv-item.equipped .ii-stat { color: #fff; }

  /* ⭐ 背包分頁 + 批量出售 */
  .inv-page-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
  }
  .inv-page-tab {
    flex: 0 0 auto;
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #fde68a, #fbbf24);
    border: 2px solid #d97706;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 800;
    color: #7c2d12;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .inv-page-tab:hover { transform: translateY(-1px); }
  .inv-page-tab.active {
    background: linear-gradient(135deg, #ef4444, #b91c1c);
    border-color: #7f1d1d;
    color: #fff;
    box-shadow: 0 0 0 2px #fff inset, 0 0 0 4px #b91c1c;
  }
  .inv-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
    padding: 6px 8px;
    background: #f5f3ff;
    border: 1px dashed #c4b5fd;
    border-radius: 8px;
  }
  .inv-toolbar .it-btn {
    padding: 5px 9px;
    border: 2px solid #c4b5fd;
    background: #fff;
    border-radius: 8px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    color: #5b21b6;
    cursor: pointer;
  }
  .inv-toolbar .it-btn:hover { background: #f3e8ff; }
  .inv-toolbar .it-btn.active {
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    color: #fff;
    border-color: #6d28d9;
  }
  .inv-toolbar .it-btn.danger {
    background: linear-gradient(135deg, #fca5a5, #ef4444);
    color: #fff;
    border-color: #b91c1c;
  }
  .inv-toolbar .it-btn.danger:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    filter: grayscale(0.4);
  }
  .inv-toolbar .it-info {
    font-size: 11px;
    color: #5b21b6;
    font-weight: 700;
    margin-left: auto;
  }
  .inv-page-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    padding: 6px;
    background: #1f1147;
    border: 2px solid #5b21b6;
    border-radius: 10px;
  }
  @media (min-width: 480px) {
    .inv-page-grid { grid-template-columns: repeat(9, 1fr); }
  }
  .inv-cell {
    aspect-ratio: 1;
    background: #2d1b69;
    border: 1px solid #4c1d95;
    border-radius: 6px;
    padding: 2px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    font-family: inherit;
  }
  .inv-cell.empty { opacity: 0.4; }
  .inv-cell.has-item { cursor: pointer; transition: transform 0.1s; }
  .inv-cell.has-item:hover { transform: scale(1.04); }
  .inv-cell .ic-icon { font-size: 20px; line-height: 1; }
  .inv-cell .ic-name {
    font-size: 8px;
    color: #f5f3ff;
    font-weight: 700;
    line-height: 1.1;
    margin-top: 1px;
    width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 2px;
  }
  .inv-cell.bulk-on { box-shadow: 0 0 0 1px #a78bfa inset; }
  .inv-cell.selected {
    background: linear-gradient(135deg, #fde047, #f59e0b);
    border-color: #d97706;
    box-shadow: 0 0 0 2px #fff inset;
  }
  .inv-cell.selected .ic-name { color: #7c2d12; }
  .inv-cell .ic-check {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 14px;
    height: 14px;
    background: #fff;
    border: 1.5px solid #6d28d9;
    border-radius: 3px;
    font-size: 11px;
    line-height: 11px;
    text-align: center;
    color: #7c3aed;
    font-weight: 900;
  }
  .inv-cell.selected .ic-check {
    background: #7c3aed;
    color: #fff;
    border-color: #4c1d95;
  }
  .inv-cell .ic-qty {
    position: absolute;
    bottom: 1px;
    right: 2px;
    font-size: 10px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 3px #000, 0 0 3px #000;
    background: rgba(0,0,0,0.55);
    padding: 0 4px;
    border-radius: 4px;
    line-height: 1.4;
  }

  /* ⭐ 世界王戰報歷史 */
  .boss-history {
    margin-top: 10px;
    background: linear-gradient(135deg, #1e1b4b, #312e81);
    border: 2px solid #6366f1;
    border-radius: 12px;
    padding: 10px 12px;
  }
  .boss-history-title {
    font-size: 13px;
    color: #fde68a;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .boss-history-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    text-align: left;
    padding: 8px 10px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid #4338ca;
    border-radius: 10px;
    cursor: pointer;
    color: #ddd6fe;
    font-family: inherit;
    transition: transform 0.1s, background 0.15s;
  }
  .boss-history-row:hover {
    background: rgba(255,255,255,0.12);
    transform: translateX(2px);
  }
  .boss-history-row.is-kill {
    border-color: #f59e0b;
    background: linear-gradient(135deg, rgba(245,158,11,0.18), rgba(255,255,255,0.05));
  }
  .boss-history-row .bh-icon {
    font-size: 28px;
    line-height: 1;
  }
  .boss-history-row .bh-meta {
    flex: 1;
    min-width: 0;
  }
  .boss-history-row .bh-line1 {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 2px;
  }
  .boss-history-row .bh-kill {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    background: #f59e0b;
    color: #7c2d12;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 800;
  }
  .boss-history-row .bh-line2 {
    font-size: 11px;
    color: #c7d2fe;
    line-height: 1.3;
  }
  .boss-history-row .bh-play {
    font-size: 16px;
    color: #fde68a;
    flex-shrink: 0;
  }

  /* 世界王 */
  .boss-card {
    background: linear-gradient(135deg, #1e1b4b, #4c1d95);
    border: 3px solid #f59e0b;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 10px;
    color: #fff;
    box-shadow: 0 6px 20px rgba(245, 158, 11, 0.3);
  }
  .boss-card.dead { background: linear-gradient(135deg, #374151, #6b7280); border-color: #9ca3af; opacity: 0.85; }
  .boss-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .boss-icon { font-size: 38px; }
  .boss-name { font-size: 18px; font-weight: 800; color: #fde68a; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
  .boss-status { font-size: 11px; color: #ddd6fe; margin-top: 2px; }
  .boss-hp-bar {
    background: rgba(0,0,0,0.4);
    border: 1px solid #f59e0b;
    border-radius: 10px;
    height: 22px;
    position: relative;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .boss-hp-fill {
    height: 100%;
    background: linear-gradient(90deg, #ef4444, #dc2626, #991b1b);
    transition: width 0.5s;
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3);
  }
  .boss-hp-text {
    position: absolute;
    inset: 0;
    text-align: center;
    line-height: 22px;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  }
  .boss-leaderboard {
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 8px;
  }
  .boss-leaderboard .bl-title { font-size: 11px; color: #fde68a; font-weight: 700; margin-bottom: 4px; }
  .boss-leaderboard .bl-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 2px 0;
  }
  .boss-leaderboard .bl-rank {
    background: #f59e0b; color: #fff;
    width: 18px; height: 18px;
    border-radius: 50%;
    text-align: center;
    line-height: 18px;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .boss-leaderboard .bl-row:nth-child(2) .bl-rank { background: #fde047; color: #78350f; }
  .boss-leaderboard .bl-row:nth-child(3) .bl-rank { background: #d1d5db; color: #1f2937; }
  .boss-leaderboard .bl-row:nth-child(4) .bl-rank { background: #c4814b; color: #fff; }
  .boss-leaderboard .bl-name { flex: 1; font-weight: 600; }
  .boss-leaderboard .bl-dmg { color: #fca5a5; font-weight: 700; }
  .boss-card .btn { margin-top: 0; }
  .boss-card .btn:disabled { background: #4b5563; box-shadow: none; }
  @keyframes wb9KillFlash {
    0%   { transform: scale(1.02); box-shadow: 0 0 0 3px #f59e0b; }
    50%  { transform: scale(1.01); box-shadow: 0 0 0 6px #fde68a; }
    100% { transform: scale(1);    box-shadow: none; }
  }
  @keyframes wb9AttackPulse {
    0%,100% { transform: scale(1);    box-shadow: 0 4px 0 #7c3aed; }
    50%     { transform: scale(1.04); box-shadow: 0 6px 18px rgba(220,38,38,0.7); }
  }
  .wb9-attack-btn { animation: wb9AttackPulse 1.2s ease-in-out infinite; }

  /* 行動規則編輯器 */
  .ap-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .ap-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 8px;
    background: #fff;
    border: 2px solid #e9d5e3;

  .ap-num {
    font-size: 11px;
    font-weight: 700;

  }
  .ap-judge, .ap-skill {

    min-width: 110px;
    padding: 5px 6px;

    border-radius: 6px;

  .ap-judge:focus, .ap-skill:focus {

  }
  .ap-param {
    width: 50px;
    padding: 5px 4px;
    border: 1px solid #e9d5e3;
    border-radius: 6px;
    font-size: 12px;
    text-align: center;
    background: #fef9ff;
    font-family: inherit;
  }
  .ap-param:focus {
    outline: none;
    border-color: #c4b5fd;
  }
  .ap-suffix {
    font-size: 11px;
    color: #8b6f9b;
    margin-right: 2px;
  }
  .ap-param-na {
    width: 50px;
    text-align: center;
    color: #c4b5fd;
    font-size: 14px;
  }
  .ap-arrow {
    color: #8b6f9b;
    font-weight: 700;
  }
  .ap-btn-icon {
    width: 26px;
    height: 26px;
    border: 1px solid #e9d5e3;
    background: #fef9ff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: #5b3d62;
    padding: 0;

  }

  .ap-btn-icon:disabled {

  .ap-btn-del {
    color: #dc2626;

  }
  .ap-btn-del:hover {
    background: #fee2e2;
    border-color: #f87171;
  }
  .ap-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;

  .ap-add { background: linear-gradient(135deg, #c4b5fd, #a78bfa); box-shadow: 0 4px 0 #8b5cf6; color: #fff; }
  .ap-reset { background: #fef3c7; color: #92400e; box-shadow: 0 3px 0 #d97706; }

  /* 探險分支選項 */

    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;

  .forage-choice {
    background: #fff;
    border: 2px solid #c4b5fd;
    border-radius: 12px;

    box-shadow: 0 3px 0 #a78bfa;

    font-family: inherit;
  }
  .forage-choice:hover:not(:disabled) {
    background: #f3e8ff;
    transform: translateY(-1px);
  }
  .forage-choice:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    background: #f3f4f6;
    border-color: #d1d5db;
    box-shadow: 0 3px 0 #9ca3af;
  }
  .forage-choice .fc-text {
    font-size: 14px;
    font-weight: 700;
    color: #5b3d62;
    line-height: 1.5;
  }
  .forage-choice .fc-cost {
    font-size: 11px;
    color: #d97706;
    margin-top: 4px;
    font-weight: 600;
  }

  /* 試煉戰場（多怪戰鬥） */
  .trial-arena {
    background: linear-gradient(135deg, #f3e8ff, #e9d5ff);
    border: 2px solid #a78bfa;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 1fr auto 2fr;
    gap: 8px;
    align-items: center;
  }
  .trial-arena .t-player, .trial-arena .t-monster {
    background: rgba(255, 255, 255, 0.7);
    border-radius: 10px;
    padding: 6px;
    text-align: center;
  }
  .trial-arena .t-monster { font-size: 11px; }
  .trial-arena .t-monsters {
    display: grid;
    grid-template-columns: 1fr;

<body>
<div class="container">
  <div class="top-bar">
    <a href="index.html" class="back-link">← 戰績小本本</a>
    <span class="sync-badge" id="syncBadge">⏳ 連線中…</span>
  </div>
  <h1 style="text-align:center;">⚔️ 冒險島 🗡</h1>
  <div style="text-align:center; font-size:12px; color:#8b6f9b; margin-bottom:14px;">
    每 30 分鐘可打一次怪 · 升級 · 收集裝備 · 共用鵝鵝幣
  </div>

  <!-- Stage A: 沒選身份 -->
  <div id="stageNoMe" class="card hidden">
    <div style="text-align:center; padding:14px 0;">
      <div style="font-size:48px; margin-bottom:8px;">🪞</div>
      <p style="font-size:13px; color:#8b6f9b; margin-bottom:14px;">先到首頁選身份才能冒險 ♡</p>
      <a href="index.html" class="btn btn-primary" style="display:inline-block; text-decoration:none; padding:12px 24px;">回首頁</a>
    </div>
  </div>

  <!-- Stage B: 沒選職業 -->
  <div id="stageClassPick" class="card hidden">
    <h2><span>🎭 選擇你的職業</span></h2>
    <div style="font-size:12px; color:#8b6f9b; margin-bottom:10px;">⚠️ 一旦選定無法更換</div>
    <div class="class-grid" id="classGrid"></div>
  </div>

  <!-- Stage C: 主畫面 -->
  <div id="stageGame" class="hidden">
    <div class="char-with-menu">
      <div class="char-quick-menu" id="charQuickMenu"></div>
      <div class="card char-card" id="charCard"></div>
    </div>

    <div class="card">
      <h2><span>⚔️ 行動</span></h2>
      <div id="zoneSelector"></div>
      <button id="fightBtn" class="btn btn-primary" onclick="onFight()">⚔️ 出發打怪</button>
      <div class="cooldown-info" id="cooldownInfo"></div>
      <div id="fightResult"></div>
      <div id="forageHistoryArea"></div>
    </div>

    <div class="card">
      <h2><span>🌍 世界王挑戰</span> <span style="font-size:11px; color:#8b6f9b; font-weight:500;">（共享 BOSS、所有人合力擊殺）</span></h2>
      <div id="worldBossBody"></div>
    </div>

    <div class="card">
      <h2><span>🍳 個人 BOSS</span> <span style="font-size:11px; color:#8b6f9b; font-weight:500;">（每 5 分挑戰 1 次、每場結束王回 5% HP）</span></h2>
      <div id="personalBossBody"></div>
      <div id="personalBossResult"></div>
      <div id="personalBossHistoryArea"></div>
    </div>

    <div class="card">
      <h2><span>🌌 試煉戰場</span> <span style="font-size:11px; color:#8b6f9b; font-weight:500;">（最多 3 隻怪物同時上場、AOE / 多目標技能）</span></h2>
      <div id="trialIntro"></div>
      <button id="trialEnterBtn" class="btn btn-primary" onclick="onTrialFight()" style="background:linear-gradient(135deg,#c4b5fd,#7c3aed); box-shadow:0 4px 0 #5b21b6;">🌌 進入試煉</button>
      <div id="trialResult"></div>

  // ⭐ 怪物能力 → 等級的縮放係數（HOF 風格層級制）
  // ATK/SPD 用基本曲線：每進一層 ×1.30，每等 +2.5%
  //   Lv 1=1.00 / Lv 5=1.10 / Lv 6=1.30 / Lv 10=1.43 / Lv 11=1.69 / Lv 16=2.20 / Lv 20=2.42
  // HP 是更陡峭的層級曲線（user spec：上 80-200 / 中 150-350 / 下 300-500 / 深 500-800）
  //   layerHP = [1.0, 2.0, 3.3, 5.0]，每等 +2.5%
  // DEF 用較緩的曲線（user spec：6-10 +30-50% / 11-15 +50-80% / 16-20 +80-120%）
  //   layerDEF = [1.0, 1.40, 1.65, 2.00]，每等 +1.5%
  // ⭐ ATK 倍率（再次上調：玩家反映中層怪攻擊偏弱）
  //   layerATK = [1.0, 1.70, 2.25, 2.95]，階內每等 +3%
  //   Lv 5  → 1.12（tier 1 末略升）
  //   Lv 10 → 1.70 × 1.12 = 1.90（舊 1.62，+17%）
  //   Lv 15 → 2.25 × 1.12 = 2.52（舊 2.18，+16%）
  //   Lv 20 → 2.95 × 1.12 = 3.30（舊 2.86，+15%）
  function monsterK(lv) {
    const lvSafe = Math.max(1, lv);
    const layer = Math.min(3, Math.floor((lvSafe - 1) / 5));
    const layerATK = [1.0, 1.70, 2.25, 2.95];
    const offsetInLayer = (lvSafe - 1) % 5;
    return layerATK[layer] * (1 + offsetInLayer * 0.03);
  }
  function monsterHPK(lv) {
    const lvSafe = Math.max(1, lv);
    const layer = Math.min(3, Math.floor((lvSafe - 1) / 5));
    // ⭐ HP 系數再次上調（中層仍偏脆，這次再 +12-15%）
    //   layer 0 (Lv 1-5)   不動 → 1.0
    //   layer 1 (Lv 6-10)  2.3 → 2.65 (+15%)
    //   layer 2 (Lv 11-15) 3.8 → 4.4  (+16%)
    //   layer 3 (Lv 16-20) 5.8 → 6.6  (+14%)
    const layerHP = [1.0, 2.65, 4.4, 6.6];
    const offsetInLayer = (lvSafe - 1) % 5;
    return layerHP[layer] * (1 + offsetInLayer * 0.025);
  }
  function monsterDEFK(lv) {
    const lvSafe = Math.max(1, lv);
    const layer = Math.min(3, Math.floor((lvSafe - 1) / 5));
    // ⭐ 中層起 DEF 系數小幅上調（配合 HP 增厚，整體耐打度提升）
    //   layer 0 (Lv 1-5)   不動 → 1.0
    //   layer 1 (Lv 6-10)  1.40 → 1.55 (+11%)
    //   layer 2 (Lv 11-15) 1.65 → 1.85 (+12%)
    //   layer 3 (Lv 16-20) 2.00 → 2.25 (+12%)
    const layerDEF = [1.0, 1.55, 1.85, 2.25];
    const offsetInLayer = (lvSafe - 1) % 5;
    return layerDEF[layer] * (1 + offsetInLayer * 0.015);
  }
  // 鵝鵝幣掉落：依層級（不再看怪物 goldBase）
  // 上層 ~30 / 中層 ~60 / 下層 ~90 / 深層 ~130，± 約 15% 浮動
  function coinDropByLevel(lv) {
    const layer = Math.min(3, Math.floor((Math.max(1, lv) - 1) / 5));
    const base = [30, 60, 90, 130][layer];
    return Math.round(base * (0.9 + Math.random() * 0.2));
  }
  // 在某層內隨機抽一個怪物等級
  function pickLayerLevel(layerId) {
    const layer = ZONE_LAYERS.find(l => l.id === layerId) || ZONE_LAYERS[0];
    const range = layer.maxLv - layer.minLv + 1;
    return layer.minLv + Math.floor(Math.random() * range);
  }
  // 給「樓層中位數」用（顯示掉落等級時用，呈現「大致等級」）
  function layerMidLevel(layerId) {
    const layer = ZONE_LAYERS.find(l => l.id === layerId) || ZONE_LAYERS[0];
    return Math.round((layer.minLv + layer.maxLv) / 2);
  }
  // 舊 API 相容（若有舊 call site 仍呼叫 layerFloorToLevel 也能 work）
  function layerFloorToLevel(layerId) { return pickLayerLevel(layerId); }

  // === 世界王 v9 （舊 v8 WORLD_BOSSES / WORLD_BOSS_DISABLED 已於 commit 7 移除） ===

  // ----------------

  const WB9_BOSSES = [

  // ⭐ Phase B：雲端 state 改用 rooms/{ROOM_ID}/wb9/{bossId}（每王一份獨立 doc）
  window.__wb9BossIds = WB9_BOSSES.map(b => b.id);

  // 取得 / 初始化單一 boss 的 state
  function wb9GetState(bossId) {
    if (!wb9 || typeof wb9 !== 'object') wb9 = {};
    const def = WB9_BOSSES.find(b => b.id === bossId);
    if (!def) return null;

  // ⭐ commit 2：加入 / 退出排隊（雲端 TX）
  async function wb9JoinQueue(bossId) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me); if (!r.class) return;
    const boss = WB9_BOSSES.find(b => b.id === bossId);
    if (!boss) return;
    if (r.hp <= 0) { showToast('💀 HP 太低，先回滿再來'); return; }
    // 全域 5 分冷卻
    const cdRemain = (r.lastBossAttackTime || 0) + WB9_COOLDOWN_MS - Date.now();
    if (cdRemain > 0) {
      const m = Math.floor(cdRemain / 60000);
      const s = Math.ceil((cdRemain % 60000) / 1000);
      showToast(`⏳ 冷卻中，${m}:${String(s).padStart(2,'0')} 後可加入`);
      return;
    }
    if (!window.__firebaseSync || !window.__firebaseSync.wb9JoinQueue) {
      showToast('☁️ 雲端尚未連線，稍後再試'); return;
    }
    try {
      const out = await window.__firebaseSync.wb9JoinQueue(bossId, me.id, boss);
      // 更新本地 wb9 並重畫
      wb9[bossId] = out.state;
      forageTrace?.('wb9 join', { bossId, position: out.position });
      showToast(`📋 已加入 ${boss.name} 排隊（第 ${out.position} 位）`);
      wb9Render({ force: true });
    } catch (e) {
      const msg = String(e?.message || e);
      if (msg.startsWith('already-queued:')) {
        const otherBossId = msg.slice('already-queued:'.length);
        const otherBoss = WB9_BOSSES.find(b => b.id === otherBossId);
        showToast(`已在 ${otherBoss?.name || '其他王'} 排隊中，先取消才能加入`);
      } else {
        console.warn('wb9JoinQueue failed:', e);
        showToast('☁️ 加入排隊失敗');
      }
    }
  }

    try {

      // 樂觀更新本地（雲端 snapshot 也會回送）
      const state = wb9[bossId];
      if (state && Array.isArray(state.queue)) {
        state.queue = state.queue.filter(x => x && x.pid !== me.id);
      }
      forageTrace?.('wb9 leave', { bossId, queueLen: out?.queueLen });
      showToast('已退出排隊');
      wb9Render({ force: true });
    } catch (e) {

  // ⭐ commit 3：攻擊世界王（輪到自己時才能呼叫）
  async function wb9Attack(bossId) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me); if (!r.class) return;
    const boss = WB9_BOSSES.find(b => b.id === bossId);
    if (!boss) return;
    if (!window.__firebaseSync?.wb9AttackTx) { showToast('☁️ 雲端尚未連線'); return; }

    const state = wb9GetState(bossId);
    const queue = state.queue || [];
    // 本地快速預檢（TX 還是會二次驗證）
    if (!queue.length || queue[0].pid !== me.id) {
      showToast('⏳ 還沒輪到你'); wb9Render({ force: true }); return;
    }

    // 建立怪物物件給 autoFight 用
    const cls   = CLASSES[r.class];
    const stats = computeStats(me);
    const monster = {
      id: boss.id, tier: 99,
      name: boss.name, icon: boss.icon, level: boss.level,
      hp: state.hp, maxHp: boss.maxHp,
      atk: boss.atk, def: boss.def, spd: boss.spd,
      defPen: boss.defPen,
      verb: boss.verb,
      ability: boss.ability,
      skills: boss.skills || [],
      goldDrop: 0, xpDrop: 0,
    };

    const result  = autoFight(me, monster);
    const dmgRaw  = Math.round(Math.max(0, state.hp - result.mHpFinal) * 1.3); // ⭐ 世界王傷害 × 1.3

    // 戰鬥快照（給 recentBattles）
    const snap_ = {
      id: 'br9_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      ts: Date.now(),
      bossId:  boss.id, bossName: boss.name, bossIcon: boss.icon, bossLevel: boss.level,
      attackerId: me.id, attackerName: me.name,
      attackerAvatar: me.avatar || cls?.icon || '🎴',
      playerSnap: { name: me.name, avatar: cls?.icon || '🎴', level: r.level, maxHp: stats.maxHp, maxMp: stats.maxMp },
      monsterSnap: { name: monster.name, icon: monster.icon, level: monster.level, ability: monster.ability },
      log: (result.log || []).slice(0, 80),
    };

    // 送 TX
    let txOut;
    try {
      txOut = await window.__firebaseSync.wb9AttackTx(
        bossId, me.id, dmgRaw,
        { maxHp: boss.maxHp, staleMs: WB9_QUEUE_STALE_MS },
        snap_
      );
    } catch (e) {
      const msg = String(e?.message || e);
      const code = e?.code || '';
      if (code === 'resource-exhausted' || msg.includes('429')) {
        showToast('☁️ Firestore 配額用完，明天 UTC 0 點重置');
      } else if (msg.includes('not-your-turn') || msg.includes('not-in-queue')) {
        showToast('⏳ 還沒輪到你，已刷新'); wb9Render({ force: true });
      } else if (msg.includes('boss-not-found')) {
        showToast('🦢 王資料異常，請重新加入排隊');
      } else {
        showToast('☁️ 攻擊失敗：' + (code || msg.slice(0, 40)));
      }
      console.warn('wb9Attack TX failed:', e);
      return;
    }

    const { actualDmg, killed, newState } = txOut;
    // 全域 5 分冷卻
    r.lastBossAttackTime = Date.now();
    // 同步本地 wb9
    wb9[bossId] = newState;

    // 獎勵（測試中全關）
    let xpGain = 0, coinGain = 0;
    if (!WB9_TESTING_NO_REWARDS) {
      xpGain   = Math.min(WB9_MAX_XP_PER_FIGHT, Math.round(actualDmg * 0.8));
      coinGain = Math.round(actualDmg * 0.1);
      if (xpGain > 0) {
        r.xp = (r.xp || 0) + xpGain;
        let leveled = 0;
        while (r.xp >= xpForLevel(r.level)) {
          r.xp -= xpForLevel(r.level); r.level += 1;
          r.skillPoints  = (r.skillPoints  || 0) + POINTS_PER_LEVEL.skill;
          r.abilityPoints= (r.abilityPoints|| 0) + POINTS_PER_LEVEL.ability;
          leveled++;
        }
        if (leveled) { const s = computeStats(me); r.hp = s.maxHp; r.mp = s.maxMp; }
      }
      if (coinGain > 0) refundCoins(me.id, coinGain);
    }

    // HP / MP 處理（每次打王都是全力出擊，輸掉 HP 歸 0）
    const _s = computeStats(me);
    if (result.pHpFinal <= 0 && !killed) {
      // ⭐ 死亡即時恢復 50%
      r.hp = Math.max(1, Math.floor(_s.maxHp * REST_HP_RATIO)); r.deathAt = null;
    } else {
      r.hp = _s.maxHp; r.deathAt = null;
    }
    r.mp = _s.maxMp;

    saveData();
    renderCharCard();
    updateStaminaUI();
    wb9Render({ force: true });

    // 顯示本場結果
    wb9ShowFightResult({ boss, dmgDealt: actualDmg, killed, xpGain, coinGain,
      won: result.pHpFinal > 0, log: result.log });
  }
  window.wb9Attack = wb9Attack;

  // 本場戰鬥結果（顯示在 #fightResult）
  function wb9ShowFightResult({ boss, dmgDealt, killed, xpGain, coinGain, won, log }) {

      : `<div style="font-size:12px; text-align:center;">+${xpGain.toLocaleString()} XP　·　+${coinGain.toLocaleString()} 鵝鵝幣</div>`;
    fr.innerHTML = `
      <div class="card" style="border-color:#f59e0b; margin-top:10px;">
        <h2>⚔️ ${boss.name} — 攻擊結果</h2>

        <button class="btn btn-secondary" onclick="this.parentElement.remove()" style="margin-top:8px; width:100%;">關閉</button>
      </div>
    `;
    fr.scrollIntoView({ behavior: 'smooth', block: 'center' });

  // ⭐ 結構性雜湊：HP / 排隊頭 pid / 排隊長度 / killCount / cd 開關
  //    雜湊沒變 → 跳過 innerHTML，只 patch 倒數文字（避免閃爍）
  let __wb9LastHash = '';
  function __wb9Hash() {
    const me = getMe();
    const r = me ? getRpg(me) : null;
    const onCd = r ? ((Date.now() - (r.lastBossAttackTime || 0)) < WB9_COOLDOWN_MS) : false;
    const parts = [`me:${me?.id || ''}`, `cd:${onCd ? '1' : '0'}`];
    for (const boss of WB9_BOSSES) {
      const s = wb9 && wb9[boss.id];
      const head = s && s.queue && s.queue[0];
      parts.push([
        boss.id,
        s ? s.hp : boss.maxHp,
        s ? (s.queue || []).length : 0,
        head ? head.pid : '',
        head ? head.joinedAt : 0,
        s ? s.killCount : 0,
        s?.lastKill?.ts || 0,
        s ? (s.recentBattles || []).length : 0,
        s ? Object.keys(s.damageLog || {}).length : 0,
      ].join('|'));
    }
    return parts.join(';');
  }

  function __wb9UpdateLiveTimers() {
    const now = Date.now();
    const me = getMe();
    const r = me ? getRpg(me) : null;
    const cdRemain = r ? Math.max(0, (r.lastBossAttackTime || 0) + WB9_COOLDOWN_MS - now) : 0;
    document.querySelectorAll('[data-wb9-cd-text]').forEach(el => {
      if (cdRemain > 0) {
        const m = Math.floor(cdRemain / 60000);
        const s = Math.ceil((cdRemain % 60000) / 1000);
        el.textContent = `⏳ 冷卻 ${m}:${String(s).padStart(2,'0')}`;
      }
    });
    // 排隊頭過期顯示
    document.querySelectorAll('[data-wb9-head-stale]').forEach(el => {
      const at = Number(el.getAttribute('data-head-joined-at')) || 0;
      const remain = Math.max(0, WB9_QUEUE_STALE_MS - (now - at));
      const sec = Math.ceil(remain / 1000);
      el.textContent = remain > 0 ? `🔥 還有 ${sec}s 動作` : '⚠️ 過期，下個攻擊會自動踢';
    });
  }

  // commit 2：基本顯示 + 加入 / 退出排隊 + 差異渲染
  function wb9Render(opts) {
    const force = opts && opts.force;
    const hash = __wb9Hash();
    if (!force && hash === __wb9LastHash) {
      __wb9UpdateLiveTimers();
      return;
    }
    __wb9LastHash = hash;
    const me = getMe();
    const r = me ? getRpg(me) : null;
    const cdRemain = r ? Math.max(0, (r.lastBossAttackTime || 0) + WB9_COOLDOWN_MS - Date.now()) : 0;
    const onCd = cdRemain > 0;
    // 我目前在哪個王排隊
    let myQueuedBossId = null;
    if (me) {
      for (const boss of WB9_BOSSES) {
        const q = (wb9?.[boss.id]?.queue) || [];
        if (q.find(x => x && x.pid === me.id)) { myQueuedBossId = boss.id; break; }
      }
    }
    return wb9RenderImpl(me, r, cdRemain, onCd, myQueuedBossId);
  }

  function wb9KillBannerHtml(state) {

  // ⭐ commit 5：傷害排行（本輪 damageLog）
  function wb9DamageLeaderboardHtml(state) {
    const log = state && state.damageLog;
    if (!log || !Object.keys(log).length) return '';
    const sorted = Object.entries(log)
      .map(([pid, dmg]) => ({ pid, dmg: Number(dmg) || 0 }))
      .sort((a, b) => b.dmg - a.dmg)
      .slice(0, 4);
    const total = sorted.reduce((s, x) => s + x.dmg, 0);
    const rows = sorted.map((x, i) => {
      const p = getPlayer(x.pid);
      const name = p ? (p.avatar || '🎴') + ' ' + escapeHtml(p.name) : '?';
      const pct  = total > 0 ? Math.round(x.dmg / total * 100) : 0;
      return `
        <div class="bl-row">
          <span class="bl-rank">${i + 1}</span>
          <span class="bl-name">${name}</span>
          <span class="bl-dmg">${x.dmg.toLocaleString()} (${pct}%)</span>
        </div>`;
    }).join('');
    return `
      <div class="boss-leaderboard" style="margin-top:8px;">
        <div class="bl-title">💢 本輪傷害</div>
        ${rows}
      </div>`;
  }

      const head = queue[0];
      const myPos = me ? queue.findIndex(x => x && x.pid === me.id) : -1;

      }
      const killBanner        = wb9KillBannerHtml(state);

      // HP bar 顏色：高 HP 綠 → 中間橙 → 低 HP 紅
      const hpBarColor = hpPct > 60
        ? 'linear-gradient(90deg,#22c55e,#16a34a)'

          </div>
          ${leaderboardHtml}
          ${queueListHtml}

    }).join('');
    el.innerHTML = `
      <div style="font-size:11px; color:#92400e; padding:8px 10px; background:linear-gradient(135deg,#fef3c7,#fde68a); border:2px dashed #f59e0b; border-radius:10px; margin-bottom:10px; text-align:center;">

  // === 精魂（王掉落）===
  // 每隻王有自己的精魂，固定基礎屬性 + 2 條隨機詞條
  // 玩家最多裝 5 個精魂（rpg.spirits[5]），未裝的放 rpg.spiritBag
  const SPIRIT_AFFIX_COUNT = 2;
  // 5 隻王 → 5 種精魂特性，讓玩家配塔
  // 早餐 = 速 / 午餐 = 防 / 晚餐 = 暴 / 鵝皇 = 攻 / 古龍 = 全能爆
  const SPIRIT_DEFS = [
    { id: 'sp_breakfast', sourceBossId: 'breakfast_goose', name: '早餐鵝精魂',  icon: '🍳', color: '#fbbf24',
      theme: '迅捷（速度+暴擊率）',
      base: { spd: 5, critChance: 0.04, atk: 2 } },
    { id: 'sp_lunch',     sourceBossId: 'lunch_goose',     name: '午餐鵝精魂',  icon: '🍱', color: '#f59e0b',
      theme: '扎實（生存+防禦）',
      base: { hp: 60, def: 5 } },
    { id: 'sp_dinner',    sourceBossId: 'dinner_goose',    name: '晚餐鵝精魂',  icon: '🍷', color: '#dc2626',
      theme: '華麗（暴擊+爆傷）',
      base: { critChance: 0.05, critDmg: 0.12, atk: 3 } },
    // 世界王精魂（傳說級）
    { id: 'sp_goose_king',  sourceBossId: 'goose_king',  name: '鵝皇精魂',   icon: '🦢', color: '#fde047',
      theme: '霸氣（純輸出）',
      base: { atk: 12, hp: 50 } },
    { id: 'sp_dragon_goose',sourceBossId: 'dragon_goose',name: '古龍鵝精魂', icon: '🐉', color: '#a855f7',
      theme: '龍威（全能+爆傷）',
      base: { atk: 8, def: 4, hp: 60, critDmg: 0.18 } },
    { id: 'sp_pebble_goose', sourceBossId: 'pebble_goose', name: '鵝卵石精魂', icon: '🪨', color: '#78716c',
      theme: '不朽（極厚生存）',
      base: { hp: 150, def: 10 } },
  ];
  const SPIRIT_BY_BOSS = Object.fromEntries(SPIRIT_DEFS.map(s => [s.sourceBossId, s]));

  // 由王 ID 抽出一隻精魂實體（隨機 2 詞條）
  function generateSpirit(sourceBossId) {
    const def = SPIRIT_BY_BOSS[sourceBossId];
    if (!def) return null;
    const inst = {
      id: 'spirit_' + sourceBossId + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5),
      defId: def.id,
      sourceBossId,
      name: def.name,
      icon: def.icon,
      color: def.color,
      theme: def.theme || '',
      // 從固定基礎屬性開始（⭐ HP 平衡：base HP × 0.7）
      hp: Math.round((def.base.hp || 0) * 0.7),
      atk: def.base.atk || 0,
      def: def.base.def || 0,
      spd: def.base.spd || 0,
      critChance: def.base.critChance || 0,
      critDmg: def.base.critDmg || 0,
      affixes: [],
    };
    // 滾 2 條隨機詞條（以王等級當「lv」算強度，這裡固定 30）
    const refLv = 30;
    for (let i = 0; i < SPIRIT_AFFIX_COUNT; i++) {
      const a = AFFIXES[Math.floor(Math.random() * AFFIXES.length)];
      let val = Math.max(1, Math.round((1 + refLv * a.perLv) * 1.0));
      // ⭐ HP 平衡：精魂 HP 詞綴值再砍 30%
      if (a.type === 'hp') val = Math.max(1, Math.round(val * 0.7));
      inst[a.type] = (inst[a.type] || 0) + val;
      inst.affixes.push({ type: a.type, name: a.name, val });
    }
    if (inst.affixes.length > 0) inst.name = `${inst.affixes[0].name}的 ${def.name}`;
    return inst;
  }
  function describeSpirit(s) {
    if (!s) return '';
    const parts = [];
    if (s.hp)  parts.push(`HP+${s.hp}`);
    if (s.atk) parts.push(`ATK+${s.atk}`);
    if (s.def) parts.push(`DEF+${s.def}`);
    if (s.spd) parts.push(`SPD+${s.spd}`);
    if (s.critChance) parts.push(`暴擊+${Math.round(s.critChance * 100)}%`);
    if (s.critDmg)    parts.push(`爆傷+${Math.round(s.critDmg * 100)}%`);
    return parts.join(' · ');
  }
  function getSpiritSlots(rpg) {
    if (!Array.isArray(rpg.spirits)) rpg.spirits = [null, null, null, null, null];
    while (rpg.spirits.length < 5) rpg.spirits.push(null);
    if (rpg.spirits.length > 5) rpg.spirits.length = 5;
    return rpg.spirits;
  }

  // 每套 5 件（helmet/armor/gloves/boots/cape），固定屬性、不帶詞綴
  // 集滿件數有疊加 bonus（在 computeStats 內被疊上）

  // === HOF Judge / Gambit 系統 ===
  // 玩家為每個職業設定一張「行動規則表」(actionPattern)：

  // 評估一條 judge 是否成立
  // ctx = { pHp, maxHp, pMp, maxMp, mHp, maxMHp, playerActions, ruleUseCount }
  function evaluateJudge(judgeId, param, ctx, ruleIdx) {
    const v = Number(param) || 0;
    switch (judgeId) {
      case 1000: return true;
      // 自身 HP / MP
      case 1100: return ctx.maxHp > 0 && (ctx.pHp / ctx.maxHp * 100) >= v;
      case 1101: return ctx.maxHp > 0 && (ctx.pHp / ctx.maxHp * 100) <= v;
      case 1150: return ctx.maxHp > 0 && (ctx.pHp / ctx.maxHp * 100) <= v; // 同 1101，作次要 HP 條件使用
      case 1200: return ctx.maxMp > 0 && (ctx.pMp / ctx.maxMp * 100) >= v;
      case 1201: return ctx.maxMp > 0 && (ctx.pMp / ctx.maxMp * 100) <= v;
      case 1205: return ctx.pMp >= v;
      // 敵方 HP（用「最低血」當主視角；最高血另判）
      case 1300: return ctx.maxMHp > 0 && (ctx.mHp / ctx.maxMHp * 100) <= v;
      case 1301: return ctx.maxMHp > 0 && (ctx.mHp / ctx.maxMHp * 100) >= v;
      case 1310: return ctx.maxMHpMax > 0 && (ctx.mHpMax / ctx.maxMHpMax * 100) <= v;
      // 敵方數量
      case 1450: return (ctx.aliveCount || 1) >= v;
      case 1451: return (ctx.aliveCount || 1) <= v;
      // 狀態
      case 1600: return !!ctx.selfPoisoned;
      case 1601: return !!ctx.selfParalyzed;
      case 1610: return !!ctx.anyEnemyPoisoned;
      case 1611: return !!ctx.anyEnemyParalyzed;
      case 1612: return !!ctx.anyEnemyBled;
      case 1620: return !!ctx.allEnemyPoisoned;
      // 行動次數 / 機率
      case 1900: return ctx.playerActions === v;
      case 1901: return ctx.playerActions >= v;
      case 1910: return v > 0 && ctx.playerActions > 0 && (ctx.playerActions % v === 0); // ⭐ 每 X 次行動觸發一次
      case 1920: return (ctx.ruleUseCount[ruleIdx] || 0) < v;
      case 1940: return Math.random() < (v / 100);
      default:   return false;
    }
  }

  // ⭐ 技能等級系統：用技能點升級，最多 10 級
  // Lv 1-5：每級 +10% 效果（前段加成快）
  // Lv 6-10：每級 +5% 效果（後段加成放緩）
  // Lv 3 強化 applyStatus（機率 / 持續 / 傷害）
  // Lv 5 額外加成：依技能特性（必爆 / 暴擊率 / 吸血 / 自癒 / MP 折扣 / buff 持續 ...）
  // Lv 10 二段加成：再給一波 lv5Kind 對應的強化
  const SKILL_MAX_LEVEL = 10;
  function getSkillEffectiveStats(skill, level) {
    const eff = { ...skill };
    // ⭐ 回魔技能統一公式（不論職業）：
    //   基底 5 MP + 5% maxMP；每級 +1 MP 固定；Lv 5 / Lv 10 各 +5% maxMP
    //   未升級 (level=0)：5 MP + 5% maxMP
    //   isMpRegenStrong（巫師 / 聖騎）：上述全 ×2 倍
    if (skill.isMpRegen) {
      const lvSafe = Math.max(0, level || 0);
      const strong = skill.isMpRegenStrong ? 2 : 1;
      eff.mpFlat = (5 + lvSafe) * strong;
      eff.mpPct = (0.05 + (lvSafe >= 5 ? 0.05 : 0) + (lvSafe >= 10 ? 0.05 : 0)) * strong;
    }
    if (!level || level <= 0) return eff;
    // 累進加成：Lv 1-5 每級 +10%，Lv 6-10 每級 +5%
    const dmgBonus = Math.min(level, 5) * 0.10 + Math.max(0, level - 5) * 0.05;
    if (skill.mult)         eff.mult     = +(skill.mult * (1 + dmgBonus)).toFixed(3);
    if (skill.flat != null) eff.flat     = Math.round(skill.flat * (1 + dmgBonus));
    if (skill.healPct)      eff.healPct  = +(skill.healPct * (1 + dmgBonus)).toFixed(3);
    // mpFlat / mpPct: 若是 isMpRegen 已用上面公式覆蓋；否則照舊縮放
    if (!skill.isMpRegen) {
      if (skill.mpPct)        eff.mpPct    = +(skill.mpPct * (1 + dmgBonus)).toFixed(3);
      if (skill.mpFlat)       eff.mpFlat   = Math.round(skill.mpFlat * (1 + dmgBonus));
    }
    if (skill.defMult)      eff.defMult  = +(skill.defMult * (1 + dmgBonus)).toFixed(3);
    if (skill.maxHpMult)    eff.maxHpMult= +(skill.maxHpMult * (1 + dmgBonus)).toFixed(3);
    // ⭐ markMult（火焰風暴 / 怒雷風暴）：每級同步按 dmgBonus 縮放
    if (skill.markMult)     eff.markMult = +(skill.markMult * (1 + dmgBonus)).toFixed(2);
    // ⭐ bonusMaxHpPct 不跟 dmgBonus 自動縮放（用 customLv 的 Lv5 / Lv10 顯式 +%）
    // ⭐ 隱身專屬：每升一級 −1 MP（max 5 級 → Lv 5 為 10 MP）
    if (skill.id === 'a_stealth') {
      eff.mpCost = Math.max(0, (skill.mpCost || 0) - Math.min(5, level));
    }
    // ⭐ 連射專屬：Lv 5 暴擊率 +20% / Lv 10 多 1 段
    if (skill.id === 'a_barrage') {
      if (level >= 5)  eff.extraCritChance = (eff.extraCritChance || 0) + 0.20;
      if (level >= 10) eff.hits = (skill.hits || 4) + 1;
    }
    // ⭐ 血祭斬專屬：Lv 10 傷害 +50%
    if (skill.id === 'w_blood_slash' && level >= 10) {
      eff.mult = (eff.mult || skill.mult || 1) * 1.50;
    }
    // ⭐ 中毒專用公式：每級 +1 charge，Lv 5 額外 +1（由 tickStatuses 每次觸發扣 3% maxHp）
    if (skill.applyStatus && skill.applyStatus.type === 'poison' && level >= 1) {
      const extraCharge = Math.min(level, 5) + (level >= 5 ? 1 : 0);
      eff.applyStatus = {
        ...skill.applyStatus,
        chance: Math.min(1, (skill.applyStatus.chance || 1) * (1 + level * 0.05)),
        charges: (skill.applyStatus.charges || 1) + extraCharge,
      };
    } else if ((skill.id === 'a_lethal_aim' || skill.id === 'p_holy_smite' || skill.id === 'm_destruction') && skill.applyStatus) {
      // 致命瞄準 / 神聖懲戒 / 毀滅之怒：易傷 hit-based，僅 Lv 10 +1 次
      eff.applyStatus = {
        ...skill.applyStatus,
        hits: (skill.applyStatus.hits || 2) + (level >= 10 ? 1 : 0),
      };
    } else if (skill.id === 'p_godfist' && skill.applyStatus) {
      // 神之拳：麻痺不隨等級縮放（固定 80%）
      eff.applyStatus = { ...skill.applyStatus };
    } else if (level >= 3 && skill.applyStatus) {
      // ⭐ charge-based：麻痺等技能每級升次數不升回合
      eff.applyStatus = {
        ...skill.applyStatus,
        chance: Math.min(1, (skill.applyStatus.chance || 1) * (1 + (level - 2) * 0.12)),
        charges: (skill.applyStatus.charges || 1) + (level >= 10 ? 3 : level >= 5 ? 2 : 1),
        dmg: Math.round((skill.applyStatus.dmg || 0) * (1 + dmgBonus)),
      };
    }
    // 自身 buff（嗜血怒嚎、神聖祝福、反傷護盾...）：每級 +量
    if (skill.selfBuff) {
      eff.selfBuff = {
        ...skill.selfBuff,
        amount: +(skill.selfBuff.amount * (1 + dmgBonus)).toFixed(3),
      };
    }
    // ⭐ Lv 5 + Lv 10 雙段加成（customLv 標記的技能跳過，由前面的特殊處理負責）
    if (!skill.customLv) {
      const applyKindBonus = (mult) => {
        const k = lv5BonusKind(skill);
        if (k === 'mark')         eff.markMult = +((eff.markMult || 0) + 1 * mult).toFixed(2); // ⭐ 法師魔攻 +1 MARK 加傷
        else if (k === 'lifesteal')    eff.lifesteal  = +((eff.lifesteal  || 0) + 0.10 * mult).toFixed(3);
        else if (k === 'heal')    eff.healCaster = +((eff.healCaster || 0) + 0.05 * mult).toFixed(3);
        else if (k === 'restore') eff.mpCostMult = (eff.mpCostMult || 1) * (1 - 0.25 * mult);
        else if (k === 'critDmg') eff.extraCritDmg = (eff.extraCritDmg || 0) + 0.25 * mult;
        else if (k === 'crit')    eff.extraCritChance = (eff.extraCritChance || 0) + 0.20 * mult;
        else if (k === 'buff' && eff.selfBuff) eff.selfBuff = { ...eff.selfBuff, turns: (eff.selfBuff.turns || 1) + Math.round(mult) };
        eff.lv5Kind = k;
      };
      if (level >= 5)  applyKindBonus(1);
      if (level >= 10) applyKindBonus(1); // 第 10 級再給一波
    }
    // ⭐ 聖光斬：customLv → Lv 5 / Lv 10 各 +10% 暴擊率
    if (skill.id === 'p_holy_slash') {
      if (level >= 5)  eff.extraCritChance = (eff.extraCritChance || 0) + 0.10;
      if (level >= 10) eff.extraCritChance = (eff.extraCritChance || 0) + 0.10;
    }
    // ⭐ 神聖懲戒：customLv → Lv 5 +5% maxHp 傷害 / Lv 10 易傷 +1 次（由 applyStatus 特殊處理）
    if (skill.id === 'p_holy_smite') {
      if (level >= 5) eff.bonusMaxHpPct = (eff.bonusMaxHpPct || 0) + 0.05;
      // Lv 10：易傷 +1 次（已在 applyStatus 特殊處理）
    }
    // ⭐ 嗜血爆裂：customLv → Lv 10 +5% 吸血
    if (skill.id === 'w_blood_burst') {
      if (level >= 10) eff.lifesteal = +((eff.lifesteal || 0) + 0.05).toFixed(3);
    }
    // ⭐ 神之矢：customLv → Lv 5 / Lv 10 各 +20% 爆擊傷害（本招）
    if (skill.id === 'a_god_arrow') {
      if (level >= 5)  eff.extraCritDmg = (eff.extraCritDmg || 0) + 0.20;
      if (level >= 10) eff.extraCritDmg = (eff.extraCritDmg || 0) + 0.20;
    }
    // ⭐ 毀滅之怒（customLv）：Lv 5 / Lv 10 各 +1 MARK 加傷
    if (skill.id === 'm_destruction') {
      if (level >= 5)  eff.markMult = (eff.markMult || 0) + 1;
      if (level >= 10) eff.markMult = (eff.markMult || 0) + 1;
    }
    return eff;
  }
  // 判斷某技能 Lv 5 應該拿什麼樣的加成
  function lv5BonusKind(skill) {
    if (skill.useMark || skill.markMult) return 'mark';  // ⭐ 法師魔攻技：Lv5/10 各 +1 MARK 加傷
    if (skill.selfBuff)         return 'buff';
    if (skill.applyStatus)      return 'status';
    if (skill.lifesteal)        return 'lifesteal';
    if (skill.healCaster)       return 'heal';
    if (skill.type === 'heal')  return 'restore';
    if (skill.alwaysCrit)       return 'critDmg';
    return 'crit';
  }
  function describeLv5Bonus(skill) {
    switch (lv5BonusKind(skill)) {
      case 'mark':      return '🌀 MARK 加傷 +1（本招）';
      case 'buff':      return '✨ 持續 +1 回合';
      case 'status':    return `${statusEmoji(skill.applyStatus.type)} ${statusLabel(skill.applyStatus.type)} +1 次`;
      case 'lifesteal': return '🩸 吸血 +10%';
      case 'heal':      return '💚 自癒 +5% maxHP';
      case 'restore':   return '💙 MP 消耗 -25%';
      case 'critDmg':   return '💥 暴擊傷害 +25%（本招）';
      case 'crit':      return '🎯 暴擊率 +20%（本招）';
      default:          return '✨ 額外加成';
    }
  }
  // ⭐ 詠唱硬值（HOF 風格）：施放後 pGauge 多扣 cast 值，重技能下次動作會更慢
  // 預設：buff / heal 5、傷害技按冷卻計（cd 3→12 / 5→36 / 7→60 / 8→72）
  // skill.cast 可顯式設定蓋過預設
  function getEffectiveCast(skill) {
    if (!skill) return 0; // 普攻沒有額外硬值
    if (skill.cast != null) return Math.max(0, skill.cast);
    if (skill.type === 'buff') return 5;
    if (skill.type === 'heal') return 10;
    const cd = skill.cooldown || 3;
    return Math.min(80, Math.max(10, (cd - 2) * 12));
  }
  // 描述某一級會帶來的好處（給 UI 用）
  function describeSkillLevelEffect(skill, level) {
    // ⭐ 回魔技專用顯示：MP +1 / 級，Lv 5 / 10 各額外 +5% maxMP
    if (skill.isMpRegen) {
      const mp = 5 + level;
      const pct = 5 + (level >= 5 ? 5 : 0) + (level >= 10 ? 5 : 0);
      const parts = [`回 ${mp} MP + ${pct}% maxMP`];
      if (level === 5)  parts.push('🌟 額外 +5% maxMP');
      if (level === 10) parts.push('🌟 再額外 +5% maxMP');
      return parts.join('、');
    }
    // ⭐ 中毒技：每級 +1 次，Lv 5 額外再 +1
    if (skill.applyStatus && skill.applyStatus.type === 'poison') {
      const baseCharges = skill.applyStatus.charges || 3;
      const charges = baseCharges + Math.min(level, 5) + (level >= 5 ? 1 : 0);
      const parts = [`☠️ 中毒 ${charges} 次（一般怪 3% maxHP / 王 0.5% maxHP，無上限）`];
      if (level === 5) parts.push('🌟 中毒次數再 +1');
      return parts.join('、');
    }
    // ⭐ 血祭斬：Lv 10 傷害 +50%
    if (skill.id === 'w_blood_slash') {
      const totalPct = Math.round((Math.min(level, 5) * 10 + Math.max(0, level - 5) * 5));
      const parts = [`效果 +${totalPct}%`];
      if (level === 5)  parts.push('🎯 暴擊率 +20%（本招）');
      if (level === 10) parts.push('🌟 傷害 ×1.5（額外 +50%）');
      return parts.join('、');
    }
    const totalPct = Math.round((Math.min(level, 5) * 10 + Math.max(0, level - 5) * 5));
    const parts = [`效果 +${totalPct}%`];
    if (level === 3 && skill.applyStatus) parts.push(`${statusEmoji(skill.applyStatus.type)} ${statusLabel(skill.applyStatus.type)} 機率/次數 +`);
    // ⭐ customLv 技能：用各自的 Lv 5 / 10 描述（不走預設 lv5BonusKind）
    if (skill.customLv) {
      if (skill.id === 'p_holy_slash') {
        if (level === 5)  parts.push('🎯 暴擊率 +10%（本招）');
        if (level === 10) parts.push('🌟 暴擊率 再 +10%（本招，共 +20%）');
      } else if (skill.id === 'p_holy_smite') {
        if (level === 5)  parts.push('🩸 maxHp 加傷 +5%（本招，共 15%）');
        if (level === 10) parts.push('🎯 易傷 +1 次（共 3 次）');
      } else if (skill.id === 'a_god_arrow') {
        if (level === 5)  parts.push('💥 爆擊傷害 +20%（本招）');
        if (level === 10) parts.push('🌟 爆擊傷害 再 +20%（本招，共 +40%）');
      } else if (skill.id === 'a_lethal_aim') {
        if (level === 10) parts.push('🎯 易傷 +1 次（共 3 次）');
      } else if (skill.id === 'm_destruction') {
        if (level === 5)  parts.push('🌀 MARK 加傷 +1（本招）');
        if (level === 10) parts.push('🌀 MARK 加傷 再 +1（共 +2）　🎯 易傷 +1 次（共 4 次）');
      }
    } else {
      if (level === 5)  parts.push(describeLv5Bonus(skill));
      if (level === 10) parts.push('🌟 ' + describeLv5Bonus(skill) + '（再強化）');
    }
    return parts.join('、');
  }

  function describeAbility(ab) {
    if (!ab) return '';
    if (ab.type === 'multiHit')     return `⚔️ ${ab.hits} 段攻擊`;
    if (ab.type === 'steal')        return `💰 偷 ${ab.min}-${ab.max} 鵝鵝幣`;
    if (ab.type === 'magicResist')  return `🔮 法抗 ${Math.round(ab.resist*100)}%`;
    if (ab.type === 'physResist')   return `🛡 物抗 ${Math.round(ab.resist*100)}%`;
    if (ab.type === 'cameo')        return `🍵 神秘事件`;
    return '';
  }

  // ============================================================
  // ⭐ Phase A：玩家 inventory / bossCoins atomic API
  // ============================================================
  // 設計：先樂觀更新本地（玩家立刻看到效果）→ 再丟雲端 atomic tx
  //   - 雲端 tx 會「讀遠端最新版 → 加 / 減 → 寫回」，保證不被別人蓋掉
  //   - 本地若跟雲端不一致，下個 onSnapshot 會把 cloud 同步回來（lastTouchedAt 比較）

  // 加道具到玩家背包（atomic）— 取代 rpg.inventory.push + saveData
  async function addInventoryItem(pid, item) {
    const player = getPlayer(pid);
    if (player && player.rpg) {
      player.rpg.inventory = Array.isArray(player.rpg.inventory) ? player.rpg.inventory : [];
      player.rpg.inventory.push(item);
      player.lastTouchedAt = Date.now();
      __persistLocalSnapshot();
    }
    if (window.__firebaseSync && window.__firebaseSync.addInventoryItemTx) {
      try {
        await window.__firebaseSync.addInventoryItemTx(pid, item);
        forageTrace?.('inventory tx add', { pid, itemId: item?.id, baseId: item?.baseId });
      } catch (e) {
        console.warn('addInventoryItemTx failed:', e);
      }
    }
  }

  // 從背包移除道具（atomic）
  async function removeInventoryItem(pid, predicate) {
    const player = getPlayer(pid);
    if (player && player.rpg && Array.isArray(player.rpg.inventory)) {
      if (predicate.id != null) {
        player.rpg.inventory = player.rpg.inventory.filter(it => {
          if (typeof it === 'string') return it !== predicate.id;
          return it && it.id !== predicate.id;
        });
      } else if (predicate.idx != null) {
        player.rpg.inventory.splice(predicate.idx, 1);
      }
      player.lastTouchedAt = Date.now();
      __persistLocalSnapshot();
    }
    if (window.__firebaseSync && window.__firebaseSync.removeInventoryItemTx) {
      try {
        await window.__firebaseSync.removeInventoryItemTx(pid, predicate);
        forageTrace?.('inventory tx remove', { pid, predicate });
      } catch (e) {
        console.warn('removeInventoryItemTx failed:', e);
      }
    }
  }

  // 王硬幣加數量（用 Firestore increment，純 atomic，不重寫整份玩家檔）
  async function addBossCoin(pid, coinId, qty) {
    const player = getPlayer(pid);
    if (player) {
      player.rpg = player.rpg || {};
      player.rpg.bossCoins = player.rpg.bossCoins || {};
      player.rpg.bossCoins[coinId] = (player.rpg.bossCoins[coinId] || 0) + qty;
      player.lastTouchedAt = Date.now();
      __persistLocalSnapshot();
    }
    if (window.__firebaseSync && window.__firebaseSync.addBossCoinTx) {
      try {
        await window.__firebaseSync.addBossCoinTx(pid, coinId, qty);
        forageTrace?.('bossCoin tx add', { pid, coinId, qty });
      } catch (e) {
        console.warn('addBossCoinTx failed:', e);
      }
    }
  }

  // 消耗 N 顆王硬幣（任意組合，按 qty 大優先扣）
  async function consumeBossCoinsAtomic(pid, totalQty) {
    if (!window.__firebaseSync || !window.__firebaseSync.consumeBossCoinsTx) {
      throw new Error('cloud-not-ready');
    }
    // 雲端先扣（如果不夠會 throw）
    await window.__firebaseSync.consumeBossCoinsTx(pid, totalQty);
    // 雲端扣完後，樂觀更新本地（讓 UI 立刻反應；下個 snapshot 會校正）
    const player = getPlayer(pid);
    if (player && player.rpg && player.rpg.bossCoins) {
      const entries = Object.entries(player.rpg.bossCoins).sort((a, b) => (b[1] || 0) - (a[1] || 0));
      let need = totalQty;
      for (const [coinId, have] of entries) {
        if (need <= 0) break;
        const take = Math.min(have, need);
        player.rpg.bossCoins[coinId] = have - take;
        need -= take;
      }
      player.lastTouchedAt = Date.now();
      __persistLocalSnapshot();
    }
  }

        try {

        } catch (e) { /* swallow */ }
        return orig(...args);

      const sorted = h.money.map((m, idx) => ({m, idx})).sort((a,b) => b.m - a.m);

      records.push({ money: myMoney, rank });

  //    Check 1：remote inventory 比 local 短 ≥2 件 AND local ≤60s 內有動過 → keep local

        window.__pendingUpdateV81.add(player.id);
      }
    }
    // ⭐ v9：世界王重寫完成公告
    if (!player.rpg.updateV9 && typeof getMeId === 'function' && player.id === getMeId()) {
      player.rpg.updateV9 = true;
      if (typeof window !== 'undefined') {
        window.__pendingUpdateV9 = window.__pendingUpdateV9 || new Set();
        window.__pendingUpdateV9.add(player.id);
      }
    }
    // ⭐ v10：探險重製 + 法師強化 + 技能全面重平衡公告
    if (!player.rpg.updateV10 && typeof getMeId === 'function' && player.id === getMeId()) {
      player.rpg.updateV10 = true;
      if (typeof window !== 'undefined') {
        window.__pendingUpdateV10 = window.__pendingUpdateV10 || new Set();
        window.__pendingUpdateV10.add(player.id);
      }
    }
    // skillPoints migration
    if (player.rpg.skillPoints == null) {
      const earned = Math.max(0, (player.rpg.level || 1) - 1) * POINTS_PER_LEVEL.skill;
      const usedTree = Object.values(player.rpg.skills).reduce((a, b) => a + (b || 0), 0);
      const usedLv   = Object.values(player.rpg.skillLevels || {}).reduce((a, b) => a + (b || 0), 0);
      player.rpg.skillPoints = Math.max(0, earned - usedTree - usedLv);
    }
    // abilityPoints migration
    if (player.rpg.abilityPoints == null) {
      const earned = 5 + Math.max(0, (player.rpg.level || 1) - 1) * POINTS_PER_LEVEL.ability;
      const used = Object.values(player.rpg.abilities).reduce((a, b) => a + (b || 0), 0);
      player.rpg.abilityPoints = Math.max(0, earned - used);
    }
    return player.rpg;
  }

  // 把已點的能力換算成屬性加成
  // 寶物庫帶來的永久能力加成（彙總成 { str, vit, agi, dex, int, luk }）
  function computeTreasureBonuses(rpg) {
    const out = { str: 0, vit: 0, agi: 0, dex: 0, int: 0, luk: 0,
                  hp: 0, mp: 0, atk: 0, def: 0, spd: 0, critChance: 0, critDmg: 0 };
    const owned = (rpg && rpg.treasures) || [];
    for (const tid of owned) {
      const t = TREASURES[tid];
      if (!t) continue;
      if (t.ability) out[t.ability] = (out[t.ability] || 0) + (t.value || 0);
      else if (t.stat) out[t.stat] = (out[t.stat] || 0) + (t.value || 0);
    }
    return out;
  }
  // 玩家有效的能力值（自選的 + 寶物給的）
  function getEffectiveAbilities(rpg) {
    const a = (rpg && rpg.abilities) || {};
    const t = computeTreasureBonuses(rpg);
    return {
      str: (a.str || 0) + t.str,
      vit: (a.vit || 0) + t.vit,
      agi: (a.agi || 0) + t.agi,
      dex: (a.dex || 0) + t.dex,
      int: (a.int || 0) + t.int,
      luk: (a.luk || 0) + t.luk,
    };
  }
  function computeAbilityBonuses(player) {
    const r = getRpg(player);
    const a = getEffectiveAbilities(r); // 含寶物加成
    return {
      atk: (a.str || 0),
      hp: (a.vit || 0) * 5,
      def: Math.floor((a.vit || 0) / 2),
      spd: Math.floor((a.agi || 0) / 2),
      critChance: (a.dex || 0) * 0.004 + (a.luk || 0) * 0.002,
      critDmgBonus: (a.luk || 0) * 0.01,
      mp: (a.int || 0) * 2,
      skillFlat: (a.int || 0) * 0.5,
      mark: (a.int || 0) * 1.5,
    };
  }

  // 驗證 / 補回應有的技能點 + 能力點（修補早期 XP 藥水沒給點的 bug）
  // 只補不扣：current < expected 時才補到 expected
  function validateRpgPoints(player) {
    if (!player || !player.rpg) return false;
    const r = player.rpg;
    if (!r.class) return false;
    let corrected = false;

    // ⭐ 清掉被移除的技能樹節點（例：w_s0/w_s1/w_s2 等）→ 退回 SP
    const cls = CLASSES[r.class];
    if (cls && cls.skillTree && r.skills) {
      const validIds = new Set(cls.skillTree.map(n => n.id));
      let refund = 0;
      for (const key of Object.keys(r.skills)) {
        if (!validIds.has(key)) {
          refund += r.skills[key] || 0;
          delete r.skills[key];
        }
      }
      if (refund > 0) {
        r.skillPoints = (r.skillPoints || 0) + refund;
        corrected = true;
      }
    }

    const expectedSk = Math.max(0, (r.level || 1) - 1) * POINTS_PER_LEVEL.skill;
    const usedSk = Object.values(r.skills || {}).reduce((a, b) => a + (b || 0), 0);
    // ⭐ 主動技能升級也吃 SP，要一起算
    const usedSkLv = Object.values(r.skillLevels || {}).reduce((a, b) => a + (b || 0), 0);
    const correctSk = Math.max(0, expectedSk - usedSk - usedSkLv);
    if ((r.skillPoints || 0) < correctSk) {
      r.skillPoints = correctSk;
      corrected = true;
    }

    const expectedAb = 5 + Math.max(0, (r.level || 1) - 1) * POINTS_PER_LEVEL.ability;
    const usedAb = Object.values(r.abilities || {}).reduce((a, b) => a + (b || 0), 0);
    const correctAb = Math.max(0, expectedAb - usedAb);
    if ((r.abilityPoints || 0) < correctAb) {
      r.abilityPoints = correctAb;
      corrected = true;
    }
    return corrected;
  }

  // 把已點的技能換算成各種屬性加成
  function computeSkillBonuses(player) {
    const rpg = getRpg(player);
    const cls = rpg && rpg.class ? CLASSES[rpg.class] : null;
    const b = { hp: 0, atk: 0, def: 0, spd: 0, mp: 0, hpPct: 0, mpPct: 0, critChance: 0, skillDmgPct: 0, skillFlat: 0, skillHealPct: 0, regen: 0,
                skill0Pct: 0, skill1Pct: 0, skill2Pct: 0 };
    if (!cls || !cls.skillTree) return b;
    const skills = rpg.skills || {};
    for (const node of cls.skillTree) {
      const lv = skills[node.id] || 0;
      if (lv > 0) b[node.effect] = (b[node.effect] || 0) + node.per * lv;
    }
    return b;
  }

  // 依能力點門檻計算職業被動加成
  function computePassiveBonuses(player) {
    const r = getRpg(player);
    const cls = r && r.class ? CLASSES[r.class] : null;
    const a = getEffectiveAbilities(r); // 寶物加成也算 passive 觸發門檻
    const b = { physPct: 0, flatPct: 0, dmgReduction: 0, mpDiscount: 0, healPct: 0, spd: 0, critChance: 0, critDmg: 0 };
    if (!cls || !cls.passives) return b;
    for (const p of cls.passives) {
      if ((a[p.stat] || 0) >= p.threshold) {
        b[p.effect] = (b[p.effect] || 0) + p.per;
      }
    }
    return b;
  }

  // 由職業 + equipment 推導出紙娃娃 4 層 SVG 路徑，存進 rpg.equipped
  // 在 pickClass / equipFromInv / unequip / buyShop / applyRemote 後都要呼叫
  function syncEquipped(player) {
    const rpg = getRpg(player);
    if (!rpg.class) return;
    const cls = CLASSES[rpg.class] || {};
    const eq = rpg.equipment || {};
    rpg.equipped = {
      weapon:    (eq.weapon    && cls.weaponImage) ? cls.weaponImage : null,
      armor:     eq.armor ? 'assets/equipment/armor-glow.svg' : null,
      accessory: (eq.accessory && cls.accImage)    ? cls.accImage    : null,
      shield:    cls.hasShield ? 'assets/equipment/shield.svg' : null,
    };
  }

  // 體力 / HP 自動回復（不存資料庫，每次讀取時算）
  // HP=0 進入休息：5 分鐘後恢復 50% HP，期間 HP 不會自然回；體力照常每分鐘 +1
  function tickRecovery(player) {
    const rpg = getRpg(player);
    const stats = computeStats(player);
    if (!stats) return null;
    if (rpg.hp == null) rpg.hp = stats.maxHp;
    if (rpg.mp == null) rpg.mp = stats.maxMp;

    // 體力 / HP / MP 自然回復
    const elapsed = Date.now() - rpg.lastTickAt;
    const ticks = Math.floor(elapsed / TICK_MS);
    if (ticks > 0) {
      // ⭐ 體力可超過 STAMINA_MAX（鵝王扭蛋獎勵），但 tick 自然回復只補到 STAMINA_MAX；超過則保持不動
      if ((rpg.stamina || 0) < STAMINA_MAX) {
        rpg.stamina = Math.min(STAMINA_MAX, (rpg.stamina || 0) + ticks * STAMINA_PER_TICK);
      }
      if (rpg.hp > 0 && rpg.hp < stats.maxHp) {
        rpg.hp = Math.min(stats.maxHp, rpg.hp + ticks * HP_PER_TICK);
      }
      if (rpg.mp < stats.maxMp) {
        rpg.mp = Math.min(stats.maxMp, (rpg.mp || 0) + ticks * MP_PER_TICK);
      }
      rpg.lastTickAt += ticks * TICK_MS;
    }

    // ⭐ 死亡即時恢復：HP = 0 時立刻恢復 50%，不再有休息等待
    if (rpg.hp <= 0) {
      rpg.hp = Math.max(1, Math.floor(stats.maxHp * REST_HP_RATIO));
      rpg.deathAt = null;
    } else {
      if (rpg.deathAt) rpg.deathAt = null;
    }

    const sinceLast = Date.now() - rpg.lastTickAt;
    return {
      stamina: rpg.stamina,
      staminaMax: STAMINA_MAX,
      hp: rpg.hp,
      hpMax: stats.maxHp,
      untilNextTick: Math.max(0, TICK_MS - sinceLast),
    };
  }
  // ⭐ Lv 1-5 標準曲線；Lv 6+ 系數 ×0.8（升級需求降 20%，配合怪物 XP +20%，中後期成長變快）
  function xpForLevel(lv) {
    // ⭐ Lv 15 以下經驗需求 -50%（加速新玩家追上）
    const base = lv <= 5 ? lv * lv * 100 : lv * lv * 80;
    return lv <= 15 ? Math.round(base * 0.5) : Math.round(base);
  }
  // 計算目前裝備的套裝件數，並回傳 { counts: {setId: n}, bonuses: {...合併} }
  function computeSetBonuses(player) {
    const rpg = player?.rpg;
    if (!rpg || !rpg.equipment) return { counts: {}, bonuses: {} };
    const counts = {};
    for (const slot of Object.keys(rpg.equipment)) {
      const entry = rpg.equipment[slot];
      if (!entry) continue;
      const item = resolveItem(entry);
      if (item && item.setId) {
        counts[item.setId] = (counts[item.setId] || 0) + 1;
      }
    }
    const bonuses = {};
    for (const setId of Object.keys(counts)) {
      const set = SETS[setId];
      if (!set) continue;
      const c = counts[setId];
      for (const tier of (set.tiers || [])) {
        if (c >= tier.req) {
          for (const k of Object.keys(tier.bonus || {})) {
            bonuses[k] = (bonuses[k] || 0) + tier.bonus[k];
          }
        }
      }
    }
    return { counts, bonuses };
  }

  function computeStats(player) {
    const rpg = getRpg(player);
    const cls = CLASSES[rpg.class];
