  async function onTrialFight() {
    if (__trialInProgress) { showToast('⏳ 戰鬥進行中…'); return; }
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.class) return;
    tickRecovery(me);
    if (rpg.hp <= 0) { showToast('💀 HP 不足'); return; }
    // ⭐ 不再扣體力（測試強度用）
    __trialInProgress = true;

    const monsters = generateTrialMonsters(rpg.level);
    if (monsters.length === 0) { __trialInProgress = false; showToast('地區沒有怪物可抽'); return; }

    const stats = computeStats(me);
    const result = autoFightMulti(me, monsters);

    // 渲染戰鬥場
    const trialResult = document.getElementById('trialResult');
    if (!trialResult) { __trialInProgress = false; return; }
    const arenaHtml = `
      <div class="trial-arena" id="trialArena">
        <div class="t-player">

          <div class="t-name">${escapeHtml(me.name)} Lv${rpg.level}</div>

        </div>
        <div class="t-vs">⚔️</div>
        <div class="t-monsters">
          ${monsters.map((m, i) => `
            <div class="t-monster" id="tm${i}">
              <div class="t-icon">${m.icon}</div>
              <div class="t-name">${escapeHtml(m.name)} Lv${m.level}</div>
              <div class="t-hp"><div class="t-hp-fill t-mfill" id="tmHpFill${i}" style="width:100%"></div></div>
              <div class="t-hp-text" id="tmHpText${i}">${m.hp}/${m.maxHp}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="battle-log" id="trialLog"></div>
    `;
    trialResult.innerHTML = arenaHtml;

    const logEl = document.getElementById('trialLog');
    let i = 0;
    const playStep = () => {
      if (i >= result.log.length) {
        finalizeTrialFight(me, result, stats, monsters);
        snapshotLastFight({ name: '試煉戰場', isElite: false }, result);

            btn.textContent = '🐛 這場有 BUG？回報一下';
            btn.onclick = () => openBugReport(true);
            fr.appendChild(btn);

        } catch (e) {}
        __trialInProgress = false;
        renderTrial();
        return;
      }
      const entry = result.log[i++];
      const cls = entry.type === 'crit-player' ? 'log-crit'
        : entry.type === 'player' ? 'log-player'
        : entry.type === 'monster' ? 'log-monster' : 'log-system';

      // 更新血條
      if (entry.hp) {

  function renderWorldBoss() {
    const me = getMe();
    const myRpg = me ? getRpg(me) : null;
    // 全域 20 分冷卻（任何王共用）
    const myGlobalCdMs = myRpg ? Math.max(0, (myRpg.lastBossAttackTime || 0) + BOSS_COOLDOWN_MS - Date.now()) : 0;
    const onGlobalCd = myGlobalCdMs > 0;
    // 我目前在哪個王的排隊

    if (me) {
      for (const b of WORLD_BOSSES) {

      const remainingMs = isDead ? Math.max(0, state.nextSpawnAt - Date.now()) : 0;
      const hr = Math.floor(remainingMs / 3600000);
      const min = Math.floor((remainingMs % 3600000) / 60000);
      const sec = Math.floor((remainingMs % 60000) / 1000);
      const sortedDmg = Object.entries(state.damageLog || {}).sort((a, b) => b[1] - a[1]);
      const top5 = sortedDmg.slice(0, 5);
      // 排隊狀態
      const queue = (state.queue || []).filter(q => q && q.pid);
      const myPos = me ? queue.findIndex(q => q.pid === me.id) : -1;
      const isMyTurn = myPos === 0;
      const queuedHere = myPos >= 0;
      const queuedElsewhere = myQueuedBossId && myQueuedBossId !== boss.id;
      const queueHtml = queue.length > 0 ? `
        <div class="boss-queue">
          <div class="bq-title">📋 排隊（${queue.length}）</div>
          ${queue.slice(0, 6).map((q, i) => {

            const stale = (Date.now() - (q.joinedAt || 0)) > BOSS_QUEUE_STALE_MS;
            return `<div class="bq-row ${i === 0 ? 'bq-head' : ''} ${q.pid === me?.id ? 'bq-me' : ''}">
              <span class="bq-pos">${i === 0 ? '🔥' : i + 1}</span>
              <span class="bq-name">${p ? (p.avatar || '🎴') + ' ' + escapeHtml(p.name) : '?'}${stale ? ' <span style="color:#dc2626;">(過期)</span>' : ''}</span>
            </div>`;
          }).join('')}
        </div>` : '';
      // 動作按鈕邏輯
      let actionHtml = '';
      if (isDead) {
        actionHtml = `<button class="btn btn-primary" disabled style="background:#4b5563;">⏳ 等待復活</button>`;
      } else if (onGlobalCd) {
        const m = Math.floor(myGlobalCdMs / 60000);
        const s = Math.ceil((myGlobalCdMs % 60000) / 1000);
        actionHtml = `<button class="btn btn-primary" disabled style="background:#4b5563;">⏳ 冷卻 ${m}:${String(s).padStart(2,'0')}（任何王共用）</button>`;
      } else if (isMyTurn) {
        actionHtml = `
          <button class="btn btn-primary" onclick="runBossFight('${boss.id}')" style="background:linear-gradient(135deg,#fde047,#f59e0b); box-shadow:0 4px 0 #d97706; color:#7c2d12;">🔥 你的回合！攻擊</button>

        `;
      } else if (queuedHere) {
        actionHtml = `
          <button class="btn btn-primary" disabled style="background:#6b7280;">🕒 排隊中：第 ${myPos + 1} 位</button>
          <button class="btn btn-secondary" onclick="leaveBossQueue('${boss.id}')" style="margin-top:6px;">取消排隊</button>
        `;
      } else if (queuedElsewhere) {
        const otherBoss = WORLD_BOSSES.find(b => b.id === myQueuedBossId);
        actionHtml = `<button class="btn btn-primary" disabled style="background:#4b5563;">已排隊在 ${otherBoss?.name || ''}</button>`;
      } else {
        const ahead = queue.length;
        actionHtml = `<button class="btn btn-primary" onclick="joinBossQueue('${boss.id}')" style="background:linear-gradient(135deg,#f59e0b,#dc2626); box-shadow:0 4px 0 #991b1b;">📋 加入排隊${ahead > 0 ? `（前面 ${ahead} 人）` : ''}</button>`;
      }
      return `
        <div class="boss-card ${isDead ? 'dead' : ''}">
          <div class="boss-header">
            <span class="boss-icon">${boss.icon}</span>
            <div>
              <div class="boss-name">${boss.name} Lv ${boss.level}</div>
              <div class="boss-status">${isDead ? `💀 倒下　·　${hr}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')} 後復活` : `⚔️ 存活　·　ATK ${boss.atk} / DEF ${boss.def}　·　${describeAbility(boss.ability) || '無特殊能力'}`}</div>
            </div>
          </div>
          <div class="boss-hp-bar">
            <div class="boss-hp-fill" style="width:${hpPct}%"></div>
            <div class="boss-hp-text">${Math.max(0, state.currentHp).toLocaleString()} / ${boss.hp.toLocaleString()}　(${hpPct.toFixed(1)}%)</div>
          </div>
          ${queueHtml}
          ${top5.length > 0 ? `
            <div class="boss-leaderboard">
              <div class="bl-title">⚔️ 傷害排行榜</div>
              ${top5.map(([pid, dmg], i) => {
                const p = getPlayer(pid);
                return `<div class="bl-row">
                  <span class="bl-rank">${i+1}</span>
                  <span class="bl-name">${p ? p.avatar + ' ' + escapeHtml(p.name) : '?'}</span>
                  <span class="bl-dmg">${dmg.toLocaleString()}</span>
                </div>`;
              }).join('')}
            </div>
          ` : '<div style="font-size:11px; color:#fde68a; text-align:center; padding:8px; opacity:0.7;">尚無人挑戰</div>'}
          ${state.lastKill ? `
            <div style="font-size:11px; color:#fde047; text-align:center; margin-bottom:8px;">
              🏆 第 ${state.killCount} 次擊殺：${getPlayer(state.lastKill.killer)?.name || '?'}
            </div>
          ` : ''}
          ${actionHtml}
        </div>
      `;
    }).join('');
    document.getElementById('worldBossBody').innerHTML = html;
  }

  // 綠茶指南書里程碑發放：遇綠茶鵝 10/20/30/50/75/100 次自動拿到對應的指南書
  function grantGreenTeaGuides(player) {
    if (!player || !player.rpg) return;
    const rpg = player.rpg;
    rpg.greenTeaGuidesGranted = rpg.greenTeaGuidesGranted || [];
    const cnt = rpg.metGreenTea || 0;
    rpg.inventory = rpg.inventory || [];
    let granted = false;
    for (const g of GREENTEA_GUIDES) {
      if (cnt >= g.count && !rpg.greenTeaGuidesGranted.includes(g.itemId)) {
        const def = ITEMS.find(i => i.id === g.itemId);
        if (def) {
          rpg.inventory.push(def.id);
          rpg.greenTeaGuidesGranted.push(g.itemId);
          granted = true;
          // 跳通知
          if (player.id === getMeId()) {
            showToast(`📚 綠茶指南書達成！第 ${g.count} 次相遇 → 獲得 ${def.icon} ${def.name}`);
          }
        }
      }
    }
    return granted;
  }

  // 玩家自己領取自己的待領獎勵（從 worldBoss[*].pendingRewards 取出 pid 等於自己的條目）
  // 用 rpg.claimedBossRewards 防止重複領取（多端同步可能重複觸發）
  function claimMyBossRewards() {
    const me = getMe();
    if (!me) return false;
    const r = getRpg(me);
    r.claimedBossRewards = r.claimedBossRewards || [];
    let claimedAny = false;
    let inventoryAdded = [];
    let coinsAdded = 0;
    for (const boss of WORLD_BOSSES) {
      const state = worldBoss && worldBoss[boss.id];
      if (!state || !Array.isArray(state.pendingRewards)) continue;
      for (const reward of state.pendingRewards) {
        if (!reward || reward.pid !== me.id) continue;
        if (r.claimedBossRewards.includes(reward.rewardId)) continue;
        // 領取
        if (reward.coins) refundCoins(me.id, reward.coins);
        if (reward.item) {
          r.inventory = r.inventory || [];
          r.inventory.push(reward.item);
          inventoryAdded.push(reward.item);
        }
        r.claimedBossRewards.push(reward.rewardId);
        coinsAdded += reward.coins || 0;
        claimedAny = true;
      }
    }
    if (claimedAny) {
      saveData();
      const itemNote = inventoryAdded.length > 0 ? ` + ${inventoryAdded.length} 件神話裝備` : '';
      showToast(`🏆 世界王獎勵入帳：+${coinsAdded} 鵝鵝幣${itemNote}`);
    }
    return claimedAny;
  }
  window.claimMyBossRewards = claimMyBossRewards;

  // 舊版的同步分發（保留為 fallback，但實際上已被 transaction 內的 pendingRewards 取代）
  function distributeBossRewards(bossId, boss, state) {
    const sortedDmg = Object.entries(state.damageLog || {}).sort((a, b) => b[1] - a[1]);
    const ranks = [boss.rewardTop, boss.rewardSecond, boss.rewardThird];
    // 尾刀大獎
    const killerP = getPlayer(state.lastHit);
    if (killerP) {
      killerP.coinsSpent = (killerP.coinsSpent || 0) - boss.rewardKiller.coins;
      if (boss.rewardKiller.item) {
        const kr = getRpg(killerP); kr.inventory = kr.inventory || [];
        kr.inventory.push(boss.rewardKiller.item);
      }
    }
    // 排行 1-3 額外
    sortedDmg.slice(0, 3).forEach(([pid, dmg], idx) => {
      const reward = ranks[idx];
      if (!reward) return;
      const p = getPlayer(pid);
      if (p) p.coinsSpent = (p.coinsSpent || 0) - reward.coins;
    });
    // 其餘參與者
    sortedDmg.slice(3).forEach(([pid]) => {
      const p = getPlayer(pid);
      if (p && boss.rewardParticipant) p.coinsSpent = (p.coinsSpent || 0) - boss.rewardParticipant.coins;
    });
  }

  // 加入排隊（不扣體力、不打）
  async function joinBossQueue(bossId) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me); if (!r.class) return;
    const boss = WORLD_BOSSES.find(b => b.id === bossId);
    if (!boss) return;
    if (r.hp <= 0) { showToast('💀 HP 太低，先回滿再來'); return; }
    // 全域 20 分鐘冷卻
    const cdRemain = (r.lastBossAttackTime || 0) + BOSS_COOLDOWN_MS - Date.now();
    if (cdRemain > 0) {
      const m = Math.floor(cdRemain / 60000);
      const s = Math.ceil((cdRemain % 60000) / 1000);
      showToast(`⏳ 上次參戰冷卻中，還要等 ${m}:${String(s).padStart(2,'0')}`);
      return;
    }
    if (!window.__firebaseSync || !window.__firebaseSync.joinBossQueue) {
      showToast('☁️ 雲端尚未連線，稍後再試');
      return;
    }
    try {
      const out = await window.__firebaseSync.joinBossQueue(bossId, me.id, boss, BOSS_QUEUE_STALE_MS);
      const pos = out.position;
      if (pos === 0) showToast(`✅ 你目前是排隊頭，可以攻擊了！`);
      else            showToast(`📋 已加入排隊：第 ${pos + 1} 位（前面 ${pos} 人）`);
      renderWorldBoss();
    } catch (e) {
      const code = e?.code || '';
      const msg = e?.message || String(e);
      if (msg.startsWith('already-in-other-queue:')) {
        const otherId = msg.split(':')[1];
        const otherBoss = WORLD_BOSSES.find(b => b.id === otherId);
        showToast(`你已排在 ${otherBoss?.name || otherId}，先取消才能改排這隻`);
      } else if (msg === 'already-in-this-queue') {
        showToast('你已經在這個排隊中');
      } else if (msg === 'boss-already-dead') {
        showToast('🦢 王已倒下，等復活吧');
      } else if (code === 'resource-exhausted' || msg.includes('429')) {
        showToast('☁️ Firestore 配額用完了');
      } else {
        showToast('☁️ 排隊失敗：' + (code || msg.slice(0, 40)));
      }
    }
  }
  window.joinBossQueue = joinBossQueue;

  // 退出排隊
  async function leaveBossQueue(bossId) {
    const me = getMe(); if (!me) return;
    if (!window.__firebaseSync || !window.__firebaseSync.leaveBossQueue) return;
    try {
      await window.__firebaseSync.leaveBossQueue(bossId, me.id);
      showToast('已退出排隊');
      renderWorldBoss();
    } catch (e) {
      console.warn('leave queue failed:', e);
    }
  }
  window.leaveBossQueue = leaveBossQueue;

  // 真正攻擊（必須是排隊頭）
  async function runBossFight(bossId) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me); if (!r.class) return;
    tickRecovery(me);
    const boss = WORLD_BOSSES.find(b => b.id === bossId);
    if (!boss) return;
    const state = getBossState(bossId);
    if (state.deadAt) { showToast('🦢 王還沒復活'); return; }
    if (r.hp <= 0) { showToast('💀 HP 不足'); return; }
    // 必須是排隊頭
    const queue = (state.queue || []);
    if (queue.length === 0 || queue[0].pid !== me.id) {
      // 是不是過期 head？讓 transaction 自己處理
      if (queue.length > 0 && queue[0].pid !== me.id) {
        showToast('⏳ 還沒輪到你');
        return;
      }
      showToast('先按「加入排隊」再來打');
      return;
    }
    if (!window.__firebaseSync || !window.__firebaseSync.applyBossAttack) {
      showToast('☁️ 雲端尚未連線，稍後再試');
      return;
    }

    const monster = {
      id: boss.id, tier: 99,
      name: boss.name, icon: boss.icon, level: boss.level,
      hp: state.currentHp, maxHp: boss.hp,
      atk: boss.atk, def: boss.def, spd: boss.spd,
      verb: boss.verb, dialogue: boss.dialogue, deathLine: boss.deathLine,
      ability: boss.ability,
      goldDrop: 0, xpDrop: 0,
    };
    const result = autoFight(me, monster);
    const dmgRaw = Math.max(0, state.currentHp - result.mHpFinal);

    // 把傷害透過 transaction 原子地寫上雲端
    let txOut;
    try {
      txOut = await window.__firebaseSync.applyBossAttack(bossId, dmgRaw, me.id, boss, BOSS_QUEUE_STALE_MS);
    } catch (e) {
      const msg = e?.message || String(e);
      const code = e?.code || '';
      console.warn('Boss attack tx failed:', code, msg);
      if (code === 'resource-exhausted' || msg.includes('429')) {
        showToast('☁️ Firestore 配額用完了，明天 UTC 0 點會重置');
      } else if (msg === 'boss-already-dead' || msg.includes('boss-already-dead')) {
        showToast('🦢 王已倒下');
      } else if (msg === 'not-your-turn' || msg.includes('not-your-turn')) {
        showToast('⏳ 還沒輪到你');
      } else if (msg === 'not-in-queue' || msg.includes('not-in-queue')) {
        showToast('你已經不在排隊中');
      } else {
        showToast('☁️ 連線出錯：' + (code || msg.slice(0, 40)));
      }
      renderWorldBoss();
      return;
    }
    // 攻擊成功 → 設置全域冷卻
    r.lastBossAttackTime = Date.now();
    const dmgDealt = txOut.actualDmg;  // 雲端實際接受的傷害（可能比 dmgRaw 少：王只剩 50 HP 時你打 1000 也只算 50）
    const newState = txOut.newState;
    const killed = txOut.killed;
    // 把雲端結果同步回本地
    worldBoss[bossId] = newState;

    // 玩家獲得：傷害 × 0.8 XP / 傷害 × 0.1 鵝鵝幣
    const xpGain = Math.round(dmgDealt * 0.8);
    const coinGain = Math.round(dmgDealt * 0.1);
    r.xp = (r.xp || 0) + xpGain;
    let leveled = 0;
    while (r.xp >= xpForLevel(r.level)) {
      r.xp -= xpForLevel(r.level);
      r.level += 1;
      r.skillPoints = (r.skillPoints || 0) + POINTS_PER_LEVEL.skill;
      r.abilityPoints = (r.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
      leveled++;
    }
    refundCoins(me.id, coinGain);
    // ⭐ HP/MP 戰後一律回滿（除非真的被打死）
    const _s = computeStats(me);
    if (result.pHpFinal <= 0) {
      r.hp = 0;
      if (!r.deathAt) r.deathAt = Date.now();
    } else {
      r.hp = _s.maxHp;
    }
    r.mp = _s.maxMp;
    if (result.critCount) r.critCount = (r.critCount || 0) + result.critCount;
    if (leveled) {
      const s = computeStats(me); r.hp = r.deathAt ? 0 : s.maxHp; r.mp = s.maxMp;
    }

    // ⭐ 世界王給尾刀者掉精魂
    let worldSpiritDropped = null;
    if (killed) {
      try {
        const sp = generateSpirit(boss.id);
        if (sp) {
          r.spiritBag = r.spiritBag || [];
          r.spiritBag.push(sp);
          worldSpiritDropped = sp;
        }
      } catch (e) {}
    }

    saveData();
    // 領自己的待領獎勵（pendingRewards）
    claimMyBossRewards();
    renderCharCard();
    renderCharQuickMenu();
    updateStaminaUI();
    renderWorldBoss();

    // 結果顯示在 fightResult
    document.getElementById('fightResult').innerHTML = `
      <div class="reward-list" style="background:linear-gradient(135deg,#1e1b4b,#4c1d95); border-color:#f59e0b; color:#fff;">
        <div class="rl-title" style="color:#fde68a;">🌍 ${boss.name} 戰報</div>
        <div class="rl-item">⚔️ 你造成 <b style="color:#fca5a5;">${dmgDealt.toLocaleString()}</b> 傷害</div>
        <div class="rl-item">⭐ +${xpGain} XP　·　🪙 +${coinGain} 鵝鵝幣</div>
        ${killed
          ? `<div style="margin-top:8px; padding:8px; background:rgba(245,158,11,0.3); border-radius:8px; color:#fde047; font-weight:700;">🏆 你給了尾刀！獎勵已加到背包與鵝鵝幣</div>`
          : `<div class="rl-item">${boss.icon} ${boss.name} 還剩 ${newState.currentHp.toLocaleString()} HP（${(newState.currentHp/boss.hp*100).toFixed(1)}%）</div>`}
        ${worldSpiritDropped ? `<div class="rl-item" style="color:${worldSpiritDropped.color}; font-weight:700; padding:6px; background:#fff8; border-radius:6px;">🌟 掉落精魂：${worldSpiritDropped.icon} ${escapeHtml(worldSpiritDropped.name)}<div style="font-size:10px; color:#5b3d62; font-weight:500; margin-top:1px;">${escapeHtml(describeSpirit(worldSpiritDropped))}</div></div>` : ''}
      </div>
    `;

    // 戰鬥日誌
    const logHtml = result.log.map(l => {
      const cls = l.type === 'crit-player' ? 'log-crit'
        : l.type === 'player' ? 'log-player'
        : l.type === 'monster' ? 'log-monster'
        : 'log-system';
      return `<div class="log-line ${cls}">${escapeHtml(l.text)}</div>`;
    }).join('');
    document.getElementById('fightResult').innerHTML += `<div class="battle-log">${logHtml}</div>`;
  }
  window.runBossFight = runBossFight;

  // === 個人 BOSS ===
  let __personalBossTab = 'breakfast_goose';
  let __personalBossInProgress = false;
  function getPersonalBossState(rpg, bossId) {
    if (!rpg.personalBoss) rpg.personalBoss = {};
    if (!rpg.personalBoss[bossId]) {
      const def = PERSONAL_BOSSES.find(b => b.id === bossId);
      rpg.personalBoss[bossId] = {
        currentHp: def ? def.hp : 1,
        killCount: 0,
      };
    }
    return rpg.personalBoss[bossId];
  }
  // ⭐ 個人王共用冷卻（任何一隻打完都要等 5 分鐘才能再打）
  function getPersonalBossCdRemain(rpg) {
    const last = rpg.personalBossLastAt || 0;
    return Math.max(0, last + PERSONAL_BOSS_COOLDOWN_MS - Date.now());
  }

    const tabsHtml = PERSONAL_BOSSES.map(b => {
      const active = __personalBossTab === b.id;
      const st = getPersonalBossState(rpg, b.id);

      return `<button onclick="setPersonalBossTab('${b.id}')" style="flex:1; padding:6px 8px; border:2px solid ${active ? '#7c3aed' : '#e5e7eb'}; background:${active ? '#ede9fe' : '#fff'}; border-radius:8px; cursor:pointer; font-family:inherit;">

      </button>`;

    const st = getPersonalBossState(rpg, cur.id);
    const hpPct = Math.max(0, Math.min(100, st.currentHp / cur.hp * 100));
    // ⭐ 共用冷卻（任一隻王打完都會鎖 5 分鐘）
    const cdRemain = getPersonalBossCdRemain(rpg);
    const onCd = cdRemain > 0;
    const m = Math.floor(cdRemain / 60000);

  function attackPersonalBoss(bossId) {
    if (__personalBossInProgress) { showToast('⏳ 戰鬥進行中…'); return; }
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.class) { showToast('先選職業'); return; }
    if (rpg.hp <= 0) { showToast('💀 你還在休息中'); return; }
    const def = PERSONAL_BOSSES.find(b => b.id === bossId);
    if (!def) return;
    const st = getPersonalBossState(rpg, bossId);
    // 共用冷卻檢查
    if (getPersonalBossCdRemain(rpg) > 0) {
      showToast('⏳ 共用冷卻中');
      return;
    }
    __personalBossInProgress = true;
    rpg.personalBossLastAt = Date.now();
    // 把王包成怪物 → 用一般 autoFight 引擎
    const monster = {
      id: def.id,
      name: def.name, icon: def.icon, level: def.level,
      hp: st.currentHp, maxHp: def.hp,
      atk: def.atk, def: def.def, spd: def.spd,
      verb: def.verb,
      ability: def.ability,
      skills: def.skills || [],
      dialogue: def.dialogue, deathLine: def.deathLine,
      goldDrop: 0, xpDrop: 0,
      isElite: false, isPersonalBoss: true,
    };
    const result = autoFight(me, monster);
    const stats = computeStats(me);

    // 渲染戰鬥區（重用世界王 / 普通戰鬥的 arena）
    const arenaHtml = `
      <div class="battle-arena" id="battleArena">
        <div class="combatant" id="combatPlayer">
          <div class="combatant-icon">${CLASSES[rpg.class].icon}</div>
          <div class="combatant-name">${escapeHtml(me.name)} Lv${rpg.level}</div>
          <div class="combatant-hp-track"><div class="combatant-hp-fill" id="pHpBar" style="width:100%"></div></div>
          <div class="combatant-hp-text" id="pHpText">${stats.maxHp}/${stats.maxHp}</div>
          <div class="combatant-hp-track" style="margin-top:2px;"><div class="combatant-hp-fill" id="pMpBar" style="width:100%; background:linear-gradient(90deg,#93c5fd,#3b82f6);"></div></div>
          <div class="combatant-hp-text" id="pMpText" style="color:#1e40af;">MP ${stats.maxMp}/${stats.maxMp}</div>
        </div>
        <div class="vs-icon">⚔️</div>
        <div class="combatant" id="combatMonster">
          <div class="combatant-icon">${monster.icon}</div>
          <div class="combatant-name">${monster.name} Lv${monster.level}</div>
          <div class="combatant-hp-track"><div class="combatant-hp-fill" id="mHpBar" style="width:${(monster.hp/monster.maxHp)*100}%"></div></div>
          <div class="combatant-hp-text" id="mHpText">${monster.hp}/${monster.maxHp}</div>
        </div>
      </div>
      <div class="battle-log" id="battleLog"></div>
    `;
    const resultHost = document.getElementById('personalBossResult');
    if (resultHost) resultHost.innerHTML = arenaHtml;
    const logEl = document.getElementById('battleLog');
    let i = 0;
    const playStep = () => {
      if (i >= result.log.length) {
        // 結算
        const dmgDealt = monster.hp - result.mHpFinal;
        st.currentHp = Math.max(0, result.mHpFinal);
        let killed = false;
        let rewardHtml = '';
        if (st.currentHp <= 0) {
          // 殺死了！給獎勵 + 滿血復活
          killed = true;
          st.killCount = (st.killCount || 0) + 1;
          st.currentHp = def.hp;
          rpg.xp = (rpg.xp || 0) + def.reward.xp;
          rpg.totalGold = (rpg.totalGold || 0) + def.reward.coins;
          refundCoins(me.id, def.reward.coins);
          let leveled = 0;
          while (rpg.xp >= xpForLevel(rpg.level)) {
            rpg.xp -= xpForLevel(rpg.level);
            rpg.level += 1;
            rpg.skillPoints = (rpg.skillPoints || 0) + POINTS_PER_LEVEL.skill;
            rpg.abilityPoints = (rpg.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
            leveled++;
          }
          // ⭐ 掉精魂
          let spiritDropped = null;
          try {
            const sp = generateSpirit(def.id);
            if (sp) {
              rpg.spiritBag = rpg.spiritBag || [];
              rpg.spiritBag.push(sp);
              spiritDropped = sp;
            }
          } catch (e) { /* swallow */ }
          rewardHtml = `
            <div class="reward-list" style="background:linear-gradient(135deg,#fef3c7,#fde047); border-color:#f59e0b; margin-top:8px;">
              <div class="rl-title" style="color:#7c2d12;">🏆 ${def.name} 被擊殺！</div>
              <div class="rl-item">💢 你打掉了 <b>${dmgDealt.toLocaleString()}</b> HP，給予最後一擊！</div>
              <div class="rl-item">🪙 +${def.reward.coins} 鵝鵝幣　·　⭐ +${def.reward.xp} XP${leveled ? `（升 ${leveled} 級）` : ''}</div>
              ${spiritDropped ? `<div class="rl-item" style="color:${spiritDropped.color}; font-weight:700;">🌟 掉落精魂：${spiritDropped.icon} ${escapeHtml(spiritDropped.name)}<div style="font-size:10px; color:#8b6f9b; font-weight:500; margin-top:1px;">${escapeHtml(describeSpirit(spiritDropped))}</div></div>` : ''}
              <div class="rl-item" style="font-size:11px; color:#7c2d12;">王已重生（HP 回滿，5 分鐘後可再戰）</div>
            </div>`;
        } else {
          // 沒殺死 → 王回 5% HP
          const regen = Math.round(def.hp * PERSONAL_BOSS_REGEN_PCT);
          st.currentHp = Math.min(def.hp, st.currentHp + regen);
          const hpPct = (st.currentHp / def.hp * 100).toFixed(1);
          rewardHtml = `
            <div class="reward-list" style="background:linear-gradient(135deg,#1e1b4b,#4c1d95); color:#fff; border-color:#7c3aed; margin-top:8px;">
              <div class="rl-title" style="color:#fde047;">${result.won ? '⏸ 暫時撤退' : '⏸ 戰鬥結束'}</div>
              <div class="rl-item">💢 你打掉了 <b style="color:#fca5a5;">${dmgDealt.toLocaleString()}</b> HP</div>
              <div class="rl-item" style="color:#fde047;">🩹 王回復 +${regen} HP（5%）</div>
              <div class="rl-item">${def.icon} ${def.name} 還剩 ${st.currentHp.toLocaleString()} / ${def.hp.toLocaleString()} HP（${hpPct}%）</div>
              <div class="rl-item" style="font-size:11px; opacity:0.85;">⏳ 5 分鐘後可再戰</div>
            </div>`;
        }
        // HP/MP 屬性化：戰後 HP/MP 自動回滿（除非真的死了）
        const ns = computeStats(me);
        if (result.pHpFinal <= 0 && (rpg.level || 1) > 4) {
          rpg.hp = 0; rpg.deathAt = Date.now();
        } else {
          rpg.hp = ns.maxHp; rpg.mp = ns.maxMp; rpg.deathAt = null;
        }
        if (rpg.critCount == null) rpg.critCount = 0;
        rpg.critCount += (result.critCount || 0);

        document.getElementById('personalBossResult').insertAdjacentHTML('beforeend', rewardHtml);
        snapshotLastFight(monster, result);
        saveData();
        renderCharCard();
        renderEquipment();
        renderRpgStats();
        renderPersonalBoss();
        __personalBossInProgress = false;
        return;
      }
      const entry = result.log[i++];
      const cls = entry.type === 'crit-player' ? 'log-crit'
        : entry.type === 'player' ? 'log-player'
        : entry.type === 'monster' ? 'log-monster'
        : 'log-system';
      const div = document.createElement('div');
      div.className = `log-line ${cls}`;
      div.textContent = entry.text;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      if (entry.hp) {
        const pHpEl = document.getElementById('pHpBar');
        const mHpEl = document.getElementById('mHpBar');
        if (pHpEl) pHpEl.style.width = (entry.hp.player / stats.maxHp * 100) + '%';
        if (mHpEl) mHpEl.style.width = (entry.hp.monster / monster.maxHp * 100) + '%';
        const pHpText = document.getElementById('pHpText');
        const mHpText = document.getElementById('mHpText');
        if (pHpText) pHpText.textContent = `${entry.hp.player}/${stats.maxHp}`;
        if (mHpText) mHpText.textContent = `${entry.hp.monster}/${monster.maxHp}`;
        if (entry.hp.mp != null) {
          const pMpBar = document.getElementById('pMpBar');
          const pMpText = document.getElementById('pMpText');
          if (pMpBar) pMpBar.style.width = (entry.hp.mp / stats.maxMp * 100) + '%';
          if (pMpText) pMpText.textContent = `MP ${entry.hp.mp}/${stats.maxMp}`;
        }
      }
      setTimeout(playStep, 350);
    };
    playStep();
  }
  window.attackPersonalBoss = attackPersonalBoss;

  // 上次擊殺通知（每個 killCount 只跳一次）
  function checkBossKillBanners() {
    for (const boss of WORLD_BOSSES) {
      const state = worldBoss && worldBoss[boss.id];
      if (!state || !state.lastKill) continue;
      const seenKey = `boss-killed-${boss.id}-${state.lastKill.killCount}`;
      if (localStorage.getItem(seenKey)) continue;
      // 1 小時內才通知
      if (Date.now() - state.lastKill.when > 60 * 60 * 1000) {
        localStorage.setItem(seenKey, '1');
        continue;
      }
      localStorage.setItem(seenKey, '1');
      showBossKillBanner(boss, state.lastKill);
    }
  }
  function showBossKillBanner(boss, lastKill) {
    const killer = getPlayer(lastKill.killer);
    const el = document.createElement('div');
    el.className = 'boss-killed-banner';
    el.innerHTML = `
      <div class="bk-icon">${boss.icon}</div>
      <div class="bk-title">${boss.name} 被擊殺！</div>
      <div>尾刀英雄：<b>${killer ? killer.avatar + ' ' + escapeHtml(killer.name) : '?'}</b></div>
      <div style="font-size:11px; opacity:0.85; margin-top:4px;">第 ${lastKill.killCount} 次擊殺　·　${boss.respawnMs ? `${boss.respawnMs/3600000} 小時後復活` : '立刻重生 ♻'}</div>
    `;
    document.body.appendChild(el);
    setTimeout(() => el.classList.add('show'), 80);
    setTimeout(() => {
      el.classList.remove('show');
      setTimeout(() => el.remove(), 500);
    }, 6000);
    el.addEventListener('click', () => {
      el.classList.remove('show');
      setTimeout(() => el.remove(), 500);
    });
  }

  function doWork() {
    const me = getMe(); if (!me) return;
    const r = getRpg(me); if (!r.class) { showToast('先選職業'); return; }
    tickRecovery(me);
    if (r.stamina < WORK_STAMINA) { showToast(`⚡ 體力不足（需 ${WORK_STAMINA}）`); return; }
    r.stamina -= WORK_STAMINA;
    r.workCount = (r.workCount || 0) + 1;
    const ev = JOB_EVENTS[Math.floor(Math.random() * JOB_EVENTS.length)];
    const mult = ev.mood === 'good' ? 1.4 : ev.mood === 'bad' ? 0.6 : 1.0;
    const variance = 0.85 + Math.random() * 0.3;
    // 限制範圍 100-250
    const pay = Math.min(250, Math.max(100, Math.round(WORK_BASE_PAY * mult * variance)));
    refundCoins(me.id, pay);
    saveData();
    renderCharCard();
    updateStaminaUI();
    document.getElementById('dailyResult').innerHTML = `
      <div class="reward-list" style="background:linear-gradient(135deg,#fef3c7,#fde68a); border-color:#f59e0b;">
        <div class="rl-title" style="color:#92400e;">${ev.icon} ${ev.name}</div>
        <div class="rl-item" style="color:#5a4a4a;">「${escapeHtml(ev.line)}」</div>
        <div class="rl-item" style="margin-top:6px; color:${ev.mood === 'good' ? '#16a34a' : ev.mood === 'bad' ? '#dc2626' : '#d97706'}; font-weight:700;">
          ${ev.mood === 'good' ? '🎉 好運加成' : ev.mood === 'bad' ? '😩 衰運' : '🙂 普通'} → +${pay} 鵝鵝幣
        </div>
      </div>
    `;
    showToast(`💼 +${pay} 鵝鵝幣`);

  window.doWork = doWork;

  function doForage() {
    const me = getMe(); if (!me) return;
    const r = getRpg(me); if (!r.class) { showToast('先選職業'); return; }
    tickRecovery(me);
    if (r.stamina < FORAGE_STAMINA) { showToast(`⚡ 體力不足（需 ${FORAGE_STAMINA}）`); return; }
    if (r.hp <= 0) { showToast('💀 HP 太低，先回滿再探險'); return; }
    r.stamina -= FORAGE_STAMINA;
    r.forageCount = (r.forageCount || 0) + 1;

    // 一律走分支事件 — 戰鬥只在玩家「選錯」時觸發（事件 outcome 帶 battle: true）
    const quest = FORAGE_QUESTS[Math.floor(Math.random() * FORAGE_QUESTS.length)];
    forageTrace('doForage', { questId: quest.id, level: r.level, class: r.class, currentZone: r.currentZone, currentFloor: r.currentFloor, forageCount: r.forageCount });
    saveData();
    showForageQuest(quest);
  }
  window.doForage = doForage;

  // 顯示分支事件：讓玩家做選擇
  function showForageQuest(quest) {
    const me = getMe();
    const myCoins = me ? getCoins(me.id) : 0;
    const choicesHtml = quest.choices.map((c, i) => {
      const need = c.requiresCoins || 0;
      const tooPoor = need > myCoins;
      return `
        <button class="forage-choice" onclick="resolveForageChoice('${quest.id}', ${i})" ${tooPoor ? 'disabled' : ''}>
          <div class="fc-text">${escapeHtml(c.text)}</div>
          ${need > 0 ? `<div class="fc-cost">需要 ${need} 幣${tooPoor ? '（不足）' : ''}</div>` : ''}
        </button>
      `;
    }).join('');
    const html = `
      <div style="text-align:center; padding:6px 0 12px;">
        <div style="font-size:54px; margin-bottom:6px;">${quest.icon}</div>
        <div style="font-size:13px; color:#5b3d62; padding:10px 12px; background:#fff8fb; border-radius:10px; border:2px dashed #ffd6e0; line-height:1.7;">${escapeHtml(quest.intro)}</div>
      </div>
      <div class="forage-choices">${choicesHtml}</div>
    `;
    showModal('🎣 探險中…', html);
  }

  function resolveForageChoice(questId, choiceIdx) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const quest = FORAGE_QUESTS.find(q => q.id === questId);
    if (!quest) { hideModal(); return; }
    const choice = quest.choices[choiceIdx];
    if (!choice) { hideModal(); return; }
    // 再檢查一次條件（防玩家在 modal 開啟期間鵝幣被扣完）
    if (choice.requiresCoins && getCoins(me.id) < choice.requiresCoins) {
      showToast('鵝幣不足');
      return;
    }
    // 加權選一個 outcome
    const roll = Math.random();
    let acc = 0;
    let outcome = choice.outcomes[choice.outcomes.length - 1];
    for (const o of choice.outcomes) {
      acc += (o.p || 0);
      if (roll < acc) { outcome = o; break; }
    }
    // ⭐ 改版：原本「戰鬥 outcome」改成「直接掉一個寶物」（不再進戰鬥）
    if (outcome.battle) {
      r.forageBattles = (r.forageBattles || 0) + 1; // 還是當成「冒險戰鬥」累計
      forageTrace('resolveForageChoice→treasure(was battle)', { questId, choiceIdx, outcomeP: outcome.p, battleLine: outcome.battleLine, forageBattles: r.forageBattles });
      // 處理 outcome 的 coins 扣費（例如賭博花了錢還被搶）
      if (outcome.coins) {
        const amt = Array.isArray(outcome.coins) ? outcome.coins[0] + Math.floor(Math.random() * (outcome.coins[1] - outcome.coins[0] + 1)) : Number(outcome.coins) || 0;
        if (amt > 0) refundCoins(me.id, amt);
        else if (amt < 0) spendCoins(me.id, -amt);
      }
      // 直接掉一個寶物（重複 → +1000 XP）
      r.treasures = r.treasures || [];
      const allIds = Object.keys(TREASURES);
      const tid = allIds[Math.floor(Math.random() * allIds.length)];
      const treasure = TREASURES[tid];
      let isDup = r.treasures.includes(tid);
      let dupXpGained = 0;
      let leveledFromDup = 0;
      if (isDup) {
        r.xp = (r.xp || 0) + TREASURE_DUP_XP;
        dupXpGained = TREASURE_DUP_XP;
        forageTrace('forage-treasure DUP', { tid, name: treasure?.name, dupXp: TREASURE_DUP_XP, ownedCount: r.treasures.length });
        while (r.xp >= xpForLevel(r.level)) {
          r.xp -= xpForLevel(r.level);
          r.level += 1;
          r.skillPoints = (r.skillPoints || 0) + POINTS_PER_LEVEL.skill;
          r.abilityPoints = (r.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
          leveledFromDup++;
        }
        if (leveledFromDup) {
          const ns = computeStats(me);
          r.hp = ns.maxHp; r.mp = ns.maxMp; r.deathAt = null;
        }
      } else {
        r.treasures.push(tid);
        forageTrace('forage-treasure NEW', { tid, name: treasure?.name, ownedCount: r.treasures.length });
      }
      saveData();
      hideModal();
      // 描述寶物效果
      let effectStr = '';
      if (treasure?.ability) effectStr = `+${treasure.value} ${(treasure.ability || '').toUpperCase()}`;
      else if (treasure?.stat) {
        const map = { hp: 'HP', mp: 'MP', atk: 'ATK', def: 'DEF', spd: 'SPD', critChance: '暴擊率', critDmg: '爆傷' };
        const fmtVal = (treasure.stat === 'critChance' || treasure.stat === 'critDmg')
          ? `+${Math.round(treasure.value * 100)}%`
          : `+${treasure.value}`;
        effectStr = `${fmtVal} ${map[treasure.stat] || treasure.stat}`;
      }
      document.getElementById('dailyResult').innerHTML = `
        <div class="reward-list" style="background:linear-gradient(135deg,#fef3c7,#fde047); border-color:#f59e0b;">
          <div class="rl-title" style="color:#92400e;">${isDup ? '✨ 找到寶物（已收藏）' : '🎁 找到寶物！'}</div>
          <div class="rl-item" style="color:#5a4a4a; font-size:11px;">經過一番周折，你撿到了…</div>
          <div class="rl-item" style="margin-top:6px; font-size:14px; color:#92400e;">
            ${treasure?.icon || '🎁'} <b>${escapeHtml(treasure?.name || '寶物')}</b>　·　<span style="color:#16a34a;">${effectStr}</span>
          </div>
          ${isDup
            ? `<div class="rl-item" style="font-size:11px; color:#7c3aed;">已擁有 → +${dupXpGained} XP${leveledFromDup ? `（升 ${leveledFromDup} 級！）` : ''}</div>`
            : '<div class="rl-item" style="font-size:11px; color:#16a34a;">永久加入寶物庫！</div>'}
        </div>
      `;
      renderCharCard();
      renderRpgStats();
      updateStaminaUI();
      return;
    }
    // 處理 outcome
    let parts = [];
    let resultColor = '#5a4a4a';
    const applyAmount = (val) => {
      if (Array.isArray(val)) return val[0] + Math.floor(Math.random() * (val[1] - val[0] + 1));
      return Number(val) || 0;
    };
    // coins
    if (outcome.coins != null) {
      const amt = applyAmount(outcome.coins);
      if (amt > 0) {
        refundCoins(me.id, amt);
        parts.push(`<span style="color:#16a34a;">+${amt} 鵝鵝幣</span>`);
      } else if (amt < 0) {
        // 防止扣超過手上有的（負債也允許，但顯示為扣多少）
        spendCoins(me.id, -amt);
        parts.push(`<span style="color:#dc2626;">${amt} 鵝鵝幣</span>`);
      }
    }
    // hp
    if (outcome.hp) {
      const amt = applyAmount(outcome.hp);
      const stats = computeStats(me);
      r.hp = Math.max(0, Math.min(stats.maxHp, (r.hp || 0) + amt));
      if (r.hp <= 0 && (r.level || 1) > 4) r.deathAt = Date.now();
      parts.push(amt >= 0
        ? `<span style="color:#16a34a;">+${amt} HP</span>`
        : `<span style="color:#dc2626;">${amt} HP</span>`);
    }
    // xp
    if (outcome.xp) {
      const amt = applyAmount(outcome.xp);
      r.xp = Math.max(0, (r.xp || 0) + amt);
      let leveled = 0;
      while (r.xp >= xpForLevel(r.level)) {
        r.xp -= xpForLevel(r.level);
        r.level += 1;
        r.skillPoints = (r.skillPoints || 0) + POINTS_PER_LEVEL.skill;
        r.abilityPoints = (r.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
        leveled++;
      }
      if (leveled) {
        const ns = computeStats(me);
        r.hp = ns.maxHp; r.mp = ns.maxMp; r.deathAt = null;
      }
      parts.push(amt >= 0
        ? `<span style="color:#7c3aed;">+${amt} XP</span>${leveled ? `<span style="color:#7c3aed; font-weight:700;">（升級到 Lv ${r.level}！）</span>` : ''}`
        : `<span style="color:#9ca3af;">${amt} XP</span>`);
    }
    // 永久屬性的舊路徑已移除——統一從寶物庫取得。
    // 萬一還有舊事件帶 stat:，靜默轉成 50 XP，避免出錯。
    if (outcome.stat) {
      r.xp = (r.xp || 0) + 50;
      parts.push(`<span style="color:#7c3aed;">+50 XP</span>`);
    }
    // 隨機掉落
    if (outcome.item === 'drop') {
      const drop = generateDropItem(r.level, true);
      if (drop) {
        r.inventory = r.inventory || [];
        r.inventory.push(drop);
        const rarLabel = RARITY[drop.rarity]?.label || '';
        const rarColor = RARITY[drop.rarity]?.color || '#7c3aed';
        parts.push(`<span style="color:${rarColor};">[${rarLabel}] ${drop.icon} ${escapeHtml(drop.name)}</span>`);
      }
    }
    // 觸發綠茶事件
    if (outcome.greentea) {
      r.metGreenTea = (r.metGreenTea || 0) + 1;
      // 偷錢扣 HP
      const kickDmg = 5 + Math.floor(Math.random() * 5);
      const stolen = 10;
      const stats = computeStats(me);
      r.hp = Math.max(1, Math.min(stats.maxHp, (r.hp || stats.maxHp) - kickDmg));
      spendCoins(me.id, stolen);
      parts.push(`<span style="color:#dc2626;">🍵 綠茶鵝偷襲 −${stolen} 幣 / −${kickDmg} HP</span>`);
      // 是否觸發指南書
      if (typeof grantGreenTeaGuides === 'function') grantGreenTeaGuides(me);
    }
    saveData();
    renderCharCard();
    renderEquipment();
    renderRpgStats();
    renderLeaderboard();
    updateStaminaUI();
    // 顯示結果
    const html = `
      <div style="text-align:center; padding:6px 0;">
        <div style="font-size:48px; margin-bottom:6px;">${quest.icon}</div>
        <div style="font-size:13px; color:#5b3d62; padding:10px 12px; background:#fff8fb; border-radius:10px; border:2px dashed #ffd6e0; line-height:1.7;">${escapeHtml(outcome.line || '')}</div>
        ${parts.length > 0 ? `<div style="margin-top:14px; padding:10px; background:#ecfdf5; border-radius:10px; font-size:13px; line-height:1.9;">${parts.join('　·　')}</div>` : '<div style="margin-top:14px; color:#9ca3af; font-size:12px;">什麼都沒發生。</div>'}
        <button class="btn btn-primary" onclick="hideModal()" style="margin-top:14px;">繼續探險 ✨</button>
      </div>
    `;
    showModal('🎣 探險結果', html);
  }
  window.resolveForageChoice = resolveForageChoice;

  let __fightInProgress = false;
  function onFight(opts) {
    if (__fightInProgress) { showToast('⏳ 戰鬥進行中…請稍候'); return; }
    const skipStamina = opts && opts.skipStamina;
    const me = getMe();
    if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.class) return;
    if (!skipStamina) {
      tickRecovery(me);
      if (rpg.stamina < STAMINA_PER_FIGHT) {
        showToast(`⚡ 體力不足（需 ${STAMINA_PER_FIGHT}，目前 ${rpg.stamina}）`);
        return;
      }
    }
    if (rpg.hp <= 0) { showToast('💀 你還在休息中，等復活或喝復活藥'); return; }

    // 鎖按鈕，扣體力
    document.getElementById('fightBtn').disabled = true;
    __fightInProgress = true;
    if (!skipStamina) rpg.stamina -= STAMINA_PER_FIGHT;

    // 使用目前選擇的地區/層數
    const zoneId = rpg.currentZone || 'forest';
    const layerId = rpg.currentLayer || 'upper';
    const zone = ZONES.find(z => z.id === zoneId) || ZONES[0];
    // ⭐ 每場戰鬥隨機抽該層範圍內的怪物等級
    const targetLv = pickLayerLevel(layerId);
    const monster = generateMonster(rpg.level, { zoneId, layerId, targetLv, forageElite: !!(opts && opts.forageElite) });
    const result = autoFight(me, monster);

    // 渲染戰鬥場景，依序播放
    const stats = computeStats(me);
    const arenaHtml = `
      <div class="battle-arena" id="battleArena">
        <div class="combatant" id="combatPlayer">
          <div class="combatant-icon">${CLASSES[rpg.class].icon}</div>
          <div class="combatant-name">${escapeHtml(me.name)} Lv${rpg.level}</div>
          <div class="combatant-hp-track"><div class="combatant-hp-fill" id="pHpBar" style="width:100%"></div></div>
          <div class="combatant-hp-text" id="pHpText">${stats.maxHp}/${stats.maxHp}</div>
          <div class="combatant-hp-track" style="margin-top:2px;"><div class="combatant-hp-fill" id="pMpBar" style="width:100%; background:linear-gradient(90deg,#93c5fd,#3b82f6);"></div></div>
          <div class="combatant-hp-text" id="pMpText" style="color:#1e40af;">MP ${stats.maxMp}/${stats.maxMp}</div>
        </div>
        <div class="vs-icon">⚔️</div>
        <div class="combatant" id="combatMonster">
          <div class="combatant-icon">${monster.icon}</div>
          <div class="combatant-name">${monster.name} Lv${monster.level}</div>
          ${monster.ability ? `<div style="font-size:9px; color:#7c3aed; font-weight:600; margin-bottom:2px;">${describeAbility(monster.ability)}</div>` : ''}
          <div class="combatant-hp-track"><div class="combatant-hp-fill" id="mHpBar" style="width:100%"></div></div>
          <div class="combatant-hp-text" id="mHpText">${monster.hp}/${monster.maxHp}</div>
        </div>
      </div>
      <div class="battle-log" id="battleLog"></div>
    `;
    document.getElementById('fightResult').innerHTML = arenaHtml;

    // 播放 log
    const logEl = document.getElementById('battleLog');
    let i = 0;
    const playStep = () => {
      if (i >= result.log.length) {
        // 結算
        finalizeFight(me, monster, result, stats);
        snapshotLastFight(monster, result);
        // 在戰鬥結果下方加一個小回報按鈕
        try {
          const fr = document.getElementById('fightResult');
          if (fr) {
            const btn = document.createElement('button');
            btn.className = 'btn btn-secondary';
            btn.style.cssText = 'margin-top:8px; padding:6px 10px; font-size:12px; background:#fef2f2; color:#991b1b; border:1px dashed #f87171;';
            btn.textContent = '🐛 這場有 BUG？回報一下';
            btn.onclick = () => openBugReport(true);
            fr.appendChild(btn);
          }
        } catch (e) {}
        __fightInProgress = false;
        return;
      }
      const entry = result.log[i++];
      const cls = entry.type === 'crit-player' ? 'log-crit'
        : entry.type === 'player' ? 'log-player'
        : entry.type === 'monster' ? 'log-monster'
        : 'log-system';
      const div = document.createElement('div');
      div.className = `log-line ${cls}`;
      div.textContent = entry.text;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      // 更新 HP / MP 條
      if (entry.hp) {
        document.getElementById('pHpBar').style.width = (entry.hp.player / stats.maxHp * 100) + '%';
        document.getElementById('pHpText').textContent = `${entry.hp.player}/${stats.maxHp}`;
        document.getElementById('mHpBar').style.width = (entry.hp.monster / monster.maxHp * 100) + '%';
        document.getElementById('mHpText').textContent = `${entry.hp.monster}/${monster.maxHp}`;
        if (entry.hp.mp != null) {
          document.getElementById('pMpBar').style.width = (entry.hp.mp / stats.maxMp * 100) + '%';
          document.getElementById('pMpText').textContent = `MP ${entry.hp.mp}/${stats.maxMp}`;
        }
        // shake 動畫
        if (entry.type === 'player' || entry.type === 'crit-player') {
          const m = document.getElementById('combatMonster');
          m.classList.remove('hurt'); void m.offsetWidth; m.classList.add('hurt');
        } else if (entry.type === 'monster') {
          const p = document.getElementById('combatPlayer');
          p.classList.remove('hurt'); void p.offsetWidth; p.classList.add('hurt');
        }
      }
      setTimeout(playStep, 550);
    };
    playStep();
  }
  window.onFight = onFight;

  function finalizeFight(player, monster, result, stats) {
    const rpg = getRpg(player);
    // ⭐ HP/MP 是屬性：戰後一律回滿（敗北分支會自己把 hp 設 0 觸發死亡）
    rpg.hp = stats.maxHp;
    rpg.mp = stats.maxMp;
    if (result.coinsStolen > 0) {
      player.coinsSpent = (player.coinsSpent || 0) + result.coinsStolen;
    }
    if (result.critCount) rpg.critCount = (rpg.critCount || 0) + result.critCount;
    if (result.metGreenTea) {
      rpg.metGreenTea = (rpg.metGreenTea || 0) + result.metGreenTea;
      // 綠茶指南書里程碑：遇到 10/20/30/50/75/100 次自動獲得
      grantGreenTeaGuides(player);
    }
    if (result.won) {
      if (!rpg.kills) rpg.kills = {};
      rpg.kills[monster.id] = (rpg.kills[monster.id] || 0) + 1;
    }
    const logEl = document.getElementById('battleLog');
    let rewardHtml = '';

    // 綠茶事件：不算勝負，直接結算
    if (result.fled) {
      const div = document.createElement('div');
      div.className = 'log-line log-system';
      div.textContent = `🍵 綠茶鵝逃走了，這次的相遇不算戰鬥`;
      logEl.appendChild(div);
      rewardHtml = `
        <div class="reward-list" style="background:#dcfce7; border-color:#86efac;">
          <div class="rl-title" style="color:#15803d;">🍵 綠茶鵝反撒了一波</div>
          <div class="rl-item">「鵝鵝沒有錯」</div>
          <div class="rl-item" style="color:#dc2626;">💰 −${result.coinsStolen} 鵝鵝幣　❤️ −${result.kickDmg || 0} HP</div>
          <div class="rl-item" style="margin-top:4px; font-size:11px; color:#16a34a;">無 XP / 無金幣 / 無戰利品</div>
        </div>
      `;
      document.getElementById('fightResult').insertAdjacentHTML('beforeend', rewardHtml);
      saveData();
      renderCharCard();
      renderEquipment();
      renderShop();
      renderRpgStats();
      updateStaminaUI();
      return;
    }

    if (result.won) {
      rpg.fightsWon = (rpg.fightsWon || 0) + 1;
      rpg.xp = (rpg.xp || 0) + monster.xpDrop;
      rpg.totalGold = (rpg.totalGold || 0) + monster.goldDrop;
      // 勝利補 20% MP
      const mpBack = Math.round(stats.maxMp * 0.2);
      rpg.mp = Math.min(stats.maxMp, rpg.mp + mpBack);
      // 獎勵鵝鵝幣
      refundCoins(player.id, monster.goldDrop);
      // 使用目前地區的掉落偏好；掉落等級 = 怪物等級（樓層）
      const _zone = ZONES.find(z => z.id === (rpg.currentZone || 'forest'));
      const dropLv = monster.level || rpg.level;
      // 寶箱怪：roll 兩次 → 掉裝率變 ~2 倍
      const drop = rollItemDrop(dropLv, { slotBias: _zone ? _zone.dropBias : null });
      if (drop) rpg.inventory.push(drop);
      let chestExtraDrop = null;
      if (monster.isChest) {
        chestExtraDrop = rollItemDrop(dropLv, { slotBias: _zone ? _zone.dropBias : null });
        if (chestExtraDrop) rpg.inventory.push(chestExtraDrop);
      }
      forageTrace('rollItemDrop', { zoneId: _zone?.id, dropBias: _zone?.dropBias, dropLv, gotDrop: !!drop, dropId: drop?.id, dropName: drop?.name, rarity: drop?.rarity, affixCount: drop?.affixes?.length, isChest: !!monster.isChest, chestExtra: !!chestExtraDrop });
      // 精英怪：必掉 2 件 3 詞條的裝備（地區偏好部位、隨機等級在玩家層樓附近）
      let elitePiece = null;
      let eliteExtraDrops = [];
      let treasureDropped = null;     // 拿到的寶物本體（首次取得才會有）
      let treasureDupXp = 0;           // 重複的話換 XP
      if (monster.isElite && !monster.isForageElite) {
        // ⭐ 地區精英：必掉 2 件「3 詞條」的裝備
        for (let i = 0; i < 2; i++) {
          const eliteDrop = generateDropItem(dropLv, { slotBias: _zone ? _zone.dropBias : null, forceAffixes: 3, boosted: true });
          if (eliteDrop) {
            rpg.inventory.push(eliteDrop);
            eliteExtraDrops.push(eliteDrop);
          }
        }
        forageTrace('zone-elite drop (2x 3-affix)', { dropLv, count: eliteExtraDrops.length, ids: eliteExtraDrops.map(d => d.id) });
      } else if (monster.isForageElite) {
        // ⭐ 探險精英：改成給寶物（重複→ +1000 XP）
        rpg.treasures = rpg.treasures || [];
        const allIds = Object.keys(TREASURES);
        const tid = allIds[Math.floor(Math.random() * allIds.length)];
        const treasure = TREASURES[tid];
        if (rpg.treasures.includes(tid)) {
          rpg.xp = (rpg.xp || 0) + TREASURE_DUP_XP;
          treasureDupXp = TREASURE_DUP_XP;
          treasureDropped = { ...treasure, duplicate: true };
          forageTrace('forage-elite treasure DUP', { tid, name: treasure?.name, dupXp: TREASURE_DUP_XP, ownedCount: rpg.treasures.length });
        } else {
          rpg.treasures.push(tid);
          treasureDropped = { ...treasure, duplicate: false };
          forageTrace('forage-elite treasure NEW', { tid, name: treasure?.name, ownedCount: rpg.treasures.length });
          // 寶物給的能力加成是 derived（透過 computeTreasureBonuses），不直接改 abilities
        }
      } else {
        // 普通怪 / 沒掉裝（不是精英）— 也記一筆方便除錯
        forageTrace('non-elite or no-drop', { isElite: !!monster.isElite, isForageElite: !!monster.isForageElite, dropSet: monster.dropSet, monsterId: monster.id });
      }
      // ⭐ 新版：層 + 樓自由切換，不再追蹤解鎖進度
      // 升級檢查
      let leveledUp = 0;
      while (rpg.xp >= xpForLevel(rpg.level)) {
        rpg.xp -= xpForLevel(rpg.level);
        rpg.level += 1;
        rpg.skillPoints = (rpg.skillPoints || 0) + POINTS_PER_LEVEL.skill;
        rpg.abilityPoints = (rpg.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
        leveledUp++;
      }
      // 升級回滿 HP
      if (leveledUp) {
        const newStats = computeStats(player);
        rpg.hp = newStats.maxHp;
        rpg.mp = newStats.maxMp;
        rpg.deathAt = null;
      }

      const div = document.createElement('div');
      div.className = 'log-line log-victory';
      div.textContent = `✨ ${monster.name}倒下！`;
      logEl.appendChild(div);
      rewardHtml = `
        <div class="reward-list" ${monster.isElite ? 'style="background:linear-gradient(135deg,#fef3c7,#fde047); border-color:#f59e0b;"' : ''}>
          <div class="rl-title">${monster.isElite ? '⭐ 精英戰利品' : '🎉 戰利品'}</div>
          <div class="rl-item">⭐ +${monster.xpDrop} XP</div>
          <div class="rl-item">🪙 +${monster.goldDrop} 鵝鵝幣</div>
          ${drop ? `<div class="rl-item">${drop.icon} ${drop.name}<span style="font-size:10px; color:#8b6f9b;"> · ${drop.affixes?.length || 0} 詞條</span></div>` : ''}
          ${chestExtraDrop ? `<div class="rl-item" style="color:#92400e;">📦 寶箱多掉：${chestExtraDrop.icon} ${chestExtraDrop.name} <span style="font-size:10px; opacity:0.85;">· ${chestExtraDrop.affixes?.length || 0} 詞條</span></div>` : ''}
          ${eliteExtraDrops && eliteExtraDrops.length ? eliteExtraDrops.map(d => `<div class="rl-item" style="color:${RARITY[d.rarity]?.color || '#7c3aed'}; font-weight:700;">⭐ ${d.icon} ${escapeHtml(d.name)} <span style="font-size:10px; opacity:0.85;">· 3 詞條 · Lv${d.lv}</span></div>`).join('') : ''}
          ${elitePiece ? `<div class="rl-item" style="color:${SETS[monster.dropSet]?.color || '#7c3aed'}; font-weight:700;">🛡 [套裝] ${elitePiece.icon} ${elitePiece.name}（${SETS[monster.dropSet]?.name}）</div>` : ''}
          ${treasureDropped && !treasureDropped.duplicate ? `
            <div class="rl-item" style="color:#7c3aed; font-weight:700; padding:6px 8px; background:#f3e8ff; border-radius:8px; margin-top:4px;">
              🎁 寶物入庫：${treasureDropped.icon} <b>${escapeHtml(treasureDropped.name)}</b>
              <div style="font-size:11px; color:#5b21b6; font-weight:500; margin-top:2px;">永久 +${treasureDropped.value} ${treasureDropped.ability.toUpperCase()}</div>
            </div>
          ` : ''}
          ${treasureDropped && treasureDropped.duplicate ? `
            <div class="rl-item" style="color:#92400e; padding:6px 8px; background:#fef3c7; border-radius:8px; margin-top:4px;">
              🎁 重複了「${treasureDropped.icon} ${escapeHtml(treasureDropped.name)}」 → +${treasureDupXp} XP
            </div>
          ` : ''}
          ${result.coinsStolen > 0 ? `<div class="rl-item" style="color:#dc2626;">💰 被偷走 −${result.coinsStolen} 鵝鵝幣</div>` : ''}
          ${leveledUp ? `<div style="margin-top:8px; color:#7c3aed; font-weight:700;">🎊 升級到 Lv ${rpg.level}！HP/MP 回滿、+${leveledUp * POINTS_PER_LEVEL.skill} 技能點 / +${leveledUp * POINTS_PER_LEVEL.ability} 能力點</div>` : ''}
        </div>
      `;
      if (leveledUp) showLevelUp(rpg.level);
    } else {
      rpg.fightsLost = (rpg.fightsLost || 0) + 1;
      // 新手保護：頭 4 等死掉直接 HP 回滿、不進入休息
      if ((rpg.level || 1) <= 4) {
        const newStats = computeStats(player);
        rpg.hp = newStats.maxHp;
        rpg.deathAt = null;
        const div = document.createElement('div');
        div.className = 'log-line log-system';
        div.textContent = `🍀 新手保護：HP 自動回滿（Lv 5 起死亡需休息 5 分鐘）`;
        logEl.appendChild(div);
        rewardHtml = `
          <div class="reward-list" style="background:#fef9c3; border-color:#fde047;">
            <div class="rl-title" style="color:#a16207;">😭 失敗了…但</div>
            <div class="rl-item">🍀 <b>新手保護啟動</b>：HP 已自動回滿</div>
            <div class="rl-item" style="font-size:11px; color:#92400e;">Lv 5 起，敗北後需休息 5 分鐘</div>
            ${result.coinsStolen > 0 ? `<div class="rl-item" style="color:#dc2626;">💰 被偷走 −${result.coinsStolen} 鵝鵝幣</div>` : ''}
          </div>
        `;
      } else {
        rpg.hp = 0;
        rpg.deathAt = Date.now();
        const div = document.createElement('div');
        div.className = 'log-line log-defeat';
        div.textContent = `💀 你被打倒了… 5 分鐘後恢復 50% HP，或用 🧚 復活藥水`;
        logEl.appendChild(div);
        rewardHtml = `
          <div class="reward-list reward-loss">
            <div class="rl-title">😭 失敗了</div>
            <div class="rl-item">💀 進入休息：5 分鐘後恢復到 50% HP</div>
            ${result.coinsStolen > 0 ? `<div class="rl-item" style="color:#dc2626;">💰 被偷走 −${result.coinsStolen} 鵝鵝幣</div>` : ''}
            <div class="rl-item" style="margin-top:4px;">🧚 想立刻復活可去商店買「復活藥水」（100 鵝幣）</div>
          </div>
        `;
      }
    }
    document.getElementById('fightResult').insertAdjacentHTML('beforeend', rewardHtml);
    saveData();
    renderCharCard();
    renderEquipment();
    renderShop();
    renderRpgStats();
    renderZoneSelector();
    updateStaminaUI();
  }

  function showLevelUp(lv) {
    const overlay = document.createElement('div');
    overlay.className = 'level-up-overlay';
    overlay.innerHTML = `<div class="level-up-text">🎊 LV ${lv}!</div>`;
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 3500);
  }

  function equipFromInv(idx) {
    const me = getMe();
    const rpg = getRpg(me);
    const entry = rpg.inventory[idx];
    const item = resolveItem(entry);
    if (!item) return;
    // ⭐ 裝備不再有等級限制（拿到就能用）
    // 把現有同 slot 裝備丟回背包
    const cur = rpg.equipment[item.slot];
    if (cur) rpg.inventory.push(cur);
    rpg.equipment[item.slot] = entry;
    rpg.inventory.splice(idx, 1);
    syncEquipped(me);
    saveData();
    renderCharCard();
    renderEquipment();
    showToast(`已裝備 ${item.icon} ${item.name}`);
  }
  window.equipFromInv = equipFromInv;

  function unequip(slot) {
    const me = getMe();
    const rpg = getRpg(me);
    const cur = rpg.equipment[slot];
    if (!cur) return;
    rpg.inventory.push(cur);
    rpg.equipment[slot] = null;
    syncEquipped(me);
    saveData();
    renderCharCard();
    renderEquipment();
  }
  window.unequip = unequip;

  // ============================================================
  // Debug 模式（密碼 admin 解鎖）
  // ============================================================
  const DEBUG_PASS = 'admin';
  const DEBUG_KEY = 'mahjong-debug-unlocked';
  function isDebugUnlocked() { return localStorage.getItem(DEBUG_KEY) === '1'; }
  function refreshDebugBtn() {
    const btn = document.getElementById('debugBtn');
    if (btn) btn.classList.toggle('unlocked', isDebugUnlocked());
  }
  function onDebugClick() {
    if (!isDebugUnlocked()) {
      const pw = prompt('🔐 Debug 密碼');
      if (pw === null) return;
      if (pw !== DEBUG_PASS) { showToast('❌ 密碼錯誤'); return; }
      localStorage.setItem(DEBUG_KEY, '1');
      showToast('🛠 Debug 模式已解鎖');
      refreshDebugBtn();
    }
    showDebugModal();
  }
  window.onDebugClick = onDebugClick;

  function showDebugModal() {
    const me = getMe();

        <button class="btn btn-secondary" onclick="adminAddCoins(1000)">+1,000</button>
        <button class="btn btn-secondary" onclick="adminAddCoins(10000)">+10,000</button>
      </div>

      <div class="shop-section-title">⭐ 經驗值（會自動升級）</div>
      <div class="debug-grid">
        <button class="btn btn-secondary" onclick="adminAddXp(100)">+100</button>
        <button class="btn btn-secondary" onclick="adminAddXp(1000)">+1,000</button>
        <button class="btn btn-secondary" onclick="adminAddXp(10000)">+10,000</button>
      </div>

      <div class="shop-section-title">🎯 直接設定等級</div>
      <div style="display:flex; gap:6px; align-items:center; margin-bottom:10px;">
        <input id="adminLvInput" type="number" min="1" max="50" value="${r.level}"
               style="flex:1; padding:8px; border:2px solid #ddd6fe; border-radius:8px; text-align:center; font-family:inherit; font-size:14px;">
        <button class="btn btn-primary" style="width:auto; padding:8px 16px;" onclick="adminSetLevel(document.getElementById('adminLvInput').value)">設定</button>
