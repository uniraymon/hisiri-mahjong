  // ⭐ 顯示全員 HP 明細：基底 / 等級成長 / 技能 / 能力 / 裝備 / 套裝 / 寶物 / 精魂
  function adminShowHpBreakdown() {
    const rows = [];
    for (const p of players) {
      if (!p || !p.rpg || !p.rpg.class) continue;
      const cls = CLASSES[p.rpg.class];
      if (!cls) continue;
      const lv = p.rpg.level || 1;
      const baseHp = cls.hp;
      const lvHp = (lv - 1) * cls.hpPer;
      const b = (typeof computeSkillBonuses === 'function') ? computeSkillBonuses(p) : { hp: 0, hpPct: 0 };
      const ab = (typeof computeAbilityBonuses === 'function') ? computeAbilityBonuses(p) : { hp: 0 };
      const skillHpPct = b.hpPct || 0;
      const skillHpFlat = b.hp || 0;
      const abilityHp = ab.hp || 0;
      // 裝備 HP（10 槽）
      let equipHp = 0;
      for (const slot of ['weapon', 'armor', 'accessory', 'helmet', 'gloves', 'boots', 'cape', 'wings', 'pet', 'guide']) {
        const id = p.rpg.equipment?.[slot];
        if (!id) continue;
        const it = (typeof resolveItem === 'function') ? resolveItem(id) : null;
        if (it && it.hp) equipHp += it.hp;
      }
      // 套裝 HP
      let setHp = 0;
      try {
        const setInfo = (typeof computeSetBonuses === 'function') ? computeSetBonuses(p) : { bonuses: {} };
        setHp = setInfo.bonuses?.hp || 0;
      } catch (e) {}
      // 寶物 HP
      let treasureHp = 0;
      try {
        const t = (typeof computeTreasureBonuses === 'function') ? computeTreasureBonuses(p.rpg) : {};
        treasureHp = t.hp || 0;
      } catch (e) {}
      // 精魂 HP
      let spiritHp = 0;
      try {
        const slots = (typeof getSpiritSlots === 'function') ? getSpiritSlots(p.rpg) : [];
        for (const sp of (slots || [])) if (sp && sp.hp) spiritHp += sp.hp;
      } catch (e) {}
      const beforePct = baseHp + lvHp + skillHpFlat + abilityHp;
      const afterPct = Math.round(beforePct * (1 + skillHpPct));
      const total = afterPct + equipHp + setHp + treasureHp + spiritHp;
      rows.push({
        name: `${p.avatar || '🎴'} ${p.name}`,
        cls: cls.name,
        lv,
        baseHp, lvHp, skillHpFlat, abilityHp, skillHpPct,

            <th style="padding:4px 4px;">套裝</th>

          ${rows.map(r => `
            <tr style="border-bottom:1px solid #e9d5ff;">
              <td style="padding:4px 6px;">${escapeHtml(r.name)}</td>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import { getFirestore, doc, collection, onSnapshot, setDoc, getDoc, deleteField, runTransaction, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1dzTX6COdDAab7gojdXaycx7Vr9EydN8",
    authDomain: "hisiri-mahjong.firebaseapp.com",
    projectId: "hisiri-mahjong",
    storageBucket: "hisiri-mahjong.firebasestorage.app",
    messagingSenderId: "565503631941",
    appId: "1:565503631941:web:be3c8a762292960527792c"
  };
  try {
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const hashParams = new URLSearchParams(location.hash.replace(/^#/, '?'));
    const ROOM_ID = hashParams.get('room') || localStorage.getItem('mahjong-room-id') || 'shared';
    localStorage.setItem('mahjong-room-id', ROOM_ID);

    // ⭐ 拆檔結構：rooms/{ROOM_ID}（meta）+ rooms/{ROOM_ID}/players/{pid}
    //              + rooms/{ROOM_ID}/wb9/{bossId}（每王獨立 doc，Phase B）
    const metaRef = doc(db, 'rooms', ROOM_ID);
    const playersCol = collection(db, 'rooms', ROOM_ID, 'players');
    const wb9Col    = collection(db, 'rooms', ROOM_ID, 'wb9');

    let firstMetaSnap = true;
    let firstPlayersSnap = true;
    let metaSaveTimer = null;
    const playerSaveTimers = {};
    let metaReady = false;
    let playersReady = false;
    const seenPlayerIds = new Set();

    function checkReady() {
      if (metaReady && playersReady && !window.__firebaseSync.ready) {
        window.__firebaseSync.ready = true;
        window.__updateSyncStatus?.('☁️ 已同步', 'ok');
      }
    }

    // ⭐ Phase A 共用：深度去除 undefined（Firestore 不接受）
    const _prune = (v) => {
      if (Array.isArray(v)) return v.map(_prune).filter(x => x !== undefined);
      if (v !== null && typeof v === 'object') {
        const out = {};
        for (const k of Object.keys(v)) {
          const x = _prune(v[k]);
          if (x !== undefined) out[k] = x;
        }
        return out;
      }
      return v;
    };

    window.__firebaseSync = {
      ready: false,
      roomId: ROOM_ID,
      // ============================================================
      // ⭐ Phase A：玩家 inventory / bossCoins atomic 操作
      // ============================================================
      //  目的：取代「全量 setDoc 整份 player」的舊路徑，避免 race / rate-limit
      //  - addInventoryItemTx：tx 讀玩家 → push item → 寫回（atomic）
      //  - removeInventoryItemTx：tx 讀玩家 → filter → 寫回
      //  - addBossCoinTx：updateDoc + FieldValue.increment（純 atomic 計數，不重寫整份）
      //  - consumeBossCoinTx：tx 讀 → 各種王硬幣扣到夠 → 寫回（無法用負 increment 防止扣到負數）
      addInventoryItemTx: async (pid, item) => {
        return await runTransaction(db, async (tx) => {
          const ref = doc(playersCol, pid);
          const snap = await tx.get(ref);
          const data = snap.exists() ? snap.data() : { id: pid };
          data.rpg = data.rpg || {};
          data.rpg.inventory = Array.isArray(data.rpg.inventory) ? data.rpg.inventory : [];
          data.rpg.inventory.push(_prune(item));
          data.lastTouchedAt = Date.now();
          tx.set(ref, _prune(data));
        });
      },
      removeInventoryItemTx: async (pid, predicate) => {
        // predicate = { id: 'xxx' } 或 { idx: N }，不能傳 function 進 tx
        return await runTransaction(db, async (tx) => {
          const ref = doc(playersCol, pid);
          const snap = await tx.get(ref);
          if (!snap.exists()) return;
          const data = snap.data();
          if (!data.rpg || !Array.isArray(data.rpg.inventory)) return;
          if (predicate.id != null) {
            data.rpg.inventory = data.rpg.inventory.filter(it => {
              if (typeof it === 'string') return it !== predicate.id;
              return it && it.id !== predicate.id;
            });
          } else if (predicate.idx != null) {
            data.rpg.inventory.splice(predicate.idx, 1);
          }
          data.lastTouchedAt = Date.now();
          tx.set(ref, _prune(data));
        });
      },
      addBossCoinTx: async (pid, coinId, qty) => {
        // 用 updateDoc + increment：純 atomic 計數，不沾整份玩家文件
        const ref = doc(playersCol, pid);
        await updateDoc(ref, {
          [`rpg.bossCoins.${coinId}`]: increment(qty),
          lastTouchedAt: Date.now(),
        });
      },
      consumeBossCoinsTx: async (pid, totalQty) => {
        // 跨王硬幣消耗 N 顆（鵝王扭蛋用任何王硬幣抽）
        // 因為要按 qty 大的優先扣，無法用單一 increment，必須 tx
        return await runTransaction(db, async (tx) => {
          const ref = doc(playersCol, pid);
          const snap = await tx.get(ref);
          if (!snap.exists()) throw new Error('player-not-found');
          const data = snap.data();
          data.rpg = data.rpg || {};
          data.rpg.bossCoins = data.rpg.bossCoins || {};
          const total = Object.values(data.rpg.bossCoins).reduce((a, b) => a + (b || 0), 0);
          if (total < totalQty) throw new Error('insufficient-coins:' + total);
          // 按 qty 由大到小扣
          const entries = Object.entries(data.rpg.bossCoins).sort((a, b) => (b[1] || 0) - (a[1] || 0));
          let need = totalQty;
          for (const [coinId, have] of entries) {
            if (need <= 0) break;
            const take = Math.min(have, need);
            data.rpg.bossCoins[coinId] = have - take;
            need -= take;
          }
          data.lastTouchedAt = Date.now();
          tx.set(ref, _prune(data));
          return { remaining: total - totalQty };
        });
      },
      // 世界王打擊：用 transaction 原子地讀 + 扣 HP + 寫回，避免兩個玩家互相蓋掉
      // bossDef 是 WB9_BOSSES 裡的設定（要拿 maxHp / 各檔次獎勵）
      // 回傳 { actualDmg, newState, killed, pendingRewards }
      // ============================================================
      // ⭐ Phase B：v9 世界王 transactions（每王一份獨立 doc）
      // ============================================================
      // 加入排隊：TX 讀取所有王的 doc → 確認沒重複排隊 → 寫入目標王 doc
      // bossDef = WB9_BOSSES 裡的設定（拿 maxHp 初始化）
      wb9JoinQueue: async (bossId, attackerId, bossDef) => {
        const allIds = (window.__wb9BossIds || [bossId]);
        return await runTransaction(db, async (tx) => {
          // 讀取所有王的 doc（確認是否已排隊）
          const refs  = allIds.map(id => doc(wb9Col, id));
          const snaps = await Promise.all(refs.map(r => tx.get(r)));
          for (const s of snaps) {
            if (!s.exists()) continue;
            const q = (s.data().queue) || [];
            if (q.find(x => x && x.pid === attackerId)) {
              throw new Error('already-queued:' + s.id);
            }
          }
          // 取得 / 初始化目標王 state
          const bossRef = doc(wb9Col, bossId);
          const bossSnap = snaps[allIds.indexOf(bossId)];
          const state = bossSnap?.exists()
            ? { ...bossSnap.data() }
            : { hp: bossDef.maxHp, queue: [], damageLog: {}, killCount: 0, recentBattles: [], lastKill: null };
          state.queue = Array.isArray(state.queue) ? [...state.queue] : [];
          state.queue.push({ pid: attackerId, joinedAt: Date.now() });
          tx.set(bossRef, _prune(state));
          return { state, position: state.queue.length };
        });
      },
      // 退出排隊：TX 讀取目標王 doc → 移除該玩家 → 寫回
      wb9LeaveQueue: async (bossId, attackerId) => {
        const bossRef = doc(wb9Col, bossId);
        return await runTransaction(db, async (tx) => {
          const snap = await tx.get(bossRef);
          if (!snap.exists()) return { ok: false };
          const state = { ...snap.data() };
          if (!Array.isArray(state.queue)) return { ok: false };
          state.queue = state.queue.filter(x => x && x.pid !== attackerId);
          tx.set(bossRef, _prune(state));
          return { ok: true, queueLen: state.queue.length };
        });
      },
      // 直接更新王 doc（commit 3 攻擊 TX 用）
      wb9SaveBoss: async (bossId, state) => {
        await setDoc(doc(wb9Col, bossId), _prune(state));
      },
      // ⭐ Boss 覆寫：寫入 Firestore config，onSnapshot 會自動推給全部客戶端
      // saveBossOverrides 已移除 — 改透過 saveData() + meta doc 同步
      // ⭐ commit 3：攻擊 TX
      // bossDef = { maxHp, staleMs }（從主腳本傳入）
      // partialBattleSnap = 戰鬥日誌快照
      wb9AttackTx: async (bossId, attackerId, dmgRaw, bossDef, partialBattleSnap) => {
        const bossRef = doc(wb9Col, bossId);
        return await runTransaction(db, async (tx) => {
          const snap = await tx.get(bossRef);
          if (!snap.exists()) throw new Error('boss-not-found');
          const state = { ...snap.data() };
          state.queue = Array.isArray(state.queue) ? [...state.queue] : [];
          // 踢過期隊頭（> staleMs 沒動作）
          const staleMs = (bossDef && bossDef.staleMs) || 60000;
          while (state.queue.length > 0) {
            const head = state.queue[0];
            if (head && (Date.now() - (head.joinedAt || 0)) > staleMs) {
              state.queue = state.queue.slice(1);
            } else break;
          }
          // 驗證輪到攻擊者
          if (!state.queue.length || state.queue[0].pid !== attackerId) {
            throw new Error('not-your-turn');
          }
          // 套用傷害（上限為當前 HP）
          const actualDmg = Math.min(state.hp || 0, Math.max(0, dmgRaw));
          state.hp = Math.max(0, (state.hp || 0) - actualDmg);
          const killed = state.hp <= 0;
          // 傷害統計
          state.damageLog = state.damageLog || {};
          state.damageLog[attackerId] = (state.damageLog[attackerId] || 0) + actualDmg;
          // 移出隊頭
          state.queue = state.queue.slice(1);
          state.lastHitAt = Date.now();
          // 最近戰報（最多 10 筆）
          if (partialBattleSnap) {
            const entry = { ...partialBattleSnap, dmgDealt: actualDmg, killed };
            state.recentBattles = [entry, ...(state.recentBattles || [])].slice(0, 10);
          }
          // 尾刀：重置王、清隊列、記錄
          if (killed) {
            state.killCount = (state.killCount || 0) + 1;
            state.lastKill = { pid: attackerId, ts: Date.now(), damageLog: { ...state.damageLog } };
            state.damageLog = {};
            state.queue = [];
            state.hp = (bossDef && bossDef.maxHp) || (state.hp);  // 重生滿血
          }
          tx.set(bossRef, _prune(state));
          return { actualDmg, killed, newState: state };
        });
      },

      // ⭐ 以下三個方法為 v8 舊世界王 TX（commit 7 保留殼防止未來誤呼叫，實作已移除）
      joinBossQueue: async () => { throw new Error('v8-removed'); },
      leaveBossQueue: async () => { throw new Error('v8-removed'); },
      // ⭐ 管理員專用：強制把所有玩家文件寫到 firestore，繞過 seenPlayerIds 限制
      //   洗白 / 重置時用，否則其他人的舊 rpg / coinsSpent 會殘留在雲端，下次同步又被拉回來
      forceWriteAllPlayers: async (allPlayers) => {
        const _prune = (v) => {
          if (Array.isArray(v)) return v.map(_prune).filter(x => x !== undefined);
          if (v !== null && typeof v === 'object') {
            const out = {};
            for (const k of Object.keys(v)) {
              const x = _prune(v[k]);
              if (x !== undefined) out[k] = x;
            }
            return out;
          }
          return v;
        };
        const tasks = [];
        for (const p of (allPlayers || [])) {
          if (!p || !p.id) continue;
          tasks.push(setDoc(doc(playersCol, p.id), _prune(p)));
        }
        try {
          await Promise.all(tasks);
        } catch (e) { console.error('forceWriteAllPlayers failed:', e); throw e; }
      },
      save: (payload) => {
        const meId = window.__getMeId?.();

        // Firestore 不接受 undefined。深度遞迴遞掉 undefined（陣列/物件）
        const pruneUndef = (v) => {
          if (Array.isArray(v)) return v.map(pruneUndef).filter(x => x !== undefined);
          if (v !== null && typeof v === 'object') {
            const out = {};
            for (const k of Object.keys(v)) {
              const x = pruneUndef(v[k]);
              if (x !== undefined) out[k] = x;
            }
            return out;
          }
          return v;
        };

        // 把 undefined 欄位過濾掉
        // 注意：merge:true 下，缺漏的欄位會保留雲端原值；只丟掉 undefined 不會誤刪
        const rawMeta = {
          history: payload.history,
          gifts: payload.gifts,
          comments: payload.comments,
          pendingBets: payload.pendingBets,
          betPool: payload.betPool,
          worldBoss: payload.worldBoss,
          // ⭐ Phase B：wb9 已移至 rooms/{ROOM_ID}/wb9/{bossId}，不再寫入 meta
          bugs: payload.bugs,
          baseMoney: payload.baseMoney,
          basePoint: payload.basePoint,
          bossOverrides: payload.bossOverrides, // ⭐ Admin boss stat overrides
        };
        const meta = pruneUndef(rawMeta);

        clearTimeout(metaSaveTimer);
        // ⭐ 1500ms debounce（比 250 慢 6 倍，緩解 Firestore write stream exhausted）
        metaSaveTimer = setTimeout(async () => {
          try {
            await setDoc(metaRef, meta, { merge: true });
            window.__updateSyncStatus?.('☁️ 已同步', 'ok');
          } catch (e) {
            console.error('Meta save failed:', e);
            window.__updateSyncStatus?.('☁️ 同步失敗', 'err');
          }
        }, 1500);

        const playersToWrite = [];
        if (meId && Array.isArray(payload.players)) {
          const me = payload.players.find(p => p && p.id === meId);
          if (me) playersToWrite.push(me);
          for (const p of payload.players) {
            if (p && p.id && p.id !== meId && !seenPlayerIds.has(p.id)) {
              playersToWrite.push(p);
            }
          }
        }
        for (const p of playersToWrite) {
          const cleanP = pruneUndef(p);
          clearTimeout(playerSaveTimers[p.id]);
          // ⭐ 1500ms debounce（緩解 Firestore write stream exhausted）
          playerSaveTimers[p.id] = setTimeout(async () => {
            try {
              await setDoc(doc(playersCol, p.id), cleanP);
              seenPlayerIds.add(p.id);
            } catch (e) { console.error('Player ' + p.id + ' save failed:', e); }
          }, 1500);
        }
      },
    };

    async function migrateIfNeeded() {
      try {
        const snap = await getDoc(metaRef);
        if (!snap.exists()) return;
        const data = snap.data();
        if (Array.isArray(data.players) && data.players.length > 0) {
          console.log('[migrate] 偵測舊結構，拆分 ' + data.players.length + ' 個玩家');
          for (const p of data.players) {
            if (p && p.id) await setDoc(doc(playersCol, p.id), p);
          }
          await setDoc(metaRef, { players: deleteField() }, { merge: true });
          console.log('[migrate] 完成');
        }
      } catch (e) { console.error('[migrate] 失敗：', e); }
    }

    (async () => {
      await migrateIfNeeded();

      onSnapshot(metaRef, async (snap) => {
        if (firstMetaSnap) {
          firstMetaSnap = false;
          // ⭐ try-finally：保證 metaReady 一定被設為 true，即使內部例外也不卡住 checkReady
          try {
            if (!snap.exists()) {
              const local = window.__getCurrentData?.();
              if (local && (local.history?.length || local.players?.length)) {
                try {
                  await setDoc(metaRef, {
                    history: local.history,
                    gifts: local.gifts,
                    comments: local.comments,
                    pendingBets: local.pendingBets,
                    betPool: local.betPool,
                    worldBoss: local.worldBoss,
                    baseMoney: local.baseMoney,
                    basePoint: local.basePoint,
                  });
                } catch (e) { console.error('[meta firstSnap] setDoc failed:', e); }
              }
            } else {
              window.__applyRemoteMeta?.(snap.data());
            }
          } catch (e) {
            console.error('[meta firstSnap] processing error:', e);
          } finally {
            metaReady = true;
            checkReady();
          }
          return;
        }
        if (snap.exists()) {
          try { window.__applyRemoteMeta?.(snap.data()); } catch (e) { console.error('[meta snap]', e); }
        }
      }, (err) => {
        console.error('Meta listen failed:', err);
        metaReady = true; checkReady(); // ⭐ 連線錯誤也要解鎖，避免 ready 永遠 false
        window.__updateSyncStatus?.('☁️ 連線錯誤', 'err');
      });

      onSnapshot(playersCol, async (snap) => {
        snap.docs.forEach(d => seenPlayerIds.add(d.id));
        if (firstPlayersSnap) {
          firstPlayersSnap = false;
          // ⭐ try-finally：保證 playersReady 一定被設為 true，即使內部例外也不卡住 checkReady
          try {
            if (snap.empty) {
              const local = window.__getCurrentData?.();
              if (local && Array.isArray(local.players)) {
                for (const p of local.players) {
                  if (p && p.id) {
                    try {
                      await setDoc(doc(playersCol, p.id), p);
                      seenPlayerIds.add(p.id);
                    } catch (e) { console.error('[players firstSnap] setDoc failed:', p.id, e); }
                  }
                }
              }
            } else {
              window.__applyRemotePlayers?.(snap.docs.map(d => d.data()));
            }
          } catch (e) {
            console.error('[players firstSnap] processing error:', e);
          } finally {
            playersReady = true;
            checkReady();
          }
          return;
        }
        const changes = snap.docChanges();
        for (const c of changes) {
          if (c.type === 'removed') {
            seenPlayerIds.delete(c.doc.id);
            try { window.__applyRemotePlayerDelete?.(c.doc.id); } catch (e) {}
          } else {
            seenPlayerIds.add(c.doc.id);
            try { window.__applyRemotePlayer?.(c.doc.data()); } catch (e) { console.error('[players snap]', e); }
          }
        }
      }, (err) => {
        console.error('Players listen failed:', err);
        playersReady = true; checkReady(); // ⭐ 連線錯誤也要解鎖
        window.__updateSyncStatus?.('☁️ 連線錯誤', 'err');
      });

      // ⭐ Boss 覆寫：監聽 config/bossOverrides，自動套用到全部客戶端
      // ⭐ bossOverrides 已改為透過 meta doc 同步（不再使用 config/bossOverrides 子文件）

      // ⭐ Phase B：監聽 wb9 subcollection（每王一份 doc）
      //   透過 window.__applyRemoteWb9 橋接到主腳本（不能直接存取 let wb9）
      let firstWb9Snap = true;
      onSnapshot(wb9Col, (snap) => {
        if (firstWb9Snap) {
          firstWb9Snap = false;
          // 首次：整批同步
          const all = {};
          snap.docs.forEach(d => { all[d.id] = d.data(); });
          window.__applyRemoteWb9?.('init', all);
        } else {
          // 之後：只傳差異
          snap.docChanges().forEach(c => {
            const type = c.type === 'removed' ? 'remove' : 'set';
            window.__applyRemoteWb9?.(type, { [c.doc.id]: c.doc.data() });
          });
        }
      }, (err) => {
        console.error('wb9 listen failed:', err);
      });
    })();
  } catch (e) {
    console.error(e);
    window.__updateSyncStatus?.('☁️ 未連線', 'err');
  }
</script>
</body>
</html>
