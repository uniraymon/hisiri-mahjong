  function autoFight(player, monster) {
    const log = [];
    const cls = CLASSES[player.rpg.class];
    const stats = computeStats(player);

    // 綠茶事件：腳本式遭遇，跳過正常戰鬥
    if (monster.ability?.type === 'cameo') {
      const startHp = Math.min(player.rpg.hp ?? stats.maxHp, stats.maxHp);
      const startMp = Math.min(player.rpg.mp ?? stats.maxMp, stats.maxMp);
      const kickDmg = 5 + Math.floor(Math.random() * 5);
      const newHp = Math.max(1, startHp - kickDmg);
      log.push({ type: 'system', text: `═══ 🍵 綠茶鵝突然飄了過來 ═══` });
      if (monster.dialogue && monster.dialogue.length) {
        const line = monster.dialogue[Math.floor(Math.random() * monster.dialogue.length)];
        log.push({ type: 'monster', text: `🍵 綠茶鵝：「${line}」` });
      }
      log.push({ type: 'monster', text: `回合 1：綠茶鵝踢了你一腳 → -${kickDmg} HP`, hp: { player: newHp, monster: 1, mp: startMp } });
      log.push({ type: 'monster', text: `回合 2：綠茶鵝順手摸走 💰 10 鵝鵝幣`, hp: { player: newHp, monster: 1, mp: startMp } });
      log.push({ type: 'system', text: `綠茶鵝丟下一句「鵝鵝沒有錯」就跑掉了 ☕💨` });
      return {
        won: false, fled: true,
        pHpFinal: newHp, pMpFinal: startMp, mHpFinal: 1,
        maxHp: stats.maxHp, maxMp: stats.maxMp,
        coinsStolen: 10, kickDmg, log,
        metGreenTea: 1,
      };
    }

    const bonus = computeSkillBonuses(player);
    const abil  = computeAbilityBonuses(player);
    const passive = computePassiveBonuses(player);
    // 被動 spd 加成已套到 stats 之外（先給門檻型，autoFight 用即時 spd）
    const effectiveSpd = stats.spd + (passive.spd || 0);
    const setB = stats.setBonuses || {};
    const baseCritChance = 0.08 + (cls.critBonus || 0) + (bonus.critChance || 0) + (abil.critChance || 0) + (passive.critChance || 0) + (setB.critChance || 0);
    const critMult = 1.7 + (abil.critDmgBonus || 0) + (passive.critDmg || 0) + (setB.critDmg || 0);
    const regenPer = (cls.regenPer || 0) + (bonus.regen || 0);
    let pHp = stats.maxHp; // ⭐ 每場戰鬥 HP 自動回滿（HP 變成屬性，不是耗材）
    let pMp = stats.maxMp; // ⭐ 每場戰鬥 MP 自動回滿
    let mHp = monster.hp;
    let round = 0;
    let playerActions = 0;
    let coinsStolen = 0;
    let critCount = 0;
    const mAbility = monster.ability;
    // 每個技能的冷卻記錄（key = skillId）
    const skills = cls.skills || (cls.skill ? [cls.skill] : []);
    const skillById = Object.fromEntries(skills.map((s, i) => [s.id, { skill: s, idx: i }]));
    const nextActionForSkill = {};
    // 每條規則的本場使用次數（給 judge 1920「最多用 X 次」用）
    const ruleUseCount = {};
    // ⭐ HOF 行動規則表：玩家自訂 / 預設值
    const actionPattern = (player.rpg.actionPattern && player.rpg.actionPattern.length)
      ? player.rpg.actionPattern
      : getDefaultActionPattern(player.rpg.class);

    // ATB（Active Time Battle）：每個單位的「行動條」依速度填滿
    // 條滿（達到 ATB_THRESHOLD）即出手；速度越快、填滿越快、出手越頻繁
    // ⭐ SPD_BASE 扁平化：把雙方 SPD 加上一個基礎值，避免「玩家 SPD 比怪高 2 倍 → 出手 2 倍」這種極端比例
    //    e.g. 你 30 vs 怪 10 → 原本 3:1，加 30 之後變 (60:40) = 1.5:1
    const ATB_THRESHOLD = 100;
    const SPD_BASE = 30;
    let pSpd = Math.max(1, SPD_BASE + effectiveSpd);   // 受 buff 影響，每回合會重算
    const mSpd = Math.max(1, SPD_BASE + monster.spd);
    // 雙方都從 0 開始填條，誰先達到 100 誰先出手（速度高自然先到）
    let pGauge = 0, mGauge = 0;
    // 狀態追蹤（玩家身上的 buff/中毒/麻痺 + 怪物身上的中毒/麻痺）
    const playerObj = { statuses: [] };
    monster.statuses = monster.statuses || [];
    // 怪物技能冷卻：lastUseRound[idx]
    const mSkillLast = {};
    // ⭐ 上次施放技能的回合 — 確保兩招間至少夾一次普攻
    let mLastSkillRound = -999;

    log.push({ type: 'system', text: `═══ ⚔️ ${player.name} VS ${monster.icon} ${monster.name} Lv ${monster.level} ═══` });
    log.push({ type: 'system', text: `🌬 速度：你 ${effectiveSpd} vs ${monster.name} ${monster.spd}（行動頻率比 ${(pSpd/mSpd).toFixed(2)} : 1）` });
    if (monster.dialogue && monster.dialogue.length) {
      const line = monster.dialogue[Math.floor(Math.random() * monster.dialogue.length)];
      log.push({ type: 'monster', text: `${monster.icon} ${monster.name}：「${line}」` });
    }
    const pushDeathLine = () => {
      if (monster.deathLine && monster.deathLine.length) {
        const line = monster.deathLine[Math.floor(Math.random() * monster.deathLine.length)];
        log.push({ type: 'monster', text: `${monster.icon} ${monster.name}：「${line}」`, hp: { player: pHp, monster: 0, mp: pMp } });
      }
    };

    while (pHp > 0 && mHp > 0 && round < 80) {
      // 重算 pSpd（含 buff）
      const pBuff = getBuffBonus(playerObj);
      pSpd = Math.max(1, SPD_BASE + effectiveSpd + (pBuff.spd || 0));
      // 推進時間：跳到下一個「條滿」的瞬間
      const pNeed = Math.max(0, ATB_THRESHOLD - pGauge);
      const mNeed = Math.max(0, ATB_THRESHOLD - mGauge);
      const dt = Math.min(pNeed / pSpd, mNeed / mSpd);
      pGauge += dt * pSpd;
      mGauge += dt * mSpd;

      // 決定誰先出手：若同時滿條，gauge 較大者先；否則只有滿條那邊出手
      let pTurn;
      if (pGauge >= ATB_THRESHOLD && mGauge >= ATB_THRESHOLD) pTurn = pGauge >= mGauge;
      else if (pGauge >= ATB_THRESHOLD) pTurn = true;
      else pTurn = false;

      round++;
      // 被動自癒（聖騎天生 + 自癒強化技能）
      if (pTurn && regenPer > 0 && pHp < stats.maxHp) {
        const heal = Math.max(1, Math.round(stats.maxHp * regenPer));
        pHp = Math.min(stats.maxHp, pHp + heal);
        log.push({ type: 'player', text: `回合 ${round}：自癒 +${heal} HP`, hp: { player: pHp, monster: mHp, mp: pMp } });
      }
      if (pTurn) {
        pGauge -= ATB_THRESHOLD;
        playerActions++;
        // 玩家身上狀態 tick（中毒、buff 倒數）
        const pevs = tickStatuses(playerObj);
        for (const ev of pevs) {
          pHp = Math.max(0, pHp - ev.dmg);
          log.push({ type: 'monster', text: `回合 ${round}：${player.name} ${statusEmoji(ev.type)}${statusLabel(ev.type)} 觸發 -${ev.dmg} HP`, hp: { player: pHp, monster: mHp, mp: pMp } });
        }
        if (pHp <= 0) break;
        // 麻痺 → 30% 機率跳過
        if (hasStatus(playerObj, 'paralyze') && Math.random() < 0.5) {
          log.push({ type: 'system', text: `回合 ${round}：${player.name} ⚡麻痺，無法行動！`, hp: { player: pHp, monster: mHp, mp: pMp } });
          continue;
        }
        // ⭐ HOF：依玩家的 actionPattern 規則表決定動作
        // 從上到下評估每條規則，第一條 judge 成立 + 技能可用就放；都不成立 → 普攻
        let useSkill = null;
        let useSkillIdx = -1;
        let usedRuleIdx = -1;
        const judgeCtx = {
          pHp, maxHp: stats.maxHp,
          pMp, maxMp: stats.maxMp,
          mHp, maxMHp: monster.maxHp,
          playerActions,
          ruleUseCount,
        };
        for (let r = 0; r < actionPattern.length; r++) {
          const rule = actionPattern[r];
          if (!rule || !evaluateJudge(rule.judgeId, rule.param, judgeCtx, r)) continue;

          if (rule.skillId === 'basic') {
            // 普攻
            useSkill = null;
            useSkillIdx = -1;
            usedRuleIdx = r;
            break;
          }

          const sInfo = skillById[rule.skillId];
          if (!sInfo) continue; // 規則指向不存在的技能（職業改了？）
          const s = sInfo.skill;
          if ((s.unlockLv || 1) > (player.rpg.level || 1)) continue;
          if (playerActions < (nextActionForSkill[s.id] || 0)) continue;
          const effMpCost = Math.round((s.mpCost || 0) * (1 - (passive.mpDiscount || 0)));
          if (pMp < effMpCost) continue;
          // HP 代價技能：必須有「比成本多」的 HP（防自爆）
          if (s.hpCost) {
            const hpNeeded = Math.max(1, Math.round(stats.maxHp * s.hpCost));
            if (pHp <= hpNeeded) continue;
          }
          if (s.hpCostFlat) {
            if (pHp <= s.hpCostFlat) continue;
          }
          // judge 已過、技能也可用 → 採用這條
          useSkill = s;
          useSkillIdx = sInfo.idx;
          usedRuleIdx = r;
          break;
        }
        // 累積規則使用次數（給 1920「最多 X 次」用）
        if (usedRuleIdx >= 0) {
          ruleUseCount[usedRuleIdx] = (ruleUseCount[usedRuleIdx] || 0) + 1;
        }

        if (useSkill) {
          // ⭐ 套用技能等級加成：傷害/治療/MP 回復 +10%/級，Lv 3+ 強化狀態，Lv 5 額外加成（依技能特性）
          const __skillLv = (player.rpg.skillLevels && player.rpg.skillLevels[useSkill.id]) || 0;
          const skill = getSkillEffectiveStats(useSkill, __skillLv);
          // Lv 5 治療系：mpCostMult 進一步打折
          const effMpCost = Math.round((skill.mpCost || 0) * (skill.mpCostMult || 1) * (1 - (passive.mpDiscount || 0)));
          pMp -= effMpCost;
          // ⭐ HP 代價（戰士血祭系列）：施法時扣自身 HP（最少留 1）
          let hpPaid = 0;
          if (skill.hpCost) {
            hpPaid = Math.max(1, Math.round(stats.maxHp * skill.hpCost));
            pHp = Math.max(1, pHp - hpPaid);
          }
          if (skill.hpCostFlat) {
            hpPaid += skill.hpCostFlat;
            pHp = Math.max(1, pHp - skill.hpCostFlat);
          }
          nextActionForSkill[skill.id] = playerActions + skill.cooldown;
          // ⭐ 硬值：施放完 pGauge 額外扣 cast（重技能下次行動更慢）
          pGauge -= getEffectiveCast(skill);
          // 成本說明字串（多種代價可能組合：MP / HP）
          const costParts = [];
          if (effMpCost > 0) costParts.push(`-${effMpCost} MP`);
          if (hpPaid > 0)    costParts.push(`-${hpPaid} HP`);
          const costStr = costParts.length ? `（${costParts.join('，')}）` : '';
          if (skill.type === 'damage') {
            let dmg;
            const isFlat = skill.flat != null;
            // 受 buff 影響的攻擊力 / 防禦力 / 最大生命
            const effAtk = stats.atk * (1 + (pBuff.atkPct || 0));
            const effDef = stats.def * (1 + (pBuff.defPct || 0));
            // ⭐ 多段技能：每段傷害 = 總傷害 / hits × 1.3（同 monster multiHit 公式）
            const skillHits = Math.max(1, skill.hits || 1);
            const perHitFactor = skillHits === 1 ? 1.0 : (1.3 / skillHits);
            if (skill.defMult != null) {
              // ⭐ 聖騎風格：以 DEF 結算傷害
              dmg = effDef * skill.defMult - Math.floor(monster.def / 2);
            } else if (skill.maxHpMult != null) {
              // ⭐ 聖騎風格：以 maxHp 結算傷害（魔攻）
              dmg = stats.maxHp * skill.maxHpMult - Math.floor(monster.def / 2);
            } else if (isFlat) {
              dmg = (skill.flat + (bonus.skillFlat || 0) + (abil.skillFlat || 0)) + (skill.perLv || 0) * (player.rpg.level || 1);
              if (!skill.ignoreDef) dmg -= Math.floor(monster.def / 2);
            } else {
              dmg = effAtk * (skill.mult || 1) - Math.floor(monster.def / 2);
            }
            dmg *= perHitFactor;
            // 技能個別 % 加成（從技能樹點到的對應節點）— 只對前 3 個技能有效
            const perSkillKey = `skill${useSkillIdx}Pct`;
            dmg *= (1 + (bonus[perSkillKey] || 0));
            // 通用 skillDmgPct（保留舊邏輯）
            dmg *= (1 + (bonus.skillDmgPct || 0));
            // 是否走「魔攻」邏輯：flat / maxHpMult / 顯式 magic flag
            const isMagic = isFlat || skill.maxHpMult != null || skill.magic;
            // 職業被動：物理或法術加成
            if (isMagic) dmg *= (1 + (passive.flatPct || 0));
            else         dmg *= (1 + (passive.physPct || 0));
            // 怪物抗性（魔攻吃法抗，物攻吃物抗）
            if (isMagic && mAbility?.type === 'magicResist') dmg *= (1 - mAbility.resist);
            if (!isMagic && mAbility?.type === 'physResist') dmg *= (1 - mAbility.resist);
            const skillCrit = baseCritChance + (skill.extraCritChance || 0) + (pBuff.critChance || 0);
            const skillCritMult = critMult + (skill.extraCritDmg || 0) + (pBuff.critDmg || 0);
            const baseDmg = dmg;
            // ⭐ 多段：每段獨立 roll 暴擊 + 變異
            let totalDmg = 0;
            let lastIsCrit = false;
            const hitLogs = [];
            let monsterDied = false;
            for (let h = 0; h < skillHits && !monsterDied; h++) {
              let hitDmg = baseDmg * (0.9 + Math.random() * 0.2);
              const hitCrit = skill.alwaysCrit || Math.random() < skillCrit;
              if (hitCrit) { hitDmg *= skillCritMult; critCount++; lastIsCrit = true; }
              hitDmg = Math.max(1, Math.round(hitDmg));
              if (mAbility?.type === 'flatCapDmg') hitDmg = Math.min(hitDmg, mAbility.cap || 1);
              mHp -= hitDmg;
              totalDmg += hitDmg;
              hitLogs.push(`${hitDmg}${hitCrit ? '【爆】' : ''}`);
              if (mAbility?.type === 'reflect' && mAbility.resist) {
                const r = Math.max(1, Math.round(hitDmg * mAbility.resist));
                pHp = Math.max(0, pHp - r);
              }
              if (mHp <= 0) { monsterDied = true; }
            }
            const dmgStr = skillHits > 1 ? `(${hitLogs.join(' / ')})` : `-${totalDmg} HP`;
            // 吸血 / 自癒：用總傷害計
            let extra = '';
            if (skill.lifesteal) {
              const heal = Math.max(1, Math.round(totalDmg * skill.lifesteal));
              const before = pHp;
              pHp = Math.min(stats.maxHp, pHp + heal);
              if (pHp - before > 0) extra += ` 🩸+${pHp - before} HP (吸血)`;
            }
            if (skill.healCaster) {
              const heal = Math.max(1, Math.round(stats.maxHp * skill.healCaster));
              const before = pHp;
              pHp = Math.min(stats.maxHp, pHp + heal);
              if (pHp - before > 0) extra += ` 💚+${pHp - before} HP`;
            }
            log.push({
              type: 'crit-player',
              text: `回合 ${round}：${skill.icon} ${skill.name}${lastIsCrit ? '【暴擊】' : ''}${isMagic ? '【魔攻】' : ''}${skillHits > 1 ? `×${skillHits}` : ''} → ${monster.name} ${skillHits > 1 ? '共 ' + totalDmg + ' HP ' + dmgStr : dmgStr}${extra}${costStr}`,
              hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp }
            });
            if (mAbility?.type === 'reflect' && mAbility.resist) {
              log.push({ type: 'monster', text: `回合 ${round}：🪞 ${monster.name} 反射光芒（多段反彈）`, hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp } });
            }
            // 對怪物上狀態（毒箭、冰錐術…）
            if (skill.applyStatus && Math.random() < (skill.applyStatus.chance || 1)) {
              applyStatus(monster, skill.applyStatus);
              log.push({ type: 'system', text: `回合 ${round}：${monster.name} 進入 ${statusEmoji(skill.applyStatus.type)}${statusLabel(skill.applyStatus.type)} 狀態`, hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp } });
            }
            if (mHp <= 0) { pushDeathLine(); break; }
          } else if (skill.type === 'buff' && skill.selfBuff) {
            applyStatus(playerObj, { type: 'buff', stat: skill.selfBuff.stat, amount: skill.selfBuff.amount, turns: skill.selfBuff.turns });
            log.push({
              type: 'player',
              text: `回合 ${round}：${skill.icon} ${skill.name} → ${describeBuff(skill.selfBuff)}（${skill.selfBuff.turns} 回合）${costStr}`,
              hp: { player: pHp, monster: mHp, mp: pMp }
            });
          } else if (skill.type === 'heal') {
            // 'heal' 類型：可同時帶 healPct（HP 補）+ mpFlat 或 mpPct（MP 補）
            const gainedParts = [];
            if (skill.healPct) {
              const before = pHp;
              const heal = Math.round(stats.maxHp * skill.healPct * (1 + (bonus.skillHealPct || 0)) * (1 + (passive.healPct || 0)));
              pHp = Math.min(stats.maxHp, pHp + heal);
              if (pHp - before > 0) gainedParts.push(`💚+${pHp - before} HP`);
            }
            if (skill.mpFlat) {
              const before = pMp;
              pMp = Math.min(stats.maxMp, pMp + skill.mpFlat);
              if (pMp - before > 0) gainedParts.push(`💙+${pMp - before} MP`);
            } else if (skill.mpPct) {
              const before = pMp;
              const mpHeal = Math.round(stats.maxMp * skill.mpPct);
              pMp = Math.min(stats.maxMp, pMp + mpHeal);
              if (pMp - before > 0) gainedParts.push(`💙+${pMp - before} MP`);
            }
            const gainedStr = gainedParts.length ? gainedParts.join(' ') : '無效果';
            log.push({
              type: 'player',
              text: `回合 ${round}：${skill.icon} ${skill.name} ${gainedStr}${costStr}`,
              hp: { player: pHp, monster: mHp, mp: pMp }
            });
          }
        } else {
          // 普攻
          const isCrit = Math.random() < baseCritChance;
          const effAtk = stats.atk * (1 + (pBuff.atkPct || 0));
          const baseCrit2 = baseCritChance + (pBuff.critChance || 0);
          const critMult2 = critMult + (pBuff.critDmg || 0);
          const isCrit2 = Math.random() < baseCrit2;
          let dmg = Math.max(1, effAtk - Math.floor(monster.def / 2));
          dmg *= (0.85 + Math.random() * 0.3);
          if (isCrit2) { dmg *= critMult2; critCount++; }
          if (mAbility?.type === 'physResist') dmg *= (1 - mAbility.resist);
          dmg = Math.max(1, Math.round(dmg));
          if (mAbility?.type === 'flatCapDmg') dmg = Math.min(dmg, mAbility.cap || 1);
          mHp -= dmg;
          log.push({
            type: isCrit2 ? 'crit-player' : 'player',
            text: `回合 ${round}：${cls.attackVerb}${isCrit2 ? '【暴擊】' : ''} → ${monster.name} -${dmg} HP`,
            hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp }
          });
          if (mAbility?.type === 'reflect' && mAbility.resist) {
            const r = Math.max(1, Math.round(dmg * mAbility.resist));
            pHp = Math.max(0, pHp - r);
            log.push({ type: 'monster', text: `回合 ${round}：🪞 ${monster.name} 反射光芒 → ${player.name} -${r} HP`, hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp } });
          }
          if (mHp <= 0) { pushDeathLine(); break; }
        }
      } else {
        mGauge -= ATB_THRESHOLD;
        // 怪物身上狀態 tick（中毒、麻痺）
        const mevs = tickStatuses(monster);
        for (const ev of mevs) {
          mHp = Math.max(0, mHp - ev.dmg);
          log.push({ type: 'player', text: `回合 ${round}：${monster.name} ${statusEmoji(ev.type)}${statusLabel(ev.type)} 觸發 -${ev.dmg} HP`, hp: { player: pHp, monster: mHp, mp: pMp } });
        }
        if (mHp <= 0) { pushDeathLine(); break; }
        // 麻痺 → 50% 機率跳過
        if (hasStatus(monster, 'paralyze') && Math.random() < 0.5) {
          log.push({ type: 'system', text: `回合 ${round}：${monster.name} ⚡麻痺，行動被取消`, hp: { player: pHp, monster: mHp, mp: pMp } });
          continue;
        }
        // 怪物技能挑選：每次只有 40% 機率，且距離上次施放技能必須 ≥ 2 回合（中間至少 1 次普攻）
        let mSkill = null;
        const skillsAllowed = (round - mLastSkillRound) >= 2;
        if (skillsAllowed && Array.isArray(monster.skills) && monster.skills.length && Math.random() < 0.40) {
          const ready = [];
          for (let si = 0; si < monster.skills.length; si++) {
            const s = monster.skills[si];
            const last = mSkillLast[si] ?? -999;
            if (round - last >= (s.cooldown || 3)) ready.push({ s, si });
          }
          if (ready.length) {
            const pick = ready[Math.floor(Math.random() * ready.length)];
            mSkill = pick.s;
            mSkillLast[pick.si] = round;
            mLastSkillRound = round;
          }
        }
        // 防禦受 buff 影響
        const effDef = stats.def * (1 + (pBuff.defPct || 0));
        // 反傷：玩家身上有 reflectPct 時，怪打到我會被反彈一部分
        const applyReflect = (incomingDmg) => {
          if (!pBuff.reflectPct || incomingDmg <= 0 || mHp <= 0) return;
          const r = Math.max(1, Math.round(incomingDmg * pBuff.reflectPct));
          mHp -= r;
          log.push({ type: 'crit-player', text: `回合 ${round}：🪞 反傷 → ${monster.name} -${r} HP`, hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp } });
        };
        let dead = false;
        if (mSkill) {
          let dmg = Math.max(1, monster.atk * (mSkill.mult || 1) - (mSkill.ignoreDef ? 0 : Math.floor(effDef / 2)));
          dmg *= (0.85 + Math.random() * 0.3);
          dmg *= (1 - (passive.dmgReduction || 0));
          dmg = Math.max(1, Math.round(dmg));
          pHp = Math.max(0, pHp - dmg);
          log.push({
            type: 'monster',
            text: `回合 ${round}：${monster.icon}${monster.name} ✨${mSkill.verb || '技能'} → ${player.name} -${dmg} HP`,
            hp: { player: pHp, monster: mHp, mp: pMp }
          });
          applyReflect(dmg);
          if (pHp <= 0) { dead = true; }
          if (mHp <= 0) { pushDeathLine(); break; }
          // 對玩家上狀態
          if (!dead && mSkill.applyStatus && Math.random() < (mSkill.applyStatus.chance || 1)) {
            applyStatus(playerObj, mSkill.applyStatus);
            log.push({ type: 'system', text: `回合 ${round}：${player.name} 進入 ${statusEmoji(mSkill.applyStatus.type)}${statusLabel(mSkill.applyStatus.type)} 狀態`, hp: { player: pHp, monster: mHp, mp: pMp } });
          }
        } else {
          // 多段攻擊：1.3x 總傷害平均分散
          const hits = (mAbility?.type === 'multiHit') ? Math.max(1, mAbility.hits || 2) : 1;
          const perHitMult = hits === 1 ? 1.0 : (1.3 / hits);
          for (let h = 0; h < hits; h++) {
            let dmg = Math.max(1, monster.atk - Math.floor(effDef / 2));
            dmg *= (0.85 + Math.random() * 0.3);
            dmg *= perHitMult;
            dmg *= (1 - (passive.dmgReduction || 0));
            dmg = Math.max(1, Math.round(dmg));
            pHp -= dmg;
            log.push({
              type: 'monster',
              text: `回合 ${round}：${monster.name} ${monster.verb}${hits > 1 ? `（${h+1}/${hits}）` : ''} → ${player.name} -${dmg} HP`,
              hp: { player: Math.max(0, pHp), monster: mHp, mp: pMp }
            });
            applyReflect(dmg);
            if (mHp <= 0) { pushDeathLine(); dead = true; break; }
            if (pHp <= 0) { dead = true; break; }
          }
        }
        // 偷錢：60% 機率得手
        if (!dead && mAbility?.type === 'steal' && Math.random() < 0.6) {
          const stolen = mAbility.min + Math.floor(Math.random() * (mAbility.max - mAbility.min + 1));
          coinsStolen += stolen;
          log.push({
            type: 'monster',
            text: `回合 ${round}：${monster.name} 摸走 💰 ${stolen} 鵝鵝幣！`,
            hp: { player: pHp, monster: mHp, mp: pMp }
          });
        }
        if (pHp <= 0) break;
      }
    }
    const won = pHp > 0 && mHp <= 0;
    return {
      won,
      pHpFinal: Math.max(0, pHp),
      pMpFinal: pMp,
      mHpFinal: Math.max(0, mHp),
      maxHp: stats.maxHp,
      maxMp: stats.maxMp,
      coinsStolen,
      critCount,
      log
    };
  }

  // ============================================================
  // 異常狀態系統 + 多目標戰鬥引擎（試煉戰場用）
  // ============================================================
  // 狀態結構：{ type: 'poison'|'paralyze', turns, dmg }
  // poison: 每回合扣 dmg；paralyze: 玩家回合 30% 機率跳過、怪物 100% 跳過
  function applyStatus(target, status) {
    target.statuses = target.statuses || [];
    // 同類覆蓋（取較長 turns）— 'buff' 型用 stat 區分，可同時帶多個不同 stat 的 buff
    const isBuff = status.type === 'buff';
    const existing = isBuff
      ? target.statuses.find(s => s.type === 'buff' && s.stat === status.stat)
      : target.statuses.find(s => s.type === status.type);
    if (existing) {
      existing.turns = Math.max(existing.turns, status.turns);
      if (isBuff) existing.amount = Math.max(existing.amount || 0, status.amount || 0);
      else        existing.dmg    = Math.max(existing.dmg    || 0, status.dmg    || 0);
    } else {
      target.statuses.push({ ...status });
    }
  }
  function tickStatuses(target) {
    if (!target.statuses || target.statuses.length === 0) return [];
    const events = []; // [{type, dmg}]
    for (const s of target.statuses) {
      if (s.type === 'poison' && s.dmg) {
        events.push({ type: 'poison', dmg: s.dmg });
      }
      s.turns = (s.turns || 0) - 1;
    }
    target.statuses = target.statuses.filter(s => s.turns > 0);
    return events;
  }
  function hasStatus(target, type) {
    return (target.statuses || []).some(s => s.type === type);
  }
  // 把目前生效的 buff 加總（atkPct/defPct/spd/critChance/critDmg/reflectPct）
  function getBuffBonus(target) {
    const out = { atkPct: 0, defPct: 0, spd: 0, critChance: 0, critDmg: 0, reflectPct: 0 };
    if (!target || !target.statuses) return out;
    for (const s of target.statuses) {
      if (s.type !== 'buff' || !s.stat) continue;
      out[s.stat] = (out[s.stat] || 0) + (s.amount || 0);
    }
    return out;
  }
  function describeBuff(buff) {
    if (!buff) return '';
    if (buff.stat === 'atkPct')     return `🦁 ATK +${Math.round(buff.amount * 100)}%`;
    if (buff.stat === 'defPct')     return `🛡 DEF +${Math.round(buff.amount * 100)}%`;
    if (buff.stat === 'spd')        return `💨 SPD +${buff.amount}`;
    if (buff.stat === 'critChance') return `🎯 暴擊率 +${Math.round(buff.amount * 100)}%`;
    if (buff.stat === 'critDmg')    return `💥 爆傷 +${Math.round(buff.amount * 100)}%`;
    if (buff.stat === 'reflectPct') return `🪞 反傷 ${Math.round(buff.amount * 100)}%`;
    return `✨ ${buff.stat} +${buff.amount}`;
  }
  function statusEmoji(type) {
    return type === 'poison' ? '☠️' : type === 'paralyze' ? '⚡' : type === 'buff' ? '✨' : '✨';
  }
  function statusLabel(type) {
    return type === 'poison' ? '中毒' : type === 'paralyze' ? '麻痺' : type === 'buff' ? '增益' : type;
  }

  // 多目標戰鬥（最多 N 隻怪物 vs 玩家），用在「試煉戰場」
  function autoFightMulti(player, monsters) {
    const log = [];
    const cls = CLASSES[player.rpg.class];
    const stats = computeStats(player);
    const bonus = computeSkillBonuses(player);
    const abil  = computeAbilityBonuses(player);
    const passive = computePassiveBonuses(player);
    const effectiveSpd = stats.spd + (passive.spd || 0);
    const setB = stats.setBonuses || {};
    const baseCritChance = 0.08 + (cls.critBonus || 0) + (bonus.critChance || 0) + (abil.critChance || 0) + (passive.critChance || 0) + (setB.critChance || 0);
    const critMult = 1.7 + (abil.critDmgBonus || 0) + (passive.critDmg || 0) + (setB.critDmg || 0);
    const regenPer = (cls.regenPer || 0) + (bonus.regen || 0);

    let pHp = stats.maxHp; // ⭐ 每場戰鬥 HP 自動回滿（HP 變成屬性，不是耗材）
    let pMp = stats.maxMp; // ⭐ 每場戰鬥 MP 自動回滿
    const playerObj = { statuses: [] };

    // 怪物列表，每隻獨立 ATB gauge
    const mList = monsters.map((m, i) => ({
      ...m,
      idx: i,
      hp: m.hp,
      maxHp: m.maxHp || m.hp,
      gauge: 0,
      statuses: [],
      alive: true,
    }));

    const skills = cls.skills || [];
    const skillById = Object.fromEntries(skills.map((s, i) => [s.id, { skill: s, idx: i }]));
    const nextActionForSkill = {};
    const ruleUseCount = {};
    const actionPattern = (player.rpg.actionPattern && player.rpg.actionPattern.length)
      ? player.rpg.actionPattern
      : getDefaultActionPattern(player.rpg.class);

    const ATB_THRESHOLD = 100;
    const SPD_BASE = 30; // ⭐ 扁平化：每方加上基礎值，避免極端比例
    let pSpd = Math.max(1, SPD_BASE + effectiveSpd); // 受 buff 影響，每回合會重算
    let pGauge = 0;
    // 把怪物 gauge 速度也加 SPD_BASE
    mList.forEach(m => { m._effSpd = Math.max(1, SPD_BASE + (m.spd || 0)); });
    // 怪物技能冷卻（每隻獨立）
    const mSkillLastByIdx = {}; // mSkillLastByIdx[mIdx][skillIdx] = round

    log.push({ type: 'system', text: `═══ ⚔️ 試煉戰場 ═══` });
    log.push({ type: 'system', text: `${player.name} VS ${monsters.map(m => m.icon + m.name).join(' / ')}` });
    log.push({ type: 'system', text: `🌬 你 SPD ${effectiveSpd}　·　${monsters.map(m => m.name + ' ' + m.spd).join(' / ')}` });

    let round = 0, playerActions = 0, critCount = 0;
    const hpsSnapshot = () => ({ player: pHp, mp: pMp, monsters: mList.map(m => Math.max(0, m.hp)) });

    while (pHp > 0 && mList.some(m => m.alive) && round < 120) {
      // 重算 pSpd（含 buff）
      const pBuff = getBuffBonus(playerObj);
      pSpd = Math.max(1, SPD_BASE + effectiveSpd + (pBuff.spd || 0));
      // ATB 推進（用 _effSpd 已加 SPD_BASE）
      const aliveM = mList.filter(m => m.alive);
      const pNeed = Math.max(0, ATB_THRESHOLD - pGauge);
      const pTime = pNeed / pSpd;
      const mTimes = aliveM.map(m => Math.max(0, ATB_THRESHOLD - m.gauge) / Math.max(1, m._effSpd));
      const dt = Math.min(pTime, ...(mTimes.length ? mTimes : [Infinity]));
      pGauge += dt * pSpd;
      aliveM.forEach(m => m.gauge += dt * m._effSpd);

      // 決定動作者：所有 gauge ≥ 100 的中，最大者；同分玩家先
      let actor = null; // 'player' or monster ref
      let bestG = -1;
      if (pGauge >= ATB_THRESHOLD - 0.001) { actor = 'player'; bestG = pGauge; }
      for (const m of aliveM) {
        if (m.gauge >= ATB_THRESHOLD - 0.001 && m.gauge > bestG) {
          actor = m; bestG = m.gauge;
        }
      }
      if (!actor) continue;

      round++;

      if (actor === 'player') {
        pGauge -= ATB_THRESHOLD;
        playerActions++;

        // 自身狀態 tick（中毒等）
        const evs = tickStatuses(playerObj);
        for (const ev of evs) {
          pHp = Math.max(0, pHp - ev.dmg);
          log.push({ type: 'monster', text: `回合 ${round}：${player.name} ${statusEmoji(ev.type)}${statusLabel(ev.type)} 觸發 -${ev.dmg} HP`, hp: hpsSnapshot() });
        }
        if (pHp <= 0) break;

        // 麻痺 → 30% 機率跳過行動
        if (hasStatus(playerObj, 'paralyze') && Math.random() < 0.5) {
          log.push({ type: 'system', text: `回合 ${round}：${player.name} 麻痺，無法行動！`, hp: hpsSnapshot() });
          continue;
        }
        // 自癒
        if (regenPer > 0 && pHp < stats.maxHp) {
          const heal = Math.max(1, Math.round(stats.maxHp * regenPer));
          pHp = Math.min(stats.maxHp, pHp + heal);
          log.push({ type: 'player', text: `回合 ${round}：自癒 +${heal} HP`, hp: hpsSnapshot() });
        }

        // 評估規則表（用最低血敵人當「敵 HP」context）
        const lowHpM = aliveM.slice().sort((a, b) => a.hp - b.hp)[0];
        const judgeCtx = {
          pHp, maxHp: stats.maxHp,
          pMp, maxMp: stats.maxMp,
          mHp: lowHpM ? lowHpM.hp : 0, maxMHp: lowHpM ? lowHpM.maxHp : 1,
          aliveCount: aliveM.length,
          playerActions,
          ruleUseCount,
        };
        let useSkill = null, useSkillIdx = -1, usedRuleIdx = -1;
        for (let r = 0; r < actionPattern.length; r++) {
          const rule = actionPattern[r];
          if (!rule || !evaluateJudge(rule.judgeId, rule.param, judgeCtx, r)) continue;
          if (rule.skillId === 'basic') { useSkill = null; useSkillIdx = -1; usedRuleIdx = r; break; }
          const sInfo = skillById[rule.skillId];
          if (!sInfo) continue;
          const s = sInfo.skill;
          if ((s.unlockLv || 1) > (player.rpg.level || 1)) continue;
          if (playerActions < (nextActionForSkill[s.id] || 0)) continue;
          const effMpCost = Math.round((s.mpCost || 0) * (1 - (passive.mpDiscount || 0)));
          if (pMp < effMpCost) continue;
          if (s.hpCost) {
            const need = Math.max(1, Math.round(stats.maxHp * s.hpCost));
            if (pHp <= need) continue;
          }
          if (s.hpCostFlat) { if (pHp <= s.hpCostFlat) continue; }
          useSkill = s; useSkillIdx = sInfo.idx; usedRuleIdx = r; break;
        }
        if (usedRuleIdx >= 0) ruleUseCount[usedRuleIdx] = (ruleUseCount[usedRuleIdx] || 0) + 1;

        // 決定目標
        const targetCount = useSkill ? (useSkill.targetCount === 'all' ? aliveM.length : (useSkill.targetCount || 1)) : 1;
        const targets = aliveM.slice().sort((a, b) => a.hp - b.hp).slice(0, targetCount);

        if (useSkill) {
          // ⭐ 套用技能等級加成：傷害/治療/MP 回復 +10%/級，Lv 3+ 強化狀態，Lv 5 額外加成（依技能特性）
          const __skillLv = (player.rpg.skillLevels && player.rpg.skillLevels[useSkill.id]) || 0;
          const skill = getSkillEffectiveStats(useSkill, __skillLv);
          // Lv 5 治療系：mpCostMult 進一步打折
          const effMpCost = Math.round((skill.mpCost || 0) * (skill.mpCostMult || 1) * (1 - (passive.mpDiscount || 0)));
          pMp -= effMpCost;
          let hpPaid = 0;
          if (skill.hpCost) {
            hpPaid = Math.max(1, Math.round(stats.maxHp * skill.hpCost));
            pHp = Math.max(1, pHp - hpPaid);
          }
          if (skill.hpCostFlat) { hpPaid += skill.hpCostFlat; pHp = Math.max(1, pHp - skill.hpCostFlat); }
          nextActionForSkill[skill.id] = playerActions + skill.cooldown;
          const costParts = [];
          if (effMpCost > 0) costParts.push(`-${effMpCost} MP`);
          if (hpPaid > 0)    costParts.push(`-${hpPaid} HP`);
          const costStr = costParts.length ? `（${costParts.join('，')}）` : '';

          if (skill.type === 'damage') {
            const isFlat = skill.flat != null;
            const isMagic = isFlat || skill.maxHpMult != null || skill.magic;
            const effAtk = stats.atk * (1 + (pBuff.atkPct || 0));
            const effDef = stats.def * (1 + (pBuff.defPct || 0));
            // 對每個目標各打一發（不分散傷害）
            const hits = [];
            for (const tgt of targets) {
              let dmg;
              if (skill.defMult != null) {
                dmg = effDef * skill.defMult - Math.floor(tgt.def / 2);
              } else if (skill.maxHpMult != null) {
                dmg = stats.maxHp * skill.maxHpMult - Math.floor(tgt.def / 2);
              } else if (isFlat) {
                dmg = (skill.flat + (bonus.skillFlat || 0) + (abil.skillFlat || 0)) + (skill.perLv || 0) * (player.rpg.level || 1);
                if (!skill.ignoreDef) dmg -= Math.floor(tgt.def / 2);
              } else {
                dmg = effAtk * (skill.mult || 1) - Math.floor(tgt.def / 2);
              }
              const perSkillKey = `skill${useSkillIdx}Pct`;
              dmg *= (1 + (bonus[perSkillKey] || 0));
              dmg *= (1 + (bonus.skillDmgPct || 0));
              if (isMagic) dmg *= (1 + (passive.flatPct || 0));
              else         dmg *= (1 + (passive.physPct || 0));
              if (isMagic && tgt.ability?.type === 'magicResist') dmg *= (1 - tgt.ability.resist);
              if (!isMagic && tgt.ability?.type === 'physResist') dmg *= (1 - tgt.ability.resist);
              const skillCrit = baseCritChance + (skill.extraCritChance || 0) + (pBuff.critChance || 0);
              const skillCritMult = critMult + (skill.extraCritDmg || 0) + (pBuff.critDmg || 0);
              const isCrit = skill.alwaysCrit || Math.random() < skillCrit;
              dmg *= (0.9 + Math.random() * 0.2);
              if (isCrit) { dmg *= skillCritMult; critCount++; }
              dmg = Math.max(1, Math.round(dmg));
              if (tgt.ability?.type === 'flatCapDmg') dmg = Math.min(dmg, tgt.ability.cap || 1);
              tgt.hp = Math.max(0, tgt.hp - dmg);
              if (tgt.hp <= 0) tgt.alive = false;
              hits.push({ tgt, dmg, isCrit });
              // 鏡鵝反傷
              if (tgt.ability?.type === 'reflect' && tgt.ability.resist) {
                pHp = Math.max(0, pHp - Math.max(1, Math.round(dmg * tgt.ability.resist)));
              }
              // 套用狀態
              if (skill.applyStatus && Math.random() < (skill.applyStatus.chance || 1)) {
                applyStatus(tgt, skill.applyStatus);
              }
            }
            // 吸血（總和）
            let extra = '';
            if (skill.lifesteal && hits.length) {
              const totalDmg = hits.reduce((s, h) => s + h.dmg, 0);
              const heal = Math.max(1, Math.round(totalDmg * skill.lifesteal));
              const before = pHp;
              pHp = Math.min(stats.maxHp, pHp + heal);
              const gained = pHp - before;
              if (gained > 0) extra += ` 🩸+${gained} HP`;
            }
            if (skill.healCaster) {
              const heal = Math.max(1, Math.round(stats.maxHp * skill.healCaster));
              const before = pHp;
              pHp = Math.min(stats.maxHp, pHp + heal);
              const gained = pHp - before;
              if (gained > 0) extra += ` 💚+${gained} HP`;
            }
            const targetSummary = hits.map(h => `${h.tgt.icon}${h.tgt.name} -${h.dmg}${h.isCrit ? '【爆】' : ''}`).join(' / ');
            log.push({
              type: 'crit-player',
              text: `回合 ${round}：${skill.icon} ${skill.name}${isMagic ? '【魔攻】' : ''} → ${targetSummary}${extra}${costStr}`,
              hp: hpsSnapshot(),
            });
            // 套狀態的 log
            if (skill.applyStatus) {
              const stuck = hits.filter(h => h.tgt.statuses.find(s => s.type === skill.applyStatus.type));
              if (stuck.length) {
                log.push({ type: 'system', text: `${stuck.map(h => h.tgt.name).join(' / ')} 進入 ${statusEmoji(skill.applyStatus.type)}${statusLabel(skill.applyStatus.type)} 狀態`, hp: hpsSnapshot() });
              }
            }
          } else if (skill.type === 'buff' && skill.selfBuff) {
            applyStatus(playerObj, { type: 'buff', stat: skill.selfBuff.stat, amount: skill.selfBuff.amount, turns: skill.selfBuff.turns });
            log.push({
              type: 'player',
              text: `回合 ${round}：${skill.icon} ${skill.name} → ${describeBuff(skill.selfBuff)}（${skill.selfBuff.turns} 回合）${costStr}`,
              hp: hpsSnapshot(),
            });
          } else if (skill.type === 'heal') {
            const gainedParts = [];
            if (skill.healPct) {
              const before = pHp;
              const heal = Math.round(stats.maxHp * skill.healPct * (1 + (bonus.skillHealPct || 0)) * (1 + (passive.healPct || 0)));
              pHp = Math.min(stats.maxHp, pHp + heal);
              if (pHp - before > 0) gainedParts.push(`💚+${pHp - before} HP`);
            }
            if (skill.mpFlat) {
              const before = pMp;
              pMp = Math.min(stats.maxMp, pMp + skill.mpFlat);
              if (pMp - before > 0) gainedParts.push(`💙+${pMp - before} MP`);
            } else if (skill.mpPct) {
              const before = pMp;
              const mpHeal = Math.round(stats.maxMp * skill.mpPct);
              pMp = Math.min(stats.maxMp, pMp + mpHeal);
              if (pMp - before > 0) gainedParts.push(`💙+${pMp - before} MP`);
            }
            log.push({
              type: 'player',
              text: `回合 ${round}：${skill.icon} ${skill.name} ${gainedParts.join(' ') || '無效果'}${costStr}`,
              hp: hpsSnapshot(),
            });
          }
        } else {
          // 普攻：打 lowHp 那隻
          const tgt = targets[0];
          const effAtk = stats.atk * (1 + (pBuff.atkPct || 0));
          const baseCrit2 = baseCritChance + (pBuff.critChance || 0);
          const critMult2 = critMult + (pBuff.critDmg || 0);
          const isCrit = Math.random() < baseCrit2;
          let dmg = Math.max(1, effAtk - Math.floor(tgt.def / 2));
          dmg *= (0.85 + Math.random() * 0.3);
          if (isCrit) { dmg *= critMult2; critCount++; }
          if (tgt.ability?.type === 'physResist') dmg *= (1 - tgt.ability.resist);
          dmg = Math.max(1, Math.round(dmg));
          if (tgt.ability?.type === 'flatCapDmg') dmg = Math.min(dmg, tgt.ability.cap || 1);
          tgt.hp = Math.max(0, tgt.hp - dmg);
          if (tgt.hp <= 0) tgt.alive = false;
          if (tgt.ability?.type === 'reflect' && tgt.ability.resist) {
            const r = Math.max(1, Math.round(dmg * tgt.ability.resist));
            pHp = Math.max(0, pHp - r);
          }
          log.push({
            type: isCrit ? 'crit-player' : 'player',
            text: `回合 ${round}：${cls.attackVerb}${isCrit ? '【暴擊】' : ''} → ${tgt.icon}${tgt.name} -${dmg} HP`,
            hp: hpsSnapshot(),
          });
        }
      } else {
        // 怪物的回合
        const m = actor;
        m.gauge -= ATB_THRESHOLD;
        // 怪物中毒等狀態 tick
        const evs = tickStatuses(m);
        for (const ev of evs) {
          m.hp = Math.max(0, m.hp - ev.dmg);
          if (m.hp <= 0) m.alive = false;
          log.push({ type: 'player', text: `回合 ${round}：${m.icon}${m.name} ${statusEmoji(ev.type)}${statusLabel(ev.type)} 觸發 -${ev.dmg} HP`, hp: hpsSnapshot() });
        }
        if (!m.alive) continue;
        // 麻痺 → 50% 機率跳過
        if (hasStatus(m, 'paralyze') && Math.random() < 0.5) {
          log.push({ type: 'system', text: `回合 ${round}：${m.icon}${m.name} ⚡麻痺，行動被取消`, hp: hpsSnapshot() });
          continue;
        }
        // 防禦受 buff 影響
        const effDef = stats.def * (1 + (pBuff.defPct || 0));
        // 怪物技能挑選：每次 40% 機率，且距離自己上次技能 ≥ 2 回合（中間至少 1 次普攻）
        let mSkill = null;
        const cdMap = mSkillLastByIdx[m.idx] = mSkillLastByIdx[m.idx] || {};
        const lastSkillR = cdMap.__lastSkillR ?? -999;
        const skillsAllowed = (round - lastSkillR) >= 2;
        if (skillsAllowed && Array.isArray(m.skills) && m.skills.length && Math.random() < 0.40) {
          const ready = [];
          for (let si = 0; si < m.skills.length; si++) {
            const s = m.skills[si];
            const last = cdMap[si] ?? -999;
            if (round - last >= (s.cooldown || 3)) ready.push({ s, si });
          }
          if (ready.length) {
            const pick = ready[Math.floor(Math.random() * ready.length)];
            mSkill = pick.s;
            cdMap[pick.si] = round;
            cdMap.__lastSkillR = round;
          }
        }
        // 反傷
        const applyReflect2 = (incomingDmg) => {
          if (!pBuff.reflectPct || incomingDmg <= 0 || !m.alive) return;
          const r = Math.max(1, Math.round(incomingDmg * pBuff.reflectPct));
          m.hp = Math.max(0, m.hp - r);
          if (m.hp <= 0) m.alive = false;
          log.push({ type: 'crit-player', text: `回合 ${round}：🪞 反傷 → ${m.icon}${m.name} -${r} HP`, hp: hpsSnapshot() });
        };
        if (mSkill) {
          let dmg = Math.max(1, m.atk * (mSkill.mult || 1) - (mSkill.ignoreDef ? 0 : Math.floor(effDef / 2)));
          dmg *= (0.85 + Math.random() * 0.3);
          dmg *= (1 - (passive.dmgReduction || 0));
          dmg = Math.max(1, Math.round(dmg));
          pHp = Math.max(0, pHp - dmg);
          log.push({
            type: 'monster',
            text: `回合 ${round}：${m.icon}${m.name} ✨${mSkill.verb || '技能'} → ${player.name} -${dmg} HP`,
            hp: hpsSnapshot(),
          });
          applyReflect2(dmg);
          if (pHp > 0 && mSkill.applyStatus && Math.random() < (mSkill.applyStatus.chance || 1)) {
            applyStatus(playerObj, mSkill.applyStatus);
            log.push({ type: 'system', text: `回合 ${round}：${player.name} 進入 ${statusEmoji(mSkill.applyStatus.type)}${statusLabel(mSkill.applyStatus.type)} 狀態`, hp: hpsSnapshot() });
          }
        } else {
          // 攻擊（含多段）
          const hits = (m.ability?.type === 'multiHit') ? Math.max(1, m.ability.hits || 2) : 1;
          const perHitMult = hits === 1 ? 1.0 : (1.3 / hits);
          for (let h = 0; h < hits; h++) {
            let dmg = Math.max(1, m.atk - Math.floor(effDef / 2));
            dmg *= (0.85 + Math.random() * 0.3);
            dmg *= perHitMult;
            dmg *= (1 - (passive.dmgReduction || 0));
            dmg = Math.max(1, Math.round(dmg));
            pHp = Math.max(0, pHp - dmg);
            log.push({
              type: 'monster',
              text: `回合 ${round}：${m.icon}${m.name} ${m.verb || '攻擊'}${hits > 1 ? ` (${h+1}/${hits})` : ''} → ${player.name} -${dmg} HP`,
              hp: hpsSnapshot(),
            });
            applyReflect2(dmg);
            if (!m.alive) break;
            if (pHp <= 0) break;
          }
        }
        if (pHp <= 0) break;
      }
    }
    const won = pHp > 0 && mList.every(m => !m.alive);
    return {
      won, fled: false,
      pHpFinal: Math.max(0, pHp),
      pMpFinal: pMp,
      monsters: mList.map(m => ({ id: m.id, name: m.name, icon: m.icon, hp: Math.max(0, m.hp), maxHp: m.maxHp, alive: m.alive, level: m.level, xpDrop: m.xpDrop, goldDrop: m.goldDrop })),
      maxHp: stats.maxHp, maxMp: stats.maxMp,
      coinsStolen: 0, critCount, log,
    };
  }

  function render() {
    if (!isPassVerified() || !getMeId()) {
      document.getElementById('stageNoMe').classList.remove('hidden');
      document.getElementById('stageClassPick').classList.add('hidden');
      document.getElementById('stageGame').classList.add('hidden');
      return;
    }
    const me = getMe();
    if (!me) {
      document.getElementById('stageNoMe').classList.remove('hidden');
      return;
    }
    document.getElementById('stageNoMe').classList.add('hidden');

    const rpg = getRpg(me);
    if (!rpg.class) {
      document.getElementById('stageClassPick').classList.remove('hidden');
      document.getElementById('stageGame').classList.add('hidden');
      renderClassPicker();
      return;
    }
    document.getElementById('stageClassPick').classList.add('hidden');
    document.getElementById('stageGame').classList.remove('hidden');

    // 驗證所有玩家的技能點 / 能力點，少了補回去（雲端來的舊資料可能有 bug）
    let anyCorrected = false;
    players.forEach(p => { if (validateRpgPoints(p)) anyCorrected = true; });
    if (anyCorrected && !__isApplyingRemote) saveData();
    syncEquipped(me);
    renderCharCard();
    renderEquipment();
    renderAbilityTree();
    renderSkillTree();
    renderShop();
    renderWorldBoss();
    renderPersonalBoss();
    renderRpgStats();
    renderLeaderboard();
    renderZoneSelector();
    renderCharQuickMenu();
    renderTrial();
    maybeFlashHelp();
    refreshBugBadge();
    updateStaminaUI();
    // checkBossKillBanners();  // ⭐ 尾刀通知關掉（單人版）
    maybeShowBetaCompModal();
  }

  function renderAbilityTree() {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    if (!r.class) {
      document.getElementById('abilityCardHeader').innerHTML = `<span>📊 能力值</span>`;
      document.getElementById('abilityBody').innerHTML = '';
      return;
    }
    const points = r.abilityPoints || 0;
    document.getElementById('abilityCardHeader').innerHTML = `
      <span>📊 能力值</span>
      <span class="skill-card-points" style="background:linear-gradient(135deg,#a7f3d0,#10b981);">⚡ ${points} 點可用</span>
    `;
    const html = ABILITIES.map(ab => {
      const cur = (r.abilities || {})[ab.id] || 0;
      const canAdd = points >= 1;
      return `
        <div class="skill-node" style="background:linear-gradient(135deg,#fff,#ecfdf5); border-color:#a7f3d0;">
          <div class="sn-icon">${ab.icon}</div>
          <div>
            <div class="sn-name" style="color:#047857;">${ab.name} <span style="color:#10b981; margin-left:4px;">${cur}</span></div>
            <div class="sn-desc">${ab.desc}</div>
          </div>
          <button class="sn-add-btn" style="background:linear-gradient(135deg,#a7f3d0,#10b981); border-color:#047857;" onclick="learnAbility('${ab.id}')" ${canAdd ? '' : 'disabled'}>+</button>
        </div>
      `;
    }).join('');
    // 職業被動（依能力門檻自動觸發）
    const cls = CLASSES[r.class];
    const passivesHtml = (cls && cls.passives) ? cls.passives.map(p => {
      const a = (r.abilities || {})[p.stat] || 0;
      const active = a >= p.threshold;
      const progress = Math.min(100, Math.round((a / p.threshold) * 100));
      return `
        <div class="skill-node ${active ? 'maxed' : ''}" style="${active ? '' : 'opacity:0.65;'} background:linear-gradient(135deg,#fff,${active ? '#fde68a' : '#f3f4f6'}); border-color:${active ? '#d97706' : '#d1d5db'};">
          <div class="sn-icon">${p.icon}</div>
          <div>
            <div class="sn-name" style="color:${active ? '#92400e' : '#6b7280'};">${active ? '✨' : '🔒'} ${escapeHtml(p.name)}</div>
            <div class="sn-desc">${escapeHtml(p.desc)}</div>
            <div class="sn-progress">
              <span>${p.stat.toUpperCase()} ${a}/${p.threshold}</span>
              <div class="sn-bar"><div class="sn-fill" style="width:${progress}%; background:${active ? 'linear-gradient(90deg,#fcd34d,#d97706)' : 'linear-gradient(90deg,#9ca3af,#6b7280)'};"></div></div>
            </div>
          </div>
          <div style="font-size:9px; color:#6b7280; text-align:center;">職業<br>被動</div>
        </div>
      `;
    }).join('') : '';

    document.getElementById('abilityBody').innerHTML = `
      ${html}
      <div style="display:flex; gap:6px; margin-top:6px;">
        <button class="btn btn-secondary" style="flex:1; margin-top:0;" onclick="resetAbilities()">🔄 重置能力（退回所有點）</button>
      </div>
      <div style="font-size:11px; color:#8b6f9b; text-align:center; margin-top:6px;">每升 1 等獲得 +${POINTS_PER_LEVEL.ability} 能力點　·　起手 +5 點</div>
      ${passivesHtml ? `
        <div style="font-size:11px; color:#92400e; font-weight:700; margin:14px 0 6px; padding:4px 8px; background:#fef3c7; border-radius:8px;">🌟 職業被動（依能力門檻自動觸發）</div>
        ${passivesHtml}
      ` : ''}
    `;
  }

  function learnAbility(id) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    if ((r.abilityPoints || 0) < 1) { showToast('沒有可用能力點'); return; }
    if (!r.abilities) r.abilities = { str: 0, vit: 0, agi: 0, dex: 0, int: 0, luk: 0 };
    r.abilities[id] = (r.abilities[id] || 0) + 1;
    r.abilityPoints -= 1;
    const s = computeStats(me);
    if (r.hp > s.maxHp) r.hp = s.maxHp;
    if (r.mp > s.maxMp) r.mp = s.maxMp;
    saveData();
    renderCharCard();
    renderAbilityTree();
    showToast(`✨ ${id.toUpperCase()} +1 → ${r.abilities[id]}`);
  }

      if (t.ability) return `+${t.value} ${(t.ability || '').toUpperCase()}`;
      if (t.stat)    return `${fmtBonus(t.stat, t.value)} ${labels[t.stat]?.split(' ')[1] || t.stat}`;

    const statGroups = {};

      else if (t.stat && statGroups[t.stat]) statGroups[t.stat].push(t);

    Object.keys(abilityGroups).forEach(k => abilityGroups[k].sort((a,b) => a.value - b.value));

  // 從背包裝備一個精魂（找第一個空槽，沒空就替換槽 1 然後把舊的丟回背包）
  function equipSpiritFromBag(bagIdx) {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    const bag = rpg.spiritBag || [];
    const sp = bag[bagIdx];
    if (!sp) return;
    const slots = getSpiritSlots(rpg);
    const emptyIdx = slots.findIndex(x => !x);
    if (emptyIdx >= 0) {
      slots[emptyIdx] = sp;
      bag.splice(bagIdx, 1);
      saveData();
      showSpiritsModal();
      renderCharCard();
      renderCharQuickMenu();
      showToast(`✨ 裝備 ${sp.icon} ${sp.name}（槽 ${emptyIdx + 1}）`);
      return;
    }
    // 滿了 — 問要替換哪一槽
    const choice = prompt(`5 個槽都裝滿了。要替換第幾槽？(1-5，輸入 0 取消)\n目前槽：\n${slots.map((s, i) => `${i+1}. ${s ? s.icon + ' ' + s.name : '空'}`).join('\n')}`);
    const n = parseInt(choice, 10);
    if (!n || n < 1 || n > 5) return;
    const targetIdx = n - 1;
    if (slots[targetIdx]) bag.push(slots[targetIdx]);
    slots[targetIdx] = sp;
    // 從 bag 移除剛拿的（注意 push 會影響 idx，所以先計算）
    // 找回 bagIdx 對應 sp（剛才可能因為 push 多了一筆）
    const myIdx = bag.indexOf(sp);
    if (myIdx >= 0) bag.splice(myIdx, 1);
    saveData();
    showSpiritsModal();
    renderCharCard();
    renderCharQuickMenu();
    showToast(`✨ 替換到槽 ${n}：${sp.icon} ${sp.name}`);
  }

  function snapshotToText(snap, userText) {

  // 一鍵複製到剪貼簿
  async function copyToClipboard(text) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch (e) { /* fall through */ }
    // fallback：textarea + execCommand
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch (e) { return false; }
  }

  function setBugStatus(id, status) {
    if (!Array.isArray(bugs)) return;
    const b = bugs.find(x => x.id === id);
    if (!b) return;
    b.status = status;
    saveData();
    showBugList();
    refreshBugBadge();
  }

  function deleteBug(id) {
    if (!Array.isArray(bugs)) return;
    if (!confirm('刪掉這筆？')) return;
    bugs = bugs.filter(b => b.id !== id);
    saveData();
    showBugList();
    refreshBugBadge();

  // ⭐ 技能詳細 + 升級
  function showSkillDetailModal(skillId) {
    const me = getMe();
    if (!me) return;
    const rpg = getRpg(me);
    const cls = CLASSES[rpg.class];
    if (!cls) return;
    const skill = (cls.skills || []).find(s => s.id === skillId);
    if (!skill) { showToast('找不到技能'); return; }
    const lv = (rpg.skillLevels || {})[skillId] || 0;
    const eff = getSkillEffectiveStats(skill, lv);
    const isLocked = (skill.unlockLv || 1) > rpg.level;
    const canUpgrade = !isLocked && lv < SKILL_MAX_LEVEL && (rpg.skillPoints || 0) >= 1;
    // 等級 breakdown
    const levelRows = [];
    for (let i = 1; i <= SKILL_MAX_LEVEL; i++) {
      const owned = i <= lv;
      const isNext = i === lv + 1;
      const desc = describeSkillLevelEffect(skill, i);
      levelRows.push(`
        <div class="skl-row ${owned ? 'owned' : ''} ${isNext ? 'next' : ''}">
          <span class="skl-num">Lv ${i}</span>
          <span class="skl-desc">${owned ? '✓ ' : isNext ? '➤ ' : '🔒 '}${desc}</span>
        </div>
      `);
    }
    // 對應的詞綴 / 自身 buff（用 effective）
    const buffPairs = [];
    if (eff.lifesteal) buffPairs.push(`🩸 吸血 ${Math.round(eff.lifesteal*100)}%`);
    if (eff.healCaster) buffPairs.push(`💚 自癒 ${Math.round(eff.healCaster*100)}% maxHP`);
    if (eff.selfBuff) {
      buffPairs.push(`${describeBuff(eff.selfBuff)}　持續 ${eff.selfBuff.turns} 回合`);
    }
    if (eff.applyStatus) {
      const s = eff.applyStatus;
      buffPairs.push(`${statusEmoji(s.type)} 賦予 ${statusLabel(s.type)}（${Math.round((s.chance||1)*100)}%、持續 ${s.turns} 回合${s.dmg ? `、每回合 ${s.dmg} 傷害` : ''}）`);
    }
    if (eff.targetCount && eff.targetCount !== 1) {
      buffPairs.push(`🎯 同時打 ${eff.targetCount === 'all' ? '全體' : eff.targetCount + ' 個目標'}`);
    }
    if (eff.alwaysCrit) buffPairs.push('💥 必中暴擊');
    if (eff.extraCritChance) buffPairs.push(`🎯 暴擊率 +${Math.round(eff.extraCritChance * 100)}%（本招）`);
    if (eff.extraCritDmg)    buffPairs.push(`💥 爆傷 +${Math.round(eff.extraCritDmg * 100)}%（本招）`);
    if (eff.mpCostMult && eff.mpCostMult < 1) buffPairs.push(`💙 MP 消耗 -${Math.round((1 - eff.mpCostMult) * 100)}%`);
    if (eff.magic) buffPairs.push('🔮 魔攻（吃法抗）');
    if (eff.ignoreDef) buffPairs.push('🗡 無視防禦');

    const html = `
      <div style="text-align:center; padding:4px 0;">
        <div style="font-size:48px; line-height:1; margin-bottom:4px;">${skill.icon}</div>
        <div style="font-weight:700; font-size:16px; color:#5b3d62;">${escapeHtml(skill.name)}</div>
        <div style="font-size:11px; color:#8b6f9b; margin-top:2px;">
          ${isLocked ? `🔒 Lv ${skill.unlockLv} 解鎖` : `等級 <b style="color:#7c3aed;">${lv}/${SKILL_MAX_LEVEL}</b>`}
          　·　CD ${skill.cooldown}　·　硬值 ${getEffectiveCast(skill)}　·　${formatSkillCost(skill)}
        </div>
        <div style="font-size:12px; color:#7c3aed; margin-top:6px; padding:6px 8px; background:#f3e8ff; border-radius:8px;">
          ${formatSkillDesc(eff)}
        </div>
        ${buffPairs.length > 0 ? `
          <div style="margin-top:8px; padding:6px 10px; background:#fff8e6; border:1px dashed #f59e0b; border-radius:8px; font-size:11px; color:#92400e; text-align:left;">
            ${buffPairs.map(p => `<div style="padding:1px 0;">${p}</div>`).join('')}
          </div>
        ` : ''}
        <div style="margin-top:10px; text-align:left;">
          <div style="font-size:11px; font-weight:700; color:#5b3d62; margin-bottom:4px;">📈 等級加成</div>
          ${levelRows.join('')}
        </div>
        <div style="margin-top:14px;">
          ${isLocked
            ? `<div style="font-size:11px; color:#dc2626;">尚未解鎖（Lv ${skill.unlockLv} 才能升級）</div>`
            : canUpgrade
              ? `<button class="btn btn-primary" onclick="upgradeSkillLevel('${skillId}')" style="background:linear-gradient(135deg,#c4b5fd,#7c3aed); box-shadow:0 4px 0 #5b21b6;">升級到 Lv ${lv + 1}（-1 SP）</button>`
              : lv >= SKILL_MAX_LEVEL
                ? `<div style="font-size:12px; color:#16a34a; font-weight:700;">✓ 已滿級</div>`
                : `<div style="font-size:12px; color:#dc2626;">技能點不足（你有 ${rpg.skillPoints || 0} SP）</div>`
          }
          <div style="font-size:10px; color:#8b6f9b; margin-top:6px;">技能點與「屬性強化」共用同一個池</div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px;">
          <button class="btn btn-secondary" onclick="showSkillsModal()">← 返回列表</button>
          <button class="btn btn-secondary" onclick="hideModal()">關閉</button>
        </div>
      </div>
    `;
    showModal(`${skill.icon} ${skill.name}`, html);
  }
  window.showSkillDetailModal = showSkillDetailModal;

  function upgradeSkillLevel(skillId) {
    const me = getMe();
    if (!me) return;
    const rpg = getRpg(me);
    const cls = CLASSES[rpg.class];
    if (!cls) return;
    const skill = (cls.skills || []).find(s => s.id === skillId);
    if (!skill) return;
    if ((skill.unlockLv || 1) > rpg.level) { showToast('等級不足，未解鎖'); return; }
    const cur = (rpg.skillLevels || {})[skillId] || 0;
    if (cur >= SKILL_MAX_LEVEL) { showToast('已達最高等級'); return; }
    if ((rpg.skillPoints || 0) < 1) { showToast('技能點不足'); return; }
    rpg.skillLevels = rpg.skillLevels || {};
    rpg.skillLevels[skillId] = cur + 1;
    rpg.skillPoints -= 1;
    saveData();
    showToast(`✨ ${skill.icon} ${skill.name} → Lv ${cur + 1}`);
    showSkillDetailModal(skillId); // refresh modal
    renderCharCard();
    renderCharQuickMenu();
  }
  window.upgradeSkillLevel = upgradeSkillLevel;

  // ⭐ 技能 modal — 主動技能升級 + 屬性強化技能樹合併到同一個畫面
  function showSkillsModal() {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    const cls = CLASSES[rpg.class];
    if (!cls) return;
    const points = rpg.skillPoints || 0;
    // ─ 主動技能：點任一個進詳細看升級
    const activeHtml = (cls.skills || []).map(s => {
      const locked = (s.unlockLv || 1) > rpg.level;
      const sLv = (rpg.skillLevels || {})[s.id] || 0;
      const canUp = !locked && sLv < SKILL_MAX_LEVEL && points >= 1;
      return `<div class="skill-row${locked ? ' locked' : ''}" onclick="hideModal(); showSkillDetailModal('${s.id}')">
        <span>${locked ? '🔒' : '✓'} <b>${s.icon} ${s.name}</b>${sLv > 0 ? ` <span class="skill-row-lv">Lv ${sLv}/${SKILL_MAX_LEVEL}</span>` : ''}${locked ? ` <span style="font-size:10px;">(${s.unlockLv})</span>` : ''}${canUp ? ` <span style="font-size:9px; color:#7c3aed; font-weight:700;">⬆ 可升級</span>` : ''}</span>
        <span style="opacity:0.85; font-size:10px; white-space:nowrap;">CD ${s.cooldown} · 硬值 ${getEffectiveCast(s)} · ${formatSkillCost(s)}</span>
      </div>`;
    }).join('');
    // ─ 屬性強化技能樹：直接 inline + 按鈕
    const treeHtml = (cls.skillTree || []).map(node => {
      const lv = (rpg.skills || {})[node.id] || 0;
      const maxed = lv >= node.maxLevel;
      const canLearn = !maxed && points >= 1;
      const pct = (lv / node.maxLevel) * 100;
      const valStr = node.effect.endsWith('Pct') || node.effect === 'critChance' || node.effect === 'regen'
        ? `${(lv * node.per * 100).toFixed(0)}%`
        : `+${(lv * node.per).toFixed(0)}`;
      return `
        <div class="skill-node ${maxed ? 'maxed' : ''}">
          <div class="sn-icon">${node.icon}</div>
          <div>
            <div class="sn-name">${escapeHtml(node.name)}</div>
            <div class="sn-desc">${escapeHtml(node.desc)}　·　目前 ${valStr}</div>
            <div class="sn-progress">
              <span>Lv ${lv}/${node.maxLevel}</span>
              <div class="sn-bar"><div class="sn-fill" style="width:${pct}%"></div></div>
            </div>
          </div>
          <button class="sn-add-btn" onclick="learnSkill('${node.id}')" ${canLearn ? '' : 'disabled'} title="${maxed ? '已滿級' : (points < 1 ? '沒點數' : '加 1 級')}">+</button>
        </div>
      `;
    }).join('');
    const html = `
      <div style="text-align:left;">
        <div style="font-size:12px; color:#5b3d62; padding:8px 10px; background:linear-gradient(135deg,#fef3c7,#fde68a); border-radius:8px; margin-bottom:10px; border:2px dashed #f59e0b;">
          技能點 <b style="color:#7c3aed; font-size:14px;">${points} SP</b>　·　每升 1 等 +${POINTS_PER_LEVEL.skill} SP<br>

  // ⭐ 裝備圖鑑：列出所有可裝備物品，分槽位分頁、標出已擁有
  let __dexTab = 'weapon';
  function getDexOwnedSet() {
    const me = getMe();
    if (!me) return new Set();
    const rpg = getRpg(me);
    const owned = new Set();
    // 背包 + 已裝備 = 擁有過
    (rpg.inventory || []).forEach(entry => {
      const id = typeof entry === 'string' ? entry : entry?.id;
      if (id) owned.add(id);
    });
    Object.values(rpg.equipment || {}).forEach(id => { if (id) owned.add(id); });
    // 也算進已永久收集（dexSeen），把當前擁有的合進 dexSeen 並存檔
    rpg.dexSeen = Array.isArray(rpg.dexSeen) ? rpg.dexSeen : [];
    let changed = false;
    for (const id of owned) {
      if (!rpg.dexSeen.includes(id)) { rpg.dexSeen.push(id); changed = true; }
    }
    rpg.dexSeen.forEach(id => owned.add(id));
    if (changed && typeof saveData === 'function') saveData();
    return owned;
  }
  function buildDexCatalog() {
    // 收集所有可裝備物品（基底 ITEMS + 商店 SHOP_ITEMS + 套裝件）
    const all = [];
    const seen = new Set();
    const push = (it, source) => {
      if (!it || !it.slot || seen.has(it.id)) return;
      seen.add(it.id);
      all.push({ ...it, __source: source });
    };
    ITEMS.forEach(i => push(i, 'drop'));
    SHOP_ITEMS.forEach(i => { if (i.type === 'equipment') push(i, 'shop'); });
    Object.values(SET_PIECES).forEach(p => push(p, 'set'));
    return all;
  }

  // ⭐ HOF 行動規則編輯器
  function renderActionPattern() {
    const me = getMe();
    if (!me) return;
    const rpg = getRpg(me);
    const host = document.getElementById('actionPatternBody');
    if (!host) return;
    if (!rpg.class) {
      host.innerHTML = '<div style="font-size:12px; color:#8b6f9b; padding:8px; text-align:center;">先選職業 ♡</div>';
      return;
    }
    const cls = CLASSES[rpg.class];
    const skills = cls.skills || [];
    const pattern = (rpg.actionPattern && rpg.actionPattern.length)
      ? rpg.actionPattern
      : getDefaultActionPattern(rpg.class);

    // 技能 dropdown 選項：basic + 各職業技能
    const skillOptions = (selectedId) => {
      let opts = `<option value="basic" ${selectedId === 'basic' ? 'selected' : ''}>${cls.attackVerb || '普攻'}（普攻）</option>`;
      for (const s of skills) {
        const locked = (s.unlockLv || 1) > (rpg.level || 1);
        opts += `<option value="${s.id}" ${selectedId === s.id ? 'selected' : ''} ${locked ? 'disabled' : ''}>${s.icon} ${s.name}${locked ? ` (Lv ${s.unlockLv} 解鎖)` : ''}</option>`;
      }
      return opts;
    };
    // judge dropdown 選項
    const judgeOptions = (selectedId) => {
      return Object.values(JUDGES).map(j =>
        `<option value="${j.id}" ${selectedId === j.id ? 'selected' : ''}>${j.label}</option>`
      ).join('');
    };

    const rows = pattern.map((rule, i) => {
      const judge = JUDGES[rule.judgeId];
      const showParam = judge && judge.paramType !== 'none';
      const paramSuffix = judge && judge.paramType === 'percent' ? '%'
        : judge && judge.paramType === 'count' ? '次' : '';
      return `
        <div class="ap-row">
          <span class="ap-num">#${i + 1}</span>
          <select class="ap-judge" onchange="updateActionRule(${i}, 'judgeId', this.value)">${judgeOptions(rule.judgeId)}</select>
          ${showParam
            ? `<input class="ap-param" type="number" value="${rule.param}" onchange="updateActionRule(${i}, 'param', this.value)">${paramSuffix ? `<span class="ap-suffix">${paramSuffix}</span>` : ''}`
            : `<span class="ap-param-na">—</span>`}
          <span class="ap-arrow">→</span>
          <select class="ap-skill" onchange="updateActionRule(${i}, 'skillId', this.value)">${skillOptions(rule.skillId)}</select>
          <button class="ap-btn-icon" onclick="moveActionRule(${i}, -1)" ${i === 0 ? 'disabled' : ''} title="上移">↑</button>
          <button class="ap-btn-icon" onclick="moveActionRule(${i}, 1)" ${i === pattern.length - 1 ? 'disabled' : ''} title="下移">↓</button>
          <button class="ap-btn-icon ap-btn-del" onclick="deleteActionRule(${i})" title="刪除">✕</button>
        </div>
      `;
    }).join('');

    host.innerHTML = `
      <div style="font-size:11px; color:#8b6f9b; padding:6px 10px; background:#fffaf0; border-radius:8px; margin-bottom:8px; border:1px dashed #fbbf24;">
        💡 從上到下檢查，第一條 <b>條件成立</b> 且 <b>技能可用</b>（MP/CD/等級）的就執行；都不成立會自動普攻。
      </div>
      <div class="ap-list">${rows}</div>
      <div class="ap-controls">
        <button class="btn btn-primary ap-add" onclick="addActionRule()">+ 加一條規則</button>
        <button class="btn btn-secondary ap-reset" onclick="resetActionPattern()">↺ 重置為預設</button>
      </div>
    `;
  }
  window.renderActionPattern = renderActionPattern;

  function updateActionRule(idx, field, value) {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.actionPattern || !rpg.actionPattern[idx]) return;
    const r = rpg.actionPattern[idx];
    if (field === 'judgeId') r.judgeId = Number(value) || 1000;
    else if (field === 'param') r.param = Math.max(0, Number(value) || 0);
    else if (field === 'skillId') r.skillId = String(value);
    saveData();
    renderActionPattern();
  }
  window.updateActionRule = updateActionRule;

  function addActionRule() {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    rpg.actionPattern = rpg.actionPattern || [];
    rpg.actionPattern.push({ judgeId: 1000, param: 0, skillId: 'basic' });
    saveData();
    renderActionPattern();
  }
  window.addActionRule = addActionRule;

  function deleteActionRule(idx) {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.actionPattern) return;
    rpg.actionPattern.splice(idx, 1);
    if (rpg.actionPattern.length === 0) {
      // 空表退回預設，否則戰鬥沒招
      rpg.actionPattern = getDefaultActionPattern(rpg.class);
    }
    saveData();
    renderActionPattern();
  }
  window.deleteActionRule = deleteActionRule;

  function moveActionRule(idx, delta) {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.actionPattern) return;
    const j = idx + delta;
    if (j < 0 || j >= rpg.actionPattern.length) return;
    const tmp = rpg.actionPattern[idx];
    rpg.actionPattern[idx] = rpg.actionPattern[j];
    rpg.actionPattern[j] = tmp;
    saveData();
    renderActionPattern();
  }
  window.moveActionRule = moveActionRule;

  function resetActionPattern() {
    if (!confirm('確定重置為預設規則表？目前的設定會清掉。')) return;
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    rpg.actionPattern = getDefaultActionPattern(rpg.class);
    saveData();
    renderActionPattern();
  }
  window.resetActionPattern = resetActionPattern;

  // 技能樹現在只在 modal 裡渲染，舊頁面卡片已移除 → 這裡保留空殼以免有舊 call site
  function renderSkillTree() { /* moved to showSkillsModal */ }

  function formatSkillDesc(s) {
    if (s.type === 'heal') {
      const parts = [];
      if (s.healPct) parts.push(`回 ${Math.round(s.healPct * 100)}% HP`);
      if (s.mpFlat)  parts.push(`回 ${s.mpFlat} MP`);
      else if (s.mpPct) parts.push(`回 ${Math.round(s.mpPct * 100)}% MP`);
      return parts.join(' + ') || '輔助';
    }
    if (s.type === 'buff' && s.selfBuff) {
      return `${describeBuff(s.selfBuff)}　持續 ${s.selfBuff.turns} 回合`;
    }
    const hitsStr = (s.hits && s.hits > 1) ? ` ×${s.hits} 段` : '';
    if (s.defMult != null)   return `${s.defMult}× DEF 傷害${hitsStr}`;
    if (s.maxHpMult != null) return `${Math.round(s.maxHpMult * 100)}% maxHP 傷害（魔攻）${hitsStr}`;
    if (s.flat != null) return `固定 ${s.flat}+Lv×${s.perLv} 傷害${s.ignoreDef ? '（無視防）' : ''}${hitsStr}`;
    let parts = [];
    if (s.mult) parts.push(`${s.mult}× ATK${s.magic ? '（魔攻）' : ''}${hitsStr}`);
    if (s.alwaysCrit) parts.push('必中暴擊');
    if (s.lifesteal) parts.push(`吸血 ${Math.round(s.lifesteal * 100)}%`);
    if (s.healCaster) parts.push(`回 ${Math.round(s.healCaster * 100)}% maxHP`);
    return parts.join(' + ');
  }
  function formatSkillCost(s) {
    const parts = [];
    if (s.mpCost && s.mpCost > 0) parts.push(`<span style="color:#3b82f6;">${s.mpCost} MP</span>`);
    if (s.hpCost)     parts.push(`<span style="color:#dc2626;">${Math.round(s.hpCost * 100)}% HP</span>`);
    if (s.hpCostFlat) parts.push(`<span style="color:#dc2626;">${s.hpCostFlat} HP</span>`);
    if (parts.length === 0) parts.push('<span style="color:#16a34a;">免費</span>');
    return parts.join(' + ');
  }

  function learnSkill(nodeId) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const cls = CLASSES[r.class];
    if (!cls || !cls.skillTree) return;
    const node = cls.skillTree.find(n => n.id === nodeId);
    if (!node) return;
    if ((r.skillPoints || 0) < 1) { showToast('沒有可用技能點'); return; }
    const cur = (r.skills || {})[nodeId] || 0;
    if (cur >= node.maxLevel) { showToast('已達最高等'); return; }
    r.skills = r.skills || {};
    r.skills[nodeId] = cur + 1;
    r.skillPoints -= 1;
    // 強化 maxHp/maxMp 後當前 HP/MP 不變但上限變大 → 補滿（避免上限變了 HP 顯示比例怪）
    const s = computeStats(me);
    if (r.hp > s.maxHp) r.hp = s.maxHp;
    if (r.mp > s.maxMp) r.mp = s.maxMp;
    saveData();
    renderCharCard();
    renderCharQuickMenu();
    // 如果技能 modal 開著就重整；否則 no-op
    const modalEl = document.getElementById('genericModal');
    if (modalEl && !modalEl.classList.contains('hidden')) {
      showSkillsModal();
    }
    showToast(`✨ ${node.name} → Lv ${cur + 1}`);
  }
  window.learnSkill = learnSkill;

  let __shopTab = 'consumable';

  function renderShop() {
    const me = getMe();
    if (!me) return;
    const myCoins = getCoins(me.id);
    const myLv = getRpg(me).level;
    // ⭐ 商店只賣消耗品；裝備全部從打怪取得
    const TABS = [
      { id: 'consumable', label: '🧪 消耗品', filter: i => i.type === 'consumable' },
    ];
    if (!TABS.find(t => t.id === __shopTab)) __shopTab = 'consumable';
    const active = TABS.find(t => t.id === __shopTab) || TABS[0];
    const list = SHOP_ITEMS.filter(active.filter);
    if (active.id !== 'consumable') list.sort((a, b) => a.lv - b.lv);

    const itemBtn = (it) => {
      const tooLow = it.type === 'equipment' && myLv < it.lv;
      const tooPoor = myCoins < it.cost;
      const disabled = tooLow || tooPoor;
      const stats = it.type === 'equipment'
        ? ['atk','def','spd','hp'].filter(k=>it[k]).map(k=>`${k.toUpperCase()}+${it[k]}`).join(' ')
        : escapeHtml(it.desc);
      return `
        <button class="shop-item ${tooLow ? 'locked' : ''}" onclick="buyShop('${it.id}')" ${disabled ? 'disabled' : ''}>
          <div class="si-icon">${it.icon}</div>
          <div class="si-name">${escapeHtml(it.name)}</div>
          <div class="si-desc">${stats}</div>
          ${it.type === 'equipment' ? `<div class="si-lv">${tooLow ? '🔒 ' : ''}需求 Lv ${it.lv}</div>` : ''}
          <div class="si-cost">🪙 ${it.cost}</div>
        </button>
      `;
    };

    const tabHtml = TABS.map(t => `
      <button class="shop-tab ${t.id === __shopTab ? 'active' : ''}" onclick="setShopTab('${t.id}')">${t.label}</button>
    `).join('');

    // 體力藥限購狀態提示（只在消耗品分頁顯示）
    let stamLimitNote = '';
    if (active.id === 'consumable') {
      if (STAM_POT_UNLIMITED) {
        stamLimitNote = `<div style="font-size:11px; color:#15803d; padding:6px 10px; background:#dcfce7; border-radius:8px; margin-bottom:6px; border:1px dashed #16a34a;">🧪 封測期間：體力藥<b>無限制購買</b>（之後會恢復每小時 ${STAM_POT_HOURLY_LIMIT} 瓶）</div>`;
      } else {
        const rpg = getRpg(me);
        const st = getStamPotState(rpg);
        const used = STAM_POT_HOURLY_LIMIT - st.remaining;
        if (st.remaining > 0) {
          let extra = '';
          if (used > 0 && rpg.stamPotPurchases && rpg.stamPotPurchases.length > 0) {
            const minLeft = Math.ceil((STAM_POT_WINDOW_MS - (Date.now() - rpg.stamPotPurchases[0])) / 60000);
            extra = `（${minLeft} 分鐘後第 1 瓶過期）`;
          }
          stamLimitNote = `<div style="font-size:11px; color:#8b6f9b; padding:6px 10px; background:#fef3c7; border-radius:8px; margin-bottom:6px; border:1px dashed #f59e0b;">🧪 體力藥本小時已購 <b>${used}/${STAM_POT_HOURLY_LIMIT}</b>${extra}</div>`;
        } else {
          const m = Math.ceil(st.nextRefillMs / 60000);
          stamLimitNote = `<div style="font-size:11px; color:#dc2626; padding:6px 10px; background:#fee2e2; border-radius:8px; margin-bottom:6px; border:1px dashed #f87171;">🚫 體力藥已達本小時上限 ${STAM_POT_HOURLY_LIMIT} 瓶（${m} 分鐘後可再買）</div>`;
        }
      }
    }

    document.getElementById('shopGrid').innerHTML = `
      <div class="shop-tabs">${tabHtml}</div>
      ${stamLimitNote}
      <div class="shop-grid">${list.map(itemBtn).join('')}</div>
    `;
  }
  function setShopTab(id) { __shopTab = id; renderShop(); }
  window.setShopTab = setShopTab;

  // 體力藥每小時限購 5 瓶（避免「打工 → 買體力 → 打工」無限 loop）
  // 體力藥每小時限購 5 瓶（封測期已結束）
  const STAM_POT_UNLIMITED = false;
  const STAM_POT_HOURLY_LIMIT = 5;
  const STAM_POT_WINDOW_MS = 60 * 60 * 1000;
  function getStamPotState(rpg) {
    const now = Date.now();
    const list = (rpg.stamPotPurchases || []).filter(t => now - t < STAM_POT_WINDOW_MS);
    rpg.stamPotPurchases = list;
    return {
      count: list.length,
      remaining: Math.max(0, STAM_POT_HOURLY_LIMIT - list.length),
      // 最早一瓶過期的時間（即下一次可以再多買的時間點）
      nextRefillMs: list.length >= STAM_POT_HOURLY_LIMIT ? STAM_POT_WINDOW_MS - (now - list[0]) : 0,
    };
  }

  function buyShop(itemId) {
    const me = getMe();
    if (!me) return;
    const it = SHOP_ITEMS.find(x => x.id === itemId);
    if (!it) return;
    if (getCoins(me.id) < it.cost) { showToast('幣不夠 ♡'); return; }
    // 體力藥限購檢查（封測期間 STAM_POT_UNLIMITED = true → 跳過）
    if (!STAM_POT_UNLIMITED && itemId.startsWith('pot_stam_')) {
      const rpg = getRpg(me);
      const st = getStamPotState(rpg);
      if (st.remaining <= 0) {
        const m = Math.ceil(st.nextRefillMs / 60000);
        showToast(`🚫 體力藥每小時限購 ${STAM_POT_HOURLY_LIMIT} 瓶（${m} 分鐘後可再買）`);
        return;
      }
    }
    // 跳出確認 modal
    openBuyConfirm(it);
  }
  window.buyShop = buyShop;

  function openBuyConfirm(it) {
    const me = getMe();
    const myCoins = getCoins(me.id);
    const after = myCoins - it.cost;
    const stats = it.type === 'equipment'
      ? `<div style="margin-top:6px; font-size:12px; color:#8b6f9b;">需求 Lv ${it.lv}　·　${['atk','def','spd','hp'].filter(k=>it[k]).map(k=>`${k.toUpperCase()}+${it[k]}`).join(' / ')}</div>`
      : `<div style="margin-top:6px; font-size:12px; color:#8b6f9b;">${escapeHtml(it.desc || '')}</div>`;
    const html = `
      <div style="text-align:center; padding:8px 0;">
        <div style="font-size:64px; margin-bottom:4px;">${it.icon}</div>

        ${stats}
        <div style="margin-top:14px; font-size:13px;">

    showModal(`🛒 確認購入`, html);
  }

  window.closeBuyConfirm = closeBuyConfirm;

  function doBuyShop(itemId) {
    const me = getMe();
    if (!me) return;
    const it = SHOP_ITEMS.find(x => x.id === itemId);
    if (!it) return;
    // 體力藥限購防呆（封測期間 STAM_POT_UNLIMITED = true → 跳過）
    if (!STAM_POT_UNLIMITED && itemId.startsWith('pot_stam_')) {
      const rpgCheck = getRpg(me);
      const st = getStamPotState(rpgCheck);
      if (st.remaining <= 0) {
        const m = Math.ceil(st.nextRefillMs / 60000);
        showToast(`🚫 體力藥每小時限購 ${STAM_POT_HOURLY_LIMIT} 瓶（${m} 分鐘後可再買）`);
        hideModal();
        return;
      }
    }
    if (!spendCoins(me.id, it.cost)) { showToast('幣不夠 ♡'); hideModal(); return; }
    const rpg = getRpg(me);
    // 記錄體力藥購買時間
    if (itemId.startsWith('pot_stam_')) {
      rpg.stamPotPurchases = rpg.stamPotPurchases || [];
      rpg.stamPotPurchases.push(Date.now());
    }
    if (it.type === 'consumable') {
      tickRecovery(me);
      const stats = computeStats(me);
      let msg = '';
      if (it.effect.stamina) {
        rpg.stamina = Math.min(STAMINA_MAX, (rpg.stamina || 0) + it.effect.stamina);
        msg = `⚡ +${it.effect.stamina} 體力`;
      }
      // ⭐ 復活藥水：必須是死亡狀態才有用
      if (it.effect.revive) {
        if (rpg.deathAt && rpg.hp <= 0) {
          rpg.hp = stats.maxHp;
          rpg.mp = stats.maxMp;
          rpg.deathAt = null;
          msg = `🧚 復活！HP / MP 回滿`;
        } else {
          // 還沒死就買沒效果 → 退錢
          refundCoins(me.id, it.cost);
          showToast('🧚 你還活著呢～復活藥水沒效果，已退款');
          hideModal();
          renderCharCard();
          renderEquipment();
          renderShop();
          return;
        }
      }
      if (it.effect.xp) {
        rpg.xp = (rpg.xp || 0) + it.effect.xp;
        let leveled = 0;
        while (rpg.xp >= xpForLevel(rpg.level)) {
          rpg.xp -= xpForLevel(rpg.level);
          rpg.level += 1;
          rpg.skillPoints = (rpg.skillPoints || 0) + POINTS_PER_LEVEL.skill;
          rpg.abilityPoints = (rpg.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
          leveled++;
          if (rpg.level > 50) break;
        }
        if (leveled) {
          const s2 = computeStats(me);
          rpg.hp = s2.maxHp;
          rpg.mp = s2.maxMp;
          rpg.deathAt = null;
          showLevelUp(rpg.level);
        }
        msg = `⭐ +${it.effect.xp} XP${leveled ? `，升 ${leveled} 級 +${leveled * POINTS_PER_LEVEL.skill} 技能 +${leveled * POINTS_PER_LEVEL.ability} 能力點` : ''}`;
      }
      showToast(`✨ 使用 ${it.icon} ${it.name}：${msg}`);
    } else if (it.type === 'equipment') {
      rpg.inventory.push(it.id);
      showToast(`🛒 購入 ${it.icon} ${it.name}`);
    }
    saveData();
    hideModal();
    renderCharCard();
    renderEquipment();
    renderShop();
  }
  window.doBuyShop = doBuyShop;

    const r = getRpg(me);
    const entry = r.inventory[idx];
    const item = resolveItem(entry);

  function formatItemStats(item) {
    const parts = [];
    if (item.atk) parts.push(`ATK+${item.atk}`);
    if (item.def) parts.push(`DEF+${item.def}`);
    if (item.spd) parts.push(`SPD+${item.spd}`);
    if (item.hp)  parts.push(`HP+${item.hp}`);
    if (item.mp)  parts.push(`MP+${item.mp}`);
    if (item.critChance) parts.push(`暴擊+${Math.round(item.critChance * 100)}%`);
    if (item.critDmg)    parts.push(`爆傷+${Math.round(item.critDmg * 100)}%`);
    let s = parts.join(' · ');
    if (item.affixes && item.affixes.length) s += ` ✨${item.affixes.length}`;
    if (item.setId) s += ' 🛡';
    return s;
  }

  // === 世界王 ===
  function getBossState(bossId) {
    if (!worldBoss) worldBoss = {};
    const boss = WORLD_BOSSES.find(b => b.id === bossId);
    if (!boss) return null;
    if (!worldBoss[bossId]) {
      worldBoss[bossId] = {
        currentHp: boss.hp,
        spawnedAt: Date.now(),
        deadAt: null,
        nextSpawnAt: null,
        damageLog: {},
        lastHit: null,
        killCount: 0,
        lastKill: null,
      };
    }
    const state = worldBoss[bossId];
    // 自動復活：respawnMs=0 → 死了就立刻重生；否則等到 nextSpawnAt
    const instant = !boss.respawnMs;
    if (state.deadAt && (instant || (state.nextSpawnAt && Date.now() >= state.nextSpawnAt))) {
      state.currentHp = boss.hp;
      state.deadAt = null;
      state.nextSpawnAt = null;
      state.spawnedAt = Date.now();
      state.damageLog = {};
      state.lastHit = null;
    }
    return state;
  }

  // ⭐ 試煉戰場：3 隻怪物同時打
  const TRIAL_STAMINA = 0; // ⭐ 試煉戰場：免費試強度，但目前不發獎勵（之後再開放）
  let __trialInProgress = false;
  function generateTrialMonsters(playerLv) {
    // 用目前所在地區的怪物池，但等級 = 玩家等級
    const me = getMe();
    const rpg = me ? getRpg(me) : null;
    const zoneId = rpg?.currentZone || 'forest';
    const zone = ZONES.find(z => z.id === zoneId) || ZONES[0];
    const pool = MONSTERS.filter(m => zone.monsters.includes(m.id));
    if (pool.length === 0) return [];
    // 抽 1-3 隻
    const count = 2 + Math.floor(Math.random() * 2); // 2-3 隻
    const out = [];
    for (let i = 0; i < count; i++) {
      const m = pool[Math.floor(Math.random() * pool.length)];
      const lv = Math.max(1, playerLv);
      const k = monsterK(lv);
      out.push({
        ...m,
        level: lv,
        hp: Math.round(m.hpBase * monsterHPK(lv) * 0.6),
        maxHp: Math.round(m.hpBase * monsterHPK(lv) * 0.6),
        atk: Math.round(m.atkBase * k * 0.9),
        def: Math.round(m.defBase * monsterDEFK(lv) * 0.6),
        spd: Math.round(m.spdBase + lv * 0.4),
        goldDrop: Math.round(coinDropByLevel(lv) * 0.5),
        xpDrop: Math.round((m.xpBase + lv * 6) * 1.3),
      });
    }
    return out;
  }
