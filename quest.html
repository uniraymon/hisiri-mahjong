<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ 冒險島 — 麻將戰績小本本</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background:
      radial-gradient(circle at 20% 10%, #ddd6fe 0%, transparent 40%),
      radial-gradient(circle at 80% 30%, #fbcfe8 0%, transparent 40%),
      radial-gradient(circle at 50% 80%, #fde68a 0%, transparent 40%),
      linear-gradient(135deg, #f3e8ff 0%, #fef3c7 100%);
    min-height: 100vh;
    padding: 16px;
    padding-bottom: 100px;
    color: #5a4a4a;
  }
  .container { max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .back-link {
    color: #8b5cf6;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
    background: rgba(255,255,255,0.7);
    padding: 6px 12px;
    border-radius: 16px;
    border: 2px dashed #c4b5fd;
  }
  .back-link:hover { background: #fff; }
  h1 {
    font-size: 24px;
    color: #7c3aed;
    text-shadow: 2px 2px 0 #fff, 3px 3px 0 #ddd6fe;
    letter-spacing: 1px;
  }

  .card {
    background: rgba(255, 255, 255, 0.88);
    border: 2px solid #ddd6fe;
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 0 #c4b5fd, 0 8px 20px rgba(167, 139, 250, 0.18);
  }
  .card h2 {
    font-size: 16px;
    margin-bottom: 12px;
    color: #7c3aed;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .hidden { display: none !important; }

  /* 職業選擇 */
  .class-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .class-card {
    background: linear-gradient(135deg, #fff, #fff8fb);
    border: 2px solid #ddd6fe;
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .class-card:hover { transform: translateY(-2px); box-shadow: 0 4px 0 #a78bfa; }
  .class-card .cls-icon { font-size: 42px; margin-bottom: 4px; }
  .class-card .cls-name { font-weight: 700; color: #7c3aed; font-size: 14px; }
  .class-card .cls-desc { font-size: 10px; color: #8b6f9b; margin-top: 4px; line-height: 1.4; }
  .class-card .cls-stats {
    font-size: 10px;
    color: #5a4a4a;
    margin-top: 6px;
    background: #f3e8ff;
    border-radius: 8px;
    padding: 4px;
    line-height: 1.4;
  }

  /* 角色卡（卡片風） */
  .char-card {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }
  .char-portrait {
    width: 220px;
    height: 280px;
    background:
      radial-gradient(circle at 50% 30%, rgba(255,255,255,0.5) 0%, transparent 40%),
      linear-gradient(160deg, #ddd6fe 0%, #c4b5fd 50%, #a78bfa 100%);
    border-radius: 18px;
    position: relative;
    overflow: hidden;
    border: 3px solid #c4b5fd;
    box-shadow:
      0 4px 0 #8b5cf6,
      0 8px 20px rgba(124, 58, 237, 0.25),
      inset 0 0 30px rgba(255, 255, 255, 0.3);
  }
  /* 卡片內框 */
  .char-portrait::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px dashed rgba(255, 255, 255, 0.55);
    border-radius: 12px;
    pointer-events: none;
    z-index: 5;
  }
  /* 卡片角落裝飾 — 飄浮在頂部中央，不擋徽章 */
  .char-portrait::after {
    content: '✨';
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    opacity: 0.7;
    animation: sparkleFloat 2.5s ease-in-out infinite;
    z-index: 6;
  }
  @keyframes sparkleFloat {
    0%, 100% { opacity: 0.3; transform: rotate(0) scale(1); }
    50%      { opacity: 1;   transform: rotate(25deg) scale(1.2); }
  }

  /* 卡片角徽章 */
  .cp-lv-badge, .cp-coin-badge {
    position: absolute;
    z-index: 7;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #fef3c7);
    border: 2px solid #f59e0b;
    color: #d97706;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 11px;
    box-shadow: 0 2px 4px rgba(245, 158, 11, 0.3);
  }
  .cp-lv-badge { top: 8px; left: 8px; }
  .cp-coin-badge { top: 8px; right: 8px; background: linear-gradient(135deg, #fff, #fed7aa); border-color: #ea580c; color: #c2410c; }
  /* sparkle 移到中央上方避免擋徽章 */

  /* 卡片下方收藏列 */
  .cp-collection {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    z-index: 7;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(124, 58, 237, 0.3);
    border-radius: 10px;
    padding: 4px 8px;
    backdrop-filter: blur(4px);
  }
  .cp-collection .cc-item {
    font-size: 16px;
    line-height: 1;
  }
  .cp-collection .cc-empty {
    font-size: 9px;
    color: #8b6f9b;
    font-style: italic;
  }

  /* 紙娃娃（SVG 5 層疊圖；每張 SVG 都是 200×250 已對齊） */
  .paper-doll {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 250px;
    z-index: 4;
    pointer-events: none;
  }
  .pd-layer {
    position: absolute;
    inset: 0;
    width: 200px;
    height: 250px;
    pointer-events: none;
    user-select: none;
  }
  .pd-armor  { z-index: 1; animation: pdPulse 3s ease-in-out infinite; filter: drop-shadow(0 0 6px rgba(125,211,252,0.5)); }
  .pd-base   { z-index: 2; filter: drop-shadow(0 4px 8px rgba(124,58,237,0.25)); }
  .pd-shield { z-index: 3; }
  .pd-weapon { z-index: 4; animation: pdSwayWeapon 2.6s ease-in-out infinite; transform-origin: center; }
  .pd-acc    { z-index: 5; animation: pdFloatAcc 2.4s ease-in-out infinite; }

  /* === 裝備分階自動上色（用 CSS filter 覆蓋 SVG 模板） === */
  /* 武器：10 階色調（木 → 鐵 → 鋼 → 銀 → 魔 → 聖 → 邪 → 雷 → 龍 → 神話） */
  .pd-weapon[data-tier="1"]  { filter: sepia(1) saturate(0.8) hue-rotate(-15deg) brightness(0.85) drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }
  .pd-weapon[data-tier="2"]  { filter: saturate(0.4) brightness(0.95) drop-shadow(0 2px 3px rgba(0,0,0,0.3)); }
  .pd-weapon[data-tier="3"]  { filter: saturate(0.7) brightness(1.05) drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }
  .pd-weapon[data-tier="4"]  { filter: saturate(0.6) brightness(1.15) drop-shadow(0 0 4px rgba(135,206,250,0.5)); }
  .pd-weapon[data-tier="5"]  { filter: hue-rotate(70deg) saturate(2.5) brightness(1.1) drop-shadow(0 0 6px rgba(167,139,250,0.85)); }
  .pd-weapon[data-tier="6"]  { filter: sepia(1) saturate(2.5) hue-rotate(-30deg) brightness(1.15) drop-shadow(0 0 6px rgba(255,215,0,0.8)); }
  .pd-weapon[data-tier="7"]  { filter: hue-rotate(-30deg) saturate(2.2) brightness(0.7) drop-shadow(0 0 6px rgba(220,38,38,0.7)); }
  .pd-weapon[data-tier="8"]  { filter: hue-rotate(-80deg) saturate(3) brightness(1.2) drop-shadow(0 0 7px rgba(250,204,21,0.95)); }
  .pd-weapon[data-tier="9"]  { filter: hue-rotate(110deg) saturate(2.2) brightness(1.05) drop-shadow(0 0 7px rgba(34,197,94,0.85)); }
  .pd-weapon[data-tier="10"] { filter: saturate(2.5) brightness(1.2) drop-shadow(0 0 4px #ff7eb9) drop-shadow(0 0 8px #7afcff) drop-shadow(0 0 14px rgba(255,255,255,0.6)); animation: pdSwayWeapon 2.6s ease-in-out infinite, pdRainbow 4s linear infinite; }
  @keyframes pdRainbow {
    0%   { filter: hue-rotate(0deg)   saturate(2.5) brightness(1.2) drop-shadow(0 0 6px #ff7eb9); }
    50%  { filter: hue-rotate(180deg) saturate(2.5) brightness(1.2) drop-shadow(0 0 6px #7afcff); }
    100% { filter: hue-rotate(360deg) saturate(2.5) brightness(1.2) drop-shadow(0 0 6px #ff7eb9); }
  }

  /* 防具：10 階盔甲光暈色 */
  .pd-armor[data-tier="1"]  { filter: hue-rotate(20deg) saturate(0.5) brightness(0.85); }
  .pd-armor[data-tier="2"]  { filter: saturate(0.3) brightness(0.95); }
  .pd-armor[data-tier="3"]  { filter: saturate(0.6) brightness(1.05); }
  .pd-armor[data-tier="4"]  { filter: hue-rotate(15deg) saturate(0.8) brightness(1.15); }
  .pd-armor[data-tier="5"]  { filter: hue-rotate(60deg) saturate(2) brightness(1.1) drop-shadow(0 0 8px rgba(167,139,250,0.7)); }
  .pd-armor[data-tier="6"]  { filter: hue-rotate(-150deg) saturate(2.5) brightness(1.2) drop-shadow(0 0 10px rgba(255,215,0,0.7)); }
  .pd-armor[data-tier="7"]  { filter: hue-rotate(140deg) saturate(2) brightness(0.6) drop-shadow(0 0 8px rgba(220,38,38,0.6)); }
  .pd-armor[data-tier="8"]  { filter: hue-rotate(-110deg) saturate(2.5) brightness(1.15) drop-shadow(0 0 10px rgba(250,204,21,0.85)); }
  .pd-armor[data-tier="9"]  { filter: hue-rotate(80deg) saturate(2.2) brightness(1.05) drop-shadow(0 0 10px rgba(34,197,94,0.8)); }
  .pd-armor[data-tier="10"] { filter: saturate(3) brightness(1.2) drop-shadow(0 0 12px rgba(255,255,255,0.8)); animation: pdPulse 3s ease-in-out infinite, pdRainbow 4s linear infinite; }

  /* 飾品：10 階色 */
  .pd-acc[data-tier="1"]  { filter: sepia(0.7) saturate(0.7) brightness(0.9); }
  .pd-acc[data-tier="2"]  { filter: saturate(0.6) brightness(1); }
  .pd-acc[data-tier="3"]  { filter: saturate(0.8) brightness(1.05); }
  .pd-acc[data-tier="4"]  { filter: hue-rotate(-20deg) saturate(0.8) brightness(1.15); }
  .pd-acc[data-tier="5"]  { filter: hue-rotate(60deg) saturate(2) brightness(1.1) drop-shadow(0 0 5px rgba(167,139,250,0.85)); }
  .pd-acc[data-tier="6"]  { filter: sepia(1) saturate(2.5) hue-rotate(-30deg) drop-shadow(0 0 6px rgba(255,215,0,0.9)); }
  .pd-acc[data-tier="7"]  { filter: hue-rotate(-30deg) saturate(2.2) brightness(0.75) drop-shadow(0 0 5px rgba(220,38,38,0.7)); }
  .pd-acc[data-tier="8"]  { filter: hue-rotate(-80deg) saturate(3) brightness(1.15) drop-shadow(0 0 6px rgba(250,204,21,0.95)); }
  .pd-acc[data-tier="9"]  { filter: hue-rotate(110deg) saturate(2.2) brightness(1.05) drop-shadow(0 0 6px rgba(34,197,94,0.85)); }
  .pd-acc[data-tier="10"] { animation: pdFloatAcc 2.4s ease-in-out infinite, pdRainbow 4s linear infinite; filter: saturate(2.5) brightness(1.2) drop-shadow(0 0 6px rgba(255,255,255,0.9)); }
  /* emoji fallback：當 SVG 載不到時用 emoji 撐住中央位置 */
  .pd-base-emoji {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 110px;
    z-index: 2;
    text-shadow: 0 4px 12px rgba(124,58,237,0.3);
  }
  @keyframes pdPulse {
    0%, 100% { transform: scale(1); opacity: 0.85; }
    50%      { transform: scale(1.04); opacity: 1; }
  }
  @keyframes pdSwayWeapon {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-2px); }
  }
  @keyframes pdFloatAcc {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-2px); }
  }

  /* 角色資訊（卡片下方） */
  .char-info { width: 100%; min-width: 0; }
  .char-name { font-weight: 700; color: #7c3aed; font-size: 18px; }
  .char-class { font-size: 12px; color: #8b6f9b; margin-bottom: 8px; }
  .char-coins { font-size: 12px; color: #d4806b; font-weight: 700; }

  .stat-bar { margin-top: 6px; }
  .stat-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .stat-bar-track {
    background: #f3f0ff;
    border: 1px solid #ddd6fe;
    border-radius: 8px;
    height: 12px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 6px;
  }
  .hp-fill   { background: linear-gradient(90deg, #fca5a5, #ef4444); }
  .mp-fill   { background: linear-gradient(90deg, #93c5fd, #3b82f6); }
  .xp-fill   { background: linear-gradient(90deg, #c4b5fd, #8b5cf6); }
  .mhp-fill  { background: linear-gradient(90deg, #fcd34d, #f59e0b); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 10px;
  }
  .stat-cell {
    background: #f3e8ff;
    border: 1px solid #ddd6fe;
    border-radius: 8px;
    padding: 6px;
    text-align: center;
  }
  .stat-cell .sc-label { font-size: 10px; color: #8b6f9b; font-weight: 600; }
  .stat-cell .sc-value { font-weight: 700; color: #7c3aed; font-size: 14px; }

  /* 行動按鈕 */
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 16px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 1px;
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, #c4b5fd, #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 0 #7c3aed, 0 6px 12px rgba(124, 58, 237, 0.3);
  }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: 0 2px 0 #c4b5fd; }
  .btn-secondary {
    background: #fff;
    color: #7c3aed;
    border: 2px solid #ddd6fe;
    margin-top: 8px;
  }
  .btn-warning {
    background: linear-gradient(135deg, #fde68a, #f59e0b);
    color: #fff;
    box-shadow: 0 4px 0 #d97706;
  }
  .btn-danger {
    background: linear-gradient(135deg, #fda4af, #ef4444);
    color: #fff;
    box-shadow: 0 4px 0 #dc2626;
  }

  .cooldown-info {
    text-align: center;
    margin-top: 8px;
    font-size: 13px;
    color: #8b6f9b;
    font-weight: 600;
  }

  /* 戰鬥場 */
  .battle-arena {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
    padding: 12px;
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border: 2px solid #f59e0b;
    border-radius: 14px;
    margin-bottom: 10px;
  }
  .combatant { text-align: center; min-width: 0; }
  .combatant-icon {
    font-size: 44px;
    line-height: 1;
    transition: transform 0.3s;
  }
  .combatant.attacking .combatant-icon { transform: scale(1.2) rotate(-10deg); }
  .combatant.hurt .combatant-icon { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .combatant-name { font-size: 11px; font-weight: 700; color: #5a4a4a; margin: 4px 0; }
  .combatant-hp-track {
    background: #fff;
    border: 1px solid #d97706;
    border-radius: 6px;
    height: 10px;
    overflow: hidden;
  }
  .combatant-hp-fill {
    height: 100%;
    background: linear-gradient(90deg, #fca5a5, #ef4444);
    transition: width 0.4s ease;
  }
  .combatant-hp-text { font-size: 10px; color: #5a4a4a; margin-top: 2px; font-weight: 600; }
  .vs-icon { font-size: 30px; color: #d97706; }

  .battle-log {
    background: #1e1b4b;
    color: #ddd6fe;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.6;
    max-height: 180px;
    overflow-y: auto;
    font-family: "Consolas", "Microsoft JhengHei", monospace;
  }
  .battle-log .log-line { margin-bottom: 2px; }
  .battle-log .log-player { color: #93c5fd; }
  .battle-log .log-monster { color: #fca5a5; }
  .battle-log .log-crit { color: #fde047; font-weight: 700; }
  .battle-log .log-system { color: #c4b5fd; font-style: italic; }
  .battle-log .log-victory { color: #86efac; font-weight: 700; }
  .battle-log .log-defeat { color: #f87171; font-weight: 700; }

  .reward-list {
    background: #f0fdf4;
    border: 2px dashed #86efac;
    border-radius: 12px;
    padding: 10px;
    margin-top: 10px;
    font-size: 13px;
    text-align: center;
  }
  .reward-list .rl-title { font-weight: 700; color: #16a34a; margin-bottom: 6px; }
  .reward-list .rl-item { display: inline-block; margin: 2px 4px; }
  .reward-loss {
    background: #fef2f2;
    border-color: #fca5a5;
  }
  .reward-loss .rl-title { color: #dc2626; }

  /* 裝備 / 背包 */
  .equip-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }
  .equip-slot {
    background: #f3e8ff;
    border: 2px dashed #c4b5fd;
    border-radius: 12px;
    padding: 10px 4px;
    text-align: center;
    min-height: 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: inherit;
  }
  .equip-slot:hover { background: #ede9fe; }
  .equip-slot.empty { color: #b5a5d4; }
  .equip-slot .es-icon { font-size: 24px; margin-bottom: 2px; }
  .equip-slot .es-name { font-size: 10px; font-weight: 700; color: #5a4a4a; }
  .equip-slot .es-stat { font-size: 9px; color: #8b6f9b; }

  .inv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 6px;
  }
  .inv-item {
    background: #fff;
    border: 1px solid #ddd6fe;
    border-radius: 10px;
    padding: 6px;
    text-align: center;
    cursor: pointer;
    font-family: inherit;
  }
  .inv-item:hover { background: #f3e8ff; }
  .inv-item .ii-icon { font-size: 20px; }
  .inv-item .ii-name { font-size: 10px; font-weight: 700; color: #5a4a4a; }
  .inv-item .ii-stat { font-size: 9px; color: #7c3aed; }
  .inv-item.equipped {
    background: linear-gradient(135deg, #c4b5fd, #a78bfa);
    border-color: #7c3aed;
  }
  .inv-item.equipped .ii-name, .inv-item.equipped .ii-stat { color: #fff; }

  /* 商店 */
  .shop-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .shop-tab {
    flex: 1;
    min-width: 60px;
    padding: 8px 6px;
    background: #f3e8ff;
    border: 2px solid #ddd6fe;
    border-radius: 12px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    color: #8b6f9b;
    cursor: pointer;
    transition: all 0.15s;
  }
  .shop-tab:hover { background: #ede9fe; }
  .shop-tab.active {
    background: linear-gradient(135deg, #c4b5fd, #a78bfa);
    color: #fff;
    border-color: #7c3aed;
    box-shadow: 0 3px 0 #7c3aed;
  }
  .shop-section-title {
    font-size: 12px;
    font-weight: 700;
    color: #8b6f9b;
    margin: 8px 0 6px;
  }
  .shop-section-title:first-child { margin-top: 0; }
  .shop-item.locked {
    opacity: 0.55;
    background: linear-gradient(135deg, #f5f5f4, #e7e5e4);
    border-color: #d6d3d1;
  }
  .shop-item .si-lv {
    font-size: 9px;
    color: #8b6f9b;
    margin-top: 2px;
  }
  .shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));

    border-radius: 6px;
    padding: 2px;

    background: rgba(30, 27, 75, 0.5);

    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-content {
    background: linear-gradient(135deg, #ffffff, #f3e8ff);
    border: 2px solid #c4b5fd;
    border-radius: 18px;
    padding: 18px;

    width: 100%;

    color: #7c3aed;
    font-size: 17px;
    margin-bottom: 12px;
    text-align: center;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: linear-gradient(135deg, #c4b5fd, #8b5cf6);
    color: #fff;
    padding: 14px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 700;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 1000;
    box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);

  .toast.show { transform: translateX(-50%) translateY(0); }

  .sync-badge {
    display: inline-block;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 600;
    background: rgba(255,255,255,0.7);
    border: 1px dashed #c4b5fd;

    padding: 2px 10px;

    color: #fff;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
  }
  .skill-node {
    display: grid;
    grid-template-columns: 40px 1fr 40px;
    gap: 10px;
    align-items: center;
    padding: 10px;

  }
  .skill-node .sn-fill {

    width: 36px; height: 36px;

    border-color: #9ca3af;

  .debug-btn {

    top: 10px;
    right: 10px;

  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); }
  }
  @keyframes fadeOut {
    to { opacity: 0; }
  }

  <div class="top-bar">

    <div class="class-grid" id="classGrid"></div>
  </div>

  <div id="stageGame" class="hidden">

  // ============================================================

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function getMeId() { return localStorage.getItem(ME_KEY); }
  function isPassVerified() { return localStorage.getItem(PASS_KEY) === '1'; }
  function getPlayer(id) { return players.find(p => p.id === id); }
  function getMe() {
    const id = getMeId();
    return id ? getPlayer(id) : null;
  }

  // 從同套計算（複製主檔邏輯，避免雙頁差異）
  function pointToMoney(point) { return (point - basePoint) * baseMoney / basePoint; }
  function getPlayerMatchData(pid) {
    const records = [];
    history.forEach((h, i) => {
      const slot = h.participants.indexOf(pid);
      if (slot < 0) return;
      const myMoney = h.money[slot];
      const sorted = h.money.map((m, idx) => ({m, idx})).sort((a,b) => b.m - a.m);
      const rank = sorted.findIndex(s => s.idx === slot) + 1;
      records.push({ money: myMoney, rank });
    });
    return records;
  }
  function calcCoinsEarned(records) {
    let coins = 0;
    for (const r of records) {
      if (r.rank === 1) coins += 50;
      else if (r.rank === 2) coins += 20;
      if (r.money > 0) coins += Math.floor(r.money / 100);
    }
    return coins;
  }
  function getCoins(playerId) {
    const p = getPlayer(playerId);
    if (!p) return 0;
    return calcCoinsEarned(getPlayerMatchData(playerId)) - (p.coinsSpent || 0);
  }
  function spendCoins(playerId, amount) {
    const p = getPlayer(playerId);
    if (!p) return false;
    if (getCoins(playerId) < amount) return false;
    p.coinsSpent = (p.coinsSpent || 0) + amount;
    return true;
  }
  function refundCoins(playerId, amount) {
    const p = getPlayer(playerId);
    if (!p) return;
    p.coinsSpent = (p.coinsSpent || 0) - amount;
  }

  // ============================================================
  // 載入 / 儲存（主檔同 schema）
  // ============================================================
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        if (data.players) players = data.players;
        if (data.history) history = data.history;
        if (data.gifts) gifts = data.gifts;
        if (data.comments) comments = data.comments;
        if (data.pendingBets) pendingBets = data.pendingBets;
        if (data.baseMoney) baseMoney = data.baseMoney;
        if (data.basePoint) basePoint = data.basePoint;
      }
    } catch (e) { console.error(e); }
  }
  function saveData() {
    const payload = { players, history, gifts, comments, pendingBets, baseMoney, basePoint };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); } catch (e) {}
    if (!__isApplyingRemote && window.__firebaseSync && window.__firebaseSync.ready) {
      window.__firebaseSync.save(payload);
    }
  }

  // 給 Firebase module 用
  window.__applyRemote = function(data) {
    if (!data) return;
    __isApplyingRemote = true;
    try {
      if (Array.isArray(data.players)) players = data.players;
      if (Array.isArray(data.history)) history = data.history;
      if (Array.isArray(data.gifts)) gifts = data.gifts;
      if (Array.isArray(data.comments)) comments = data.comments;
      if (Array.isArray(data.pendingBets)) pendingBets = data.pendingBets;
      if (typeof data.baseMoney === 'number') baseMoney = data.baseMoney;
      if (typeof data.basePoint === 'number') basePoint = data.basePoint;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
      render();
    } finally { __isApplyingRemote = false; }
  };
  window.__getCurrentData = function() {
    return { players, history, gifts, comments, pendingBets, baseMoney, basePoint };
  };
  window.__updateSyncStatus = function(text, cls) {
    const el = document.getElementById('syncBadge');
    if (!el) return;
    el.textContent = text;
    el.className = 'sync-badge' + (cls === 'ok' ? ' ok' : cls === 'err' ? ' err' : '');
  };

  // ============================================================
  function findItem(id) {
    return ITEMS.find(i => i.id === id) || SHOP_ITEMS.find(i => i.id === id);
  }

  // 賣價：商店物品 = 原價 40%；其他依等級換算
  function getSellValue(item) {
    if (!item) return 0;
    if (item.cost) return Math.max(5, Math.floor(item.cost * 0.4));
    return Math.max(8, (item.lv || 1) * 20);
  }

  // 把裝備 lv 轉成 1..10 階（用於紙娃娃 CSS filter 對應）
  // 商店裝備等級：1, 4, 7, 10, 13, 16, 19, 22, 25, 28
  // ITEMS（怪物掉落）等級：1, 2, 3, 4, 5, 7, 8, 12, 18, 20 等不規則 → 用 ceil(lv/3)
  const SHOP_LEVEL_SEQ = [1, 4, 7, 10, 13, 16, 19, 22, 25, 28];
  function itemTier(item) {
    if (!item || !item.lv) return 1;
    const idx = SHOP_LEVEL_SEQ.indexOf(item.lv);
    if (idx >= 0) return idx + 1;
    // 不在商店序列：用 lv 大略換算（lv 28+ → 10、lv 1 → 1）
    return Math.max(1, Math.min(10, Math.ceil(item.lv / 3)));
  }

  function getRpg(player) {
    if (!player) return null;
    if (!player.rpg) {
      player.rpg = {
        class: null,
        level: 1,
        xp: 0,
        hp: null,
        mp: null,
        equipment: { weapon: null, armor: null, accessory: null },
        equipped:  { weapon: null, shield: null, accessory: null, armor: null },
        inventory: [],
        skillPoints: 0,
        skills: {},
        abilityPoints: 5, // 起手 5 點
        abilities: { str: 0, vit: 0, agi: 0, dex: 0, int: 0, luk: 0 },
        stamina: STAMINA_MAX,
        lastTickAt: Date.now(),
        fightsWon: 0,
        fightsLost: 0,
        totalGold: 0,
      };
    }
    if (player.rpg.stamina == null) player.rpg.stamina = STAMINA_MAX;
    if (player.rpg.lastTickAt == null) player.rpg.lastTickAt = Date.now();
    if (!player.rpg.equipped) player.rpg.equipped = { weapon: null, shield: null, accessory: null, armor: null };
    if (!player.rpg.skills) player.rpg.skills = {};
    if (!player.rpg.abilities) player.rpg.abilities = { str: 0, vit: 0, agi: 0, dex: 0, int: 0, luk: 0 };
    // skillPoints migration
    if (player.rpg.skillPoints == null) {
      const earned = Math.max(0, (player.rpg.level || 1) - 1) * POINTS_PER_LEVEL.skill;
      const used = Object.values(player.rpg.skills).reduce((a, b) => a + (b || 0), 0);
      player.rpg.skillPoints = Math.max(0, earned - used);
    }
    // abilityPoints migration
    if (player.rpg.abilityPoints == null) {
      const earned = 5 + Math.max(0, (player.rpg.level || 1) - 1) * POINTS_PER_LEVEL.ability;
      const used = Object.values(player.rpg.abilities).reduce((a, b) => a + (b || 0), 0);
      player.rpg.abilityPoints = Math.max(0, earned - used);
    }
    return player.rpg;
  }

  // 把已點的能力換算成屬性加成
  function computeAbilityBonuses(player) {
    const r = getRpg(player);
    const a = r.abilities || {};
    return {
      atk: (a.str || 0),
      hp: (a.vit || 0) * 5,
      def: Math.floor((a.vit || 0) / 2),
      spd: Math.floor((a.agi || 0) / 2),
      critChance: (a.dex || 0) * 0.004 + (a.luk || 0) * 0.002,
      critDmgBonus: (a.luk || 0) * 0.01,
      mp: (a.int || 0) * 2,
      skillFlat: (a.int || 0) * 0.5,
    };
  }

  // 把已點的技能換算成各種屬性加成
  function computeSkillBonuses(player) {
    const rpg = getRpg(player);
    const cls = rpg && rpg.class ? CLASSES[rpg.class] : null;
    const b = { hp: 0, atk: 0, def: 0, spd: 0, mp: 0, hpPct: 0, mpPct: 0, critChance: 0, skillDmgPct: 0, skillFlat: 0, skillHealPct: 0, regen: 0,
                skill0Pct: 0, skill1Pct: 0, skill2Pct: 0 };
    if (!cls || !cls.skillTree) return b;
    const skills = rpg.skills || {};
    for (const node of cls.skillTree) {
      const lv = skills[node.id] || 0;
      if (lv > 0) b[node.effect] = (b[node.effect] || 0) + node.per * lv;
    }
    return b;
  }

  // 依能力點門檻計算職業被動加成
  function computePassiveBonuses(player) {
    const r = getRpg(player);
    const cls = r && r.class ? CLASSES[r.class] : null;
    const a = r.abilities || {};
    const b = { physPct: 0, flatPct: 0, dmgReduction: 0, mpDiscount: 0, healPct: 0, spd: 0, critChance: 0, critDmg: 0 };
    if (!cls || !cls.passives) return b;
    for (const p of cls.passives) {
      if ((a[p.stat] || 0) >= p.threshold) {
        b[p.effect] = (b[p.effect] || 0) + p.per;
      }
    }
    return b;
  }

  // 由職業 + equipment 推導出紙娃娃 4 層 SVG 路徑，存進 rpg.equipped
  // 在 pickClass / equipFromInv / unequip / buyShop / applyRemote 後都要呼叫
  function syncEquipped(player) {
    const rpg = getRpg(player);
    if (!rpg.class) return;
    const cls = CLASSES[rpg.class] || {};
    const eq = rpg.equipment || {};
    rpg.equipped = {
      weapon:    (eq.weapon    && cls.weaponImage) ? cls.weaponImage : null,
      armor:     eq.armor ? 'assets/equipment/armor-glow.svg' : null,
      accessory: (eq.accessory && cls.accImage)    ? cls.accImage    : null,
      shield:    cls.hasShield ? 'assets/equipment/shield.svg' : null,
    };
  }

  // 體力 / HP 自動回復（不存資料庫，每次讀取時算）
  // HP=0 進入休息：10 分鐘後恢復 50% HP，期間 HP 不會自然回；體力照常每分鐘 +1
  function tickRecovery(player) {
    const rpg = getRpg(player);
    const stats = computeStats(player);
    if (!stats) return null;
    if (rpg.hp == null) rpg.hp = stats.maxHp;
    if (rpg.mp == null) rpg.mp = stats.maxMp;

    // 體力 / HP / MP 自然回復
    const elapsed = Date.now() - rpg.lastTickAt;
    const ticks = Math.floor(elapsed / TICK_MS);
    if (ticks > 0) {
      rpg.stamina = Math.min(STAMINA_MAX, (rpg.stamina || 0) + ticks * STAMINA_PER_TICK);
      if (rpg.hp > 0 && rpg.hp < stats.maxHp) {
        rpg.hp = Math.min(stats.maxHp, rpg.hp + ticks * HP_PER_TICK);
      }
      if (rpg.mp < stats.maxMp) {
        rpg.mp = Math.min(stats.maxMp, (rpg.mp || 0) + ticks * MP_PER_TICK);
      }
      rpg.lastTickAt += ticks * TICK_MS;
    }

    // 死亡休息（HP = 0 時）
    let resting = false, restLeftMs = 0;
    if (rpg.hp <= 0) {
      if (!rpg.deathAt) rpg.deathAt = Date.now();
      const restElapsed = Date.now() - rpg.deathAt;
      if (restElapsed >= REST_MS) {
        rpg.hp = Math.max(1, Math.floor(stats.maxHp * REST_HP_RATIO));
        rpg.deathAt = null;
      } else {
        resting = true;
        restLeftMs = REST_MS - restElapsed;
      }
    } else {
      // HP > 0 → 確保沒卡 deathAt
      if (rpg.deathAt) rpg.deathAt = null;
    }

    const sinceLast = Date.now() - rpg.lastTickAt;
    return {
      stamina: rpg.stamina,
      staminaMax: STAMINA_MAX,
      hp: rpg.hp,
      hpMax: stats.maxHp,
      untilNextTick: Math.max(0, TICK_MS - sinceLast),
      resting,
      restLeftMs,
    };
  }
  function xpForLevel(lv) { return lv * lv * 100; }
  function computeStats(player) {
    const rpg = getRpg(player);
    const cls = CLASSES[rpg.class];
    if (!cls) return null;
    const lv = rpg.level || 1;
    const b = computeSkillBonuses(player);
    const ab = computeAbilityBonuses(player);
    let stats = {
      maxHp: Math.round((cls.hp + (lv - 1) * cls.hpPer) * (1 + b.hpPct)) + b.hp + ab.hp,
      maxMp: Math.round(((cls.mp || 30) + (lv - 1) * (cls.mpPer || 5)) * (1 + b.mpPct)) + b.mp + ab.mp,
      atk:   Math.round(cls.atk + (lv - 1) * cls.atkPer) + b.atk + ab.atk,
      def:   Math.round(cls.def + (lv - 1) * cls.defPer) + b.def + ab.def,
      spd:   Math.round(cls.spd + (lv - 1) * cls.spdPer) + b.spd + ab.spd,
    };
    // 裝備加成
    for (const slot of ['weapon', 'armor', 'accessory']) {
      const itemId = rpg.equipment?.[slot];
      if (itemId) {
        const item = findItem(itemId);
        if (item) {
          if (item.atk) stats.atk += item.atk;
          if (item.def) stats.def += item.def;
          if (item.spd) stats.spd += item.spd;
          if (item.hp)  stats.maxHp += item.hp;
        }
      }
    }
    return stats;
  }
  function generateMonster(playerLv) {
    // 5% 機率：綠茶事件
    if (Math.random() < 0.05) return createGreenTea(playerLv);
    const tierMax = Math.min(5, Math.ceil(playerLv / 4));
    const tierMin = Math.max(1, tierMax - 1);
    const candidates = MONSTERS.filter(m => m.tier <= tierMax && m.tier >= tierMin);
    const m = candidates[Math.floor(Math.random() * candidates.length)];
    // 等級變化縮小到 ±1，戰鬥節奏更穩定
    const lv = Math.max(1, playerLv + Math.floor(Math.random() * 3) - 1);
    const k = 1 + (lv - 1) * 0.18;
    return {
      ...m,
      level: lv,
      hp: Math.round(m.hpBase * k),
      maxHp: Math.round(m.hpBase * k),
      // atk 倍率 1.5 → 1.3：因為 atkBase 已重新調高，總體 atk 仍變強
      atk: Math.round(m.atkBase * k * 1.3),
      def: Math.round(m.defBase * k * 0.7),
      spd: Math.round(m.spdBase + lv * 0.4),
      goldDrop: Math.round(m.goldBase + lv * 1.8 + Math.random() * lv * 0.6),
      xpDrop: Math.round(m.xpBase + lv * 4 + Math.random() * lv * 2),
    };
  }
  function rollItemDrop(playerLv, monsterLv) {
    if (Math.random() > 0.28) return null; // 28% 掉落
    const eligible = ITEMS.filter(i => i.lv <= playerLv + 2);
    if (eligible.length === 0) return null;
    return eligible[Math.floor(Math.random() * eligible.length)];
  }

  // ============================================================
  // 戰鬥邏輯
  // ============================================================
  function autoFight(player, monster) {
    const log = [];
    const cls = CLASSES[player.rpg.class];
    const stats = computeStats(player);

    // 綠茶事件：腳本式遭遇，跳過正常戰鬥
    if (monster.ability?.type === 'cameo') {
      const startHp = Math.min(player.rpg.hp ?? stats.maxHp, stats.maxHp);
      const startMp = Math.min(player.rpg.mp ?? stats.maxMp, stats.maxMp);
      const kickDmg = 5 + Math.floor(Math.random() * 5);
      const newHp = Math.max(1, startHp - kickDmg);
      log.push({ type: 'system', text: `═══ 🍵 綠茶鵝突然飄了過來 ═══` });
      if (monster.dialogue && monster.dialogue.length) {
        const line = monster.dialogue[Math.floor(Math.random() * monster.dialogue.length)];
        log.push({ type: 'monster', text: `🍵 綠茶鵝：「${line}」` });
      }
      log.push({ type: 'monster', text: `回合 1：綠茶鵝踢了你一腳 → -${kickDmg} HP`, hp: { player: newHp, monster: 1, mp: startMp } });
      log.push({ type: 'monster', text: `回合 2：綠茶鵝順手摸走 💰 10 鵝鵝幣`, hp: { player: newHp, monster: 1, mp: startMp } });
      log.push({ type: 'system', text: `綠茶鵝丟下一句「鵝鵝沒有錯」就跑掉了 ☕💨` });
      return {
        won: false, fled: true,
        pHpFinal: newHp, pMpFinal: startMp, mHpFinal: 1,
        maxHp: stats.maxHp, maxMp: stats.maxMp,
        coinsStolen: 10, kickDmg, log,
        metGreenTea: 1,
      };
    }

    const bonus = computeSkillBonuses(player);
    const abil  = computeAbilityBonuses(player);
    const passive = computePassiveBonuses(player);
    // 被動 spd 加成已套到 stats 之外（先給門檻型，autoFight 用即時 spd）
    const effectiveSpd = stats.spd + (passive.spd || 0);
    const baseCritChance = 0.08 + (cls.critBonus || 0) + (bonus.critChance || 0) + (abil.critChance || 0) + (passive.critChance || 0);
    const critMult = 1.7 + (abil.critDmgBonus || 0) + (passive.critDmg || 0);
    const regenPer = (cls.regenPer || 0) + (bonus.regen || 0);
    let pHp = Math.min(player.rpg.hp ?? stats.maxHp, stats.maxHp);
    let pMp = Math.min(player.rpg.mp ?? stats.maxMp, stats.maxMp);
    let mHp = monster.hp;
    let pTurn = effectiveSpd >= monster.spd;
    let round = 0;
    let playerActions = 0;
    let coinsStolen = 0;
    let critCount = 0;
    const mAbility = monster.ability;
    // 每個技能各自的 nextActionForSkill（順序：強→中→弱，優先發強的）
    const skills = cls.skills || (cls.skill ? [cls.skill] : []);
    const nextActionForSkill = skills.map(() => 1);

    log.push({ type: 'system', text: `═══ ⚔️ ${player.name} VS ${monster.icon} ${monster.name} Lv ${monster.level} ═══` });
    if (monster.dialogue && monster.dialogue.length) {
      const line = monster.dialogue[Math.floor(Math.random() * monster.dialogue.length)];
      log.push({ type: 'monster', text: `${monster.icon} ${monster.name}：「${line}」` });
    }
    const pushDeathLine = () => {
      if (monster.deathLine && monster.deathLine.length) {
        const line = monster.deathLine[Math.floor(Math.random() * monster.deathLine.length)];
        log.push({ type: 'monster', text: `${monster.icon} ${monster.name}：「${line}」`, hp: { player: pHp, monster: 0, mp: pMp } });
      }
    };

    while (pHp > 0 && mHp > 0 && round < 50) {
      round++;
      // 被動自癒（聖騎天生 + 自癒強化技能）
      if (pTurn && regenPer > 0 && pHp < stats.maxHp) {
        const heal = Math.max(1, Math.round(stats.maxHp * regenPer));
        pHp = Math.min(stats.maxHp, pHp + heal);
        log.push({ type: 'player', text: `回合 ${round}：自癒 +${heal} HP`, hp: { player: pHp, monster: mHp, mp: pMp } });
      }
      if (pTurn) {
        playerActions++;
        // 從強到弱掃技能，第一個 cooldown 完且 MP 夠 + 條件 OK 的就放
        let useSkill = null;
        let useSkillIdx = -1;
        for (let i = 0; i < skills.length; i++) {
          const s = skills[i];
          if ((s.unlockLv || 1) > (player.rpg.level || 1)) continue; // 等級不夠未解鎖
          if (playerActions < nextActionForSkill[i]) continue;
          const effMpCost = Math.round(s.mpCost * (1 - (passive.mpDiscount || 0)));
          if (pMp < effMpCost) continue;
          if (s.type === 'heal' && pHp >= stats.maxHp * 0.7) continue;
          useSkill = s;
          useSkillIdx = i;
          break;
        }

        if (useSkill) {
          const skill = useSkill;
          const effMpCost = Math.round(skill.mpCost * (1 - (passive.mpDiscount || 0)));
          pMp -= effMpCost;
          nextActionForSkill[useSkillIdx] = playerActions + skill.cooldown;
          if (skill.type === 'damage') {
            let dmg;
            const isFlat = skill.flat != null;
            if (isFlat) {
              dmg = (skill.flat + (bonus.skillFlat || 0) + (abil.skillFlat || 0)) + (skill.perLv || 0) * (player.rpg.level || 1);
              if (!skill.ignoreDef) dmg -= Math.floor(monster.def / 2);
            } else {
              dmg = stats.atk * (skill.mult || 1) - Math.floor(monster.def / 2);
            }
            // 技能個別 % 加成（從技能樹點到的對應節點）
            const perSkillKey = `skill${useSkillIdx}Pct`;
            dmg *= (1 + (bonus[perSkillKey] || 0));
            // 通用 skillDmgPct（保留舊邏輯）
            dmg *= (1 + (bonus.skillDmgPct || 0));
            // 職業被動：物理或法術加成
            if (isFlat) dmg *= (1 + (passive.flatPct || 0));
            else        dmg *= (1 + (passive.physPct || 0));
            // 怪物抗性
            if (isFlat && mAbility?.type === 'magicResist') dmg *= (1 - mAbility.resist);
            if (!isFlat && mAbility?.type === 'physResist') dmg *= (1 - mAbility.resist);
            const isCrit = skill.alwaysCrit || Math.random() < baseCritChance;
            dmg *= (0.9 + Math.random() * 0.2);
            if (isCrit) { dmg *= critMult; critCount++; }
            dmg = Math.max(1, Math.round(dmg));
            mHp -= dmg;
            // healCaster: 攻擊同時治癒自己（例如聖光斬）
            let extra = '';
            if (skill.healCaster) {
              const heal = Math.max(1, Math.round(stats.maxHp * skill.healCaster));
              const before = pHp;
              pHp = Math.min(stats.maxHp, pHp + heal);
              extra = ` +${pHp - before} HP`;
            }
            log.push({
              type: 'crit-player',
              text: `回合 ${round}：${skill.icon} ${skill.name}${isCrit ? '【暴擊】' : ''} → ${monster.name} -${dmg} HP${extra}（-${effMpCost} MP）`,
              hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp }
            });
            if (mHp <= 0) { pushDeathLine(); break; }
          } else if (skill.type === 'heal') {
            const before = pHp;
            const heal = Math.round(stats.maxHp * skill.healPct * (1 + (bonus.skillHealPct || 0)) * (1 + (passive.healPct || 0)));
            pHp = Math.min(stats.maxHp, pHp + heal);
            log.push({
              type: 'player',
              text: `回合 ${round}：${skill.icon} ${skill.name} +${pHp - before} HP（-${effMpCost} MP）`,
              hp: { player: pHp, monster: mHp, mp: pMp }
            });
          }
        } else {
          // 普攻
          const isCrit = Math.random() < baseCritChance;
          let dmg = Math.max(1, stats.atk - Math.floor(monster.def / 2));
          dmg *= (0.85 + Math.random() * 0.3);
          if (isCrit) { dmg *= critMult; critCount++; }
          if (mAbility?.type === 'physResist') dmg *= (1 - mAbility.resist);
          dmg = Math.max(1, Math.round(dmg));
          mHp -= dmg;
          log.push({
            type: isCrit ? 'crit-player' : 'player',
            text: `回合 ${round}：${cls.attackVerb}${isCrit ? '【暴擊】' : ''} → ${monster.name} -${dmg} HP`,
            hp: { player: pHp, monster: Math.max(0, mHp), mp: pMp }
          });
          if (mHp <= 0) { pushDeathLine(); break; }
        }
      } else {
        // 多段攻擊：1.3x 總傷害平均分散
        const hits = (mAbility?.type === 'multiHit') ? Math.max(1, mAbility.hits || 2) : 1;
        const perHitMult = hits === 1 ? 1.0 : (1.3 / hits);
        let dead = false;
        for (let h = 0; h < hits; h++) {
          let dmg = Math.max(1, monster.atk - Math.floor(stats.def / 2));
          dmg *= (0.85 + Math.random() * 0.3);
          dmg *= perHitMult;
          dmg *= (1 - (passive.dmgReduction || 0));
          dmg = Math.max(1, Math.round(dmg));
          pHp -= dmg;
          log.push({
            type: 'monster',
            text: `回合 ${round}：${monster.name} ${monster.verb}${hits > 1 ? `（${h+1}/${hits}）` : ''} → ${player.name} -${dmg} HP`,
            hp: { player: Math.max(0, pHp), monster: mHp, mp: pMp }
          });
          if (pHp <= 0) { dead = true; break; }
        }
        // 偷錢：60% 機率得手
        if (!dead && mAbility?.type === 'steal' && Math.random() < 0.6) {
          const stolen = mAbility.min + Math.floor(Math.random() * (mAbility.max - mAbility.min + 1));
          coinsStolen += stolen;
          log.push({
            type: 'monster',
            text: `回合 ${round}：${monster.name} 摸走 💰 ${stolen} 鵝鵝幣！`,
            hp: { player: pHp, monster: mHp, mp: pMp }
          });
        }
        if (pHp <= 0) break;
      }
      pTurn = !pTurn;
    }
    const won = pHp > 0 && mHp <= 0;
    return {
      won,
      pHpFinal: Math.max(0, pHp),
      pMpFinal: pMp,
      mHpFinal: Math.max(0, mHp),
      maxHp: stats.maxHp,
      maxMp: stats.maxMp,
      coinsStolen,
      critCount,
      log
    };
  }

  // ============================================================
  // 渲染
  // ============================================================
  function render() {
    if (!isPassVerified() || !getMeId()) {
      document.getElementById('stageNoMe').classList.remove('hidden');
      document.getElementById('stageClassPick').classList.add('hidden');
      document.getElementById('stageGame').classList.add('hidden');
      return;
    }
    const me = getMe();
    if (!me) {
      document.getElementById('stageNoMe').classList.remove('hidden');
      return;
    }
    document.getElementById('stageNoMe').classList.add('hidden');

    const rpg = getRpg(me);
    if (!rpg.class) {
      document.getElementById('stageClassPick').classList.remove('hidden');
      document.getElementById('stageGame').classList.add('hidden');
      renderClassPicker();
      return;
    }
    document.getElementById('stageClassPick').classList.add('hidden');
    document.getElementById('stageGame').classList.remove('hidden');

    syncEquipped(me); // 雲端載入後可能 equipped 還沒填
    renderCharCard();
    renderEquipment();
    renderAbilityTree();
    renderSkillTree();
    renderShop();
    renderRpgStats();
    updateStaminaUI();
  }

  function renderAbilityTree() {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    if (!r.class) {
      document.getElementById('abilityCardHeader').innerHTML = `<span>📊 能力值</span>`;
      document.getElementById('abilityBody').innerHTML = '';
      return;
    }
    const points = r.abilityPoints || 0;
    document.getElementById('abilityCardHeader').innerHTML = `
      <span>📊 能力值</span>
      <span class="skill-card-points" style="background:linear-gradient(135deg,#a7f3d0,#10b981);">⚡ ${points} 點可用</span>
    `;
    const html = ABILITIES.map(ab => {
      const cur = (r.abilities || {})[ab.id] || 0;
      const canAdd = points >= 1;
      return `
        <div class="skill-node" style="background:linear-gradient(135deg,#fff,#ecfdf5); border-color:#a7f3d0;">
          <div class="sn-icon">${ab.icon}</div>
          <div>
            <div class="sn-name" style="color:#047857;">${ab.name} <span style="color:#10b981; margin-left:4px;">${cur}</span></div>
            <div class="sn-desc">${ab.desc}</div>
          </div>
          <button class="sn-add-btn" style="background:linear-gradient(135deg,#a7f3d0,#10b981); border-color:#047857;" onclick="learnAbility('${ab.id}')" ${canAdd ? '' : 'disabled'}>+</button>
        </div>
      `;
    }).join('');
    // 職業被動（依能力門檻自動觸發）
    const cls = CLASSES[r.class];
    const passivesHtml = (cls && cls.passives) ? cls.passives.map(p => {
      const a = (r.abilities || {})[p.stat] || 0;
      const active = a >= p.threshold;
      const progress = Math.min(100, Math.round((a / p.threshold) * 100));
      return `
        <div class="skill-node ${active ? 'maxed' : ''}" style="${active ? '' : 'opacity:0.65;'} background:linear-gradient(135deg,#fff,${active ? '#fde68a' : '#f3f4f6'}); border-color:${active ? '#d97706' : '#d1d5db'};">
          <div class="sn-icon">${p.icon}</div>
          <div>
            <div class="sn-name" style="color:${active ? '#92400e' : '#6b7280'};">${active ? '✨' : '🔒'} ${escapeHtml(p.name)}</div>
            <div class="sn-desc">${escapeHtml(p.desc)}</div>
            <div class="sn-progress">
              <span>${p.stat.toUpperCase()} ${a}/${p.threshold}</span>
              <div class="sn-bar"><div class="sn-fill" style="width:${progress}%; background:${active ? 'linear-gradient(90deg,#fcd34d,#d97706)' : 'linear-gradient(90deg,#9ca3af,#6b7280)'};"></div></div>
            </div>
          </div>
          <div style="font-size:9px; color:#6b7280; text-align:center;">職業<br>被動</div>
        </div>
      `;
    }).join('') : '';

    document.getElementById('abilityBody').innerHTML = `
      ${html}
      <div style="display:flex; gap:6px; margin-top:6px;">
        <button class="btn btn-secondary" style="flex:1; margin-top:0;" onclick="resetAbilities()">🔄 重置能力（退回所有點）</button>
      </div>
      <div style="font-size:11px; color:#8b6f9b; text-align:center; margin-top:6px;">每升 1 等獲得 +${POINTS_PER_LEVEL.ability} 能力點　·　起手 +5 點</div>
      ${passivesHtml ? `
        <div style="font-size:11px; color:#92400e; font-weight:700; margin:14px 0 6px; padding:4px 8px; background:#fef3c7; border-radius:8px;">🌟 職業被動（依能力門檻自動觸發）</div>
        ${passivesHtml}
      ` : ''}
    `;
  }

  function learnAbility(id) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    if ((r.abilityPoints || 0) < 1) { showToast('沒有可用能力點'); return; }
    if (!r.abilities) r.abilities = { str: 0, vit: 0, agi: 0, dex: 0, int: 0, luk: 0 };
    r.abilities[id] = (r.abilities[id] || 0) + 1;
    r.abilityPoints -= 1;
    const s = computeStats(me);
    if (r.hp > s.maxHp) r.hp = s.maxHp;
    if (r.mp > s.maxMp) r.mp = s.maxMp;
    saveData();
    renderCharCard();
    renderAbilityTree();
    showToast(`✨ ${id.toUpperCase()} +1 → ${r.abilities[id]}`);
  }
  window.learnAbility = learnAbility;

  function resetAbilities() {
    const me = getMe(); if (!me) return;
    if (!confirm('退回所有能力點？')) return;
    const r = getRpg(me);
    const total = Object.values(r.abilities || {}).reduce((a, b) => a + (b || 0), 0);
    r.abilityPoints = (r.abilityPoints || 0) + total;
    r.abilities = { str: 0, vit: 0, agi: 0, dex: 0, int: 0, luk: 0 };
    const s = computeStats(me);
    if (r.hp > s.maxHp) r.hp = s.maxHp;
    if (r.mp > s.maxMp) r.mp = s.maxMp;
    saveData();
    renderCharCard();
    renderAbilityTree();
    showToast(`🔄 退回 ${total} 點能力`);
  }
  window.resetAbilities = resetAbilities;

  function renderSkillTree() {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const cls = CLASSES[r.class];
    if (!cls || !cls.skillTree) {
      document.getElementById('skillCardHeader').innerHTML = `<span>📚 技能</span>`;
      document.getElementById('skillTreeBody').innerHTML = '';
      return;
    }
    const points = r.skillPoints || 0;
    document.getElementById('skillCardHeader').innerHTML = `
      <span>📚 ${escapeHtml(cls.name)}技能樹</span>
      <span class="skill-card-points">⚡ ${points} 點可用</span>
    `;
    // 主動技能（依等級解鎖、戰鬥自動施放，無法用點數提升）
    const activeHtml = (cls.skills || []).map(s => {
      const locked = (s.unlockLv || 1) > r.level;
      return `
        <div class="skill-node ${locked ? '' : 'maxed'}" style="${locked ? 'opacity:0.55;' : ''}">
          <div class="sn-icon">${s.icon}</div>
          <div>
            <div class="sn-name">${escapeHtml(s.name)} ${locked ? `<span style="color:#9ca3af; font-size:10px;">🔒 Lv ${s.unlockLv} 解鎖</span>` : `<span style="color:#16a34a; font-size:10px;">✓ 已解鎖</span>`}</div>
            <div class="sn-desc">${formatSkillDesc(s)}　·　CD ${s.cooldown} 回合 / ${s.mpCost} MP</div>
          </div>
          <div style="font-size:9px; color:#8b6f9b; text-align:center;">主動<br>自動</div>
        </div>
      `;
    }).join('');

    const html = cls.skillTree.map(node => {
      const lv = (r.skills || {})[node.id] || 0;
      const maxed = lv >= node.maxLevel;
      const canLearn = !maxed && points >= 1;
      const pct = (lv / node.maxLevel) * 100;
      const valStr = node.effect.endsWith('Pct') || node.effect === 'critChance' || node.effect === 'regen'
        ? `${(lv * node.per * 100).toFixed(0)}%`
        : `+${(lv * node.per).toFixed(0)}`;
      return `
        <div class="skill-node ${maxed ? 'maxed' : ''}">
          <div class="sn-icon">${node.icon}</div>
          <div>
            <div class="sn-name">${escapeHtml(node.name)}</div>
            <div class="sn-desc">${escapeHtml(node.desc)}　·　目前 ${valStr}</div>
            <div class="sn-progress">
              <span>Lv ${lv}/${node.maxLevel}</span>
              <div class="sn-bar"><div class="sn-fill" style="width:${pct}%"></div></div>
            </div>
          </div>
          <button class="sn-add-btn" onclick="learnSkill('${node.id}')" ${canLearn ? '' : 'disabled'} title="${maxed ? '已滿級' : (points < 1 ? '沒點數' : '加 1 級')}">+</button>
        </div>
      `;
    }).join('');
    document.getElementById('skillTreeBody').innerHTML = `
      <div style="font-size:11px; color:#1e3a8a; font-weight:700; margin:0 0 6px; padding:4px 8px; background:#dbeafe; border-radius:8px;">⚡ 主動技能（戰鬥自動施放，依等級解鎖）</div>
      ${activeHtml}
      <div style="font-size:11px; color:#8b6f37; font-weight:700; margin:12px 0 6px; padding:4px 8px; background:#fef3c7; border-radius:8px;">💪 屬性強化（用技能點 +）</div>
      ${html}
      <div style="font-size:11px; color:#8b6f9b; text-align:center; margin-top:6px;">每升 1 等獲得 +2 技能點　·　點 + 強化屬性</div>
    `;
  }

  function formatSkillDesc(s) {
    if (s.type === 'heal') return `回 ${Math.round(s.healPct * 100)}% maxHP`;
    if (s.flat != null) return `固定 ${s.flat}+Lv×${s.perLv} 傷害${s.ignoreDef ? '（無視防）' : ''}`;
    let parts = [];
    if (s.mult) parts.push(`${s.mult}× ATK`);
    if (s.alwaysCrit) parts.push('必中暴擊');
    if (s.healCaster) parts.push(`回 ${Math.round(s.healCaster * 100)}% maxHP`);
    return parts.join(' + ');
  }

  function learnSkill(nodeId) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const cls = CLASSES[r.class];
    if (!cls || !cls.skillTree) return;
    const node = cls.skillTree.find(n => n.id === nodeId);
    if (!node) return;
    if ((r.skillPoints || 0) < 1) { showToast('沒有可用技能點'); return; }
    const cur = (r.skills || {})[nodeId] || 0;
    if (cur >= node.maxLevel) { showToast('已達最高等'); return; }
    r.skills = r.skills || {};
    r.skills[nodeId] = cur + 1;
    r.skillPoints -= 1;
    // 強化 maxHp/maxMp 後當前 HP/MP 不變但上限變大 → 補滿（避免上限變了 HP 顯示比例怪）
    const s = computeStats(me);
    if (r.hp > s.maxHp) r.hp = s.maxHp;
    if (r.mp > s.maxMp) r.mp = s.maxMp;
    saveData();
    renderCharCard();
    renderSkillTree();
    showToast(`✨ ${node.name} → Lv ${cur + 1}`);
  }
  window.learnSkill = learnSkill;

  let __shopTab = 'consumable';

  function renderShop() {
    const me = getMe();
    if (!me) return;
    const myCoins = getCoins(me.id);
    const myLv = getRpg(me).level;
    const TABS = [
      { id: 'consumable', label: '🧪 消耗', filter: i => i.type === 'consumable' },
      { id: 'weapon',     label: '⚔️ 武器', filter: i => i.type === 'equipment' && i.slot === 'weapon' },
      { id: 'armor',      label: '🛡 防具', filter: i => i.type === 'equipment' && i.slot === 'armor' },
      { id: 'accessory',  label: '💎 飾品', filter: i => i.type === 'equipment' && i.slot === 'accessory' },
    ];
    const active = TABS.find(t => t.id === __shopTab) || TABS[0];
    const list = SHOP_ITEMS.filter(active.filter);
    if (active.id !== 'consumable') list.sort((a, b) => a.lv - b.lv);

    const itemBtn = (it) => {
      const tooLow = it.type === 'equipment' && myLv < it.lv;
      const tooPoor = myCoins < it.cost;
      const disabled = tooLow || tooPoor;
      const stats = it.type === 'equipment'
        ? ['atk','def','spd','hp'].filter(k=>it[k]).map(k=>`${k.toUpperCase()}+${it[k]}`).join(' ')
        : escapeHtml(it.desc);
      return `
        <button class="shop-item ${tooLow ? 'locked' : ''}" onclick="buyShop('${it.id}')" ${disabled ? 'disabled' : ''}>
          <div class="si-icon">${it.icon}</div>
          <div class="si-name">${escapeHtml(it.name)}</div>
          <div class="si-desc">${stats}</div>
          ${it.type === 'equipment' ? `<div class="si-lv">${tooLow ? '🔒 ' : ''}需求 Lv ${it.lv}</div>` : ''}
          <div class="si-cost">🪙 ${it.cost}</div>
        </button>
      `;
    };

    const tabHtml = TABS.map(t => `
      <button class="shop-tab ${t.id === __shopTab ? 'active' : ''}" onclick="setShopTab('${t.id}')">${t.label}</button>
    `).join('');

    document.getElementById('shopGrid').innerHTML = `
      <div class="shop-tabs">${tabHtml}</div>
      <div class="shop-grid">${list.map(itemBtn).join('')}</div>
    `;
  }
  function setShopTab(id) { __shopTab = id; renderShop(); }
  window.setShopTab = setShopTab;

  function buyShop(itemId) {
    const me = getMe();
    if (!me) return;
    const it = SHOP_ITEMS.find(x => x.id === itemId);
    if (!it) return;
    if (getCoins(me.id) < it.cost) { showToast('幣不夠 ♡'); return; }
    // 跳出確認 modal
    openBuyConfirm(it);
  }
  window.buyShop = buyShop;

  function openBuyConfirm(it) {
    const me = getMe();
    const myCoins = getCoins(me.id);
    const after = myCoins - it.cost;
    const stats = it.type === 'equipment'
      ? `<div style="margin-top:6px; font-size:12px; color:#8b6f9b;">需求 Lv ${it.lv}　·　${['atk','def','spd','hp'].filter(k=>it[k]).map(k=>`${k.toUpperCase()}+${it[k]}`).join(' / ')}</div>`
      : `<div style="margin-top:6px; font-size:12px; color:#8b6f9b;">${escapeHtml(it.desc || '')}</div>`;
    const html = `
      <div style="text-align:center; padding:8px 0;">
        <div style="font-size:64px; margin-bottom:4px;">${it.icon}</div>
        <div style="font-weight:700; font-size:16px; color:#7c3aed;">${escapeHtml(it.name)}</div>
        ${stats}
        <div style="margin-top:14px; font-size:13px;">
          🪙 <b>${myCoins}</b> → 購入後剩 <b style="color:#d97706;">${after}</b>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px;">
          <button class="btn btn-secondary" onclick="closeBuyConfirm()" style="margin-top:0;">取消</button>
          <button class="btn btn-primary" onclick="doBuyShop('${it.id}')">確認購入（🪙 ${it.cost}）</button>
        </div>
      </div>
    `;
    showModal(`🛒 確認購入`, html);
  }
  function closeBuyConfirm() { hideModal(); }
  window.closeBuyConfirm = closeBuyConfirm;

  function doBuyShop(itemId) {
    const me = getMe();
    if (!me) return;
    const it = SHOP_ITEMS.find(x => x.id === itemId);
    if (!it) return;
    if (!spendCoins(me.id, it.cost)) { showToast('幣不夠 ♡'); hideModal(); return; }
    const rpg = getRpg(me);
    if (it.type === 'consumable') {
      tickRecovery(me);
      const stats = computeStats(me);
      let msg = '';
      if (it.effect.stamina) {
        rpg.stamina = Math.min(STAMINA_MAX, (rpg.stamina || 0) + it.effect.stamina);
        msg = `⚡ +${it.effect.stamina} 體力`;
      }
      if (it.effect.hp === 'full') {
        rpg.hp = stats.maxHp;
        rpg.deathAt = null;
        msg = `❤️ HP 回滿`;
      } else if (it.effect.hpRatio) {
        const recover = Math.round(stats.maxHp * it.effect.hpRatio);
        rpg.hp = Math.min(stats.maxHp, (rpg.hp || 0) + recover);
        if (rpg.hp > 0) rpg.deathAt = null;
        msg = `❤️ +${recover} HP`;
      }
      if (it.effect.mp === 'full') {
        rpg.mp = stats.maxMp;
        msg = `💙 MP 回滿`;
      } else if (it.effect.mpRatio) {
        const recover = Math.round(stats.maxMp * it.effect.mpRatio);
        rpg.mp = Math.min(stats.maxMp, (rpg.mp || 0) + recover);
        msg = `💙 +${recover} MP`;
      }
      if (it.effect.xp) {
        rpg.xp = (rpg.xp || 0) + it.effect.xp;
        let leveledUp = false;
        while (rpg.xp >= xpForLevel(rpg.level)) {
          rpg.xp -= xpForLevel(rpg.level);
          rpg.level += 1;
          leveledUp = true;
        }
        if (leveledUp) {
          rpg.hp = computeStats(me).maxHp;
          showLevelUp(rpg.level);
        }
        msg = `⭐ +${it.effect.xp} XP`;
      }
      showToast(`✨ 使用 ${it.icon} ${it.name}：${msg}`);
    } else if (it.type === 'equipment') {
      rpg.inventory.push(it.id);
      showToast(`🛒 購入 ${it.icon} ${it.name}`);
    }
    saveData();
    hideModal();
    renderCharCard();
    renderEquipment();
    renderShop();
  }
  window.doBuyShop = doBuyShop;

  // === Modal helpers ===
  function showModal(title, html) {
    const overlay = document.getElementById('genericModal');
    document.getElementById('genericModalTitle').textContent = title;
    document.getElementById('genericModalBody').innerHTML = html;
    overlay.classList.remove('hidden');
  }

    if (e && e.target.id !== 'genericModal') return;
    document.getElementById('genericModal').classList.add('hidden');
  }

  function renderClassPicker() {
    const grid = document.getElementById('classGrid');
    grid.innerHTML = Object.entries(CLASSES).map(([id, c]) => `
      <button class="class-card" onclick="pickClass('${id}')">
        <div class="cls-icon">${c.icon}</div>
        <div class="cls-name">${c.name}</div>
        <div class="cls-desc">${c.desc}</div>
        <div class="cls-stats">HP ${c.hp} / ATK ${c.atk}<br>DEF ${c.def} / SPD ${c.spd}</div>
      </button>
    `).join('');

  function renderCharCard() {
    const me = getMe();
    const rpg = getRpg(me);
    const cls = CLASSES[rpg.class];
    const stats = computeStats(me);
    tickRecovery(me); // 確保 hp/體力已更新
    if (rpg.hp == null || rpg.hp > stats.maxHp) rpg.hp = stats.maxHp;
    if (rpg.mp == null || rpg.mp > stats.maxMp) rpg.mp = stats.maxMp;
    const xpCur = rpg.xp;
    const xpNeed = xpForLevel(rpg.level);
    const xpPercent = Math.min(100, Math.round((xpCur / xpNeed) * 100));
    const hpPercent = Math.round((rpg.hp / stats.maxHp) * 100);
    const mpPercent = Math.round((rpg.mp / stats.maxMp) * 100);
    const stamPercent = Math.round((rpg.stamina / STAMINA_MAX) * 100);
    const coins = getCoins(me.id);

    // 從同步好的 equipped 物件讀紙娃娃 SVG 路徑（裝備物品 ID 仍存在 rpg.equipment）
    const equipped = rpg.equipped || {};
    const weaponItem = rpg.equipment?.weapon ? findItem(rpg.equipment.weapon) : null;
    const armorItem  = rpg.equipment?.armor  ? findItem(rpg.equipment.armor)  : null;
    const accItem    = rpg.equipment?.accessory ? findItem(rpg.equipment.accessory) : null;
    const wTier = weaponItem ? itemTier(weaponItem) : 0;
    const aTier = armorItem  ? itemTier(armorItem)  : 0;
    const cTier = accItem    ? itemTier(accItem)    : 0;
    const unlockedAvatars = (me.unlockedAvatars || []).slice(0, 6);
    const collectionHtml = unlockedAvatars.length > 0
      ? unlockedAvatars.map(a => `<span class="cc-item">${a}</span>`).join('')
      : `<span class="cc-empty">主頁抽蛋可解鎖收藏</span>`;
    // 紙娃娃 5 層（順序由下到上：armor-glow → base → shield → weapon → accessory）
    // 每張 SVG 都是 200×250、位置已對齊；data-tier 觸發 CSS filter 上色（1..10）
    const dollLayers = [];
    if (equipped.armor) dollLayers.push(`<img class="pd-layer pd-armor" data-tier="${aTier}" src="${equipped.armor}" alt="">`);
    dollLayers.push(`<img class="pd-layer pd-base" src="${cls.baseImage}" alt="${cls.name}"
       onerror="this.outerHTML='<div class=\\'pd-base-emoji\\'>${cls.icon}</div>';">`);
    if (equipped.shield) dollLayers.push(`<img class="pd-layer pd-shield" src="${equipped.shield}" alt="">`);
    if (equipped.weapon) dollLayers.push(`<img class="pd-layer pd-weapon" data-tier="${wTier}" src="${equipped.weapon}" alt="">`);
    if (equipped.accessory) dollLayers.push(`<img class="pd-layer pd-acc" data-tier="${cTier}" src="${equipped.accessory}" alt="">`);

    document.getElementById('charCard').innerHTML = `
      <div class="char-portrait">
        <div class="cp-lv-badge">Lv ${rpg.level}</div>
        <div class="cp-coin-badge">🪙 ${coins >= 1000 ? (coins/1000).toFixed(1) + 'k' : coins}</div>
        <div class="paper-doll">${dollLayers.join('')}</div>
        <div class="cp-collection">${collectionHtml}</div>
      </div>
      <div class="char-info">
        <div class="char-name">${escapeHtml(me.name)}</div>
        <div class="char-class">${cls.name} · Lv ${rpg.level}</div>
        <div class="char-coins">🪙 ${coins} 鵝鵝幣</div>
        <div class="stat-bar">
          <div class="stat-bar-label"><span>❤️ HP</span><span>${rpg.hp} / ${stats.maxHp}</span></div>
          <div class="stat-bar-track"><div class="stat-bar-fill hp-fill" style="width:${hpPercent}%"></div></div>
        </div>
        <div class="stat-bar">
          <div class="stat-bar-label"><span>💙 MP</span><span>${rpg.mp} / ${stats.maxMp}</span></div>
          <div class="stat-bar-track"><div class="stat-bar-fill mp-fill" style="width:${mpPercent}%"></div></div>
        </div>
        <div class="stat-bar">
          <div class="stat-bar-label"><span>⚡ 體力</span><span>${rpg.stamina} / ${STAMINA_MAX}</span></div>
          <div class="stat-bar-track"><div class="stat-bar-fill mhp-fill" style="width:${stamPercent}%"></div></div>
        </div>
        <div class="stat-bar">
          <div class="stat-bar-label"><span>⭐ XP</span><span>${xpCur} / ${xpNeed}</span></div>
          <div class="stat-bar-track"><div class="stat-bar-fill xp-fill" style="width:${xpPercent}%"></div></div>
        </div>
        <div class="stats-grid">
          <div class="stat-cell"><div class="sc-label">ATK</div><div class="sc-value">${stats.atk}</div></div>
          <div class="stat-cell"><div class="sc-label">DEF</div><div class="sc-value">${stats.def}</div></div>
          <div class="stat-cell"><div class="sc-label">SPD</div><div class="sc-value">${stats.spd}</div></div>
        </div>

  function renderEquipment() {

      const item = id ? findItem(id) : null;

  function formatItemStats(item) {
    const parts = [];
    if (item.atk) parts.push(`ATK+${item.atk}`);
    if (item.def) parts.push(`DEF+${item.def}`);
    if (item.spd) parts.push(`SPD+${item.spd}`);
    if (item.hp)  parts.push(`HP+${item.hp}`);
    return parts.join(' · ');
  }

  function renderRpgStats() {
    const me = getMe();
    const rpg = getRpg(me);
    const total = rpg.fightsWon + rpg.fightsLost;
    const winRate = total > 0 ? Math.round((rpg.fightsWon / total) * 100) : 0;
    document.getElementById('rpgStats').innerHTML = `
      ⚔️ 勝場：<b>${rpg.fightsWon}</b><br>
      💀 敗場：<b>${rpg.fightsLost}</b><br>
      🏆 勝率：<b>${winRate}%</b><br>
      💰 累計獲得金幣：<b>${rpg.totalGold || 0}</b>
    `;
  }

  function updateStaminaUI() {
    const me = getMe();
    if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.class) return;
    const state = tickRecovery(me);
    const fightBtn = document.getElementById('fightBtn');
    const info = document.getElementById('cooldownInfo');
    if (!info || !fightBtn) return;
    const canFight = state.stamina >= STAMINA_PER_FIGHT && state.hp > 0;
    fightBtn.disabled = !canFight;
    let parts = [`⚡ 體力 ${state.stamina}/${state.staminaMax}`];
    if (state.resting) {
      const m = Math.floor(state.restLeftMs / 60000);
      const s = Math.floor((state.restLeftMs % 60000) / 1000);
      parts.push(`💀 休息中：${m}:${s.toString().padStart(2,'0')} 後恢復 50% HP`);
    } else {
      const sec = Math.ceil(state.untilNextTick / 1000);
      if (state.stamina < state.staminaMax || state.hp < state.hpMax) {
        parts.push(`每分鐘 +${STAMINA_PER_TICK} 體力 / +${HP_PER_TICK} HP / +${MP_PER_TICK} MP（${sec}s）`);
      }
      if (state.stamina < STAMINA_PER_FIGHT) parts.push(`需 ${STAMINA_PER_FIGHT} 體力才能出戰`);
    }
    info.textContent = parts.join(' · ');
  }
  setInterval(() => {
    const stage = document.getElementById('stageGame');
    if (stage && !stage.classList.contains('hidden')) {
      updateStaminaUI();
      // 每 30 秒同步一次（避免頻繁 Firebase 寫入）
      if (Math.floor(Date.now() / 1000) % 30 === 0) renderCharCard();
    }
  }, 1000);

  // 互動
  // ============================================================
  function pickClass(classId) {
    const me = getMe();
    if (!me) return;
    const rpg = getRpg(me);
    if (rpg.class) return;
    rpg.class = classId;
    rpg.level = 1;
    rpg.xp = 0;
    rpg.skillPoints = 0;
    rpg.skills = {};
    rpg.abilityPoints = 5;
    rpg.abilities = { str: 0, vit: 0, agi: 0, dex: 0, int: 0, luk: 0 };
    const stats = computeStats(me);
    rpg.hp = stats.maxHp;
    rpg.mp = stats.maxMp;
    rpg.stamina = STAMINA_MAX;
    rpg.lastTickAt = Date.now();
    syncEquipped(me);
    saveData();
    showToast(`✨ 選擇了 ${CLASSES[classId].icon} ${CLASSES[classId].name}`);
    render();
  }
  window.pickClass = pickClass;

  function onFight() {
    const me = getMe();
    if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.class) return;
    tickRecovery(me);
    if (rpg.stamina < STAMINA_PER_FIGHT) {
      showToast(`⚡ 體力不足（需 ${STAMINA_PER_FIGHT}，目前 ${rpg.stamina}）`);
      return;
    }
    if (rpg.hp <= 0) { showToast('💀 HP 不足，等回血或喝藥'); return; }

    // 鎖按鈕，扣體力
    document.getElementById('fightBtn').disabled = true;
    rpg.stamina -= STAMINA_PER_FIGHT;

    const monster = generateMonster(rpg.level);
    const result = autoFight(me, monster);

    // 渲染戰鬥場景，依序播放
    const stats = computeStats(me);
    const arenaHtml = `
      <div class="battle-arena" id="battleArena">
        <div class="combatant" id="combatPlayer">
          <div class="combatant-icon">${CLASSES[rpg.class].icon}</div>
          <div class="combatant-name">${escapeHtml(me.name)} Lv${rpg.level}</div>
          <div class="combatant-hp-track"><div class="combatant-hp-fill" id="pHpBar" style="width:${(rpg.hp/stats.maxHp)*100}%"></div></div>
          <div class="combatant-hp-text" id="pHpText">${rpg.hp}/${stats.maxHp}</div>
          <div class="combatant-hp-track" style="margin-top:2px;"><div class="combatant-hp-fill" id="pMpBar" style="width:${(rpg.mp/stats.maxMp)*100}%; background:linear-gradient(90deg,#93c5fd,#3b82f6);"></div></div>
          <div class="combatant-hp-text" id="pMpText" style="color:#1e40af;">MP ${rpg.mp}/${stats.maxMp}</div>
        </div>
        <div class="vs-icon">⚔️</div>
        <div class="combatant" id="combatMonster">
          <div class="combatant-icon">${monster.icon}</div>
          <div class="combatant-name">${monster.name} Lv${monster.level}</div>
          ${monster.ability ? `<div style="font-size:9px; color:#7c3aed; font-weight:600; margin-bottom:2px;">${describeAbility(monster.ability)}</div>` : ''}
          <div class="combatant-hp-track"><div class="combatant-hp-fill" id="mHpBar" style="width:100%"></div></div>
          <div class="combatant-hp-text" id="mHpText">${monster.hp}/${monster.maxHp}</div>
        </div>
      </div>
      <div class="battle-log" id="battleLog"></div>
    `;
    document.getElementById('fightResult').innerHTML = arenaHtml;

    // 播放 log
    const logEl = document.getElementById('battleLog');
    let i = 0;
    const playStep = () => {
      if (i >= result.log.length) {
        // 結算
        finalizeFight(me, monster, result, stats);
        return;
      }
      const entry = result.log[i++];
      const cls = entry.type === 'crit-player' ? 'log-crit'
        : entry.type === 'player' ? 'log-player'
        : entry.type === 'monster' ? 'log-monster'
        : 'log-system';
      const div = document.createElement('div');
      div.className = `log-line ${cls}`;
      div.textContent = entry.text;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      // 更新 HP / MP 條
      if (entry.hp) {
        document.getElementById('pHpBar').style.width = (entry.hp.player / stats.maxHp * 100) + '%';
        document.getElementById('pHpText').textContent = `${entry.hp.player}/${stats.maxHp}`;
        document.getElementById('mHpBar').style.width = (entry.hp.monster / monster.maxHp * 100) + '%';
        document.getElementById('mHpText').textContent = `${entry.hp.monster}/${monster.maxHp}`;
        if (entry.hp.mp != null) {
          document.getElementById('pMpBar').style.width = (entry.hp.mp / stats.maxMp * 100) + '%';
          document.getElementById('pMpText').textContent = `MP ${entry.hp.mp}/${stats.maxMp}`;
        }
        // shake 動畫
        if (entry.type === 'player' || entry.type === 'crit-player') {
          const m = document.getElementById('combatMonster');
          m.classList.remove('hurt'); void m.offsetWidth; m.classList.add('hurt');
        } else if (entry.type === 'monster') {
          const p = document.getElementById('combatPlayer');
          p.classList.remove('hurt'); void p.offsetWidth; p.classList.add('hurt');
        }
      }
      setTimeout(playStep, 550);
    };
    playStep();
  }
  window.onFight = onFight;

  function finalizeFight(player, monster, result, stats) {
    const rpg = getRpg(player);
    rpg.hp = result.pHpFinal;
    rpg.mp = result.pMpFinal;
    if (result.coinsStolen > 0) {
      player.coinsSpent = (player.coinsSpent || 0) + result.coinsStolen;
    }
    if (result.critCount) rpg.critCount = (rpg.critCount || 0) + result.critCount;
    if (result.metGreenTea) rpg.metGreenTea = (rpg.metGreenTea || 0) + result.metGreenTea;
    if (result.won) {
      if (!rpg.kills) rpg.kills = {};
      rpg.kills[monster.id] = (rpg.kills[monster.id] || 0) + 1;
    }
    const logEl = document.getElementById('battleLog');
    let rewardHtml = '';

    // 綠茶事件：不算勝負，直接結算
    if (result.fled) {
      const div = document.createElement('div');
      div.className = 'log-line log-system';
      div.textContent = `🍵 綠茶鵝逃走了，這次的相遇不算戰鬥`;
      logEl.appendChild(div);
      rewardHtml = `
        <div class="reward-list" style="background:#dcfce7; border-color:#86efac;">
          <div class="rl-title" style="color:#15803d;">🍵 綠茶鵝反撒了一波</div>
          <div class="rl-item">「鵝鵝沒有錯」</div>
          <div class="rl-item" style="color:#dc2626;">💰 −${result.coinsStolen} 鵝鵝幣　❤️ −${result.kickDmg || 0} HP</div>
          <div class="rl-item" style="margin-top:4px; font-size:11px; color:#16a34a;">無 XP / 無金幣 / 無戰利品</div>
        </div>
      `;
      document.getElementById('fightResult').insertAdjacentHTML('beforeend', rewardHtml);
      saveData();
      renderCharCard();
      renderEquipment();
      renderShop();
      renderRpgStats();
      updateStaminaUI();
      return;
    }

    if (result.won) {
      rpg.fightsWon = (rpg.fightsWon || 0) + 1;
      rpg.xp = (rpg.xp || 0) + monster.xpDrop;
      rpg.totalGold = (rpg.totalGold || 0) + monster.goldDrop;
      // 勝利補 20% MP
      const mpBack = Math.round(stats.maxMp * 0.2);
      rpg.mp = Math.min(stats.maxMp, rpg.mp + mpBack);
      // 獎勵鵝鵝幣
      refundCoins(player.id, monster.goldDrop);
      const drop = rollItemDrop(rpg.level, monster.level);
      if (drop) rpg.inventory.push(drop.id);
      // 升級檢查
      let leveledUp = 0;
      while (rpg.xp >= xpForLevel(rpg.level)) {
        rpg.xp -= xpForLevel(rpg.level);
        rpg.level += 1;
        rpg.skillPoints = (rpg.skillPoints || 0) + POINTS_PER_LEVEL.skill;
        rpg.abilityPoints = (rpg.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
        leveledUp++;
      }
      // 升級回滿 HP
      if (leveledUp) {
        const newStats = computeStats(player);
        rpg.hp = newStats.maxHp;
        rpg.mp = newStats.maxMp;
        rpg.deathAt = null;
      }

      const div = document.createElement('div');
      div.className = 'log-line log-victory';
      div.textContent = `✨ ${monster.name}倒下！`;
      logEl.appendChild(div);
      rewardHtml = `
        <div class="reward-list">
          <div class="rl-title">🎉 戰利品</div>
          <div class="rl-item">⭐ +${monster.xpDrop} XP</div>
          <div class="rl-item">🪙 +${monster.goldDrop} 鵝鵝幣</div>
          ${drop ? `<div class="rl-item">${drop.icon} ${drop.name}</div>` : ''}
          ${result.coinsStolen > 0 ? `<div class="rl-item" style="color:#dc2626;">💰 被偷走 −${result.coinsStolen} 鵝鵝幣</div>` : ''}
          ${leveledUp ? `<div style="margin-top:8px; color:#7c3aed; font-weight:700;">🎊 升級到 Lv ${rpg.level}！HP/MP 回滿、+${leveledUp * POINTS_PER_LEVEL.skill} 技能點 / +${leveledUp * POINTS_PER_LEVEL.ability} 能力點</div>` : ''}
        </div>
      `;
      if (leveledUp) showLevelUp(rpg.level);
    } else {
      rpg.fightsLost = (rpg.fightsLost || 0) + 1;
      rpg.hp = 0;
      rpg.deathAt = Date.now();
      const div = document.createElement('div');
      div.className = 'log-line log-defeat';
      div.textContent = `💀 你被打倒了… 必須休息 10 分鐘恢復 50% HP（或喝藥）`;
      logEl.appendChild(div);
      rewardHtml = `
        <div class="reward-list reward-loss">
          <div class="rl-title">😭 失敗了</div>
          <div class="rl-item">💀 進入休息：10 分鐘後恢復到 50% HP</div>
          ${result.coinsStolen > 0 ? `<div class="rl-item" style="color:#dc2626;">💰 被偷走 −${result.coinsStolen} 鵝鵝幣</div>` : ''}
          <div class="rl-item" style="margin-top:4px;">想立刻回血可用治療藥</div>
        </div>
      `;
    }
    document.getElementById('fightResult').insertAdjacentHTML('beforeend', rewardHtml);
    saveData();
    renderCharCard();
    renderEquipment();
    renderShop();
    renderRpgStats();
    updateStaminaUI();
  }

  function showLevelUp(lv) {
    const overlay = document.createElement('div');
    overlay.className = 'level-up-overlay';
    overlay.innerHTML = `<div class="level-up-text">🎊 LV ${lv}!</div>`;
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 3500);
  }

  function equipFromInv(idx) {
    const me = getMe();
    const rpg = getRpg(me);
    const itemId = rpg.inventory[idx];
    const item = findItem(itemId);
    if (!item) return;
    if (item.lv && rpg.level < item.lv) {
      showToast(`等級不足（需 Lv ${item.lv}）`);
      return;
    }
    // 把現有同 slot 裝備丟回背包
    const cur = rpg.equipment[item.slot];
    if (cur) rpg.inventory.push(cur);
    rpg.equipment[item.slot] = itemId;
    rpg.inventory.splice(idx, 1);
    syncEquipped(me);
    saveData();
    renderCharCard();
    renderEquipment();
    showToast(`已裝備 ${item.icon} ${item.name}`);
  }
  window.equipFromInv = equipFromInv;

  function unequip(slot) {
    const me = getMe();
    const rpg = getRpg(me);
    const cur = rpg.equipment[slot];
    if (!cur) return;
    rpg.inventory.push(cur);
    rpg.equipment[slot] = null;
    syncEquipped(me);
    saveData();
    renderCharCard();
    renderEquipment();
  }
  window.unequip = unequip;
