        const minSkillGap2 = m.fixedSkillOrder ? 2 : 1;
        const skillsAllowed = (round - lastSkillR) >= minSkillGap2;
        if (skillsAllowed && Array.isArray(m.skills) && m.skills.length) {
          if (m.fixedSkillOrder) {
            // ⭐ 固定出招順序：按陣列循環，等 CD 就緒才出招
            cdMap.__nextIdx = cdMap.__nextIdx || 0;
            const si = cdMap.__nextIdx % m.skills.length;
            const s = m.skills[si];
            const last = cdMap[si] ?? -999;
            if (round - last >= (s.cooldown || 3)) {
              mSkill = s;
              cdMap[si] = round;
              cdMap.__lastSkillR = round;
              cdMap.__nextIdx++;
            }
          } else if (Math.random() < 0.65) {
            const ready = [];
            for (let si = 0; si < m.skills.length; si++) {
              const s = m.skills[si];
              const last = cdMap[si] ?? -999;
              if (round - last >= (s.cooldown || 3)) ready.push({ s, si });
            }
            if (ready.length) {
              const pick = ready[Math.floor(Math.random() * ready.length)];
              mSkill = pick.s;
              cdMap[pick.si] = round;
              cdMap.__lastSkillR = round;
            }
          }
        }
        // 反傷（受到傷害的 50%，最多 300）
        const applyReflect2 = (incomingDmg) => {
          if (!pBuff.reflectPct || incomingDmg <= 0 || !m.alive) return;
          const r = Math.min(300, Math.max(1, Math.round(incomingDmg * pBuff.reflectPct)));
          m.hp = Math.max(0, m.hp - r);
          if (m.hp <= 0) m.alive = false;
          log.push({ type: 'crit-player', text: `回合 ${round}：🪞 反傷 → ${m.icon}${m.name} -${r} HP`, hp: hpsSnapshot() });
        };
        // ⭐ 試煉場也支援 shield 吸傷
        const consumeShield2 = (incoming) => {
          if (incoming <= 0) return incoming;
          const s = (playerObj.statuses || []).find(x => x.type === 'shield' && (x.charges || 0) > 0);
          if (!s) return incoming;
          s.charges -= 1;
          if (s.charges <= 0) playerObj.statuses = playerObj.statuses.filter(x => x !== s);
          log.push({ type: 'system', text: `回合 ${round}：🌫 ${player.name} 隱身免疫此次傷害！`, hp: hpsSnapshot() });
          return 0;
        };
        // ⭐ 試煉場魔坑
        const consumePartialShield2 = (incoming) => {
          if (incoming <= 0) return incoming;
          const ps = (playerObj.statuses || []).find(x => x.type === 'partialShield' && (x.hitsLeft || 0) > 0);
          if (!ps) return incoming;
          const reduced = Math.max(1, Math.round(incoming * (1 - (ps.reducePct || 0))));
          ps.hitsLeft -= 1;
          if (ps.hitsLeft <= 0) playerObj.statuses = playerObj.statuses.filter(x => x !== ps);
          log.push({ type: 'system', text: `回合 ${round}：🛡 魔坑 −${Math.round((ps.reducePct||0)*100)}% 傷害（剩 ${ps.hitsLeft} 次）`, hp: hpsSnapshot() });
          return reduced;
        };
        if (mSkill) {
          if (mSkill.type === 'monsterSelfBuff') {
            applyStatus(m, { type: 'buff', stat: mSkill.stat, amount: mSkill.amount, turns: mSkill.turns });
            const buffDesc = mSkill.stat === 'def' ? `DEF +${mSkill.amount}（${mSkill.turns} 回合）` : `強化 ${mSkill.turns} 回合`;
            log.push({ type: 'monster', text: `回合 ${round}：${m.icon}${m.name} ✨${mSkill.verb || '強化'} → ${buffDesc}`, hp: hpsSnapshot() });
          } else if (mSkill.type === 'monsterShield') {
            applyStatus(m, { type: 'shield', charges: mSkill.charges || 1, turns: 99 });
            log.push({ type: 'monster', text: `回合 ${round}：${m.icon}${m.name} ✨${mSkill.verb || '護盾'} → 無視下 ${mSkill.charges || 1} 次傷害！`, hp: hpsSnapshot() });
          } else {
            // ⭐ 30% DEF 穿透（試煉場）
            const _mPen3 = m.defPen || 0;
            let dmg;
            if (mSkill.ignoreDef || _mPen3 <= 0) {
              dmg = Math.max(1, m.atk * (mSkill.mult || 1) - (mSkill.ignoreDef ? 0 : Math.floor(effDef / 2)));
            } else {
              const _totAtk3 = m.atk * (mSkill.mult || 1);
              dmg = Math.max(1, _totAtk3 * _mPen3 + Math.max(0, _totAtk3 * (1 - _mPen3) - Math.floor(effDef / 2)));
            }
            dmg *= (0.85 + Math.random() * 0.3);
            dmg *= (1 - (passive.dmgReduction || 0));
            dmg *= (1 - (pBuff.dmgReducePct || 0));
            dmg = Math.max(1, Math.round(dmg));
            dmg = consumeShield2(dmg);
            dmg = consumePartialShield2(dmg);
            pHp = Math.max(0, pHp - dmg);
            if (dmg > 0) {
              log.push({
                type: 'monster',
                text: `回合 ${round}：${m.icon}${m.name} ✨${mSkill.verb || '技能'} → ${player.name} -${dmg} HP`,
                hp: hpsSnapshot(),
              });
              applyReflect2(dmg);
            }
            if (pHp > 0 && mSkill.applyStatus && Math.random() < (mSkill.applyStatus.chance || 1)) {
              applyStatus(playerObj, mSkill.applyStatus);
              log.push({ type: 'system', text: `回合 ${round}：${player.name} 進入 ${statusEmoji(mSkill.applyStatus.type)}${statusLabel(mSkill.applyStatus.type)} 狀態`, hp: hpsSnapshot() });
            }
          }
        } else {
          // 攻擊（含多段）
          const hits = (m.ability?.type === 'multiHit') ? Math.max(1, m.ability.hits || 2) : 1;
          const perHitMult = hits === 1 ? 1.0 : (1.3 / hits);
          const _mPen4 = m.defPen || 0;
          for (let h = 0; h < hits; h++) {
            let dmg;
            if (_mPen4 > 0) {
              dmg = Math.max(1, m.atk * _mPen4 + Math.max(0, m.atk * (1 - _mPen4) - Math.floor(effDef / 2)));
            } else {
              dmg = Math.max(1, m.atk - Math.floor(effDef / 2));
            }
            dmg *= (0.85 + Math.random() * 0.3);
            dmg *= perHitMult;
            dmg *= (1 - (passive.dmgReduction || 0));
            dmg *= (1 - (pBuff.dmgReducePct || 0));
            dmg = Math.max(1, Math.round(dmg));
            dmg = consumeShield2(dmg);
            dmg = consumePartialShield2(dmg);
            pHp = Math.max(0, pHp - dmg);
            if (dmg > 0) {
              log.push({
                type: 'monster',
                text: `回合 ${round}：${m.icon}${m.name} ${m.verb || '攻擊'}${hits > 1 ? ` (${h+1}/${hits})` : ''} → ${player.name} -${dmg} HP`,
                hp: hpsSnapshot(),
              });
              applyReflect2(dmg);
            }
            if (!m.alive) break;
            if (pHp <= 0) break;
          }
        }
        if (pHp <= 0) break;
      }
    }
    const won = pHp > 0 && mList.every(m => !m.alive);
    return {
      won, fled: false,
      pHpFinal: Math.max(0, pHp),
      pMpFinal: pMp,
      monsters: mList.map(m => ({ id: m.id, name: m.name, icon: m.icon, hp: Math.max(0, m.hp), maxHp: m.maxHp, alive: m.alive, level: m.level, xpDrop: m.xpDrop, goldDrop: m.goldDrop })),
      maxHp: stats.maxHp, maxMp: stats.maxMp,
      coinsStolen: 0, critCount, log,
    };
  }

  function renderAbilityTree() {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    if (!r.class) {
      document.getElementById('abilityCardHeader').innerHTML = `<span>📊 能力值</span>`;
      document.getElementById('abilityBody').innerHTML = '';
      return;
    }
    const points = r.abilityPoints || 0;
    document.getElementById('abilityCardHeader').innerHTML = `
      <span>📊 能力值</span>
      <span class="skill-card-points" style="background:linear-gradient(135deg,#a7f3d0,#10b981);">⚡ ${points} 點可用</span>
    `;
    const html = ABILITIES.map(ab => {
      const cur = (r.abilities || {})[ab.id] || 0;
      const canAdd = points >= 1;
      return `
        <div class="skill-node" style="background:linear-gradient(135deg,#fff,#ecfdf5); border-color:#a7f3d0;">
          <div class="sn-icon">${ab.icon}</div>
          <div>
            <div class="sn-name" style="color:#047857;">${ab.name} <span style="color:#10b981; margin-left:4px;">${cur}</span></div>
            <div class="sn-desc">${ab.desc}</div>
          </div>
          <button class="sn-add-btn" style="background:linear-gradient(135deg,#a7f3d0,#10b981); border-color:#047857;" onclick="learnAbility('${ab.id}')" ${canAdd ? '' : 'disabled'}>+</button>
        </div>
      `;
    }).join('');
    // 職業被動（依能力門檻自動觸發）
    const cls = CLASSES[r.class];
    const passivesHtml = (cls && cls.passives) ? cls.passives.map(p => {
      const a = (r.abilities || {})[p.stat] || 0;
      const active = a >= p.threshold;
      const progress = Math.min(100, Math.round((a / p.threshold) * 100));
      return `
        <div class="skill-node ${active ? 'maxed' : ''}" style="${active ? '' : 'opacity:0.65;'} background:linear-gradient(135deg,#fff,${active ? '#fde68a' : '#f3f4f6'}); border-color:${active ? '#d97706' : '#d1d5db'};">
          <div class="sn-icon">${p.icon}</div>
          <div>
            <div class="sn-name" style="color:${active ? '#92400e' : '#6b7280'};">${active ? '✨' : '🔒'} ${escapeHtml(p.name)}</div>
            <div class="sn-desc">${escapeHtml(p.desc)}</div>
            <div class="sn-progress">
              <span>${p.stat.toUpperCase()} ${a}/${p.threshold}</span>
              <div class="sn-bar"><div class="sn-fill" style="width:${progress}%; background:${active ? 'linear-gradient(90deg,#fcd34d,#d97706)' : 'linear-gradient(90deg,#9ca3af,#6b7280)'};"></div></div>
            </div>
          </div>
          <div style="font-size:9px; color:#6b7280; text-align:center;">職業<br>被動</div>
        </div>
      `;
    }).join('') : '';

    document.getElementById('abilityBody').innerHTML = `
      ${html}
      <div style="display:flex; gap:6px; margin-top:6px;">
        <button class="btn btn-secondary" style="flex:1; margin-top:0;" onclick="resetAbilities()">🔄 重置能力（🪙 ${RESET_ABILITY_COST}）</button>
      </div>
      <div style="font-size:11px; color:#8b6f9b; text-align:center; margin-top:6px;">每升 1 等獲得 +${POINTS_PER_LEVEL.ability} 能力點　·　起手 +5 點</div>
      ${passivesHtml ? `
        <div style="font-size:11px; color:#92400e; font-weight:700; margin:14px 0 6px; padding:4px 8px; background:#fef3c7; border-radius:8px;">🌟 職業被動（依能力門檻自動觸發）</div>
        ${passivesHtml}
      ` : ''}
    `;
  }

  // ⭐ 王硬幣彙總（從 rpg.bossCoins map 讀；Phase A 後不再翻 inventory）
  function totalBossCoinsInInventory(rpg) {
    if (!rpg || !rpg.bossCoins) return 0;
    return Object.values(rpg.bossCoins).reduce((a, b) => a + (Number(b) || 0), 0);
  }
  // ⭐ 取代舊的本地版 consumeBossCoins — 改用 atomic tx
  //    舊呼叫 sites 改成 await consumeBossCoinsAtomic(pid, n)
  function consumeBossCoins(rpg, n) {
    // 此函式保留為 fallback（樂觀本地扣，雲端 tx 由 caller 負責）
    if (!rpg) return false;
    rpg.bossCoins = rpg.bossCoins || {};
    const total = Object.values(rpg.bossCoins).reduce((a, b) => a + (b || 0), 0);
    if (total < n) return false;
    const entries = Object.entries(rpg.bossCoins).sort((a, b) => (b[1] || 0) - (a[1] || 0));
    let need = n;
    for (const [id, have] of entries) {
      if (need <= 0) break;
      const take = Math.min(have, need);
      rpg.bossCoins[id] = have - take;
      need -= take;
    }
    return true;
  }

  async function rollGacha(machineId, count) {
    const m = GACHA_MACHINES.find(g => g.id === machineId);
    if (!m || m.status !== 'open') return;
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const totalCost = m.cost * count;
    // 扣費（兩種模式）
    if (m.isBossCoin) {
      if (totalBossCoinsInInventory(r) < totalCost) { showToast('王硬幣不夠'); return; }
      // ⭐ Phase A：用 atomic tx 扣（雲端先確認夠才扣，避免並發問題）
      try {
        await consumeBossCoinsAtomic(me.id, totalCost);
      } catch (e) {
        const msg = String(e?.message || e);
        if (msg.startsWith('insufficient-coins')) showToast('☁️ 雲端王硬幣不足');
        else { console.warn('consumeBossCoinsAtomic failed:', e); showToast('☁️ 扣費失敗'); }
        return;
      }
    } else {
      if ((r[m.currency] || 0) < totalCost) { showToast('幣不夠'); return; }
      r[m.currency] = (r[m.currency] || 0) - totalCost;
    }
    // 抽取
    const isComplexPool = Array.isArray(m.pool) && m.pool.length > 0 && typeof m.pool[0] === 'object';
    const results = []; // 統一格式：{ kind: 'item'|'reward', item?: drop, reward?: { type, amount, label, icon } }
    let levelUps = 0;
    if (isComplexPool) {
      const totalW = m.pool.reduce((a, p) => a + (p.weight || 0), 0);
      for (let i = 0; i < count; i++) {
        let roll = Math.random() * totalW;
        let picked = m.pool[0];
        for (const p of m.pool) {
          roll -= (p.weight || 0);
          if (roll <= 0) { picked = p; break; }
        }
        if (picked.type === 'item') {
          const baseItem = findItem(picked.id);
          if (!baseItem) continue;
          // 鵝王恩賜：金裝、不洗詞綴；其餘（探險扭蛋戒指）：固定 3 詞條隨機
          const drop = baseItem.isBossGift ? createBossGiftInstance(baseItem) : createExploreRingInstance(baseItem);
          r.inventory = r.inventory || [];
          r.inventory.push(drop);
          results.push({ kind: 'item', item: drop });
        } else if (picked.type === 'stamina') {
          // 體力可超過上限
          r.stamina = (r.stamina || 0) + picked.amount;
          results.push({ kind: 'reward', reward: picked });
        } else if (picked.type === 'coins') {
          if (typeof refundCoins === 'function') refundCoins(me.id, picked.amount);
          else me.coinsSpent = (me.coinsSpent || 0) - picked.amount;
          results.push({ kind: 'reward', reward: picked });
        } else if (picked.type === 'xp') {
          r.xp = (r.xp || 0) + picked.amount;
          while (r.xp >= xpForLevel(r.level)) {
            r.xp -= xpForLevel(r.level);
            r.level += 1;
            r.skillPoints = (r.skillPoints || 0) + POINTS_PER_LEVEL.skill;
            r.abilityPoints = (r.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
            levelUps++;
            if (r.level > 50) break;
          }
          results.push({ kind: 'reward', reward: picked });
        } else if (picked.type === 'treasure') {
          r.treasures = r.treasures || [];
          const allTids = Object.keys(TREASURES);
          const tid = allTids[Math.floor(Math.random() * allTids.length)];
          const treasure = TREASURES[tid];
          const isDup = r.treasures.includes(tid);
          if (isDup) {
            r.exploreCoins = (r.exploreCoins || 0) + 2;
            results.push({ kind: 'reward', reward: { icon: treasure?.icon || '🎁', label: `${treasure?.name || '寶物'}（重複）→ 🧭 +2 探險幣` } });
          } else {
            r.treasures.push(tid);
            results.push({ kind: 'reward', reward: { icon: treasure?.icon || '🎁', label: `寶物：${treasure?.name || tid}` } });
          }
        }
      }
    } else {
      // 舊式：pool 是 [id...] + weights
      const totalW = m.weights.reduce((a, b) => a + b, 0);
      for (let i = 0; i < count; i++) {
        let roll = Math.random() * totalW;
        let pickedIdx = 0;
        for (let j = 0; j < m.pool.length; j++) {
          roll -= (m.weights[j] || 0);
          if (roll <= 0) { pickedIdx = j; break; }
        }
        const baseId = m.pool[pickedIdx];
        const baseItem = findItem(baseId);
        if (!baseItem) continue;
        const drop = createGachaItemInstance(baseItem);
        r.inventory = r.inventory || [];
        r.inventory.push(drop);
        results.push({ kind: 'item', item: drop });
      }
    }
    saveData();
    renderCharCard();
    renderEquipment();
    renderCharQuickMenu();
    if (levelUps > 0) showToast(`🎉 升 ${levelUps} 級！+${levelUps * POINTS_PER_LEVEL.skill} 技能點 +${levelUps * POINTS_PER_LEVEL.ability} 能力點`);
    // 顯示結果
    const resultHtml = results.map(res => {
      if (res.kind === 'item') {
        const d = res.item;
        const isGold = d.rarity === 'gold';
        const rarColor = isGold ? '#fbbf24' : (d.rarity ? RARITY[d.rarity]?.color : '#7c3aed');
        const rarLabel = isGold ? '金裝' : (d.rarity ? RARITY[d.rarity]?.label : '');
        const bg = isGold ? 'linear-gradient(135deg,#fef9c3,#fde68a)' : '#fff';
        return `<div style="display:flex; gap:8px; align-items:center; padding:6px 8px; background:${bg}; border:2px solid ${rarColor}; border-radius:8px; margin-bottom:4px;">
          <span style="font-size:24px;">${d.icon}</span>
          <div style="flex:1; min-width:0;">
            <div style="font-size:12px; font-weight:800; color:${isGold ? '#92400e' : rarColor};">[${rarLabel}] ${escapeHtml(d.name)}</div>
            <div style="font-size:10px; color:#7c3aed;">${formatItemStats(d)}</div>
            ${d.affixDesc ? `<div style="font-size:10px; color:#b45309; font-weight:700;">✦ ${escapeHtml(d.affixDesc)}</div>` : ''}
          </div>
        </div>`;
      }
      const rw = res.reward;
      return `<div style="display:flex; gap:8px; align-items:center; padding:6px 8px; background:#f0fdf4; border:2px solid #86efac; border-radius:8px; margin-bottom:4px;">
        <span style="font-size:24px;">${rw.icon || '🎁'}</span>
        <div style="flex:1; min-width:0;">
          <div style="font-size:12px; font-weight:800; color:#166534;">${escapeHtml(rw.label || (rw.type + ' +' + rw.amount))}</div>
        </div>
      </div>`;
    }).join('');
    const costNote = m.isBossCoin ? `${m.currencyIcon} −${totalCost}（王硬幣）` : `${m.currencyIcon} −${totalCost}`;
    showModal(`🎰 抽到 ${results.length} 件`, `
      <div style="text-align:left;">
        <div style="font-size:11px; color:#5b3d62; padding:6px 10px; background:#fef3c7; border:1px dashed #f59e0b; border-radius:8px; margin-bottom:10px; text-align:center;">
          ${costNote}　·　已加進背包 / 入帳
        </div>
        ${resultHtml}
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:10px;">
          <button class="btn btn-primary" onclick="openGachaMachine('${machineId}')">🎰 再抽</button>
          <button class="btn btn-secondary" onclick="hideModal()">收下</button>
        </div>
      </div>
    `);
  }
  window.rollGacha = rollGacha;

  // 鵝王恩賜：金裝飾品，固定詞條（affixDesc 顯示），不洗 affixes，不重命名
  function createBossGiftInstance(base) {
    return {
      id: 'bg_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      baseId: base.id,
      rarity: 'gold',
      name: base.name,
      icon: base.icon,
      slot: base.slot,
      lv: base.lv || 1,
      atk: base.atk || 0,
      def: base.def || 0,
      spd: base.spd || 0,
      hp:  base.hp  || 0,
      mp:  base.mp  || 0,
      mpRegen: base.mpRegen || 0,
      critChance: base.critChance || 0,
      critDmg:    base.critDmg    || 0,
      isBossGift: true,
      affixDesc: base.affixDesc,
      affixes: [], // 不洗
    };
  }

  // 把 ITEMS 的基底飾品造成「drop instance」（隨機稀有度 + 詞綴）
  function createGachaItemInstance(base) {
    const rarity = rollRarity(false);
    const def = RARITY[rarity];
    const drop = {
      id: 'gacha_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      baseId: base.id,
      rarity,
      name: base.name,
      icon: base.icon,
      slot: base.slot,
      lv: base.lv || 1,
      atk: base.atk || 0,
      def: base.def || 0,
      spd: base.spd || 0,
      hp:  base.hp  || 0,
      mp:  base.mp  || 0,
      critChance: base.critChance || 0,
      critDmg:    base.critDmg    || 0,
      affixes: [],
    };
    // 詞綴數依稀有度（白 0 / 綠 1 / 藍 2 / 紫 3）
    const affixCount = def.affixes;
    for (let i = 0; i < affixCount; i++) {
      const a = AFFIXES[Math.floor(Math.random() * AFFIXES.length)];
      const val = Math.max(1, Math.round((1 + drop.lv * a.perLv) * def.mult));
      drop[a.type] = (drop[a.type] || 0) + val;
      drop.affixes.push({ type: a.type, name: a.name, val });
    }
    if (drop.affixes.length > 0) drop.name = `${drop.affixes[0].name}的 ${base.name}`;
    return drop;
  }

  // ⭐ 探險扭蛋戒指：固定 3 詞條，傳說稀有度（紫）
  function createExploreRingInstance(base) {
    const EXPLORE_LV = 15; // 詞條強度基準等級
    const mult = RARITY['legendary'].mult; // 1.5
    const drop = {
      id: 'exring_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      baseId: base.id,
      rarity: 'legendary',
      name: base.name,
      icon: base.icon,
      slot: base.slot,
      atk: base.atk || 0,
      def: base.def || 0,
      spd: base.spd || 0,
      hp:  base.hp  || 0,
      mp:  base.mp  || 0,
      critChance: base.critChance || 0,
      critDmg:    base.critDmg   || 0,
      affixes: [],
    };
    for (let i = 0; i < 3; i++) {
      const a = AFFIXES[Math.floor(Math.random() * AFFIXES.length)];
      const val = Math.max(1, Math.round((1 + EXPLORE_LV * a.perLv) * mult));
      drop[a.type] = (drop[a.type] || 0) + val;
      drop.affixes.push({ type: a.type, name: a.name, val });
    }
    if (drop.affixes.length > 0) drop.name = `${drop.affixes[0].name}的 ${base.name}`;
    return drop;
  }

  // 從背包裝備一個精魂（找第一個空槽，沒空就替換槽 1 然後把舊的丟回背包）
  function equipSpiritFromBag(bagIdx) {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    const bag = rpg.spiritBag || [];
    const sp = bag[bagIdx];
    if (!sp) return;
    const slots = getSpiritSlots(rpg);
    const emptyIdx = slots.findIndex(x => !x);
    if (emptyIdx >= 0) {
      slots[emptyIdx] = sp;
      bag.splice(bagIdx, 1);
      saveData();
      showSpiritsModal();
      renderCharCard();
      renderCharQuickMenu();
      showToast(`✨ 裝備 ${sp.icon} ${sp.name}（槽 ${emptyIdx + 1}）`);
      return;
    }
    // 滿了 — 問要替換哪一槽
    const choice = prompt(`5 個槽都裝滿了。要替換第幾槽？(1-5，輸入 0 取消)\n目前槽：\n${slots.map((s, i) => `${i+1}. ${s ? s.icon + ' ' + s.name : '空'}`).join('\n')}`);
    const n = parseInt(choice, 10);
    if (!n || n < 1 || n > 5) return;
    const targetIdx = n - 1;
    if (slots[targetIdx]) bag.push(slots[targetIdx]);
    slots[targetIdx] = sp;
    // 從 bag 移除剛拿的（注意 push 會影響 idx，所以先計算）
    // 找回 bagIdx 對應 sp（剛才可能因為 push 多了一筆）
    const myIdx = bag.indexOf(sp);
    if (myIdx >= 0) bag.splice(myIdx, 1);
    saveData();
    showSpiritsModal();
    renderCharCard();
    renderCharQuickMenu();
    showToast(`✨ 替換到槽 ${n}：${sp.icon} ${sp.name}`);
  }
  window.equipSpiritFromBag = equipSpiritFromBag;

  function unequipSpirit(slotIdx) {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    const slots = getSpiritSlots(rpg);

    if (!sp) return;
    rpg.spiritBag = rpg.spiritBag || [];

    slots[slotIdx] = null;
    saveData();
    showSpiritsModal();
    renderCharCard();
    renderCharQuickMenu();
    showToast(`📦 卸下 ${sp.icon} ${sp.name}`);

  function captureFullSnapshot() {

    try { stats = me && rpg && rpg.class ? computeStats(me) : null; } catch (e) { stats = { error: String(e) }; }
    const safeRpg = rpg ? {
      class: rpg.class, level: rpg.level, xp: rpg.xp, hp: rpg.hp, mp: rpg.mp, stamina: rpg.stamina,
      skillPoints: rpg.skillPoints, abilityPoints: rpg.abilityPoints,

      inventory: (rpg.inventory || []).map(it => typeof it === 'string' ? it : (it && it.id) ? `${it.id}${it.rarity ? `[${it.rarity}]` : ''}${it.affixes ? `(${it.affixes.length} affix)` : ''}` : '?'),
      skills: rpg.skills, skillLevels: rpg.skillLevels, abilities: rpg.abilities,
      treasures: rpg.treasures, dexSeenCount: (rpg.dexSeen || []).length,
      currentZone: rpg.currentZone, currentFloor: rpg.currentFloor,

    } : null;
    return {
      ts: Date.now(),

      ua: navigator.userAgent,

        totalCritChance: stats.totalCritChance, totalCritDmg: stats.totalCritDmg,

  function snapshotToText(snap, userText) {

  // 一鍵複製到剪貼簿
  async function copyToClipboard(text) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch (e) { /* fall through */ }
    // fallback：textarea + execCommand
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch (e) { return false; }
  }

  function showBugList() {
    const me = getMe();
    if (!Array.isArray(bugs)) bugs = [];
    const open = bugs.filter(b => b.status !== 'fixed' && b.status !== 'wontfix');
    const closed = bugs.filter(b => b.status === 'fixed' || b.status === 'wontfix');
    const renderBug = (b) => {
      const dt = new Date(b.ts);
      const when = `${dt.getMonth() + 1}/${dt.getDate()} ${String(dt.getHours()).padStart(2, '0')}:${String(dt.getMinutes()).padStart(2, '0')}`;
      const isMine = me && b.reporter === me.id;
      const statusBadge = b.status === 'fixed' ? '<span style="font-size:10px; color:#fff; background:#16a34a; padding:1px 6px; border-radius:6px;">已修</span>'
        : b.status === 'wontfix' ? '<span style="font-size:10px; color:#fff; background:#9ca3af; padding:1px 6px; border-radius:6px;">不修</span>'
        : '<span style="font-size:10px; color:#fff; background:#dc2626; padding:1px 6px; border-radius:6px;">待修</span>';
      const snap = b.snapshot;
      return `
        <div class="bug-card" data-id="${b.id}">
          <div class="bug-head">
            <span>${b.reporterAvatar || '🐛'} <b>${escapeHtml(b.reporterName || '?')}</b></span>
            <span style="font-size:10px; color:#8b6f9b;">${when}</span>
            ${statusBadge}
          </div>
          <div class="bug-text">${escapeHtml(b.text)}</div>
          ${snap ? `
            <details class="bug-snapshot">
              <summary>📎 戰鬥快照（${escapeHtml(snap.monster?.name || '?')} ${snap.result?.won ? '勝' : snap.result?.fled ? '逃' : '敗'}）</summary>
              <div class="bug-snap-body">
                <div style="font-size:10px; color:#8b6f9b; margin-bottom:4px;">怪物：${escapeHtml(snap.monster?.name || '?')} Lv${snap.monster?.level || '?'} (HP ${snap.monster?.hp || '?'} / ATK ${snap.monster?.atk || '?'} / DEF ${snap.monster?.def || '?'})</div>
                <div style="max-height:160px; overflow:auto; background:#fff; border-radius:6px; padding:6px; font-size:10px; line-height:1.4;">
                  ${snap.log.slice(-15).map(l => `<div>${escapeHtml(l.text)}</div>`).join('')}
                </div>
              </div>
            </details>
          ` : ''}
          <div style="display:flex; gap:4px; margin-top:6px; flex-wrap:wrap;">
            <button class="btn btn-secondary" style="font-size:10px; padding:4px 8px; margin:0; flex:1; background:#ede9fe; color:#5b21b6;" onclick="copyBugById('${b.id}')" title="複製完整 JSON">📋 複製</button>
            ${isMine || isDebugUnlocked() ? `
              ${b.status !== 'fixed' ? `<button class="btn btn-secondary" style="font-size:10px; padding:4px 8px; margin:0; flex:1;" onclick="setBugStatus('${b.id}','fixed')">標記已修</button>` : ''}
              ${b.status !== 'wontfix' ? `<button class="btn btn-secondary" style="font-size:10px; padding:4px 8px; margin:0; flex:1;" onclick="setBugStatus('${b.id}','wontfix')">不修</button>` : ''}
              <button class="btn btn-secondary" style="font-size:10px; padding:4px 8px; margin:0; color:#dc2626;" onclick="deleteBug('${b.id}')">刪除</button>
            ` : ''}
          </div>
        </div>
      `;
    };
    const html = `
      <div style="text-align:left;">
        <div style="font-size:12px; color:#8b6f9b; margin-bottom:8px;">所有玩家的 BUG 回報，按時間倒序。任何人都能標記「已修」或「不修」。</div>
        ${open.length > 0 ? `
          <div style="font-size:13px; font-weight:700; color:#dc2626; margin:6px 0;">⏳ 待修（${open.length}）</div>
          ${[...open].reverse().map(renderBug).join('')}
        ` : '<div style="font-size:12px; color:#9ca3af; padding:8px; text-align:center;">沒有待修 BUG，乾淨！</div>'}
        ${closed.length > 0 ? `
          <div style="font-size:13px; font-weight:700; color:#16a34a; margin:14px 0 6px;">✓ 已處理（${closed.length}）</div>
          ${[...closed].reverse().slice(0, 10).map(renderBug).join('')}
          ${closed.length > 10 ? `<div style="font-size:11px; color:#9ca3af; text-align:center; margin-top:6px;">還有 ${closed.length - 10} 筆，省略</div>` : ''}

  // ⭐ 技能詳細 + 升級
  function showSkillDetailModal(skillId) {
    const me = getMe();
    if (!me) return;
    const rpg = getRpg(me);
    const cls = CLASSES[rpg.class];
    if (!cls) return;
    const skill = (cls.skills || []).find(s => s.id === skillId);
    if (!skill) { showToast('找不到技能'); return; }
    const lv = (rpg.skillLevels || {})[skillId] || 0;
    const skillMax = skill.maxLv || SKILL_MAX_LEVEL;
    const eff = getSkillEffectiveStats(skill, lv);
    const isLocked = (skill.unlockLv || 1) > rpg.level;
    const canUpgrade = !isLocked && lv < skillMax && (rpg.skillPoints || 0) >= 1;
    // 等級 breakdown
    const levelRows = [];
    for (let i = 1; i <= skillMax; i++) {
      const owned = i <= lv;
      const isNext = i === lv + 1;
      const desc = describeSkillLevelEffect(skill, i);
      levelRows.push(`
        <div class="skl-row ${owned ? 'owned' : ''} ${isNext ? 'next' : ''}">
          <span class="skl-num">Lv ${i}</span>
          <span class="skl-desc">${owned ? '✓ ' : isNext ? '➤ ' : '🔒 '}${desc}</span>
        </div>
      `);
    }
    // 對應的詞綴 / 自身 buff（用 effective）
    const buffPairs = [];
    if (eff.lifesteal) buffPairs.push(`🩸 吸血 ${Math.round(eff.lifesteal*100)}%`);
    if (skill.bleedBonus) buffPairs.push(`🩸 流血目標傷害 +${Math.round(skill.bleedBonus*100)}%`);
    if (skill.bleedLifestealBonus) buffPairs.push(`🩸 流血目標額外吸血 +${Math.round(skill.bleedLifestealBonus*100)}%`);
    if (eff.healCaster) buffPairs.push(`💚 自癒 ${Math.round(eff.healCaster*100)}% maxHP`);
    if (eff.selfBuff) {
      buffPairs.push(`${describeBuff(eff.selfBuff)}　持續 ${eff.selfBuff.turns} 回合`);
    }
    if (skill.applyPartialShield) {
      buffPairs.push(`🛡 魔坑 −${Math.round(skill.applyPartialShield.reducePct*100)}% 受到傷害（${skill.applyPartialShield.hits} 次）`);
    }
    if (eff.applyStatus) {
      const s = eff.applyStatus;
      const durText = s.type === 'vulnerable' ? `${s.hits || 2} 次`
                    : s.type === 'shield'     ? `${s.charges || 1} 次`
                    : s.type === 'paralyze'   ? `${s.charges || 2} 次`
                    : s.type === 'poison'     ? `${s.charges || 3} 次`
                    : s.type === 'bleed'      ? `${s.charges || 3} 次`
                    : `持續 ${s.turns} 回合`;
      buffPairs.push(`${statusEmoji(s.type)} 賦予 ${statusLabel(s.type)}（${Math.round((s.chance||1)*100)}%、${durText}${s.dmg ? `、每次觸發 ${s.dmg} 傷害` : ''}）`);
    }
    if (eff.targetCount && eff.targetCount !== 1) {
      buffPairs.push(`🎯 同時打 ${eff.targetCount === 'all' ? '全體' : eff.targetCount + ' 個目標'}`);
    }
    if (eff.alwaysCrit) buffPairs.push('💥 必中暴擊');
    if (eff.extraCritChance) buffPairs.push(`🎯 暴擊率 +${Math.round(eff.extraCritChance * 100)}%（本招）`);
    if (eff.extraCritDmg)    buffPairs.push(`💥 爆傷 +${Math.round(eff.extraCritDmg * 100)}%（本招）`);
    if (eff.bonusMaxHpPct)   buffPairs.push(`🩸 maxHp 加傷 +${Math.round(eff.bonusMaxHpPct * 100)}%（純加值，無視怪 DEF）`);
    if (skill.buffMaxHpPct)  buffPairs.push(`💖 最大HP +${Math.round(skill.buffMaxHpPct * 100)}%（戰鬥中有效）`);
    if (skill.bonusHealPct)  buffPairs.push(`💚 即時回血 ${Math.round(skill.bonusHealPct * 100)}% maxHP（不超出上限）`);
    if (skill.applyShield)   buffPairs.push(`🛡 免疫一次傷害`);
    if (eff.markMult)        buffPairs.push(`🌀 MARK 加傷 ×${Number(eff.markMult).toFixed(2).replace(/\.?0+$/, '')}（每點 MARK 多這麼多傷害）`);
    if (skill.mpRestorePct)  buffPairs.push(`💙 回復 ${Math.round(skill.mpRestorePct * 100)}% maxMP`);
    if (eff.postSelfBuff)    buffPairs.push(`✨ 攻擊完後：${describeBuff(eff.postSelfBuff)}（${eff.postSelfBuff.turns} 回合）`);
    if (eff.mpCostMult && eff.mpCostMult < 1) buffPairs.push(`💙 MP 消耗 -${Math.round((1 - eff.mpCostMult) * 100)}%`);
    if (eff.magic) buffPairs.push('🔮 魔攻（吃法抗）');
    if (eff.ignoreDef) buffPairs.push('🗡 無視防禦');
    if (skill.applyShield)   buffPairs.push('🛡 免疫一次傷害');

    const html = `
      <div style="text-align:center; padding:4px 0;">
        <div style="font-size:48px; line-height:1; margin-bottom:4px;">${skill.icon}</div>
        <div style="font-weight:700; font-size:16px; color:#5b3d62;">${escapeHtml(skill.name)}</div>
        <div style="font-size:11px; color:#8b6f9b; margin-top:2px;">
          ${isLocked ? `🔒 Lv ${skill.unlockLv} 解鎖` : `等級 <b style="color:#7c3aed;">${lv}/${skillMax}</b>`}
          　·　硬值 ${getEffectiveCast(skill)}　·　${formatSkillCost(skill)}
        </div>
        <div style="font-size:12px; color:#7c3aed; margin-top:6px; padding:6px 8px; background:#f3e8ff; border-radius:8px;">
          ${formatSkillDesc(eff)}
        </div>
        ${buffPairs.length > 0 ? `
          <div style="margin-top:8px; padding:6px 10px; background:#fff8e6; border:1px dashed #f59e0b; border-radius:8px; font-size:11px; color:#92400e; text-align:left;">
            ${buffPairs.map(p => `<div style="padding:1px 0;">${p}</div>`).join('')}
          </div>
        ` : ''}
        <div style="margin-top:10px; text-align:left;">
          <div style="font-size:11px; font-weight:700; color:#5b3d62; margin-bottom:4px;">📈 等級加成</div>
          ${levelRows.join('')}
        </div>
        <div style="margin-top:14px;">
          ${isLocked
            ? `<div style="font-size:11px; color:#dc2626;">尚未解鎖（Lv ${skill.unlockLv} 才能升級）</div>`
            : canUpgrade
              ? `<button class="btn btn-primary" onclick="upgradeSkillLevel('${skillId}')" style="background:linear-gradient(135deg,#c4b5fd,#7c3aed); box-shadow:0 4px 0 #5b21b6;">升級到 Lv ${lv + 1}（-1 SP）</button>`
              : lv >= skillMax
                ? `<div style="font-size:12px; color:#16a34a; font-weight:700;">✓ 已滿級</div>`
                : `<div style="font-size:12px; color:#dc2626;">技能點不足（你有 ${rpg.skillPoints || 0} SP）</div>`
          }
          <div style="font-size:10px; color:#8b6f9b; margin-top:6px;">技能點與「屬性強化」共用同一個池</div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px;">
          <button class="btn btn-secondary" onclick="showSkillsModal()">← 返回列表</button>
          <button class="btn btn-secondary" onclick="hideModal()">關閉</button>
        </div>
      </div>
    `;
    showModal(`${skill.icon} ${skill.name}`, html);
  }
  window.showSkillDetailModal = showSkillDetailModal;

  function upgradeSkillLevel(skillId) {
    const me = getMe();
    if (!me) return;
    const rpg = getRpg(me);
    const cls = CLASSES[rpg.class];
    if (!cls) return;
    const skill = (cls.skills || []).find(s => s.id === skillId);
    if (!skill) return;
    if ((skill.unlockLv || 1) > rpg.level) { showToast('等級不足，未解鎖'); return; }
    const cur = (rpg.skillLevels || {})[skillId] || 0;
    const skillMax = skill.maxLv || SKILL_MAX_LEVEL;
    if (cur >= skillMax) { showToast('已達最高等級'); return; }
    if ((rpg.skillPoints || 0) < 1) { showToast('技能點不足'); return; }
    rpg.skillLevels = rpg.skillLevels || {};
    rpg.skillLevels[skillId] = cur + 1;
    rpg.skillPoints -= 1;
    saveData();
    showToast(`✨ ${skill.icon} ${skill.name} → Lv ${cur + 1}`);
    showSkillDetailModal(skillId); // refresh modal
    renderCharCard();
    renderCharQuickMenu();
  }
  window.upgradeSkillLevel = upgradeSkillLevel;

  // ⭐ 技能 modal — 主動技能升級 + 屬性強化技能樹合併到同一個畫面
  function showSkillsModal() {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    const cls = CLASSES[rpg.class];
    if (!cls) return;
    const points = rpg.skillPoints || 0;
    // ─ 主動技能：點任一個進詳細看升級
    const activeHtml = (cls.skills || []).map(s => {
      const locked = (s.unlockLv || 1) > rpg.level;
      const sLv = (rpg.skillLevels || {})[s.id] || 0;
      const sMax = s.maxLv || SKILL_MAX_LEVEL;
      const canUp = !locked && sLv < sMax && points >= 1;
      return `<div class="skill-row${locked ? ' locked' : ''}" onclick="hideModal(); showSkillDetailModal('${s.id}')">
        <span>${locked ? '🔒' : '✓'} <b>${s.icon} ${s.name}</b>${sLv > 0 ? ` <span class="skill-row-lv">Lv ${sLv}/${sMax}</span>` : ''}${locked ? ` <span style="font-size:10px;">(${s.unlockLv})</span>` : ''}${canUp ? ` <span style="font-size:9px; color:#7c3aed; font-weight:700;">⬆ 可升級</span>` : ''}</span>
        <span style="opacity:0.85; font-size:10px; white-space:nowrap;">硬值 ${getEffectiveCast(s)} · ${formatSkillCost(s)}</span>
      </div>`;
    }).join('');
    // ─ 屬性強化技能樹：直接 inline + 按鈕
    const treeHtml = (cls.skillTree || []).map(node => {
      const lv = (rpg.skills || {})[node.id] || 0;
      const maxed = lv >= node.maxLevel;
      const canLearn = !maxed && points >= 1;
      const pct = (lv / node.maxLevel) * 100;
      const valStr = node.effect.endsWith('Pct') || node.effect === 'critChance' || node.effect === 'regen'
        ? `${(lv * node.per * 100).toFixed(0)}%`
        : `+${(lv * node.per).toFixed(0)}`;
      return `
        <div class="skill-node ${maxed ? 'maxed' : ''}">
          <div class="sn-icon">${node.icon}</div>
          <div>
            <div class="sn-name">${escapeHtml(node.name)}</div>
            <div class="sn-desc">${escapeHtml(node.desc)}　·　目前 ${valStr}</div>
            <div class="sn-progress">
              <span>Lv ${lv}/${node.maxLevel}</span>
              <div class="sn-bar"><div class="sn-fill" style="width:${pct}%"></div></div>
            </div>
          </div>
          <button class="sn-add-btn" onclick="learnSkill('${node.id}')" ${canLearn ? '' : 'disabled'} title="${maxed ? '已滿級' : (points < 1 ? '沒點數' : '加 1 級')}">+</button>
        </div>
      `;
    }).join('');
    const html = `
      <div style="text-align:left;">
        <div style="font-size:12px; color:#5b3d62; padding:8px 10px; background:linear-gradient(135deg,#fef3c7,#fde68a); border-radius:8px; margin-bottom:10px; border:2px dashed #f59e0b;">
          技能點 <b style="color:#7c3aed; font-size:14px;">${points} SP</b>　·　每升 1 等 +${POINTS_PER_LEVEL.skill} SP<br>

        </div>

  // ⭐ 全職業技能傷害比較表
  //   標準測試環境：Lv 30 玩家、ATK 100、DEF 30、maxHp 500、maxMp 200
  //   Lv 0 / Lv 5 / Lv 10 三個技能等級對比，方便看升級曲線
  function showAllSkillsCompare() {
    const TEST = { atk: 100, def: 30, maxHp: 500, maxMp: 200, mark: 60, lv: 30 };
    const calcDmg = (skill, level) => {
      const eff = getSkillEffectiveStats(skill, level);
      if (eff.type !== 'damage') return null;
      let baseDmg = 0;
      if (eff.defMult != null) baseDmg = TEST.def * eff.defMult;
      else if (eff.maxHpMult != null) baseDmg = TEST.maxHp * eff.maxHpMult;
      else if (eff.flat != null) {
        baseDmg = eff.flat + (eff.perLv || 0) * TEST.lv;
        if (eff.markMult) baseDmg += TEST.mark * eff.markMult;
      }
      else if (eff.mult != null) baseDmg = (eff.useMark ? TEST.mark : TEST.atk) * eff.mult;
      const hits = Math.max(1, eff.hits || 1);
      const perHitFactor = 1.0; // mult = 每段獨立乘率
      const perHitDmg = Math.max(1, Math.round(baseDmg * perHitFactor));
      const totalDmg = perHitDmg * hits;
      return { perHitDmg, totalDmg, hits };
    };
    const formatTags = (skill) => {
      const tags = [];
      if (skill.alwaysCrit) tags.push('💥 必爆');
      if (skill.magic || skill.flat != null || skill.maxHpMult != null || skill.markMult) tags.push('🔮 魔');
      if (skill.useMark) tags.push(`🌀 MARK`);
      if (skill.markMult) tags.push(`+${skill.markMult}×MARK`);
      if (skill.ignoreDef) tags.push('🛡 無視防');
      if (skill.targetCount === 'all') tags.push('🌐 全體');
      else if (skill.targetCount && skill.targetCount > 1) tags.push(`🎯 ${skill.targetCount} 目標`);
      if (skill.lifesteal) tags.push(`🩸 ${Math.round(skill.lifesteal * 100)}%`);
      if (skill.healCaster) tags.push(`💚 ${Math.round(skill.healCaster * 100)}%`);
      if (skill.mpRestore) tags.push(`💙 +${skill.mpRestore} MP`);
      if (skill.mpRestorePct) tags.push(`💙 +${Math.round(skill.mpRestorePct * 100)}% MP`);
      if (skill.applyStatus) tags.push(`${statusEmoji(skill.applyStatus.type)} ${statusLabel(skill.applyStatus.type)}`);
      if (skill.hpCostFlat) tags.push(`❤️ -${skill.hpCostFlat}`);
      if (skill.hpCost) tags.push(`❤️ -${Math.round(skill.hpCost * 100)}%`);
      if (skill.fixedHitMult) tags.push('📌 段固定');
      return tags.join(' ');
    };
    const buildClassSection = (classId) => {
      const cls = CLASSES[classId];
      if (!cls) return '';
      const damageSkills = (cls.skills || []).filter(s => s.type === 'damage');
      const rows = damageSkills.map(s => {
        const lv0 = calcDmg(s, 0);
        const lv5 = calcDmg(s, 5);
        const lv10 = calcDmg(s, 10);
        const skMax = s.maxLv || 10;
        const lvMaxDmg = (skMax < 10) ? calcDmg(s, skMax) : null;
        const fmt = (d) => d ? `${d.totalDmg.toLocaleString()}${d.hits > 1 ? ` (${d.perHitDmg}×${d.hits})` : ''}` : '-';
        const tags = formatTags(s);
        const cast = getEffectiveCast(s);
        return `<tr style="border-bottom:1px dashed #e5e7eb;">
          <td style="padding:4px 6px; font-weight:600; white-space:nowrap;">${s.icon} ${s.name}</td>
          <td style="padding:4px 6px; font-size:10px; color:#7c3aed; white-space:nowrap;">Lv ${s.unlockLv}　·　MP ${s.mpCost || 0}　·　硬 ${cast}${skMax < 10 ? `　·　max ${skMax}` : ''}</td>
          <td style="padding:4px 6px; text-align:right; color:#9ca3af;">${fmt(lv0)}</td>
          <td style="padding:4px 6px; text-align:right; color:#7c3aed; font-weight:700;">${fmt(lv5)}</td>
          <td style="padding:4px 6px; text-align:right; color:#16a34a; font-weight:700;">${lvMaxDmg ? fmt(lvMaxDmg) + ' (max)' : fmt(lv10)}</td>
          <td style="padding:4px 6px; font-size:10px; color:#6b7280;">${tags}</td>
        </tr>`;
      }).join('');
      return `
        <div style="margin-top:12px;">
          <div style="font-size:13px; font-weight:800; color:#5b21b6; margin-bottom:4px; padding:4px 8px; background:#f3e8ff; border-radius:6px;">${cls.icon} ${cls.name}（${damageSkills.length} 招傷害技）</div>
          <div style="overflow-x:auto;">
            <table style="width:100%; border-collapse:collapse; font-size:11px;">
              <thead>
                <tr style="background:#fef3c7; border-bottom:2px solid #f59e0b;">
                  <th style="padding:4px 6px; text-align:left;">招式</th>
                  <th style="padding:4px 6px; text-align:left;">屬性</th>
                  <th style="padding:4px 6px; text-align:right;">Lv 0</th>
                  <th style="padding:4px 6px; text-align:right;">Lv 5</th>
                  <th style="padding:4px 6px; text-align:right;">Lv 10</th>
                  <th style="padding:4px 6px; text-align:left;">標記</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    };
    const html = `
      <div style="text-align:left; font-size:12px;">
        <div style="font-size:11px; color:#5b3d62; padding:6px 10px; background:#fef3c7; border-radius:8px; margin-bottom:8px; border:1px dashed #f59e0b;">
          📊 標準測試環境：<b>Lv ${TEST.lv}</b> 玩家、<b>ATK ${TEST.atk}</b>、DEF ${TEST.def}、maxHP ${TEST.maxHp}、maxMP ${TEST.maxMp}<br>
          <span style="font-size:10px; color:#92400e;">不算暴擊、不算 buff、不算職業被動加成；單純看技能基底</span>
        </div>
        ${buildClassSection('warrior')}
        ${buildClassSection('archer')}
        ${buildClassSection('mage')}
        ${buildClassSection('paladin')}
        <button class="btn btn-secondary" onclick="hideModal()" style="margin-top:14px; width:100%;">關閉</button>
      </div>
    `;
    showModal('📊 全職業技能傷害比較表', html);
  }
  window.showAllSkillsCompare = showAllSkillsCompare;

  // ⭐ 裝備 modal — 顯示裝備格 + 背包格

  // ⭐ 裝備圖鑑：列出所有可裝備物品，分槽位分頁、標出已擁有
  let __dexTab = 'weapon';
  function getDexOwnedSet() {
    const me = getMe();
    if (!me) return new Set();
    const rpg = getRpg(me);
    const owned = new Set();
    // 背包 + 已裝備 = 擁有過
    (rpg.inventory || []).forEach(entry => {
      const id = typeof entry === 'string' ? entry : entry?.id;
      if (id) owned.add(id);
    });
    Object.values(rpg.equipment || {}).forEach(id => { if (id) owned.add(id); });
    // 也算進已永久收集（dexSeen），把當前擁有的合進 dexSeen 並存檔
    rpg.dexSeen = Array.isArray(rpg.dexSeen) ? rpg.dexSeen : [];
    let changed = false;
    for (const id of owned) {
      if (!rpg.dexSeen.includes(id)) { rpg.dexSeen.push(id); changed = true; }
    }
    rpg.dexSeen.forEach(id => owned.add(id));
    if (changed && typeof saveData === 'function') saveData();
    return owned;
  }
  function buildDexCatalog() {
    // 收集所有可裝備物品（基底 ITEMS + 商店 SHOP_ITEMS + 套裝件）
    const all = [];
    const seen = new Set();
    const push = (it, source) => {
      if (!it || !it.slot || seen.has(it.id)) return;
      seen.add(it.id);
      all.push({ ...it, __source: source });
    };
    ITEMS.forEach(i => push(i, 'drop'));
    SHOP_ITEMS.forEach(i => { if (i.type === 'equipment') push(i, 'shop'); });
    Object.values(SET_PIECES).forEach(p => push(p, 'set'));
    return all;
  }
  function showItemDex() {
    const me = getMe(); if (!me) { showToast('請先進入遊戲'); return; }
    const all = buildDexCatalog();
    const owned = getDexOwnedSet();
    // 槽位順序與標籤
    const SLOTS = [
      { id: 'weapon',    label: '⚔️ 武器' },
      { id: 'armor',     label: '🛡 防具' },
      { id: 'accessory', label: '💎 飾品' },
      { id: 'helmet',    label: '🪖 頭盔' },
      { id: 'gloves',    label: '🧤 手套' },
      { id: 'boots',     label: '🥾 鞋子' },
      { id: 'cape',      label: '🎽 披風' },
      { id: 'guide',     label: '📗 綠茶指南' },
    ];
    if (!SLOTS.find(s => s.id === __dexTab)) __dexTab = 'weapon';
    const totalAll = all.length;
    const totalOwned = all.filter(i => owned.has(i.id)).length;

    // 該分頁的物品（按 lv 升冪 + 名稱）
    const pageItems = all.filter(i => i.slot === __dexTab)
      .sort((a, b) => (a.lv || 0) - (b.lv || 0) || (a.name || '').localeCompare(b.name || ''));
    const pageOwned = pageItems.filter(i => owned.has(i.id)).length;

    const tabsHtml = SLOTS.map(s => {
      const slotItems = all.filter(i => i.slot === s.id);
      const slotOwned = slotItems.filter(i => owned.has(i.id)).length;
      const active = s.id === __dexTab;
      return `<button onclick="setDexTab('${s.id}')" style="padding:5px 9px; border-radius:8px; border:2px solid ${active ? '#7c3aed' : '#e5e7eb'}; background:${active ? '#ede9fe' : '#fff'}; color:${active ? '#5b21b6' : '#6b7280'}; font-size:11px; font-weight:${active ? '700' : '500'}; cursor:pointer; white-space:nowrap;">${s.label} <span style="opacity:0.7; font-size:10px;">${slotOwned}/${slotItems.length}</span></button>`;
    }).join('');

    const itemsHtml = pageItems.length === 0
      ? '<div style="text-align:center; color:#9ca3af; padding:20px; font-size:12px;">— 此槽位尚無物品 —</div>'
      : pageItems.map(i => {
          const has = owned.has(i.id);
          const rarColor = i.rarity ? RARITY[i.rarity]?.color
            : i.setId ? (SETS[i.setId]?.color || '#f59e0b')
            : '#9ca3af';
          const sourceLabel = i.__source === 'shop' ? '🛒 商店'
            : i.__source === 'set' ? `🛡 ${SETS[i.setId]?.name || '套裝'}`
            : '⚔️ 掉落';
          // 即便未取得也顯示完整能力，只是用灰底 + 「未取得」標記
          return `<div style="display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:8px; border:1px solid ${has ? rarColor : '#e5e7eb'}; background:${has ? `linear-gradient(135deg,#fff,${rarColor}1a)` : '#f9fafb'}; margin-bottom:5px;">
            <div style="font-size:24px; line-height:1; ${has ? '' : 'filter:grayscale(0.7); opacity:0.55;'}">${i.icon}</div>
            <div style="flex:1; min-width:0;">
              <div style="font-size:12px; font-weight:700; color:${has ? rarColor : '#9ca3af'}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(i.name)}</div>
              <div style="font-size:10px; color:${has ? '#8b6f9b' : '#9ca3af'}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                ${i.lv ? `Lv ${i.lv} · ` : ''}${formatItemStats(i) || '無屬性'}
              </div>
              <div style="font-size:9px; color:#9ca3af; margin-top:1px;">${sourceLabel}${i.cost ? ` · 🪙${i.cost}` : ''}</div>
            </div>
            ${has
              ? '<div style="font-size:10px; color:#16a34a; font-weight:700;">✓</div>'
              : '<div style="font-size:9px; color:#9ca3af; font-weight:600; padding:2px 5px; border:1px dashed #d1d5db; border-radius:4px;">未取得</div>'}
          </div>`;
        }).join('');

    const html = `
      <div style="text-align:left;">
        <div style="font-size:12px; color:#5b3d62; padding:8px 10px; background:linear-gradient(135deg,#ede9fe,#ddd6fe); border-radius:8px; margin-bottom:10px; border:2px dashed #a78bfa;">
          📖 共收集 <b style="color:#7c3aed; font-size:14px;">${totalOwned} / ${totalAll}</b> 件裝備　·　當前頁 ${pageOwned}/${pageItems.length}
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:10px;">
          ${tabsHtml}
        </div>
        <div style="max-height:50vh; overflow-y:auto; padding-right:4px;">
          ${itemsHtml}
        </div>
        <button class="btn btn-secondary" onclick="hideModal()" style="margin-top:10px;">關閉</button>
      </div>
    `;
    showModal('📖 裝備圖鑑', html);
  }
  window.showItemDex = showItemDex;
  function setDexTab(slot) { __dexTab = slot; showItemDex(); }
  window.setDexTab = setDexTab;

  // 用 modal 開行動規則編輯器（規則改完即時存）
  function showActionPatternModal() {
    const me = getMe();
    if (!me) return;
    const html = `
      <div id="actionPatternBody"></div>
      <button class="btn btn-secondary" onclick="hideModal()" style="margin-top:10px;">關閉</button>
    `;

  window.showActionPatternModal = showActionPatternModal;

  // ⭐ HOF 行動規則編輯器
  function renderActionPattern() {
    const me = getMe();
    if (!me) return;
    const rpg = getRpg(me);
    const host = document.getElementById('actionPatternBody');
    if (!host) return;
    if (!rpg.class) {
      host.innerHTML = '<div style="font-size:12px; color:#8b6f9b; padding:8px; text-align:center;">先選職業 ♡</div>';
      return;
    }
    const cls = CLASSES[rpg.class];
    const skills = cls.skills || [];
    const pattern = (rpg.actionPattern && rpg.actionPattern.length)
      ? rpg.actionPattern
      : getDefaultActionPattern(rpg.class);

    // 技能 dropdown 選項：basic + 各職業技能
    const skillOptions = (selectedId) => {
      let opts = `<option value="basic" ${selectedId === 'basic' ? 'selected' : ''}>${cls.attackVerb || '普攻'}（普攻）</option>`;
      for (const s of skills) {
        const locked = (s.unlockLv || 1) > (rpg.level || 1);
        opts += `<option value="${s.id}" ${selectedId === s.id ? 'selected' : ''} ${locked ? 'disabled' : ''}>${s.icon} ${s.name}${locked ? ` (Lv ${s.unlockLv} 解鎖)` : ''}</option>`;
      }
      return opts;
    };
    // judge dropdown 選項
    const judgeOptions = (selectedId) => {
      return Object.values(JUDGES).map(j =>
        `<option value="${j.id}" ${selectedId === j.id ? 'selected' : ''}>${j.label}</option>`
      ).join('');
    };

    const rows = pattern.map((rule, i) => {
      const judge = JUDGES[rule.judgeId];
      const showParam = judge && judge.paramType !== 'none';
      const paramSuffix = judge && judge.paramType === 'percent' ? '%'
        : judge && judge.paramType === 'count' ? '次' : '';
      return `
        <div class="ap-row">
          <span class="ap-num">#${i + 1}</span>
          <select class="ap-judge" onchange="updateActionRule(${i}, 'judgeId', this.value)">${judgeOptions(rule.judgeId)}</select>
          ${showParam
            ? `<input class="ap-param" type="number" value="${rule.param}" onchange="updateActionRule(${i}, 'param', this.value)">${paramSuffix ? `<span class="ap-suffix">${paramSuffix}</span>` : ''}`
            : `<span class="ap-param-na">—</span>`}
          <span class="ap-arrow">→</span>
          <select class="ap-skill" onchange="updateActionRule(${i}, 'skillId', this.value)">${skillOptions(rule.skillId)}</select>
          <button class="ap-btn-icon" onclick="moveActionRule(${i}, -1)" ${i === 0 ? 'disabled' : ''} title="上移">↑</button>
          <button class="ap-btn-icon" onclick="moveActionRule(${i}, 1)" ${i === pattern.length - 1 ? 'disabled' : ''} title="下移">↓</button>
          <button class="ap-btn-icon ap-btn-del" onclick="deleteActionRule(${i})" title="刪除">✕</button>
        </div>
      `;
    }).join('');

    host.innerHTML = `
      <div style="font-size:11px; color:#8b6f9b; padding:6px 10px; background:#fffaf0; border-radius:8px; margin-bottom:8px; border:1px dashed #fbbf24;">
        💡 從上到下檢查，第一條 <b>條件成立</b> 且 <b>技能可用</b>（MP/CD/等級）的就執行；都不成立會自動普攻。
      </div>
      <div class="ap-list">${rows}</div>
      <div class="ap-controls">
        <button class="btn btn-primary ap-add" onclick="addActionRule()">+ 加一條規則</button>
        <button class="btn btn-secondary ap-reset" onclick="resetActionPattern()">↺ 重置為預設</button>
      </div>
    `;
  }
  window.renderActionPattern = renderActionPattern;

  function updateActionRule(idx, field, value) {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.actionPattern || !rpg.actionPattern[idx]) return;
    const r = rpg.actionPattern[idx];
    if (field === 'judgeId') r.judgeId = Number(value) || 1000;
    else if (field === 'param') r.param = Math.max(0, Number(value) || 0);
    else if (field === 'skillId') r.skillId = String(value);
    saveData();
    renderActionPattern();
  }
  window.updateActionRule = updateActionRule;

  function addActionRule() {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    rpg.actionPattern = rpg.actionPattern || [];
    rpg.actionPattern.push({ judgeId: 1000, param: 0, skillId: 'basic' });
    saveData();
    renderActionPattern();
  }
  window.addActionRule = addActionRule;

  function deleteActionRule(idx) {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.actionPattern) return;
    rpg.actionPattern.splice(idx, 1);
    if (rpg.actionPattern.length === 0) {
      // 空表退回預設，否則戰鬥沒招
      rpg.actionPattern = getDefaultActionPattern(rpg.class);
    }
    saveData();
    renderActionPattern();
  }
  window.deleteActionRule = deleteActionRule;

  function moveActionRule(idx, delta) {
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    if (!rpg.actionPattern) return;
    const j = idx + delta;
    if (j < 0 || j >= rpg.actionPattern.length) return;
    const tmp = rpg.actionPattern[idx];
    rpg.actionPattern[idx] = rpg.actionPattern[j];
    rpg.actionPattern[j] = tmp;
    saveData();
    renderActionPattern();
  }
  window.moveActionRule = moveActionRule;

  function resetActionPattern() {
    if (!confirm('確定重置為預設規則表？目前的設定會清掉。')) return;
    const me = getMe(); if (!me) return;
    const rpg = getRpg(me);
    rpg.actionPattern = getDefaultActionPattern(rpg.class);
    saveData();
    renderActionPattern();
  }

  // ⭐ 物品 hover tooltip 文字（用 title 屬性，瀏覽器原生顯示）
  function buildItemTooltipText(item) {
    if (!item) return '';
    const lines = [];
    const rarLabel = item.rarity ? RARITY[item.rarity]?.label : (item.setId ? '套裝' : '');
    lines.push(`${item.icon} ${item.name}${rarLabel ? `  [${rarLabel}]` : ''}${item.lv ? `  Lv ${item.lv}` : ''}`);
    const stats = formatItemStats(item);
    if (stats) lines.push(stats);
    if (item.affixes && item.affixes.length) {
      item.affixes.forEach(a => lines.push(`+${a.val} ${a.type.toUpperCase()}（${a.name}）`));
    }
    // ⭐ 鵝王恩賜固定詞條
    if (item.affixDesc) lines.push(`✦ ${item.affixDesc}`);
    if (item.setId && SETS[item.setId]) {
      const set = SETS[item.setId];
      lines.push('');
      lines.push(`🛡 套裝：${set.name}`);
      set.tiers.forEach(t => lines.push(`  ${t.req} 件：${t.desc}`));
    }
    if (item.gachaOnly) lines.push('🎰 扭蛋限定');
    if (item.isBossCoin) lines.push(`🏆 王硬幣 ×${item.qty || 1}`);
    return lines.join('\n');
  }

  function formatSkillDesc(s) {
    if (s.type === 'heal') {
      const parts = [];
      if (s.healPct) parts.push(`回 ${Math.round(s.healPct * 100)}% HP`);
      // ⭐ 回魔技：mpFlat 跟 mpPct 一起顯示（基底 5 MP + 5% maxMP，每級 +1 / Lv 5,10 各 +5% maxMP）
      if (s.isMpRegen) {
        parts.push(`回 ${s.mpFlat || 5} MP + ${Math.round((s.mpPct || 0.05) * 100)}% maxMP`);
      } else if (s.mpFlat) {
        parts.push(`回 ${s.mpFlat} MP`);
      } else if (s.mpPct) {
        parts.push(`回 ${Math.round(s.mpPct * 100)}% maxMP`);
      }
      return parts.join(' + ') || '輔助';
    }
    if (s.type === 'buff' && s.selfBuff) {
      const buff2Str = s.selfBuff2 ? ` / ${describeBuff(s.selfBuff2)}` : '';
      const buff3Str = s.selfBuff3 ? ` / ${describeBuff(s.selfBuff3)}` : '';
      const buffStr = `${describeBuff(s.selfBuff)}${buff2Str}${buff3Str}　持續 ${s.selfBuff.turns} 回合`;
      const shieldStr = s.applyShield ? `　+　🛡 免疫一次傷害` : '';
      const bonusHealStr = s.bonusHealPct ? `　+　💚 即時回血 ${Math.round(s.bonusHealPct * 100)}% maxHp` : '';
      const partialShieldStr = s.applyPartialShield ? `　+　🛡 受傷 -${Math.round(s.applyPartialShield.reducePct * 100)}%（${s.applyPartialShield.hits} 次）` : '';
      return buffStr + shieldStr + bonusHealStr + partialShieldStr;
    }
    if (s.type === 'buff' && s.applyPartialShield) {
      const shieldStr = `🛡 受傷 -${Math.round(s.applyPartialShield.reducePct * 100)}%（${s.applyPartialShield.hits} 次）`;
      const bonusHealStr = s.bonusHealPct ? `　+　💚 即時回血 ${Math.round(s.bonusHealPct * 100)}% maxHp` : '';
      return shieldStr + bonusHealStr;
    }
    const hitsStr = (s.hits && s.hits > 1) ? ` ×${s.hits} 段` : '';
    if (s.defMult != null)   return `${s.defMult}× DEF 傷害${hitsStr}`;
    if (s.maxHpMult != null) return `${Math.round(s.maxHpMult * 100)}% maxHP 傷害（魔攻）${hitsStr}`;
    if (s.flat != null) {
      const flatParts = [];
      const flatStr = s.perLv ? `固定 ${s.flat}+Lv×${s.perLv} 傷害` : `固定 ${s.flat} 傷害`;
      flatParts.push(flatStr + (s.ignoreDef ? '（無視防）' : '') + hitsStr);
      if (s.markMult) flatParts.push(`+ ${s.markMult}× MARK`);
      return flatParts.join(' ');
    }
    let parts = [];
    if (s.mult) parts.push(`${s.mult}× ${s.useMark ? (s.magic ? 'MARK（魔攻）' : 'MARK（物理）') : (s.magic ? 'ATK（魔攻）' : 'ATK')}${hitsStr}`);
    if (s.bonusMaxHpPct) parts.push(`+ ${Math.round(s.bonusMaxHpPct * 100)}% maxHp 傷害`);
    if (s.alwaysCrit) parts.push('必中暴擊');
    if (s.lifesteal) parts.push(`吸血 ${Math.round(s.lifesteal * 100)}%`);
    if (s.healCaster) parts.push(`回 ${Math.round(s.healCaster * 100)}% maxHP`);
    if (s.targetCount === 'all') parts.push('打全體');
    else if (s.targetCount && s.targetCount > 1) parts.push(`${s.targetCount} 目標`);
    return parts.join(' + ');
  }
  function formatSkillCost(s) {
    const parts = [];
    if (s.mpCost && s.mpCost > 0) parts.push(`<span style="color:#3b82f6;">${s.mpCost} MP</span>`);
    if (s.hpCost)     parts.push(`<span style="color:#dc2626;">${Math.round(s.hpCost * 100)}% HP</span>`);
    if (s.hpCostFlat) parts.push(`<span style="color:#dc2626;">${s.hpCostFlat} HP</span>`);
    if (parts.length === 0) parts.push('<span style="color:#16a34a;">免費</span>');
    return parts.join(' + ');
  }

  function learnSkill(nodeId) {
    const me = getMe(); if (!me) return;
    const r = getRpg(me);
    const cls = CLASSES[r.class];
    if (!cls || !cls.skillTree) return;
    const node = cls.skillTree.find(n => n.id === nodeId);
    if (!node) return;
    if ((r.skillPoints || 0) < 1) { showToast('沒有可用技能點'); return; }
    const cur = (r.skills || {})[nodeId] || 0;
    if (cur >= node.maxLevel) { showToast('已達最高等'); return; }
    r.skills = r.skills || {};
    r.skills[nodeId] = cur + 1;
    r.skillPoints -= 1;
    // 強化 maxHp/maxMp 後當前 HP/MP 不變但上限變大 → 補滿（避免上限變了 HP 顯示比例怪）
    const s = computeStats(me);
    if (r.hp > s.maxHp) r.hp = s.maxHp;
    if (r.mp > s.maxMp) r.mp = s.maxMp;
    saveData();
    renderCharCard();
    renderCharQuickMenu();
    // 如果技能 modal 開著就重整；否則 no-op
    const modalEl = document.getElementById('genericModal');
    if (modalEl && !modalEl.classList.contains('hidden')) {
      showSkillsModal();
    }
    showToast(`✨ ${node.name} → Lv ${cur + 1}`);
  }
  window.learnSkill = learnSkill;

          <div class="si-name">${escapeHtml(it.name)}</div>
          <div class="si-desc">${stats}</div>
          ${it.type === 'equipment' ? `<div class="si-lv">${tooLow ? '🔒 ' : ''}需求 Lv ${it.lv}</div>` : ''}
          <div class="si-cost">🪙 ${it.cost}</div>
        </button>
      `;

    const tabHtml = TABS.map(t => `
      <button class="shop-tab ${t.id === __shopTab ? 'active' : ''}" onclick="setShopTab('${t.id}')">${t.label}</button>
    `).join('');

    // 體力藥限購狀態提示（只在消耗品分頁顯示）
    let stamLimitNote = '';
    if (active.id === 'consumable') {
      if (STAM_POT_UNLIMITED) {
        stamLimitNote = `<div style="font-size:11px; color:#15803d; padding:6px 10px; background:#dcfce7; border-radius:8px; margin-bottom:6px; border:1px dashed #16a34a;">🧪 封測期間：體力藥<b>無限制購買</b>（之後會恢復每 20 分鐘 ${STAM_POT_HOURLY_LIMIT} 瓶）</div>`;
      } else {
        const rpg = getRpg(me);
        const st = getStamPotState(rpg);
        const used = STAM_POT_HOURLY_LIMIT - st.remaining;
        if (st.remaining > 0) {
          let extra = '';
          if (used > 0 && rpg.stamPotPurchases && rpg.stamPotPurchases.length > 0) {
            const minLeft = Math.ceil((STAM_POT_WINDOW_MS - (Date.now() - rpg.stamPotPurchases[0])) / 60000);
            extra = `（${minLeft} 分鐘後第 1 瓶過期）`;
          }
          stamLimitNote = `<div style="font-size:11px; color:#8b6f9b; padding:6px 10px; background:#fef3c7; border-radius:8px; margin-bottom:6px; border:1px dashed #f59e0b;">🧪 體力藥近 20 分鐘已購 <b>${used}/${STAM_POT_HOURLY_LIMIT}</b>${extra}</div>`;
        } else {
          const m = Math.ceil(st.nextRefillMs / 60000);
          stamLimitNote = `<div style="font-size:11px; color:#dc2626; padding:6px 10px; background:#fee2e2; border-radius:8px; margin-bottom:6px; border:1px dashed #f87171;">🚫 體力藥已達 20 分鐘上限 ${STAM_POT_HOURLY_LIMIT} 瓶（${m} 分鐘後可再買）</div>`;
        }
      }
    }

    document.getElementById('shopGrid').innerHTML = `
      <div class="shop-tabs">${tabHtml}</div>
      ${stamLimitNote}
      <div class="shop-grid">${list.map(itemBtn).join('')}</div>
    `;

  function setShopTab(id) { __shopTab = id; renderShop(); }
  window.setShopTab = setShopTab;

  // 體力藥每小時限購 5 瓶（避免「打工 → 買體力 → 打工」無限 loop）
  // 體力藥每小時限購 5 瓶（封測期已結束）
  const STAM_POT_UNLIMITED = false;
  const STAM_POT_HOURLY_LIMIT = 3;             // ⭐ 每 20 分鐘最多 3 瓶
  const STAM_POT_WINDOW_MS = 20 * 60 * 1000;   // 20 分鐘視窗
  function getStamPotState(rpg) {
    const now = Date.now();
    const list = (rpg.stamPotPurchases || []).filter(t => now - t < STAM_POT_WINDOW_MS);
    rpg.stamPotPurchases = list;
    return {
      count: list.length,
      remaining: Math.max(0, STAM_POT_HOURLY_LIMIT - list.length),
      // 最早一瓶過期的時間（即下一次可以再多買的時間點）
      nextRefillMs: list.length >= STAM_POT_HOURLY_LIMIT ? STAM_POT_WINDOW_MS - (now - list[0]) : 0,
    };
  }

  function buyShop(itemId) {
    const me = getMe();
    if (!me) return;
    const it = SHOP_ITEMS.find(x => x.id === itemId);
    if (!it) return;
    if (getCoins(me.id) < it.cost) { showToast('幣不夠 ♡'); return; }
    // 體力藥限購檢查（封測期間 STAM_POT_UNLIMITED = true → 跳過）
    if (!STAM_POT_UNLIMITED && itemId.startsWith('pot_stam_')) {
      const rpg = getRpg(me);
      const st = getStamPotState(rpg);
      if (st.remaining <= 0) {
        const m = Math.ceil(st.nextRefillMs / 60000);
        showToast(`🚫 體力藥每小時限購 ${STAM_POT_HOURLY_LIMIT} 瓶（${m} 分鐘後可再買）`);
        return;
      }
    }
    // 跳出確認 modal
    openBuyConfirm(it);
  }
  window.buyShop = buyShop;

  function openBuyConfirm(it) {
    const me = getMe();
    const myCoins = getCoins(me.id);
    const after = myCoins - it.cost;
    const stats = it.type === 'equipment'
      ? `<div style="margin-top:6px; font-size:12px; color:#8b6f9b;">需求 Lv ${it.lv}　·　${['atk','def','spd','hp'].filter(k=>it[k]).map(k=>`${k.toUpperCase()}+${it[k]}`).join(' / ')}</div>`
      : `<div style="margin-top:6px; font-size:12px; color:#8b6f9b;">${escapeHtml(it.desc || '')}</div>`;
    const html = `
      <div style="text-align:center; padding:8px 0;">
        <div style="font-size:64px; margin-bottom:4px;">${it.icon}</div>
        <div style="font-weight:700; font-size:16px; color:#7c3aed;">${escapeHtml(it.name)}</div>
        ${stats}
        <div style="margin-top:14px; font-size:13px;">
          🪙 <b>${myCoins}</b> → 購入後剩 <b style="color:#d97706;">${after}</b>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px;">
          <button class="btn btn-secondary" onclick="closeBuyConfirm()" style="margin-top:0;">取消</button>
          <button class="btn btn-primary" onclick="doBuyShop('${it.id}')">確認購入（🪙 ${it.cost}）</button>
        </div>
      </div>
    `;
    showModal(`🛒 確認購入`, html);
  }
  function closeBuyConfirm() { hideModal(); }
  window.closeBuyConfirm = closeBuyConfirm;

  function doBuyShop(itemId) {
    const me = getMe();
    if (!me) return;
    const it = SHOP_ITEMS.find(x => x.id === itemId);
    if (!it) return;
    // 體力藥限購防呆（封測期間 STAM_POT_UNLIMITED = true → 跳過）
    if (!STAM_POT_UNLIMITED && itemId.startsWith('pot_stam_')) {
      const rpgCheck = getRpg(me);
      const st = getStamPotState(rpgCheck);
      if (st.remaining <= 0) {
        const m = Math.ceil(st.nextRefillMs / 60000);
        showToast(`🚫 體力藥每小時限購 ${STAM_POT_HOURLY_LIMIT} 瓶（${m} 分鐘後可再買）`);
        hideModal();
        return;
      }
    }
    if (!spendCoins(me.id, it.cost)) { showToast('幣不夠 ♡'); hideModal(); return; }
    const rpg = getRpg(me);
    // 記錄體力藥購買時間
    if (itemId.startsWith('pot_stam_')) {
      rpg.stamPotPurchases = rpg.stamPotPurchases || [];
      rpg.stamPotPurchases.push(Date.now());
    }
    if (it.type === 'consumable') {
      tickRecovery(me);
      const stats = computeStats(me);
      let msg = '';
      if (it.effect.revive) {
        rpg.hp = Math.max(1, Math.floor(stats.maxHp * 0.5));
        rpg.deathAt = null;
        msg = `💊 復活！HP 恢復 50%`;
      }
      if (it.effect.stamina) {
        rpg.stamina = Math.min(STAMINA_MAX, (rpg.stamina || 0) + it.effect.stamina);
        msg = `⚡ +${it.effect.stamina} 體力`;
      }
      if (it.effect.xp) {
        rpg.xp = (rpg.xp || 0) + it.effect.xp;
        let leveled = 0;
        while (rpg.xp >= xpForLevel(rpg.level)) {
          rpg.xp -= xpForLevel(rpg.level);
          rpg.level += 1;
          rpg.skillPoints = (rpg.skillPoints || 0) + POINTS_PER_LEVEL.skill;
          rpg.abilityPoints = (rpg.abilityPoints || 0) + POINTS_PER_LEVEL.ability;
          leveled++;
          if (rpg.level > 50) break;
        }
        if (leveled) {
          const s2 = computeStats(me);
          rpg.hp = s2.maxHp;
          rpg.mp = s2.maxMp;
          rpg.deathAt = null;
          showLevelUp(rpg.level);
        }
        msg = `⭐ +${it.effect.xp} XP${leveled ? `，升 ${leveled} 級 +${leveled * POINTS_PER_LEVEL.skill} 技能 +${leveled * POINTS_PER_LEVEL.ability} 能力點` : ''}`;
      }
      showToast(`✨ 使用 ${it.icon} ${it.name}：${msg}`);
    } else if (it.type === 'equipment') {
      rpg.inventory.push(it.id);
      showToast(`🛒 購入 ${it.icon} ${it.name}`);
    }
    saveData();
    hideModal();
    renderCharCard();
    renderEquipment();
    renderShop();
  }
  window.doBuyShop = doBuyShop;
