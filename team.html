<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛡️ 隊伍冒險島</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 12px;
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    color: #5b3d62;
    min-height: 100vh;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: linear-gradient(135deg,#fde047,#f59e0b);
    border-radius: 14px; color: #7c2d12; box-shadow: 0 3px 0 #d97706;
    margin-bottom: 12px;
  }
  header h1 { margin: 0; font-size: 18px; }
  .back-btn {
    background: rgba(255,255,255,0.6); border: none; border-radius: 10px;
    padding: 6px 12px; cursor: pointer; font-family: inherit;
    color: #7c2d12; font-weight: 700; font-size: 12px;
  }
  .card {
    background: #fff; border-radius: 14px; padding: 12px; margin-bottom: 12px;
    border: 2px solid #fde68a; box-shadow: 0 3px 0 #fde68a;
  }
  .card h2 {
    margin: 0 0 10px; font-size: 15px; color: #92400e;
    border-bottom: 2px dashed #fbbf24; padding-bottom: 6px;
  }
  .btn {
    border: none; border-radius: 10px; padding: 9px 14px; font-family: inherit;
    font-weight: 700; cursor: pointer; transition: transform 0.1s;
  }
  .btn:active { transform: translateY(2px); }
  .btn-primary { background: linear-gradient(135deg,#fde047,#f59e0b); color: #7c2d12; box-shadow: 0 3px 0 #b45309; }
  .btn-secondary { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
  .btn-danger { background: linear-gradient(135deg,#fca5a5,#dc2626); color: #fff; box-shadow: 0 3px 0 #991b1b; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .login-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
    display: flex; align-items: center; justify-content: center;
  }
  .login-overlay.hidden { display: none; }
  .login-box {
    background: #fff; border-radius: 14px; padding: 22px;
    width: min(360px, 92%);
  }

  .tabs {
    display: flex; gap: 4px; padding: 4px;
    background: #fff8e6; border-radius: 12px; margin-bottom: 12px;
  }
  .tab-btn {
    flex: 1; padding: 8px 6px; background: transparent; border: none;
    border-radius: 9px; font-family: inherit; cursor: pointer;
    font-weight: 700; font-size: 13px; color: #92400e;
  }
  .tab-btn.active { background: linear-gradient(135deg,#fde047,#f59e0b); color: #7c2d12; }

  .class-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .class-card {
    background: linear-gradient(135deg,#fffbeb,#fef3c7);
    border: 2px solid #fcd34d; border-radius: 12px; padding: 12px;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
    text-align: left;
  }
  .class-card:hover { transform: translateY(-2px); box-shadow: 0 4px 0 #f59e0b; }
  .class-card.selected { background: linear-gradient(135deg,#fef3c7,#fde047); border-color: #f59e0b; }
  .class-card .cc-icon { font-size: 32px; }
  .class-card .cc-name { font-weight: 700; color: #7c2d12; font-size: 14px; }
  .class-card .cc-role { font-size: 10px; color: #92400e; margin-top: 2px; }
  .class-card .cc-stats {
    font-size: 10px; background: #fff; border-radius: 6px; padding: 4px 6px;
    margin-top: 6px; line-height: 1.4; color: #6b3a1a;
  }

  .hero-row {
    display: flex; align-items: center; gap: 10px; padding: 10px;
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px;
    margin-bottom: 6px; cursor: pointer; transition: all 0.1s;
  }
  .hero-row:hover { background: #fef3c7; transform: translateX(2px); }
  .hero-row.selected { background: linear-gradient(135deg,#fef3c7,#fde047); border-color: #f59e0b; box-shadow: 0 2px 0 #f59e0b; }
  .hero-icon { font-size: 30px; }
  .hero-meta { flex: 1; }
  .hero-name { font-weight: 700; color: #7c2d12; font-size: 13px; }
  .hero-sub { font-size: 10px; color: #92400e; }
  .hero-row .hero-actions { display: flex; gap: 4px; }

  .stat-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    margin-top: 8px;
  }
  .stat-cell {
    background: #fff8e6; border: 1px solid #fcd34d; border-radius: 8px;
    text-align: center; padding: 6px;
  }
  .stat-cell .sc-key { font-size: 10px; color: #92400e; font-weight: 700; }
  .stat-cell .sc-val { font-size: 14px; color: #7c2d12; font-weight: 700; margin-top: 2px; }
  .stat-cell .sc-grow { font-size: 9px; color: #c2410c; }

  .skill-list { display: flex; flex-direction: column; gap: 5px; }
  .skill-row {
    display: flex; align-items: center; gap: 8px; padding: 7px 9px;
    background: #fff8e6; border: 1px solid #fde68a; border-radius: 8px;
  }
  .skill-row.locked { opacity: 0.45; }
  .skill-icon { font-size: 22px; }
  .skill-meta { flex: 1; min-width: 0; }
  .skill-name { font-weight: 700; color: #7c2d12; font-size: 12px; }
  .skill-desc { font-size: 10px; color: #8b6f9b; line-height: 1.3; }
  .skill-tags { font-size: 9px; color: #6b3a1a; }

  .pattern-row {
    display: grid; grid-template-columns: auto 1fr 1fr auto; gap: 5px;
    align-items: center; padding: 6px 8px;
    background: #fff8e6; border: 1px solid #fde68a; border-radius: 8px;
    margin-bottom: 4px; font-size: 12px;
  }
  .pattern-row select, .pattern-row input {
    padding: 4px 6px; border: 1px solid #fcd34d; border-radius: 6px;
    background: #fff; font-family: inherit; font-size: 11px;
  }
  .pattern-row .pr-num { font-weight: 700; color: #b45309; min-width: 20px; }
  .pattern-row .pr-x { background: transparent; border: none; cursor: pointer; color: #dc2626; font-weight: 700; font-size: 14px; }

  /* Battle */
  .battle-zone {
    background: linear-gradient(135deg,#1e1b4b,#4c1d95);
    color: #fff; border-radius: 12px; padding: 12px; margin-bottom: 10px;
  }
  .battle-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .combatant-card {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px; padding: 6px 8px; min-width: 100px;
  }
  .combatant-card.dead { opacity: 0.35; }
  .combatant-card.player { border-color: #fde047; }
  .combatant-card.front { background: rgba(252, 165, 165, 0.15); }
  .combatant-card.back { background: rgba(196, 181, 253, 0.10); }
  .cc-name { font-size: 11px; font-weight: 700; }
  .cc-bar {
    height: 4px; background: rgba(0,0,0,0.4); border-radius: 2px; overflow: hidden;
    margin-top: 3px;
  }
  .cc-bar-fill { height: 100%; background: linear-gradient(90deg,#fca5a5,#dc2626); transition: width 0.3s; }
  .cc-bar-fill.sp { background: linear-gradient(90deg,#93c5fd,#3b82f6); }
  .cc-bar-fill.atb { background: linear-gradient(90deg,#fde68a,#f59e0b); }
  .cc-text { font-size: 9px; opacity: 0.85; margin-top: 1px; }

  .log-line {
    padding: 4px 6px; border-radius: 6px; font-size: 12px; margin-bottom: 2px;
    line-height: 1.4;
  }
  .log-system { background: #f3e8ff; color: #5b21b6; }
  .log-player  { background: #dcfce7; color: #15803d; }
  .log-enemy   { background: #fee2e2; color: #991b1b; }
  .log-cast    { background: #fef3c7; color: #92400e; font-style: italic; }
  .log-crit    { background: #fde047; color: #7c2d12; font-weight: 700; }
  .log-status  { background: #fce7f3; color: #9f1239; }
  .log-heal    { background: #dbeafe; color: #1e40af; }
  .log-gauge   { font-size: 10px; opacity: 0.65; margin-left: 4px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #7c2d12; color: #fff; padding: 8px 14px; border-radius: 18px;
    font-size: 13px; opacity: 0; transition: opacity 0.2s; z-index: 200;
  }
  .toast.show { opacity: 1; }

  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 90;
    display: flex; align-items: center; justify-content: center; padding: 12px;
  }
  .modal.hidden { display: none; }
  .modal-content {
    background: #fff; border-radius: 14px; padding: 16px;
    width: min(560px, 100%); max-height: 90vh; overflow-y: auto;
  }

  .stub-banner {
    background: linear-gradient(135deg,#ede9fe,#ddd6fe); color: #5b21b6;
    padding: 10px 12px; border-radius: 10px; border: 1px dashed #a78bfa;
    font-size: 11px; line-height: 1.6;
  }
</style>
</head>
<body>

<div id="loginOverlay" class="login-overlay hidden">
  <div class="login-box">
    <h2>🔐 隊伍冒險島</h2>
    <div style="font-size:13px; color:#92400e; margin-bottom:10px;">
      請先到主頁完成密碼驗證，再回來這邊。
    </div>
    <button class="btn btn-primary" onclick="location.href='index.html'" style="width:100%;">回主頁</button>
  </div>
</div>

<div class="wrap" id="mainWrap">
  <header>
    <button class="back-btn" onclick="location.href='index.html'">← 主頁</button>
    <h1>🛡️ 隊伍冒險島</h1>
    <div id="meTag" style="font-size:13px;"></div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="heroes">👥 英雄</button>
    <button class="tab-btn" data-tab="dungeons">🏰 副本</button>
  </div>

  <div id="tabContent"></div>
</div>

<div class="toast" id="toast"></div>
<div id="modalRoot"></div>

<script>
(() => {
  'use strict';

  // ============================================================
  // 共用 keys（跟 index.html 對齊）
  // ============================================================
  const STORAGE_KEY = 'mahjong-tracker-v2';
  const ME_KEY = 'mahjong-me-id';
  const PASS_KEY = 'mahjong-pass-ok';

  // ============================================================
  // 八能力屬性系統
  // ============================================================
  const STATS = {

    SP:  { full: 'Skill Points',   desc: '技能消耗（非 MP）' },

    INT: { full: 'Intelligence',   desc: '魔法攻擊力' },
    DEX: { full: 'Dexterity',      desc: '命中、暴擊、弓系傷害' },
    SPD: { full: 'Speed',          desc: '行動順序、迴避率' },
    VIT: { full: 'Vitality',       desc: 'HP 成長、物理防禦' },
    LUK: { full: 'Luck',           desc: '暴擊機率、運氣判定' },
  };
  const STAT_KEYS = ['HP','SP','STR','INT','DEX','SPD','VIT','LUK'];
  const POINTS_PER_LEVEL_TEAM = { ability: 5, skill: 2 };
  const LEVEL_MAX = 50;
  const ABILITY_CAP = 250;

  // ============================================================
  // 4 個一轉職業
  // ============================================================
  const CLASSES = [
    {
      id: 'warrior', name: '鵝戰士', icon: '⚔️', role: '前排・物理坦', position: 'front',
      desc: '近戰肉搏，可裝盾。HP 高、SP 偏低，靠 STR + VIT 推進。',
      base: { HP: 300, SP: 50, STR: 10, INT: 2, DEX: 4, SPD: 4, VIT: 8, LUK: 1 },
      coef: { hpPerVit: 3.0, spPerInt: 0.5, atkPerStr: 1.0, defPerVit: 0.6 },
      equipTypes: ['sword1h','sword2h','shield','heavyArmor','clothArmor','robe','misc'],
    },
    {
      id: 'sorcerer', name: '鵝法師', icon: '🪄', role: '後排・魔法輸出', position: 'back',
      desc: '遠程魔法輸出，HP 低、SP 充足，主屬性 INT。',

    {
      id: 'priest', name: '鵝牧師', icon: '✨', role: '後排・治療輔助', position: 'back',

      base: { HP: 200, SP: 80, STR: 3, INT: 8, DEX: 5, SPD: 4, VIT: 4, LUK: 1 },
      coef: { hpPerVit: 2.0, spPerInt: 1.0, atkPerStr: 0.8, defPerVit: 0.5, magAtkPerInt: 1.0 },
      equipTypes: ['shortStaff','tome','clothArmor','robe','misc'],
    },
    {
      id: 'hunter', name: '鵝獵人', icon: '🏹', role: '後排・遠程物理', position: 'back',
      desc: '遠程物理輸出，DEX/SPD 並重，迴避型。',
      base: { HP: 250, SP: 60, STR: 2, INT: 2, DEX: 10, SPD: 6, VIT: 4, LUK: 1 },
      coef: { hpPerVit: 2.2, spPerInt: 0.8, atkPerStr: 1.0, atkPerDex: 0.8, defPerVit: 0.4 },
      equipTypes: ['bow','clothArmor','robe','misc'],

  ];
  const CLASS_BY_ID = Object.fromEntries(CLASSES.map(c => [c.id, c]));

  // ============================================================
  // 技能（原創命名 + 自己平衡的數值）
  // 欄位：
  //   id / class / name / icon
  //   kind: 'phys' | 'mag' | 'heal' | 'buff' | 'debuff'
  //   sp:   消耗
  //   pow:  威力倍率（100 = 1.0×，傷害技 = atk 倍率，治療技 = 數值 base）
  //   target: 'enemy_single' / 'enemy_multi' / 'enemy_all'
  //           'ally_single' / 'ally_multi' / 'ally_all' / 'self'
  //   hits:  攻擊次數（預設 1）
  //   cast:  詠唱（ATB 單位）
  //   recover: 硬直（ATB 單位，施完後額外扣 gauge）
  //   ignoreCover: 無視掩護
  //   ignoreDef:   無視防禦
  //   priority:    'lowHp' / 'backRow'（目標選擇優先）
  //   buff:   { stat:'atkPct'/'defPct'/'spdPct', amount, turns }
  //   debuff: { stat, amount, turns }
  //   status: { type:'paralyze'/'poison', delay, dmg, turns }
  //   delay:  整體 ATB 推遲（鵝鵝閃光那種）
  //   restoreSpPct: 自身回復 SP %
  //   healPct:  治療技回復 % maxHp

  // ============================================================

    // ⚔️ 鵝戰士

    { id:'tw_break',  class:'warrior', name:'撞擊破鵝',  icon:'🪓', kind:'phys', sp:22, pow:100, target:'enemy_single', cast:0, recover:30, debuff:{stat:'defPct', amount:0.25, turns:3}, unlockLv:5 },
    { id:'tw_roar',   class:'warrior', name:'戰意鵝吼',  icon:'📢', kind:'buff', sp:10, target:'self', cast:0, recover:5, buff:{stat:'atkPct', amount:0.35, turns:5}, unlockLv:6 },
    { id:'tw_smash',  class:'warrior', name:'鵝劍奧義',  icon:'🗡', kind:'phys', sp:18, pow:165, target:'enemy_single', cast:0, recover:35, unlockLv:8 },
    { id:'tw_recov',  class:'warrior', name:'鵝魂自癒',  icon:'💚', kind:'heal', sp:20, target:'self', cast:0, recover:15, healPct:0.55, unlockLv:10 },
    { id:'tw_pierce', class:'warrior', name:'穿甲鵝擊',  icon:'⚡', kind:'phys', sp:30, pow:145, target:'enemy_single', cast:30, recover:35, ignoreDef:true, unlockLv:12 },
    { id:'tw_storm',  class:'warrior', name:'鵝怒風暴',  icon:'🌪', kind:'phys', sp:35, pow:80,  target:'enemy_multi', hits:4, cast:30, recover:50, unlockLv:14 },
    { id:'tw_doom',   class:'warrior', name:'鵝皇終斬',  icon:'☠️',  kind:'phys', sp:60, pow:320, target:'enemy_single', cast:0, recover:55, unlockLv:18 },

    // 🪄 鵝法師
    { id:'tm_recharge', class:'sorcerer', name:'鵝魂湧泉', icon:'💧', kind:'mag', sp:0,  target:'self', cast:25, recover:0, restoreSpPct:0.50, unlockLv:1 },
    { id:'tm_icespear', class:'sorcerer', name:'冰鵝錐',   icon:'❄️', kind:'mag', sp:18, pow:80,  target:'enemy_single', hits:3, cast:25, recover:0, unlockLv:5 },
    { id:'tm_flash',    class:'sorcerer', name:'鵝鵝閃光', icon:'✨', kind:'mag', sp:28, pow:0,   target:'enemy_all', cast:25, recover:0, delay:25, unlockLv:7 },
    { id:'tm_pillar',   class:'sorcerer', name:'焰鵝柱擊', icon:'🔥', kind:'mag', sp:35, pow:115, target:'enemy_multi', hits:2, cast:40, recover:0, ignoreCover:true, debuff:{stat:'atkPct', amount:0.40, turns:2}, unlockLv:8 },
    { id:'tm_paralyze', class:'sorcerer', name:'鵝鵝麻痺', icon:'⚡', kind:'mag', sp:15, pow:40,  target:'enemy_single', cast:25, recover:0, status:{type:'paralyze', delay:120}, unlockLv:9 },
    { id:'tm_thunder',  class:'sorcerer', name:'雷鵝彈',   icon:'⚡', kind:'mag', sp:28, pow:340, target:'enemy_single', cast:45, recover:0, ignoreCover:true, unlockLv:11 },
    { id:'tm_firestorm',class:'sorcerer', name:'火鵝旋風', icon:'🌋', kind:'mag', sp:60, pow:85,  target:'enemy_multi', hits:5, cast:60, recover:0, ignoreCover:true, unlockLv:12 },
    { id:'tm_icejav',   class:'sorcerer', name:'冰鵝矛',   icon:'🧊', kind:'mag', sp:50, pow:130, target:'enemy_single', hits:3, cast:35, recover:0, unlockLv:14 },
    { id:'tm_iceprison',class:'sorcerer', name:'冰鵝獄',   icon:'🟦', kind:'mag', sp:35, pow:155, target:'enemy_single', cast:35, recover:0, ignoreCover:true, debuff:{stat:'defPct', amount:0.30, turns:3}, unlockLv:16 },
    { id:'tm_ball',     class:'sorcerer', name:'雷鵝球',   icon:'🔵', kind:'mag', sp:70, pow:195, target:'enemy_multi', hits:3, cast:60, recover:0, ignoreCover:true, unlockLv:18 },

    // ✨ 鵝牧師
    { id:'tp_holy',     class:'priest', name:'鵝光普照', icon:'✨', kind:'mag',  sp:10, pow:80,  target:'enemy_single', cast:10, recover:0, ignoreCover:true, unlockLv:1 },
    { id:'tp_powerheal',class:'priest', name:'鵝強治癒', icon:'💚', kind:'heal', sp:22, pow:280, target:'ally_multi', hits:2, cast:45, recover:0, priority:'lowHp', unlockLv:5 },
    { id:'tp_bless',    class:'priest', name:'鵝祝福',   icon:'🙏', kind:'buff', sp:20, target:'ally_all', cast:35, recover:0, buff:{stat:'atkPct', amount:0.18, turns:4}, unlockLv:8 },
    { id:'tp_partyheal',class:'priest', name:'鵝隊治癒', icon:'🌟', kind:'heal', sp:30, pow:130, target:'ally_all', cast:45, recover:0, unlockLv:10 },
    { id:'tp_cleanse',  class:'priest', name:'鵝清新',   icon:'🌬', kind:'heal', sp:30, pow:60,  target:'ally_all', cast:45, recover:0, cleanseStatuses:true, unlockLv:12 },
    { id:'tp_quickheal',class:'priest', name:'鵝速治癒', icon:'⚕️', kind:'heal', sp:22, pow:160, target:'ally_multi', hits:2, cast:0, recover:0, priority:'lowHp', unlockLv:14 },
    { id:'tp_smartheal',class:'priest', name:'鵝智治癒', icon:'💎', kind:'heal', sp:32, pow:175, target:'ally_multi', hits:3, cast:35, recover:0, priority:'lowHp', unlockLv:18 },

    // 🏹 鵝獵人
    { id:'th_shoot', class:'hunter', name:'鵝矢射擊', icon:'🏹', kind:'phys', sp:0,  pow:80,  target:'enemy_single', cast:0, recover:0, ignoreCover:true, priority:'backRow', unlockLv:1 },

  function evaluateJudge(rule, ctx) {
    const { judgeId, param: p } = rule;
    const v = Number(p) || 0;
    switch (judgeId) {
      case 0:   return true;
      case 100: return ctx.selfHpPct <= v;
      case 101: return ctx.selfHpPct >= v;
      case 110: return ctx.selfSpPct <= v;
      case 111: return ctx.selfSpPct >= v;
      case 200: return ctx.allies.some(a => a.alive && (a.hp / a.maxHp * 100) <= v);
      case 210: return ctx.allies.filter(a => a.alive).length <= v;
      case 300: return ctx.enemies.some(e => e.alive && (e.hp / e.maxHp * 100) <= v);
      case 310: return ctx.enemies.every(e => !e.alive || (e.hp / e.maxHp * 100) >= v);
      case 400: return ctx.enemies.filter(e => e.alive).length >= v;
      case 401: return ctx.enemies.filter(e => e.alive).length <= v;
      case 500: return ctx.actionCount === v;
      case 510: return (ctx.ruleUsage[ctx.ruleIdx] || 0) < v;
      case 600: return Math.random() * 100 < v;
      default: return false;
    }
  }

      type, slot: def.slot, name, lv: tier * 5 + 1,
      stat: def.stat, val, tier,

  function computeHeroStats(hero) {
    const cls = CLASS_BY_ID[hero.classId];
    if (!cls) return null;
    const a = hero.abilities;
    const lv = hero.level || 1;
    let maxHp = Math.round(cls.base.HP + (a.VIT - cls.base.VIT) * cls.coef.hpPerVit + (lv - 1) * 5);
    let maxSp = Math.round(cls.base.SP + (a.INT - cls.base.INT) * cls.coef.spPerInt + (lv - 1) * 2);
    let atk   = Math.round(a.STR * (cls.coef.atkPerStr || 1) + (a.DEX || 0) * (cls.coef.atkPerDex || 0));
    let magAtk= Math.round(a.INT * (cls.coef.magAtkPerInt || 1));
    let def   = Math.round(a.VIT * (cls.coef.defPerVit || 0.5));
    let magDef= Math.round(a.INT * 0.3);
    let spd   = a.SPD;
    let critRate = Math.min(0.6, a.DEX * 0.01 + a.LUK * 0.005);
    // 加上裝備
    Object.values(hero.equipment || {}).forEach(eq => {
      if (!eq) return;
      if (eq.stat === 'atk')      atk    += eq.val;
      if (eq.stat === 'magAtk')   magAtk += eq.val;
      if (eq.stat === 'def')      def    += eq.val;
      if (eq.stat === 'magDef')   magDef += eq.val;
      if (eq.stat === 'spd')      spd    += eq.val;
      if (eq.stat === 'critRate') critRate = Math.min(0.6, critRate + eq.val);
    });
    return {
      maxHp, maxSp, atk, magAtk, def, magDef, spd, critRate,
      hit: a.DEX * 1.2,
      dodge: a.SPD * 0.5,
    };
  }
  function xpForLevel(lv) { return 100 + (lv - 1) * 80; }
  function awardXp(hero, xp) {
    hero.exp = (hero.exp || 0) + xp;
    let leveled = 0;
    while (hero.exp >= xpForLevel(hero.level) && hero.level < LEVEL_MAX) {
      hero.exp -= xpForLevel(hero.level);
      hero.level += 1;
      hero.abilityPoints = (hero.abilityPoints || 0) + POINTS_PER_LEVEL_TEAM.ability;
      hero.skillPoints   = (hero.skillPoints   || 0) + POINTS_PER_LEVEL_TEAM.skill;
      // 自動學會該等級新技能
      SKILLS.forEach(s => {
        if (s.class === hero.classId && s.unlockLv === hero.level && !hero.skillsLearned.includes(s.id)) {
          hero.skillsLearned.push(s.id);
        }
      });
      leveled++;
    }
    return leveled;
  }

  // ============================================================
  // 戰鬥引擎（ATB）
  //   party = [hero...]，enemies = [monster instance...]
  //   每回合：找出 gauge 最高（>= 100）的角色出手
  //   詠唱中：減少詠唱條，到 0 才實際施放
  //   施放後：gauge -= 100 + recover
  // ============================================================
  const ATB_THRESHOLD = 100;

  function runTeamFight(party, enemies, opts) {
    opts = opts || {};
    const log = [];
    // 包裝成戰鬥用 combatant
    const wrapHero = (h, idx) => {
      const stats = computeHeroStats(h);
      return {
        idx, side: 'player', alive: true,
        ref: h, name: h.name, icon: CLASS_BY_ID[h.classId].icon,
        hp: stats.maxHp, maxHp: stats.maxHp,
        sp: stats.maxSp, maxSp: stats.maxSp,
        atk: stats.atk, magAtk: stats.magAtk, def: stats.def, magDef: stats.magDef,
        spd: stats.spd, critRate: stats.critRate,
        position: h.position,
        gauge: 0, casting: null, statuses: [],
        actionCount: 0,
        atkPctBuff: 0, defPctBuff: 0, // buffs
      };
    };
    const wrapEnemy = (m, idx) => {
      const dungeonLv = opts.enemyLv || 5;
      const k = 1 + (dungeonLv - 1) * 0.18;
      return {
        idx, side: 'enemy', alive: true,
        ref: m, name: m.name, icon: m.icon,
        hp: Math.round(m.hpBase * k), maxHp: Math.round(m.hpBase * k),
        sp: 999, maxSp: 999,
        atk: Math.round(m.atkBase * k), magAtk: Math.round(m.atkBase * k * 0.8),
        def: Math.round(m.defBase * k), magDef: Math.round(m.defBase * k * 0.7),
        spd: m.spdBase + Math.floor(dungeonLv / 4),
        critRate: 0.05,
        position: m.position || 'front',
        ability: m.ability,
        verb: m.verb,
        gauge: 0, casting: null, statuses: [],
        actionCount: 0,
        atkPctBuff: 0, defPctBuff: 0,
      };
    };
    const players = party.map(wrapHero);
    const monsters = enemies.map(wrapEnemy);

    log.push({ type: 'system', text: `═══ 隊伍 ${players.map(p=>p.icon).join('')} vs ${monsters.map(m=>m.icon).join('')} ═══` });
    log.push({ type: 'system', text: `🌬 速度：` + players.map(p=>`${p.icon}${p.spd}`).join('  ') + '  ｜  ' + monsters.map(m=>`${m.icon}${m.spd}`).join('  ') });

    let round = 0;
    const MAX_ROUNDS = 200;
    while (round < MAX_ROUNDS) {
      const alivePlayers = players.filter(p => p.alive);
      const aliveEnemies = monsters.filter(m => m.alive);
      if (alivePlayers.length === 0) {
        log.push({ type: 'system', text: `💀 隊伍全滅` });
        return { won: false, log, players, monsters };
      }
      if (aliveEnemies.length === 0) {
        log.push({ type: 'system', text: `🎉 戰鬥勝利` });
        return { won: true, log, players, monsters };
      }
      round++;

      // 找出下一個動作者
      const all = [...alivePlayers, ...aliveEnemies];
      // ATB 推進：算出最近哪個動作者最快達到 100
      let dt = Infinity;
      for (const c of all) {
        const need = ATB_THRESHOLD - c.gauge;
        const t = need / Math.max(1, c.spd);
        if (t < dt) dt = t;
      }
      if (dt === Infinity) break;
      for (const c of all) c.gauge += dt * c.spd;
      // 處理「整體 delay」效果（鵝鵝閃光）
      // 處理詠唱倒數
      // 取出 gauge 最高的可動作者
      const ready = all.filter(c => c.gauge >= ATB_THRESHOLD - 0.001).sort((a, b) => b.gauge - a.gauge);
      if (ready.length === 0) continue;
      const actor = ready[0];

      // 狀態 tick（只在此角色行動前）
      tickStatuses(actor, log, round);
      if (!actor.alive) continue;

      // 麻痺：直接消費 gauge 跳過
      if (hasStatus(actor, 'paralyze')) {
        const par = actor.statuses.find(s => s.type === 'paralyze');
        if (par && par.delay > 0) {
          par.delay -= ATB_THRESHOLD;
          actor.gauge -= ATB_THRESHOLD;
          log.push({ type: 'status', text: `回合 ${round}：${actor.icon}${actor.name} ⚡麻痺中（剩 ${Math.max(0,par.delay)}）`, gauges: snapshotGauges(all) });
          continue;
        }
      }

      // 詠唱中？
      if (actor.casting) {
        actor.casting.remaining -= ATB_THRESHOLD;
        if (actor.casting.remaining <= 0) {
          // 詠唱完成 → 釋放
          executeSkill(actor, actor.casting.skill, actor.casting.target, players, monsters, log, round);
          actor.actionCount++;
          actor.gauge -= ATB_THRESHOLD;
          if (actor.casting.skill.recover) actor.gauge -= actor.casting.skill.recover;
          actor.casting = null;
        } else {
          log.push({ type: 'cast', text: `回合 ${round}：${actor.icon}${actor.name} ⏳ 詠唱中（剩 ${actor.casting.remaining}）`, gauges: snapshotGauges(all) });
          actor.gauge -= ATB_THRESHOLD;
        }
        continue;
      }

      // 從 actionPattern 挑技能
      const allies = (actor.side === 'player') ? players : monsters;
      const foes   = (actor.side === 'player') ? monsters : players;
      const ctx = {
        selfHpPct: actor.hp / actor.maxHp * 100,
        selfSpPct: actor.sp / actor.maxSp * 100,
        allies, enemies: foes,
        actionCount: actor.actionCount + 1,
        ruleUsage: actor._ruleUsage = actor._ruleUsage || {},
        ruleIdx: 0,
      };
      let pickedSkill = null;
      let pickedRuleIdx = -1;
      const pattern = (actor.side === 'player') ? actor.ref.actionPattern : null;
      if (pattern && Array.isArray(pattern)) {
        for (let r = 0; r < pattern.length; r++) {
          const rule = pattern[r];
          ctx.ruleIdx = r;
          if (!evaluateJudge(rule, ctx)) continue;
          if (rule.skillId === 'basic') { pickedSkill = null; pickedRuleIdx = r; break; }
          const sk = SKILL_BY_ID[rule.skillId];
          if (!sk) continue;
          if (!actor.ref.skillsLearned.includes(sk.id)) continue;
          if (actor.sp < sk.sp) continue;
          pickedSkill = sk; pickedRuleIdx = r; break;
        }
      } else {
        // 怪物：50% 機率使用基本攻擊（簡化 — 怪物沒有 actionPattern）
        // 留待後續擴充
      }
      if (pickedRuleIdx >= 0) ctx.ruleUsage[pickedRuleIdx] = (ctx.ruleUsage[pickedRuleIdx] || 0) + 1;

      if (pickedSkill) {
        // 選目標
        const target = pickTarget(pickedSkill, actor, players, monsters);
        if (pickedSkill.cast > 0) {
          // 進入詠唱
          actor.casting = { skill: pickedSkill, target, remaining: pickedSkill.cast };
          log.push({ type: 'cast', text: `回合 ${round}：${actor.icon}${actor.name} ✨ 詠唱「${pickedSkill.name}」（${pickedSkill.cast} 詠唱）`, gauges: snapshotGauges(all) });
          actor.gauge -= ATB_THRESHOLD;
        } else {
          // 立即釋放
          actor.sp -= pickedSkill.sp;
          executeSkill(actor, pickedSkill, target, players, monsters, log, round);
          actor.actionCount++;
          actor.gauge -= ATB_THRESHOLD;
          if (pickedSkill.recover) actor.gauge -= pickedSkill.recover;
        }
      } else {
        // 普通攻擊
        const target = pickBasicTarget(actor, foes);
        if (target) {
          executeBasic(actor, target, log, round);
          actor.actionCount++;
        }
        actor.gauge -= ATB_THRESHOLD;
      }
    }
    log.push({ type: 'system', text: `⏱ 回合上限到，戰鬥結束（平手）` });
    return { won: monsters.every(m => !m.alive), log, players, monsters };
  }

  function snapshotGauges(combatants) {
    return combatants.map(c => ({
      icon: c.icon, side: c.side, value: Math.max(0, Math.min(100, Math.round(c.gauge))),
    }));
  }

  function pickTarget(skill, actor, players, monsters) {
    const tgt = skill.target;
    const allies = (actor.side === 'player') ? players : monsters;
    const foes   = (actor.side === 'player') ? monsters : players;
    const aliveAllies = allies.filter(c => c.alive);
    const aliveFoes   = foes.filter(c => c.alive);
    if (tgt === 'self') return [actor];
    if (tgt === 'enemy_all') return aliveFoes;
    if (tgt === 'ally_all')  return aliveAllies;
    if (tgt === 'ally_multi' || tgt === 'ally_single') {
      let pool = aliveAllies.slice();
      if (skill.priority === 'lowHp') pool.sort((a,b) => (a.hp/a.maxHp) - (b.hp/b.maxHp));
      const n = (skill.target === 'ally_multi') ? Math.min(skill.hits || 1, pool.length) : 1;
      return pool.slice(0, n);
    }
    if (tgt === 'enemy_multi' || tgt === 'enemy_single') {
      // 掩護：除非 ignoreCover，前排還活著時，後排不能被選為目標
      let pool = aliveFoes.slice();
      if (!skill.ignoreCover) {
        const fronts = pool.filter(c => c.position === 'front');
        if (fronts.length > 0) pool = fronts;
      }
      if (skill.priority === 'backRow') {
        // backRow priority：優先選後排（如果掩護沒擋到）
        pool.sort((a, b) => (b.position === 'back' ? 1 : 0) - (a.position === 'back' ? 1 : 0));
      } else if (skill.priority === 'lowHp') {
        pool.sort((a,b) => (a.hp/a.maxHp) - (b.hp/b.maxHp));
      }
      const n = (skill.target === 'enemy_multi') ? Math.min((skill.hits || 1), pool.length) : 1;
      return pool.slice(0, n);
    }
    return [];
  }
  function pickBasicTarget(actor, foes) {
    let pool = foes.filter(c => c.alive);
    const fronts = pool.filter(c => c.position === 'front');
    if (fronts.length > 0) pool = fronts;
    return pool[0] || null;
  }

  function executeSkill(actor, skill, targets, players, monsters, log, round) {
    // 治療
    if (skill.kind === 'heal') {
      const baseHeal = (skill.pow || 0) + actor.magAtk * 0.5;
      const healed = [];
      for (const t of targets) {
        if (!t.alive) continue;
        const heal = (skill.healPct ? Math.round(t.maxHp * skill.healPct) : Math.max(1, Math.round(baseHeal)));
        const before = t.hp;
        t.hp = Math.min(t.maxHp, t.hp + heal);
        healed.push(`${t.icon}${t.name}+${t.hp - before}`);
        if (skill.cleanseStatuses) t.statuses = [];
      }
      log.push({ type: 'heal', text: `回合 ${round}：${actor.icon}${actor.name} 💚 ${skill.name} → ${healed.join(' / ') || '（無對象）'}`, gauges: snapshotGauges([...players, ...monsters]) });
      return;
    }
    // buff
    if (skill.kind === 'buff' && skill.buff) {
      for (const t of targets) {
        applyStatus(t, { type: 'buff', stat: skill.buff.stat, amount: skill.buff.amount, turns: skill.buff.turns });
      }
      log.push({ type: 'status', text: `回合 ${round}：${actor.icon}${actor.name} ✨ ${skill.name} → ${targets.map(t=>t.icon+t.name).join(' / ')}（${describeBuff(skill.buff)} ${skill.buff.turns}T）`, gauges: snapshotGauges([...players, ...monsters]) });
      return;
    }
    // SP regen / 純效果
    if (skill.restoreSpPct) {
      const restored = Math.round(actor.maxSp * skill.restoreSpPct);
      actor.sp = Math.min(actor.maxSp, actor.sp + restored);
      log.push({ type: 'heal', text: `回合 ${round}：${actor.icon}${actor.name} 💧 ${skill.name} → SP +${restored}`, gauges: snapshotGauges([...players, ...monsters]) });
      return;
    }
    if (skill.delay) {
      // 全體 delay（鵝鵝閃光）
      for (const t of targets) {
        t.gauge = Math.max(0, t.gauge - skill.delay);
      }
      log.push({ type: 'status', text: `回合 ${round}：${actor.icon}${actor.name} ✨ ${skill.name} → 全敵推遲 -${skill.delay} ATB`, gauges: snapshotGauges([...players, ...monsters]) });
      return;
    }
    // 傷害技
    const isPhys = (skill.kind === 'phys');
    const hits = skill.hits || 1;
    const totalDmg = {};
    const summary = [];
    for (const t of targets) {
      if (!t.alive) continue;
      let totalForT = 0;
      let critForT = false;
      for (let h = 0; h < hits; h++) {
        if (!t.alive) break;
        const baseAtk = isPhys
          ? actor.atk * (1 + (actor.atkPctBuff || 0))
          : actor.magAtk;
        const baseDef = (skill.ignoreDef ? 0 : (isPhys ? t.def : t.magDef) * (1 + (t.defPctBuff || 0)));
        let dmg = baseAtk * (skill.pow / 100) - baseDef * 0.5;
        // 抗性
        if (!isPhys && t.ability && t.ability.type === 'magicResist') dmg *= (1 - t.ability.resist);
        if (isPhys && t.ability && t.ability.type === 'physResist') dmg *= (1 - t.ability.resist);
        const isCrit = Math.random() < (actor.critRate || 0);
        dmg *= (0.9 + Math.random() * 0.2);
        if (isCrit) { dmg *= 1.7; critForT = true; }
        dmg = Math.max(1, Math.round(dmg));
        t.hp = Math.max(0, t.hp - dmg);
        totalForT += dmg;
        if (t.hp <= 0) { t.alive = false; }
      }
      totalDmg[t.idx] = totalForT;
      summary.push(`${t.icon}${t.name}-${totalForT}${critForT ? '【爆】' : ''}${!t.alive ? '💀' : ''}`);
      // debuff
      if (skill.debuff && t.alive) {
        applyStatus(t, { type: 'debuff', stat: skill.debuff.stat, amount: -skill.debuff.amount, turns: skill.debuff.turns });
      }
      // 狀態（中毒/麻痺）
      if (skill.status && t.alive) {
        applyStatus(t, { ...skill.status });
      }
    }
    log.push({
      type: 'player' === actor.side ? 'player' : 'enemy',
      text: `回合 ${round}：${actor.icon}${actor.name} ${isPhys ? '⚔️' : '🪄'} ${skill.name}${hits>1?'×'+hits:''} → ${summary.join(' / ')}`,
      gauges: snapshotGauges([...players, ...monsters]),
    });
  }
  function executeBasic(actor, target, log, round) {
    const isPhys = true;
    const baseAtk = actor.atk * (1 + (actor.atkPctBuff || 0));
    const baseDef = target.def * (1 + (target.defPctBuff || 0));
    let dmg = baseAtk - baseDef * 0.5;
    if (target.ability && target.ability.type === 'physResist') dmg *= (1 - target.ability.resist);
    const isCrit = Math.random() < (actor.critRate || 0.05);
    dmg *= (0.9 + Math.random() * 0.2);
    if (isCrit) dmg *= 1.7;
    dmg = Math.max(1, Math.round(dmg));
    // 多段
    const hits = (actor.ability && actor.ability.type === 'multiHit') ? (actor.ability.hits || 2) : 1;
    let total = 0;
    for (let h = 0; h < hits && target.alive; h++) {
      target.hp = Math.max(0, target.hp - Math.round(dmg * (1.3 / hits)));
      total += Math.round(dmg * (1.3 / hits));
      if (target.hp <= 0) target.alive = false;
    }
    log.push({
      type: 'player' === actor.side ? 'player' : 'enemy',
      text: `回合 ${round}：${actor.icon}${actor.name} ${isCrit ? '【爆】' : ''}${actor.verb || '攻擊'} → ${target.icon}${target.name}-${total}${!target.alive ? '💀' : ''}`,
      gauges: null,  // basic 不顯示 gauge（避免太多）
    });
  }

  function applyStatus(target, status) {
    target.statuses = target.statuses || [];
    if (status.type === 'buff' || status.type === 'debuff') {
      // 立刻套用 atkPctBuff/defPctBuff
      const key = (status.stat === 'atkPct') ? 'atkPctBuff'
                : (status.stat === 'defPct') ? 'defPctBuff' : null;
      if (key) target[key] = (target[key] || 0) + status.amount;
    }
    target.statuses.push({ ...status });
  }
  function tickStatuses(target, log, round) {
    target.statuses = target.statuses || [];
    for (const s of target.statuses) {
      if (s.type === 'poison' && s.dmg) {
        target.hp = Math.max(0, target.hp - s.dmg);
        log.push({ type: 'status', text: `回合 ${round}：${target.icon}${target.name} ☠️ 中毒 -${s.dmg} HP`, gauges: null });
        if (target.hp <= 0) target.alive = false;
      }
      if (s.turns != null) s.turns -= 1;
    }
    // 移除過期 + 復原 buff/debuff
    target.statuses = target.statuses.filter(s => {
      const expire = (s.turns != null && s.turns <= 0);
      if (expire && (s.type === 'buff' || s.type === 'debuff')) {
        const key = (s.stat === 'atkPct') ? 'atkPctBuff' : (s.stat === 'defPct') ? 'defPctBuff' : null;
        if (key) target[key] = (target[key] || 0) - s.amount;
      }
      return !expire;
    });
  }
  function hasStatus(target, type) { return (target.statuses || []).some(s => s.type === type); }
  function describeBuff(b) {
    if (b.stat === 'atkPct') return `ATK +${Math.round(b.amount * 100)}%`;
    if (b.stat === 'defPct') return `DEF +${Math.round(b.amount * 100)}%`;
    return `${b.stat} +${b.amount}`;
  }

  // UI

      return;

    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === __currentTab);
      b.onclick = () => { __currentTab = b.dataset.tab; renderAll(); };

    if (__currentTab === 'heroes') renderHeroesTab(me, data);
    else if (__currentTab === 'dungeons') renderDungeonsTab(me, data);

  function renderSkillRow(skill, locked) {
    const tags = [];
    tags.push(skill.kind === 'phys' ? '物理' : skill.kind === 'mag' ? '魔法' : skill.kind === 'heal' ? '治療' : skill.kind === 'buff' ? '增益' : '其他');
    if (skill.cast)    tags.push(`詠 ${skill.cast}`);
    if (skill.recover) tags.push(`硬 ${skill.recover}`);
    if (skill.hits)    tags.push(`×${skill.hits}`);
    if (skill.ignoreCover) tags.push('無視掩護');
    if (skill.ignoreDef) tags.push('無視防');
    if (skill.priority === 'lowHp') tags.push('優先低血');
    if (skill.priority === 'backRow') tags.push('優先後排');
    return `
      <div class="skill-row${locked ? ' locked' : ''}">
        <div class="skill-icon">${skill.icon}</div>
        <div class="skill-meta">
          <div class="skill-name">${skill.name} <span style="font-weight:400; color:#9ca3af;">${locked ? `🔒 Lv ${skill.unlockLv}` : ''}</span></div>
          <div class="skill-desc">SP ${skill.sp}${skill.pow ? ` · 威力 ${skill.pow}` : ''}${skill.target ? ` · ${targetLabel(skill.target)}` : ''}</div>
          <div class="skill-tags">${tags.join(' · ')}</div>
        </div>
      </div>
    `;
  }
  function targetLabel(t) {
    const m = {
      enemy_single: '敵單體', enemy_multi: '敵多體', enemy_all: '敵全體',
      ally_single: '友單', ally_multi: '友多', ally_all: '友全體',
      self: '自身',
    };
    return m[t] || t;
  }

  function startDungeon(dungeonId, me, data) {
    const dungeon = DUNGEON_BY_ID[dungeonId];
    if (!dungeon) return;
    if (__party.length === 0) { showToast('先選隊伍'); return; }
    __dungeonProgress = {
      dungeonId,
      stage: 0,
      partyHeroIds: __party.slice(),
      totalCoins: 0,
      totalXp: 0,
      drops: [],
      ended: false,
    };
    runNextStage(me, data);
  }
  function runNextStage(me, data) {
    if (!__dungeonProgress) return;
    const dungeon = DUNGEON_BY_ID[__dungeonProgress.dungeonId];
    const stage = dungeon.stages[__dungeonProgress.stage];
    if (!stage) {
      finishDungeon(me, data);
      return;
    }
    // 組隊
    const partyHeroes = __dungeonProgress.partyHeroIds
      .map(id => me.heroes.find(h => h.id === id))
      .filter(Boolean);
    if (partyHeroes.length === 0) {
      showToast('隊伍裡沒有角色'); return;
    }
    // 組敵
    const enemies = stage.enemies.map(mid => MONSTER_BY_ID[mid]).filter(Boolean);
    // 戰鬥！
    const result = runTeamFight(partyHeroes, enemies, { enemyLv: dungeon.enemyLv });
    renderBattleResult(result, dungeon, stage, partyHeroes, me, data);
  }
  function renderBattleResult(result, dungeon, stage, partyHeroes, me, data) {
    const zone = document.getElementById('dungeonZone');
    if (!zone) return;
    const stageNum = __dungeonProgress.stage + 1;
    const isBoss = !!stage.boss;
    // 狀況面板
    const finalHpHtml = result.players.map(p => `
      <div class="combatant-card player ${p.position}">
        <div class="cc-name">${p.icon} ${p.name}${!p.alive ? ' 💀' : ''}</div>
        <div class="cc-bar"><div class="cc-bar-fill" style="width:${Math.max(0,p.hp/p.maxHp*100)}%"></div></div>
        <div class="cc-text">HP ${p.hp}/${p.maxHp}</div>
        <div class="cc-bar"><div class="cc-bar-fill sp" style="width:${Math.max(0,p.sp/p.maxSp*100)}%"></div></div>
        <div class="cc-text">SP ${p.sp}/${p.maxSp}</div>
      </div>
    `).join('');
    const enemyHpHtml = result.monsters.map(m => `
      <div class="combatant-card ${m.alive ? '' : 'dead'} ${m.position}">
        <div class="cc-name">${m.icon} ${m.name}${!m.alive ? ' 💀' : ''}</div>
        <div class="cc-bar"><div class="cc-bar-fill" style="width:${Math.max(0,m.hp/m.maxHp*100)}%"></div></div>
        <div class="cc-text">HP ${m.hp}/${m.maxHp}</div>
      </div>
    `).join('');
    // 戰鬥日誌
    const logHtml = result.log.map(l => {
      const cls = l.type ? `log-${l.type}` : '';
      let gauge = '';
      if (l.gauges) {
        gauge = `<span class="log-gauge">⏱ ${l.gauges.map(g => g.icon + (g.value)).join(' ')}</span>`;
      }
      return `<div class="log-line ${cls}">${escapeHtml(l.text)}${gauge}</div>`;
    }).join('');

    // 結算
    let resultHtml = '';
    if (result.won) {
      // 給 XP / 金幣 / 戰利品
      const xpEach = Math.round(stage.enemies.length * dungeon.enemyLv * 30 * (isBoss ? 2.5 : 1));
      const coinsEach = Math.round(stage.enemies.length * dungeon.enemyLv * 20 * (isBoss ? 2 : 1));
      __dungeonProgress.totalXp += xpEach;
      __dungeonProgress.totalCoins += coinsEach;
      // 裝備掉落（boss 比較容易掉）
      if (isBoss && Math.random() < 0.95 || (!isBoss && Math.random() < 0.4)) {
        const eq = generateEquipForDungeon(dungeon.enemyLv);
        __dungeonProgress.drops.push(eq);
      }
      // 給每個英雄 XP
      partyHeroes.forEach(h => awardXp(h, xpEach));
      saveData(data);

      const finished = __dungeonProgress.stage + 1 >= dungeon.stages.length;
      resultHtml = `
        <div class="card" style="background:linear-gradient(135deg,#dcfce7,#bbf7d0);">
          <h2>🎉 第 ${stageNum} 場勝利！${isBoss ? '（王關）' : ''}</h2>
          <div style="font-size:12px; color:#15803d; margin-bottom:6px;">
            🏆 戰利品：每位 +${xpEach} XP / 共 +${coinsEach} 鵝鵝幣${__dungeonProgress.drops.length ? ` / 累計 ${__dungeonProgress.drops.length} 件裝備` : ''}
          </div>
          ${finished
            ? `<button class="btn btn-primary" style="width:100%;" onclick="window.__teamUI.finishDungeon()">🎁 領取通關獎勵</button>`
            : `<button class="btn btn-primary" style="width:100%;" onclick="window.__teamUI.nextStage()">前往第 ${stageNum + 1} 場</button>`}
        </div>
      `;
    } else {
      __dungeonProgress.ended = true;
      resultHtml = `
        <div class="card" style="background:linear-gradient(135deg,#fee2e2,#fca5a5);">
          <h2>💀 第 ${stageNum} 場戰敗</h2>
          <div style="font-size:12px; color:#991b1b; margin-bottom:6px;">
            隊伍全滅，副本中止。已累積：⭐ ${__dungeonProgress.totalXp} XP / 🪙 ${__dungeonProgress.totalCoins} 鵝鵝幣 / 📦 ${__dungeonProgress.drops.length} 件裝備
          </div>
          <button class="btn btn-primary" style="width:100%;" onclick="window.__teamUI.exitDungeon()">退出副本</button>
        </div>
      `;
    }

    zone.innerHTML = `
      <div class="card">
        <h2>${dungeon.icon} ${dungeon.name} - 第 ${stageNum}/${dungeon.stages.length} 場${isBoss ? '（👑 王關）' : ''}</h2>
        <div class="battle-zone">
          <div style="font-size:11px; opacity:0.85; margin-bottom:6px;">隊伍狀態</div>
          <div class="battle-row">${finalHpHtml}</div>
          <div style="font-size:11px; opacity:0.85; margin: 8px 0 6px;">敵方狀態</div>
          <div class="battle-row">${enemyHpHtml}</div>
        </div>
        <details style="margin-top:8px;">
          <summary style="cursor:pointer; font-weight:700; color:#92400e;">📜 戰鬥日誌（${result.log.length} 條）</summary>
          <div style="max-height:50vh; overflow-y:auto; margin-top:8px;">${logHtml}</div>
        </details>
      </div>
      ${resultHtml}
    `;
    // 滾到 zone
    zone.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function finishDungeon(me, data) {
    const dungeon = DUNGEON_BY_ID[__dungeonProgress.dungeonId];
    // 通關獎勵
    const totalCoins = __dungeonProgress.totalCoins + dungeon.reward.coins;
    const totalXp = __dungeonProgress.totalXp;
    const drops = __dungeonProgress.drops.slice();
    // 通關還會額外掉指定數量的裝備
    for (let i = 0; i < dungeon.reward.eqDrops; i++) {
      drops.push(generateEquipForDungeon(dungeon.enemyLv));
    }
    // 獎勵：鵝鵝幣 → 用 me.coinsSpent 的負數加（跟 index.html 共用）
    me.coinsSpent = (me.coinsSpent || 0) - totalCoins;
    // 裝備分配：每件隨機給隊伍中一個英雄
    const partyHeroes = __dungeonProgress.partyHeroIds.map(id => me.heroes.find(h => h.id === id)).filter(Boolean);
    drops.forEach(eq => {
      const lucky = partyHeroes[Math.floor(Math.random() * partyHeroes.length)];
      if (lucky) {
        lucky.inventory = lucky.inventory || [];
        lucky.inventory.push(eq);
      }
    });
    saveData(data);

    const zone = document.getElementById('dungeonZone');
    if (!zone) return;
    zone.innerHTML = `
      <div class="card" style="background:linear-gradient(135deg,#fef3c7,#fde047);">
        <h2>🏆 ${dungeon.name} 通關！</h2>
        <div style="font-size:13px; color:#7c2d12; line-height:1.8;">
          🪙 共獲得 <b>${totalCoins}</b> 鵝鵝幣（含通關 ${dungeon.reward.coins}）<br>
          ⭐ 每位英雄 +<b>${totalXp}</b> XP<br>
          📦 共獲得 <b>${drops.length}</b> 件裝備（隨機分配給隊伍）<br>
        </div>
        <div style="margin-top:8px; padding:8px; background:#fff; border-radius:8px; font-size:11px; color:#92400e;">
          ${drops.map(eq => `<span style="display:inline-block; padding:2px 6px; margin:2px; background:#fef3c7; border-radius:6px;">${eq.name} +${eq.val} ${eq.stat}</span>`).join('')}
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="window.__teamUI.exitDungeon()">完成</button>
      </div>
    `;
    __dungeonProgress = null;
  }

  // ===== UI hooks =====
  window.__teamUI = {
    pickClass(classId) { __pickedClass = classId; renderAll(); },
    confirmCreate() {
      if (!__pickedClass) { showToast('先選一個職業'); return; }
      const name = document.getElementById('newHeroName')?.value.trim();
      const data = loadData();
      const me = data.players?.find(p => p.id === getMeId());
      if (!me) return;
      if (!me.heroes) me.heroes = [];
      const hero = newHero(name, __pickedClass);
      if (!hero) return;
      me.heroes.push(hero);
      saveData(data);
      __selectedHeroId = hero.id;
      __pickedClass = null;
      __creatingNew = false;  // ⭐ 結束創建模式
      showToast(`✨ 創建 ${CLASS_BY_ID[hero.classId].icon} ${hero.name}`);
      renderAll();
    },
    beginCreate() {
      __pickedClass = null;
      __creatingNew = true;  // ⭐ 進入創建模式（顯示職業選擇）
      renderAll();
    },
    cancelCreate() {
      __pickedClass = null;
      __creatingNew = false;
      renderAll();
    },
    selectHero(id) { __selectedHeroId = id; showHeroDetail(id); },
    deleteHero(id) {
      if (!confirm('刪除這個角色？無法復原')) return;
      const data = loadData();
      const me = data.players?.find(p => p.id === getMeId());
      if (!me) return;
      me.heroes = (me.heroes || []).filter(h => h.id !== id);
      saveData(data);
      __selectedHeroId = null;
      __party = __party.filter(pid => pid !== id);
      showToast('🗑 已刪除');
      renderAll();
    },
    editPattern(heroId) { openPatternEditor(heroId); },
    closeModal() { closeModal(); },
    addRule(heroId) {
      const data = loadData();
      const me = data.players?.find(p => p.id === getMeId());
      const hero = me?.heroes?.find(h => h.id === heroId);
      if (!hero) return;
      hero.actionPattern.splice(Math.max(0, hero.actionPattern.length - 1), 0, { judgeId: 0, param: 0, skillId: 'basic' });
      saveData(data);
      openPatternEditor(heroId);
    },
    removeRule(heroId, idx) {
      const data = loadData();
      const me = data.players?.find(p => p.id === getMeId());
      const hero = me?.heroes?.find(h => h.id === heroId);
      if (!hero) return;
      hero.actionPattern.splice(idx, 1);
      saveData(data);
      openPatternEditor(heroId);
    },
    updateRule(heroId, idx, field, value) {
      const data = loadData();
      const me = data.players?.find(p => p.id === getMeId());
      const hero = me?.heroes?.find(h => h.id === heroId);
      if (!hero) return;
      const rule = hero.actionPattern[idx];
      if (!rule) return;
      if (field === 'judgeId') rule.judgeId = Number(value);
      else if (field === 'param') rule.param = Number(value);
      else if (field === 'skillId') rule.skillId = value;
      saveData(data);
    },
    resetPattern(heroId) {
      if (!confirm('重置為職業預設？')) return;
      const data = loadData();
      const me = data.players?.find(p => p.id === getMeId());
      const hero = me?.heroes?.find(h => h.id === heroId);
      if (!hero) return;
      hero.actionPattern = defaultActionPattern(hero.classId);
      saveData(data);
      openPatternEditor(heroId);
    },
    toggleParty(heroId) {
      if (__party.includes(heroId)) {
        __party = __party.filter(id => id !== heroId);
      } else {
        if (__party.length >= 5) { showToast('隊伍最多 5 人'); return; }
        __party.push(heroId);
      }
      renderAll();
    },
    enterDungeon(dungeonId) {
      const data = loadData();
      const me = data.players?.find(p => p.id === getMeId());
      if (!me) return;
      startDungeon(dungeonId, me, data);
    },
    nextStage() {
      const data = loadData();
      const me = data.players?.find(p => p.id === getMeId());
      if (!me || !__dungeonProgress) return;
      __dungeonProgress.stage += 1;
      runNextStage(me, data);
    },
    finishDungeon() {
      const data = loadData();
      const me = data.players?.find(p => p.id === getMeId());
      if (!me) return;
      finishDungeon(me, data);
    },
    exitDungeon() {
      __dungeonProgress = null;
      const z = document.getElementById('dungeonZone');
      if (z) z.innerHTML = '';
      renderAll();
    },
    equipItem(heroId, invIdx) {
      const data = loadData();
      const me = data.players?.find(p => p.id === getMeId());
      const hero = me?.heroes?.find(h => h.id === heroId);
      if (!hero) return;
      const eq = hero.inventory[invIdx];
      if (!eq) return;
      // 檢查職業可裝
      const cls = CLASS_BY_ID[hero.classId];
      if (!cls.equipTypes.includes(eq.type) && !['helm','boots','accessory'].includes(eq.type)) {
        showToast(`${cls.name}不能裝 ${eq.name}`);
        return;
      }
      // 把舊的丟回背包
      const old = hero.equipment[eq.slot];
      if (old) hero.inventory.push(old);
      hero.equipment[eq.slot] = eq;
      hero.inventory.splice(invIdx, 1);
      saveData(data);
      showToast(`✨ 裝備 ${eq.name}`);
      showHeroDetail(heroId);
    },
  };

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // 啟動
  renderAll();
})();
</script>

</body>
</html>
