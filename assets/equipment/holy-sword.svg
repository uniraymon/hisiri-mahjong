<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <!-- 聖劍 -->
  <defs>
    <linearGradient id="hsword-blade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#fff7c2"/>
      <stop offset="0.5" stop-color="#fff"/>
      <stop offset="1" stop-color="#ffd966"/>
    </linearGradient>
    <radialGradient id="hsword-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff7c2" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#fff7c2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="translate(150,160) rotate(-22)">
    <!-- 光暈 -->
    <ellipse cx="0" cy="-45" rx="18" ry="60" fill="url(#hsword-glow)"/>
    <!-- 劍刃 -->
    <path d="M -5 -100 L 5 -100 L 7 0 L -7 0 Z" fill="url(#hsword-blade)" stroke="#c69a2a" stroke-width="1.5"/>
    <line x1="0" y1="-98" x2="0" y2="-2" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
    <!-- 護手（十字） -->
    <rect x="-22" y="-3" width="44" height="7" fill="#ffd966" stroke="#7a5a1a" stroke-width="1.2"/>
    <circle cx="-22" cy="0.5" r="4" fill="#ffe28a" stroke="#7a5a1a" stroke-width="1"/>
    <circle cx="22" cy="0.5" r="4" fill="#ffe28a" stroke="#7a5a1a" stroke-width="1"/>
    <!-- 握把 -->
    <rect x="-3" y="4" width="6" height="22" fill="#7a1010" stroke="#3a0808" stroke-width="1"/>
    <!-- 把頭（寶石） -->
    <circle cx="0" cy="30" r="6" fill="#3aa0e8" stroke="#1a5a8a" stroke-width="1"/>
    <circle cx="-1.5" cy="28.5" r="1.5" fill="#fff" opacity="0.8"/>
  </g>
</svg>
