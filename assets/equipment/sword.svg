<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <!-- 鐵劍（疊在右手上） -->
  <defs>
    <linearGradient id="sword-blade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#e8ecf2"/>
      <stop offset="0.5" stop-color="#fff"/>
      <stop offset="1" stop-color="#9ca3af"/>
    </linearGradient>
  </defs>
  <g transform="translate(150,160) rotate(-25)">
    <!-- 劍刃 -->
    <path d="M -4 -90 L 4 -90 L 6 0 L -6 0 Z" fill="url(#sword-blade)" stroke="#3a3e47" stroke-width="1.5"/>
    <!-- 刃光 -->
    <line x1="0" y1="-88" x2="0" y2="-2" stroke="#fff" stroke-width="1" opacity="0.7"/>
    <!-- 護手 -->
    <rect x="-16" y="-2" width="32" height="6" fill="#c69a2a" stroke="#7a5a1a" stroke-width="1"/>
    <!-- 握把 -->
    <rect x="-3" y="4" width="6" height="20" fill="#4a2818" stroke="#2a1810" stroke-width="1"/>
    <!-- 把頭 -->
    <circle cx="0" cy="26" r="5" fill="#c69a2a" stroke="#7a5a1a" stroke-width="1"/>
  </g>
</svg>
