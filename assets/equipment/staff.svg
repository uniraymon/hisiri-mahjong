<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <!-- 法杖 -->
  <defs>
    <linearGradient id="staff-wood" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#6b4226"/>
      <stop offset="1" stop-color="#3d2614"/>
    </linearGradient>
    <radialGradient id="staff-orb" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#b8e8ff"/>
      <stop offset="0.5" stop-color="#3aa0e8"/>
      <stop offset="1" stop-color="#1a4a8a"/>
    </radialGradient>
    <radialGradient id="staff-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3aa0e8" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#3aa0e8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="translate(150,160) rotate(8)">
    <!-- 杖頂光暈 -->
    <circle cx="0" cy="-90" r="22" fill="url(#staff-glow)"/>
    <!-- 杖身 -->
    <rect x="-3" y="-80" width="6" height="120" rx="2" fill="url(#staff-wood)" stroke="#1a0d06" stroke-width="1"/>
    <!-- 木紋 -->
    <line x1="-1" y1="-78" x2="-1" y2="38" stroke="#8b5a2b" stroke-width="0.6" opacity="0.6"/>
    <!-- 杖頂金屬托 -->
    <path d="M -10 -78 Q 0 -90 10 -78 L 7 -75 L -7 -75 Z" fill="#c69a2a" stroke="#7a5a1a" stroke-width="1"/>
    <path d="M -10 -78 L 10 -78" stroke="#c69a2a" stroke-width="3"/>
    <!-- 法杖寶珠 -->
    <circle cx="0" cy="-92" r="12" fill="url(#staff-orb)" stroke="#1a4a8a" stroke-width="1.5"/>
    <circle cx="-3" cy="-95" r="3" fill="#fff" opacity="0.7"/>
    <!-- 杖底金屬 -->
    <ellipse cx="0" cy="40" rx="5" ry="3" fill="#c69a2a" stroke="#7a5a1a" stroke-width="1"/>
  </g>
</svg>
