<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <!-- 弓（疊在左手） -->
  <defs>
    <linearGradient id="bow-wood" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#8b5a2b"/>
      <stop offset="1" stop-color="#4a2818"/>
    </linearGradient>
  </defs>
  <g transform="translate(50,160)">
    <!-- 弓身 -->
    <path d="M -4 -55 Q -22 0 -4 55" fill="none" stroke="url(#bow-wood)" stroke-width="6" stroke-linecap="round"/>
    <!-- 弓的高光 -->
    <path d="M -4 -55 Q -22 0 -4 55" fill="none" stroke="#c89868" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- 弓弦 -->
    <line x1="-4" y1="-55" x2="-4" y2="55" stroke="#f0f0f0" stroke-width="1.2"/>
    <!-- 中間握把（皮繩） -->
    <rect x="-9" y="-8" width="10" height="16" fill="#3a2010" stroke="#1a1006" stroke-width="1"/>
    <!-- 弓尖裝飾（葉子） -->
    <path d="M -8 -57 Q -6 -64 -2 -60 Q -4 -54 -8 -57 Z" fill="#5fa055" stroke="#1f4a1a" stroke-width="0.8"/>
    <path d="M -8 57 Q -6 64 -2 60 Q -4 54 -8 57 Z" fill="#5fa055" stroke="#1f4a1a" stroke-width="0.8"/>
    <!-- 箭（搭在弦上） -->
    <line x1="0" y1="0" x2="35" y2="0" stroke="#8b5a2b" stroke-width="1.5"/>
    <path d="M 35 0 L 41 -3 L 38 0 L 41 3 Z" fill="#9ca3af" stroke="#3a3e47" stroke-width="0.8"/>
    <path d="M -2 -3 L -8 -1 L -8 1 L -2 3 Z" fill="#e8d18a" stroke="#7a5a1a" stroke-width="0.5"/>
  </g>
</svg>
