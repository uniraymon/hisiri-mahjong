<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <!-- 戰士 Warrior -->
  <defs>
    <linearGradient id="war-skin" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffd9b3"/>
      <stop offset="1" stop-color="#f3b98a"/>
    </linearGradient>
    <linearGradient id="war-hair" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#7a3a1f"/>
      <stop offset="1" stop-color="#4d2110"/>
    </linearGradient>
    <linearGradient id="war-armor" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#a3a8b3"/>
      <stop offset="1" stop-color="#6d7280"/>
    </linearGradient>
    <linearGradient id="war-belt" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#6b4226"/>
      <stop offset="1" stop-color="#3d2614"/>
    </linearGradient>
  </defs>

  <!-- 影子 -->
  <ellipse cx="100" cy="238" rx="42" ry="6" fill="#000" opacity="0.18"/>

  <!-- 腿 -->
  <rect x="78" y="170" width="18" height="60" rx="6" fill="url(#war-belt)"/>
  <rect x="104" y="170" width="18" height="60" rx="6" fill="url(#war-belt)"/>
  <!-- 鞋 -->
  <ellipse cx="87" cy="232" rx="14" ry="6" fill="#2a1810"/>
  <ellipse cx="113" cy="232" rx="14" ry="6" fill="#2a1810"/>

  <!-- 身體（鎧甲） -->
  <path d="M 60 110 Q 60 100 70 100 L 130 100 Q 140 100 140 110 L 140 175 Q 140 180 135 180 L 65 180 Q 60 180 60 175 Z" fill="url(#war-armor)" stroke="#3a3e47" stroke-width="2"/>
  <!-- 鎧甲腹線 -->
  <line x1="100" y1="105" x2="100" y2="175" stroke="#3a3e47" stroke-width="2" opacity="0.6"/>
  <line x1="70" y1="135" x2="130" y2="135" stroke="#3a3e47" stroke-width="2" opacity="0.6"/>
  <!-- 腰帶 -->
  <rect x="60" y="160" width="80" height="14" fill="url(#war-belt)" stroke="#2a1810" stroke-width="1"/>
  <circle cx="100" cy="167" r="4" fill="#d4af37" stroke="#7a5a1a" stroke-width="1"/>

  <!-- 手臂 -->
  <ellipse cx="55" cy="135" rx="14" ry="22" fill="url(#war-armor)" stroke="#3a3e47" stroke-width="1.5"/>
  <ellipse cx="145" cy="135" rx="14" ry="22" fill="url(#war-armor)" stroke="#3a3e47" stroke-width="1.5"/>
  <!-- 手 -->
  <circle cx="50" cy="160" r="9" fill="url(#war-skin)" stroke="#a17042" stroke-width="1"/>
  <circle cx="150" cy="160" r="9" fill="url(#war-skin)" stroke="#a17042" stroke-width="1"/>

  <!-- 護肩 -->
  <ellipse cx="55" cy="115" rx="18" ry="10" fill="url(#war-armor)" stroke="#3a3e47" stroke-width="1.5"/>
  <ellipse cx="145" cy="115" rx="18" ry="10" fill="url(#war-armor)" stroke="#3a3e47" stroke-width="1.5"/>

  <!-- 脖子 -->
  <rect x="92" y="92" width="16" height="14" fill="url(#war-skin)"/>

  <!-- 頭 -->
  <circle cx="100" cy="65" r="32" fill="url(#war-skin)" stroke="#a17042" stroke-width="1.5"/>

  <!-- 頭髮 -->
  <path d="M 70 55 Q 68 35 90 32 Q 100 22 110 32 Q 132 35 130 55 Q 130 48 122 48 Q 118 42 110 44 Q 100 38 90 44 Q 82 42 78 48 Q 70 48 70 55 Z" fill="url(#war-hair)"/>

  <!-- 頭巾/額帶 -->
  <rect x="68" y="56" width="64" height="6" fill="#8b1a1a" stroke="#4a0d0d" stroke-width="1"/>

  <!-- 眼睛 -->
  <ellipse cx="89" cy="70" rx="3" ry="4" fill="#2a1810"/>
  <ellipse cx="111" cy="70" rx="3" ry="4" fill="#2a1810"/>
  <circle cx="90" cy="69" r="1" fill="#fff"/>
  <circle cx="112" cy="69" r="1" fill="#fff"/>

  <!-- 眉毛 -->
  <path d="M 84 63 L 94 64" stroke="#3a1f10" stroke-width="2" stroke-linecap="round"/>
  <path d="M 106 64 L 116 63" stroke="#3a1f10" stroke-width="2" stroke-linecap="round"/>

  <!-- 嘴 -->
  <path d="M 95 82 Q 100 86 105 82" stroke="#7a3a1f" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
