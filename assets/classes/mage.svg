<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <!-- 巫師 Wizard -->
  <defs>
    <linearGradient id="wiz-skin" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fde7d3"/>
      <stop offset="1" stop-color="#f1c9a3"/>
    </linearGradient>
    <linearGradient id="wiz-robe" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#5b3aa8"/>
      <stop offset="1" stop-color="#2d1a5a"/>
    </linearGradient>
    <linearGradient id="wiz-hat" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#6c44c2"/>
      <stop offset="1" stop-color="#2d1a5a"/>
    </linearGradient>
    <linearGradient id="wiz-trim" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe28a"/>
      <stop offset="1" stop-color="#c69a2a"/>
    </linearGradient>
    <radialGradient id="wiz-aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 魔法光暈背景（巫師專屬） -->
  <circle cx="100" cy="125" r="95" fill="url(#wiz-aura)"/>

  <ellipse cx="100" cy="238" rx="44" ry="6" fill="#000" opacity="0.18"/>

  <!-- 長袍（下擺寬） -->
  <path d="M 70 110 Q 70 100 80 100 L 120 100 Q 130 100 130 110 L 145 230 Q 145 235 140 235 L 60 235 Q 55 235 55 230 Z" fill="url(#wiz-robe)" stroke="#1a0d3a" stroke-width="2"/>
  <!-- 袍子下擺金邊 -->
  <path d="M 60 230 L 140 230" stroke="url(#wiz-trim)" stroke-width="3"/>
  <!-- 衣襟金線 -->
  <line x1="100" y1="105" x2="100" y2="225" stroke="url(#wiz-trim)" stroke-width="2"/>

  <!-- 星星裝飾 -->
  <path d="M 85 145 L 87 150 L 92 151 L 88 154 L 89 159 L 85 156 L 81 159 L 82 154 L 78 151 L 83 150 Z" fill="url(#wiz-trim)"/>
  <path d="M 118 175 L 119 178 L 122 178.5 L 120 180.5 L 120.5 184 L 118 182 L 115.5 184 L 116 180.5 L 114 178.5 L 117 178 Z" fill="url(#wiz-trim)"/>

  <!-- 手臂 -->
  <ellipse cx="58" cy="135" rx="12" ry="24" fill="url(#wiz-robe)" stroke="#1a0d3a" stroke-width="1.5"/>
  <ellipse cx="142" cy="135" rx="12" ry="24" fill="url(#wiz-robe)" stroke="#1a0d3a" stroke-width="1.5"/>
  <!-- 袖口金邊 -->
  <ellipse cx="58" cy="158" rx="13" ry="4" fill="url(#wiz-trim)"/>
  <ellipse cx="142" cy="158" rx="13" ry="4" fill="url(#wiz-trim)"/>
  <!-- 手 -->
  <circle cx="56" cy="162" r="8" fill="url(#wiz-skin)" stroke="#a17042" stroke-width="1"/>
  <circle cx="144" cy="162" r="8" fill="url(#wiz-skin)" stroke="#a17042" stroke-width="1"/>

  <!-- 脖子 -->
  <rect x="93" y="92" width="14" height="14" fill="url(#wiz-skin)"/>

  <!-- 頭 -->
  <circle cx="100" cy="65" r="30" fill="url(#wiz-skin)" stroke="#a17042" stroke-width="1.5"/>

  <!-- 鬍鬚（白色，有點老法師感） -->
  <path d="M 88 80 Q 100 105 112 80 L 110 92 Q 100 100 90 92 Z" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>

  <!-- 眼睛 -->
  <ellipse cx="89" cy="70" rx="3" ry="3.5" fill="#2a1860"/>
  <ellipse cx="111" cy="70" rx="3" ry="3.5" fill="#2a1860"/>
  <circle cx="90" cy="69" r="1" fill="#fff"/>
  <circle cx="112" cy="69" r="1" fill="#fff"/>

  <!-- 眉毛（粗白眉） -->
  <path d="M 82 62 Q 89 58 96 62" stroke="#e8e8e8" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 104 62 Q 111 58 118 62" stroke="#e8e8e8" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 巫師帽 -->
  <path d="M 60 45 L 100 -10 L 140 45 Z" fill="url(#wiz-hat)" stroke="#1a0d3a" stroke-width="2"/>
  <!-- 帽尖小球 -->
  <circle cx="100" cy="-8" r="4" fill="url(#wiz-trim)"/>
  <!-- 帽簷 -->
  <ellipse cx="100" cy="48" rx="44" ry="8" fill="url(#wiz-hat)" stroke="#1a0d3a" stroke-width="2"/>
  <!-- 帽帶（金色） -->
  <rect x="56" y="42" width="88" height="6" fill="url(#wiz-trim)" stroke="#7a5a1a" stroke-width="1"/>
  <!-- 帽子上的星星 -->
  <path d="M 95 25 L 97 30 L 102 31 L 98 34 L 99 39 L 95 36 L 91 39 L 92 34 L 88 31 L 93 30 Z" fill="url(#wiz-trim)"/>
</svg>
