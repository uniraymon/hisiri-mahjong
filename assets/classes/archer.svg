<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <!-- 精靈弓手 Elf Archer -->
  <defs>
    <linearGradient id="arc-skin" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fde7d3"/>
      <stop offset="1" stop-color="#f1c9a3"/>
    </linearGradient>
    <linearGradient id="arc-hair" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e8d18a"/>
      <stop offset="1" stop-color="#a8843a"/>
    </linearGradient>
    <linearGradient id="arc-tunic" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#5fa055"/>
      <stop offset="1" stop-color="#2f6029"/>
    </linearGradient>
    <linearGradient id="arc-pant" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#6b4226"/>
      <stop offset="1" stop-color="#3d2614"/>
    </linearGradient>
  </defs>

  <ellipse cx="100" cy="238" rx="40" ry="6" fill="#000" opacity="0.18"/>

  <!-- 腿 -->
  <rect x="80" y="170" width="16" height="60" rx="5" fill="url(#arc-pant)"/>
  <rect x="104" y="170" width="16" height="60" rx="5" fill="url(#arc-pant)"/>
  <!-- 靴 -->
  <path d="M 76 222 L 100 222 L 98 234 L 78 234 Z" fill="#4a2818"/>
  <path d="M 102 222 L 124 222 L 122 234 L 100 234 Z" fill="#4a2818"/>

  <!-- 身體（綠色短袍） -->
  <path d="M 65 110 Q 65 100 75 100 L 125 100 Q 135 100 135 110 L 135 172 Q 135 178 130 178 L 70 178 Q 65 178 65 172 Z" fill="url(#arc-tunic)" stroke="#1f4a1a" stroke-width="2"/>
  <!-- 衣襟 -->
  <path d="M 100 100 L 90 178" stroke="#1f4a1a" stroke-width="2" opacity="0.6"/>
  <!-- 葉子裝飾 -->
  <path d="M 88 115 Q 95 110 100 118 Q 95 125 88 120 Z" fill="#a8d878" stroke="#1f4a1a" stroke-width="1"/>

  <!-- 腰帶 -->
  <rect x="65" y="160" width="70" height="10" fill="url(#arc-pant)" stroke="#2a1810" stroke-width="1"/>

  <!-- 手臂 -->
  <ellipse cx="58" cy="135" rx="11" ry="22" fill="url(#arc-tunic)" stroke="#1f4a1a" stroke-width="1.5"/>
  <ellipse cx="142" cy="135" rx="11" ry="22" fill="url(#arc-tunic)" stroke="#1f4a1a" stroke-width="1.5"/>
  <!-- 手 -->
  <circle cx="56" cy="158" r="8" fill="url(#arc-skin)" stroke="#a17042" stroke-width="1"/>
  <circle cx="144" cy="158" r="8" fill="url(#arc-skin)" stroke="#a17042" stroke-width="1"/>

  <!-- 脖子 -->
  <rect x="93" y="92" width="14" height="14" fill="url(#arc-skin)"/>

  <!-- 頭 -->
  <circle cx="100" cy="65" r="30" fill="url(#arc-skin)" stroke="#a17042" stroke-width="1.5"/>

  <!-- 精靈耳 -->
  <path d="M 70 65 L 60 55 L 65 72 Z" fill="url(#arc-skin)" stroke="#a17042" stroke-width="1.2"/>
  <path d="M 130 65 L 140 55 L 135 72 Z" fill="url(#arc-skin)" stroke="#a17042" stroke-width="1.2"/>

  <!-- 頭髮（長髮 + 瀏海） -->
  <path d="M 72 50 Q 70 30 90 28 Q 100 20 110 28 Q 130 30 128 50 L 130 60 Q 122 50 115 50 Q 108 42 100 46 Q 92 42 85 50 Q 78 50 70 60 Z" fill="url(#arc-hair)" stroke="#7a5a1a" stroke-width="1"/>
  <!-- 後方長髮 -->
  <path d="M 72 60 Q 65 90 72 110 L 78 105 Q 75 85 80 65 Z" fill="url(#arc-hair)" opacity="0.85"/>
  <path d="M 128 60 Q 135 90 128 110 L 122 105 Q 125 85 120 65 Z" fill="url(#arc-hair)" opacity="0.85"/>

  <!-- 葉子髮飾 -->
  <path d="M 78 38 Q 84 32 90 38 Q 84 44 78 38 Z" fill="#a8d878" stroke="#1f4a1a" stroke-width="1"/>

  <!-- 眼睛 -->
  <ellipse cx="89" cy="70" rx="3" ry="4" fill="#2f6029"/>
  <ellipse cx="111" cy="70" rx="3" ry="4" fill="#2f6029"/>
  <circle cx="90" cy="69" r="1" fill="#fff"/>
  <circle cx="112" cy="69" r="1" fill="#fff"/>

  <!-- 眉 -->
  <path d="M 85 64 Q 90 62 94 64" stroke="#7a5a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 106 64 Q 110 62 115 64" stroke="#7a5a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 嘴 -->
  <path d="M 96 82 Q 100 84 104 82" stroke="#7a3a1f" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
