<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <!-- 聖騎士 Paladin -->
  <defs>
    <linearGradient id="pal-skin" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffd9b3"/>
      <stop offset="1" stop-color="#f3b98a"/>
    </linearGradient>
    <linearGradient id="pal-hair" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe28a"/>
      <stop offset="1" stop-color="#c69a2a"/>
    </linearGradient>
    <linearGradient id="pal-armor" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f5f5f5"/>
      <stop offset="1" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="pal-cape" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e63a3a"/>
      <stop offset="1" stop-color="#7a1010"/>
    </linearGradient>
    <linearGradient id="pal-gold" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe28a"/>
      <stop offset="1" stop-color="#c69a2a"/>
    </linearGradient>
    <radialGradient id="pal-halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff7c2" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#fff7c2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 聖光光暈 -->
  <circle cx="100" cy="60" r="55" fill="url(#pal-halo)"/>

  <ellipse cx="100" cy="238" rx="44" ry="6" fill="#000" opacity="0.18"/>

  <!-- 披風（從肩膀往下） -->
  <path d="M 50 110 Q 35 130 30 230 L 50 232 L 60 130 Z" fill="url(#pal-cape)" stroke="#4a0808" stroke-width="2"/>
  <path d="M 150 110 Q 165 130 170 230 L 150 232 L 140 130 Z" fill="url(#pal-cape)" stroke="#4a0808" stroke-width="2"/>

  <!-- 腿（金屬護脛） -->
  <rect x="78" y="170" width="18" height="60" rx="6" fill="url(#pal-armor)" stroke="#3a3e47" stroke-width="1.5"/>
  <rect x="104" y="170" width="18" height="60" rx="6" fill="url(#pal-armor)" stroke="#3a3e47" stroke-width="1.5"/>
  <!-- 鞋（金屬靴） -->
  <ellipse cx="87" cy="232" rx="14" ry="6" fill="#5a606b" stroke="#2a2e37" stroke-width="1"/>
  <ellipse cx="113" cy="232" rx="14" ry="6" fill="#5a606b" stroke="#2a2e37" stroke-width="1"/>

  <!-- 板甲身體 -->
  <path d="M 58 110 Q 58 100 68 100 L 132 100 Q 142 100 142 110 L 142 175 Q 142 180 137 180 L 63 180 Q 58 180 58 175 Z" fill="url(#pal-armor)" stroke="#3a3e47" stroke-width="2"/>

  <!-- 胸前十字（聖騎標誌） -->
  <rect x="96" y="118" width="8" height="40" fill="url(#pal-gold)" stroke="#7a5a1a" stroke-width="1"/>
  <rect x="84" y="130" width="32" height="8" fill="url(#pal-gold)" stroke="#7a5a1a" stroke-width="1"/>

  <!-- 腰帶 -->
  <rect x="58" y="160" width="84" height="14" fill="#4a2818" stroke="#2a1810" stroke-width="1"/>
  <rect x="94" y="161" width="12" height="12" fill="url(#pal-gold)" stroke="#7a5a1a" stroke-width="1"/>

  <!-- 手臂 -->
  <ellipse cx="55" cy="135" rx="14" ry="22" fill="url(#pal-armor)" stroke="#3a3e47" stroke-width="1.5"/>
  <ellipse cx="145" cy="135" rx="14" ry="22" fill="url(#pal-armor)" stroke="#3a3e47" stroke-width="1.5"/>
  <!-- 手 -->
  <circle cx="50" cy="160" r="9" fill="url(#pal-skin)" stroke="#a17042" stroke-width="1"/>
  <circle cx="150" cy="160" r="9" fill="url(#pal-skin)" stroke="#a17042" stroke-width="1"/>

  <!-- 護肩（金邊） -->
  <ellipse cx="55" cy="115" rx="20" ry="11" fill="url(#pal-armor)" stroke="url(#pal-gold)" stroke-width="2.5"/>
  <ellipse cx="145" cy="115" rx="20" ry="11" fill="url(#pal-armor)" stroke="url(#pal-gold)" stroke-width="2.5"/>

  <!-- 脖子 -->
  <rect x="92" y="92" width="16" height="14" fill="url(#pal-skin)"/>

  <!-- 頭 -->
  <circle cx="100" cy="65" r="32" fill="url(#pal-skin)" stroke="#a17042" stroke-width="1.5"/>

  <!-- 金髮 -->
  <path d="M 70 55 Q 68 32 90 30 Q 100 20 110 30 Q 132 32 130 55 Q 130 48 122 48 Q 118 42 110 44 Q 100 38 90 44 Q 82 42 78 48 Q 70 48 70 55 Z" fill="url(#pal-hair)" stroke="#7a5a1a" stroke-width="1"/>

  <!-- 頭頂光環 -->
  <ellipse cx="100" cy="22" rx="22" ry="4" fill="none" stroke="url(#pal-gold)" stroke-width="3" opacity="0.9"/>

  <!-- 眼睛 -->
  <ellipse cx="89" cy="70" rx="3" ry="4" fill="#2a4860"/>
  <ellipse cx="111" cy="70" rx="3" ry="4" fill="#2a4860"/>
  <circle cx="90" cy="69" r="1" fill="#fff"/>
  <circle cx="112" cy="69" r="1" fill="#fff"/>

  <!-- 眉 -->
  <path d="M 84 63 Q 89 61 94 63" stroke="#7a5a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 106 63 Q 111 61 116 63" stroke="#7a5a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- 嘴（微笑） -->
  <path d="M 94 82 Q 100 87 106 82" stroke="#7a3a1f" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
